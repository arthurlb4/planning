<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Planning</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Planning">
<meta name="theme-color" id="theme-color-meta" content="#18181b">
<link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='22' fill='%230C447C'/%3E%3Ctext y='.9em' font-size='70' x='10' fill='white'%3E%F0%9F%93%85%3C/text%3E%3C/svg%3E">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.47.0/tabler-icons.min.css">
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');
:root{
  --bg:#18181b;--bg2:#27272a;--bg3:#3f3f46;
  --text:#f4f4f5;--text2:#d4d4d8;--text3:#71717a;
  --border:rgba(255,255,255,.12);--border2:rgba(255,255,255,.06);
  --r:10px;--rl:14px;
  --blue:#4ea0f7;--blue-l:#1a2d45;--blue-m:#2a4a6e;
  --green:#5a9e3f;--green-l:#1a2e10;--green-m:#2a4a1a;
  --amber:#e09830;--red:#c0392b;
  --gold:#b8941e;--gold-dark:#9a7a18;--gold-l:rgba(184,148,30,.15);--gold-b:rgba(184,148,30,.35);
  --rendu-red:#b0443a;--rendu-red-l:rgba(176,68,58,.18);--rendu-red-text:#d4776f;
  --fer-bg:#7a5c14;--fer-bg-light:#8f6e1a;--fer-text:#e8d5a3;
  --font:'Inter',-apple-system,sans-serif;
}
[data-theme=light]{
  --bg:#fff;--bg2:#f7f7f5;--bg3:#eeede9;
  --text:#1a1a18;--text2:#5f5e5a;--text3:#b4b2a9;
  --border:rgba(0,0,0,.11);--border2:rgba(0,0,0,.06);
  --blue:#0C447C;--blue-l:#E6F1FB;--blue-m:#B5D4F4;
  --green:#3d6b18;--green-l:#eef5e5;--green-m:#c8ddb0;
  --gold-l:rgba(184,148,30,.10);--gold-b:rgba(184,148,30,.25);
  --rendu-red:#b0443a;--rendu-red-l:rgba(176,68,58,.08);--rendu-red-text:#b0443a;
  --fer-bg:#e8d5a3;--fer-bg-light:#f0e2c0;--fer-text:#7a5c14;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;font-family:var(--font);}
html,body{height:100%;background:var(--bg);color:var(--text);transition:background .25s,color .25s;}
input,select,button,textarea{font-family:var(--font);}
input[type=number]::-webkit-inner-spin-button,input[type=number]::-webkit-outer-spin-button{-webkit-appearance:none;margin:0;}
input[type=number]{-moz-appearance:textfield;appearance:textfield;}
#app{display:block;}
.app-outer{max-width:1080px;margin:0 auto;padding:10px 12px 60px;}
.layout{display:flex;gap:14px;align-items:flex-start;}
.cal-col{flex:1;min-width:0;position:relative;}
.side-col{width:260px;flex-shrink:0;display:flex;flex-direction:column;gap:8px;padding-top:38px;}
@media(max-width:720px){.layout{flex-direction:column;}.side-col{width:100%;padding-top:0;}}

/* HEADER */
.hdr{display:flex;align-items:center;justify-content:space-between;padding:14px 20px;margin:-10px calc(-50vw + 50%) 50px;background:var(--bg2);border-bottom:0.5px solid var(--border);position:sticky;top:-1px;z-index:200;transition:transform .2s ease;}
.hdr-title{font-size:16px;font-weight:600;}
.hdr-btns{display:flex;gap:5px;align-items:center;}
.ibtn{background:transparent;border:0.5px solid var(--border);border-radius:var(--r);padding:6px 9px;font-size:12px;cursor:pointer;color:var(--text2);display:flex;align-items:center;gap:4px;transition:background .1s;}
.ibtn:hover{background:var(--bg2);}
.ibtn:active{opacity:.7;}
.ibtn:disabled{opacity:.3;pointer-events:none;}

/* NAV */
.mbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;gap:4px;position:relative;}
.mnav{background:transparent;border:0.5px solid var(--border);border-radius:var(--r);padding:6px 12px;font-size:14px;cursor:pointer;color:var(--text);transition:background .1s;}
.mnav:hover{background:var(--bg2);}
.mnav.today{font-size:12px;padding:6px 12px;font-weight:500;background:transparent;color:var(--text);border-color:var(--border);}
.mtit{font-size:15px;font-weight:500;cursor:pointer;padding:4px 8px;border-radius:var(--r);transition:background .1s;position:absolute;left:50%;transform:translateX(-50%);white-space:nowrap;}
#month-view{transition:opacity .18s ease,transform .18s ease;}
.slide-left{animation:slideLeft .2s ease forwards;}
.slide-right{animation:slideRight .2s ease forwards;}
@keyframes slideLeft{from{opacity:1;transform:translateX(0)}to{opacity:0;transform:translateX(-28px)}}
@keyframes slideRight{from{opacity:1;transform:translateX(0)}to{opacity:0;transform:translateX(28px)}}
.slide-in-left{animation:slideInLeft .2s ease forwards;}
.slide-in-right{animation:slideInRight .2s ease forwards;}
@keyframes slideInLeft{from{opacity:0;transform:translateX(28px)}to{opacity:1;transform:translateX(0)}}
@keyframes slideInRight{from{opacity:0;transform:translateX(-28px)}to{opacity:1;transform:translateX(0)}}
.mtit:hover{background:var(--bg2);}

/* Month view */
#month-view{transition:opacity .2s ease,transform .2s ease;}

/* Annual view */
.ann-wrap{overflow:hidden;pointer-events:none;opacity:0;visibility:hidden;position:absolute;top:0;left:0;right:0;transition:opacity .2s ease;}
.ann-wrap.open{pointer-events:all;opacity:1;display:block;}
.annual-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:10px;width:100%;box-sizing:border-box;}
@media(max-width:600px){.annual-grid{grid-template-columns:repeat(3,1fr);}}
.ann-month{background:var(--bg2);border:2px solid transparent;border-radius:var(--r);padding:8px;cursor:pointer;transition:background .1s;}
.ann-month:hover{background:var(--bg3);}
.ann-month.sel{border-color:var(--border);background:var(--bg2);}
[data-theme=light] .ann-month.sel{border-color:var(--border);background:var(--bg2);}
.ann-month.cur-month{background:var(--blue-l);border-color:var(--blue-m);}
[data-theme=light] .ann-month.cur-month{background:var(--blue-l);border-color:var(--blue-m);}
.ann-mname{font-size:12px;font-weight:500;color:var(--text);margin-bottom:5px;}
.ann-mini{display:grid;grid-template-columns:repeat(7,1fr);gap:1px;}
.ann-day{width:100%;aspect-ratio:1;border-radius:2px;outline:0.5px solid rgba(255,255,255,.07);}
[data-theme=light] .ann-day{outline:0.5px solid rgba(0,0,0,.07);}
.ann-day.tv{background:var(--blue-l);}
.ann-day.cg{background:var(--green-l);}
.ann-day.rend{background:var(--rendu-red-l);}
.ann-day.fer{background:var(--gold-l);}
.ann-day.tv-fer{background:var(--blue-l);outline:1.5px solid var(--gold);}
.ann-day.ec,.ann-day.ec-fer{background:rgba(124,92,191,.18);}
.ann-day.ec2,.ann-day.ec2-fer{background:var(--bg3);}
.ann-day.cg-fer{background:var(--green-l);outline:1.5px solid var(--gold);}
.ann-day.rend-fer{background:var(--rendu-red-l);outline:1.5px solid var(--gold);}
.ann-day.absent-fer{background:var(--bg3);outline:1.5px solid var(--gold);}
.ann-day.absent{background:var(--bg3);}
.ann-day.sv,.ann-day.rh{background:rgba(255,255,255,.03);}
[data-theme=light] .ann-day.sv,[data-theme=light] .ann-day.rh{background:rgba(0,0,0,.03);}
.ann-day.ram{background:var(--gold-l);}

/* Calendar */
.cal-wrap{background:var(--bg);border:0.5px solid var(--border);border-radius:var(--rl);overflow:hidden;margin-bottom:8px;width:100%;box-sizing:border-box;}
.cal{width:100%;border-collapse:collapse;table-layout:fixed;}
.cal th{font-size:10px;color:var(--text3);text-align:center;padding:4px 2px 3px;font-weight:400;}
.cal th.wkh{width:20px;}
.cal td{text-align:center;padding:4px;}
/* ramtr row bg removed - only wkn.wram is colored */
.cal tr.curweek td{background:rgba(78,160,247,.06);}
[data-theme=light] .cal tr.curweek td{background:rgba(12,68,124,.05);}
.cal tr.cgweek td{background:rgba(90,158,63,.07);}
[data-theme=light] .cal tr.cgweek td{background:rgba(61,107,24,.06);}
/* Week number - base */
.wkn{font-size:9px;color:var(--text3);text-align:center;vertical-align:middle;width:20px;padding:1px 2px;border-radius:4px;}
/* Colored week numbers */

.wkn.wcur{background:var(--blue-l);color:var(--blue);font-weight:600;}.wkn.wram{background:var(--gold-l)!important;color:var(--gold-dark)!important;font-weight:600;}.wkn.wcg{background:var(--green-l)!important;color:var(--green)!important;font-weight:600;}


.dc{width:100%;padding-top:80%;position:relative;border-radius:var(--r);display:block;}
.dci{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1px;border-radius:var(--r);transition:background .1s;}
.dn{font-size:13px;font-weight:500;line-height:1;}
.dv{font-size:10px;line-height:1;opacity:.85;}

/* Day states */
.s-tv .dci{background:var(--blue-l);color:var(--blue);cursor:pointer;}
.s-tv .dci:hover{background:var(--blue-m);}
.s-rh .dci{color:#b080c0;cursor:pointer;}
.s-rh .dci:hover{background:var(--bg2);}
.s-sv .dci{color:var(--text3);cursor:pointer;}
.s-sv .dci:hover{background:var(--bg2);}
/* Fériés: bordure dorée, pas de fond */
.s-fer .dci{background:transparent;color:var(--gold);box-shadow:inset 0 0 0 1.5px var(--gold);cursor:pointer;}
.s-fer .dci:hover{background:var(--gold-l);}
[data-theme=light] .s-fer .dci{color:var(--gold-dark);box-shadow:inset 0 0 0 1.5px var(--gold);}
.s-cg .dci{background:var(--green-l);color:var(--green);cursor:pointer;}
.s-cg .dci:hover{background:var(--green-m);}
.s-rend .dci{background:var(--rendu-red-l);color:var(--rendu-red-text);cursor:pointer;}
.s-rend .dci:hover{background:rgba(176,68,58,.28);}
.s-sv-vac .dci{background:rgba(7,224,210,.18);color:#07E0D2;cursor:pointer;}
.s-sv-vac .dci:hover{background:rgba(7,224,210,.28);}
[data-theme=light] .s-sv-vac .dci{background:rgba(7,224,210,.15);color:#059688;}
[data-theme=light] .s-sv-vac .dci:hover{background:rgba(7,224,210,.25);}
.s-absent .dci{background:var(--bg3);color:var(--text3);cursor:pointer;}
/* All *-fer states share the gold border */
.s-tv-fer .dci,.s-cg-fer .dci,.s-rend-fer .dci,.s-absent-fer .dci,.s-ec2-fer .dci{box-shadow:inset 0 0 0 1.5px var(--gold);}
.s-tv-fer .dci{background:var(--blue-l);color:var(--blue);cursor:pointer;}
.s-tv-fer .dci:hover{background:var(--blue-m);}
.s-cg-fer .dci{background:var(--green-l);color:var(--green);cursor:pointer;}
.s-cg-fer .dci:hover{background:var(--green-m);}
.s-rend-fer .dci{background:var(--rendu-red-l);color:var(--rendu-red-text);cursor:pointer;}
.s-rend-fer .dci:hover{opacity:.8;}
.s-absent-fer .dci{background:var(--bg3);color:var(--text3);cursor:pointer;}
.s-ec2-fer .dci{background:var(--bg3);color:var(--text3);cursor:pointer;}
/* Échange: orange=je travaille, gris=collègue couvre */
.s-ec .dci{background:var(--orange-bg,rgba(124,92,191,.20));color:#9b7fe0;cursor:pointer;}
.s-ec .dci:hover{background:rgba(124,92,191,.32);}
.s-ec-fer .dci{background:var(--orange-bg,rgba(124,92,191,.20));color:#9b7fe0;box-shadow:inset 0 0 0 1.5px var(--gold);cursor:pointer;}
.s-ec-fer .dci:hover{background:rgba(124,92,191,.32);}
.s-ec2 .dci{background:var(--bg3);color:var(--text3);cursor:pointer;}
.s-ec2 .dci:hover{background:var(--bg3);}
.pdot{position:absolute;top:3px;right:3px;width:5px;height:5px;border-radius:50%;background:#FFB300;}

/* Legend */
.leg{display:flex;flex-wrap:nowrap;gap:0;margin-bottom:8px;align-items:center;justify-content:space-between;width:100%;}
.li{display:flex;align-items:center;gap:3px;color:var(--text2);font-size:clamp(8px,2vw,10px);white-space:nowrap;flex:1;justify-content:center;min-width:0;}
.ld{width:clamp(7px,1.8vw,9px);height:clamp(7px,1.8vw,9px);border-radius:2px;flex-shrink:0;}
.li{display:flex;align-items:center;gap:3px;color:var(--text2);}

/* Side counters */
.ctr-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;}
.ctr{background:var(--bg2);border-radius:var(--r);padding:9px 10px;border:0.5px solid var(--border);}
/* "Créés ce mois" wide with detail */
.ctr.wide{grid-column:1/-1;}
.ctr-wide-inner{display:flex;align-items:flex-start;justify-content:space-between;gap:6px;}
.ctr-detail{display:flex;flex-direction:column;gap:2px;padding-top:1px;min-height:56px;justify-content:flex-start;}
.ctr-dot-row{display:flex;align-items:center;gap:4px;font-size:9px;color:var(--text2);}
.rdot{width:6px;height:6px;border-radius:50%;flex-shrink:0;}
.clbl{font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:.05em;margin-bottom:2px;}
.cval{font-size:17px;font-weight:600;line-height:1;}
.csub{font-size:9px;color:var(--text3);margin-top:1px;}

.bloc{background:var(--bg);border:0.5px solid var(--border);border-radius:var(--rl);padding:10px 12px;}
.bloc.clk{cursor:pointer;transition:background .1s;}
.bloc.clk:hover{background:var(--bg2);}
.btit{font-size:10px;font-weight:500;color:var(--text3);text-transform:uppercase;letter-spacing:.07em;margin-bottom:7px;}

/* Eph table — responsive bar */
.eph-row{display:flex;align-items:center;font-size:11px;gap:4px;padding:2px 0;}
.eph-mc{width:54px;flex-shrink:0;color:var(--text2);white-space:nowrap;}
.eph-bc{flex:1;min-width:0;}
.eph-bw{width:100%;height:4px;background:var(--bg3);border-radius:3px;overflow:hidden;}
.eph-b{height:4px;border-radius:3px;transition:width .3s;}
.eph-vc{width:42px;text-align:right;flex-shrink:0;font-weight:500;white-space:nowrap;}
.eph-ec{width:46px;text-align:right;flex-shrink:0;font-size:10px;color:var(--text3);white-space:nowrap;}
.eph-rbtn{font-size:8px;padding:1px 4px;border:0.5px solid var(--border);border-radius:4px;background:transparent;color:var(--text3);cursor:pointer;flex-shrink:0;width:26px;text-align:center;}
.eph-rbtn:hover{background:var(--bg3);}
.eph-row.exp .eph-vc{color:var(--text3);text-decoration:line-through;}
.eph-row.fut .eph-mc,.eph-row.fut .eph-vc{color:var(--text3);}

/* History */
.hrow{display:flex;align-items:flex-start;gap:6px;padding:5px 0;border-bottom:0.5px solid var(--border2);font-size:11px;}
.hrow:last-child{border-bottom:none;}
.hdot{width:6px;height:6px;border-radius:50%;flex-shrink:0;margin-top:3px;}
.htime{color:var(--text3);font-size:10px;min-width:32px;}
.hdesc{color:var(--text);flex:1;}

/* Modal */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:200;display:flex;align-items:flex-end;justify-content:center;}
.overlay.behind{z-index:100;}
.sheet{background:var(--bg);border-radius:20px 20px 0 0;padding:16px 16px 44px;width:100%;max-width:520px;max-height:90vh;overflow-y:auto;touch-action:pan-x;user-select:none;transition:transform .2s ease;}
.sh{width:36px;height:4px;background:var(--border);border-radius:2px;margin:0 auto 14px;}
.st{font-size:15px;font-weight:600;margin-bottom:3px;}
.ss{font-size:12px;color:var(--text2);margin-bottom:12px;}
.mrow{display:flex;flex-direction:column;gap:3px;margin-bottom:8px;}
.mrow label{font-size:11px;color:var(--text2);}
.mrow select,.mrow input{padding:10px 12px;border:0.5px solid var(--border);border-radius:var(--r);font-size:14px;background:var(--bg2);color:var(--text);width:100%;-webkit-appearance:none;}
.mr2{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px;}
.mr2>div{display:flex;flex-direction:column;gap:3px;}
.mr2>div label{font-size:11px;color:var(--text2);}
.mr2>div select,.mr2>div input{padding:10px 12px;border:0.5px solid var(--border);border-radius:var(--r);font-size:14px;background:var(--bg2);color:var(--text);width:100%;-webkit-appearance:none;}
.mcb{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--text2);margin-bottom:6px;cursor:pointer;padding:4px 0;}
.mcb input[type=checkbox]{width:18px;height:18px;accent-color:var(--blue);cursor:pointer;}
.mbtns{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px;}
.mb{padding:6px 6px;border:0.5px solid var(--border);border-radius:var(--r);font-size:13px;cursor:pointer;background:var(--bg2);color:var(--text);text-align:center;line-height:1.4;transition:opacity .1s;min-height:42px;display:flex;align-items:center;justify-content:center;flex-direction:column;}
.mb:active{opacity:.7;}
.mb.pri{background:var(--blue);color:#fff;border-color:transparent;}
.mb.del{border-color:#d09595;color:var(--red);background:rgba(192,57,43,.1);}
.mb.amb{border-color:#c09030;color:#d4a030;background:rgba(200,160,48,.1);}
.mb.grn{background:var(--green-l);color:var(--green);border-color:var(--green-m);}
.mb.wide{grid-column:1/-1;}
.mb.ghost{background:transparent;}
.mcancel{width:100%;padding:11px;border:none;background:transparent;font-size:14px;color:var(--text3);cursor:pointer;margin-top:4px;}
.sep{height:0.5px;background:var(--border2);margin:10px 0;}
.minfo{font-size:12px;color:var(--blue);background:var(--blue-l);border-radius:var(--r);padding:8px 12px;margin-bottom:8px;}
.chip-info{font-size:10px;padding:2px 6px;border-radius:10px;background:var(--gold-l);color:var(--gold-dark);}

/* Exchange */
.exchange-days{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:8px;}
.exchange-day{flex:0 0 auto;padding:6px 10px;border-radius:var(--r);border:0.5px solid var(--border);background:var(--bg2);cursor:pointer;font-size:11px;text-align:center;transition:all .1s;min-width:38px;}
.exchange-day:hover{background:var(--bg3);}
.exchange-day.sel{background:var(--blue-l);border-color:var(--blue-m);color:var(--blue);font-weight:600;}
.exchange-day.current{background:var(--blue);color:#fff;border-color:var(--blue);}

/* Settings / profile */
.srow{display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:0.5px solid var(--border2);}
.srow:last-child{border-bottom:none;}
.slbl{font-size:13px;color:var(--text);}
.tgl{position:relative;width:44px;height:26px;flex-shrink:0;}
.tgl input{opacity:0;width:0;height:0;}
.tgl-s{position:absolute;inset:0;background:var(--bg3);border-radius:13px;cursor:pointer;transition:.2s;}
.tgl input:checked+.tgl-s{background:var(--blue);}
.tgl-s:before{content:'';position:absolute;width:20px;height:20px;left:3px;top:3px;background:#fff;border-radius:50%;transition:.2s;}
.tgl input:checked+.tgl-s:before{transform:translateX(18px);}
.pit{display:flex;align-items:center;justify-content:space-between;padding:8px 10px;border-radius:var(--r);cursor:pointer;border:0.5px solid transparent;margin-bottom:0;transition:background .1s;min-height:40px;}
.pit.act{background:var(--blue-l);border-color:var(--blue-m);cursor:default;}
.pit:not(.act){background:var(--bg2);opacity:.8;}
.pit:not(.act):hover{opacity:1;background:var(--bg3);}
.pname{font-size:13px;font-weight:500;}
.pdel,.pgear{background:transparent;border:none;color:var(--text3);cursor:pointer;font-size:13px;padding:2px 5px;}
.pit-wrap{margin-bottom:4px;}
.ps-panel{display:block;padding:8px 10px 10px;border-radius:0 0 var(--r) var(--r);background:var(--blue-l);border:0.5px solid var(--blue-m);border-top:none;margin-top:-2px;}
.pgear:hover{color:var(--blue);}
.svi{display:flex;align-items:center;justify-content:space-between;padding:7px 10px;background:var(--bg2);border-radius:var(--r);margin-bottom:5px;font-size:12px;}
.svn{font-weight:500;}.svd{color:var(--text3);font-size:11px;}
.svdel{background:transparent;border:none;color:var(--text3);cursor:pointer;font-size:13px;}
.np-toggle{width:100%;padding:11px;border:0.5px solid var(--border);border-radius:var(--r);font-size:13px;cursor:pointer;background:var(--bg2);color:var(--text);text-align:left;display:flex;align-items:center;gap:8px;margin-top:8px;}
.np-body{display:none;overflow:hidden;max-height:800px;opacity:1;transition:max-height .3s ease,opacity .25s;}

const FERIES=new Set(['2025-01-01','2025-04-21','2025-05-01','2025-05-08','2025-05-29','2025-06-09','2025-07-14','2025-08-15','2025-11-01','2025-11-11','2025-12-25','2026-01-01','2026-04-06','2026-05-01','2026-05-08','2026-05-14','2026-05-25','2026-07-14','2026-08-15','2026-11-01','2026-11-11','2026-12-25','2027-01-01','2027-03-29','2027-05-01','2027-05-08','2027-05-13','2027-05-24','2027-07-14','2027-08-15','2027-11-01','2027-11-11','2027-12-25','2028-01-01','2028-04-17','2028-05-01','2028-05-08','2028-05-25','2028-06-05','2028-07-14','2028-08-15','2028-11-01','2028-11-11','2028-12-25','2029-01-01','2029-04-02','2029-05-01','2029-05-08','2029-05-10','2029-05-21','2029-07-14','2029-08-15','2029-11-01','2029-11-11','2029-12-25','2030-01-01','2030-04-22','2030-05-01','2030-05-08','2030-05-30','2030-06-10','2030-07-14','2030-08-15','2030-11-01','2030-11-11','2030-12-25']);
const ANCHOR=new Date(2026,4,4),ANCHOR_L=8;
const NOW=new Date(),TODAY_YM=NOW.getFullYear()*12+NOW.getMonth(),CUR_YEAR=NOW.getFullYear();
const MC=['jan','fev','mar','avr','mai','jun','jui','aou','sep','oct','nov','dec'];

const DEFAULT_PD=()=>({
  profile:{name:'Lebreton',anchorLine:8,matelas:162*60+27,congesInit:25,ephSolde:0,ephSoldeCreatedYM:TODAY_YM},
  settings:{dimRendu:true,rhRendu:true,ferRendu:true,hsRendu:true,settingsHistory:[],theme:'dark'},
  overrides:{},conges:{},history:[],customVacs:{},
});

let _profs={},_aid='default',S=DEFAULT_PD();
let curY=CUR_YEAR,curM=NOW.getMonth(),pendingKey=null,annualOpen=false;
let _us=[],_rs=[];

// ================================================================
// STATE
// ================================================================
function loadState(){
  try{const d=JSON.parse(localStorage.getItem('pl_v8')||'{}');_profs=d.p||{};_aid=d.a||'default';}catch(e){}
  if(!_profs[_aid])_profs[_aid]=DEFAULT_PD();

  if(!S.settings)S.settings={};
  if(S.settings.dimRendu===undefined)S.settings.dimRendu=true;
  if(S.settings.rhRendu===undefined)S.settings.rhRendu=true;
  if(S.settings.ferRendu===undefined)S.settings.ferRendu=true;
  if(S.settings.hsRendu===undefined)S.settings.hsRendu=true;
  // Ensure profile fields exist
  if(!S.profile)S.profile={};
  if(S.profile.ephSoldeCreatedYM===undefined)S.profile.ephSoldeCreatedYM=TODAY_YM;
  // Mark all existing customVacs as hidden (not shown in grid)
  if(S.customVacs){Object.keys(S.customVacs).forEach(k=>{S.customVacs[k].hidden=true;});}
}
function saveState(){try{localStorage.setItem('pl_v8',JSON.stringify({p:_profs,a:_aid}));}catch(e){}}
function switchProfile(id){_profs[_aid]=S;saveState();if(!_profs[id])_profs[id]=DEFAULT_PD();_aid=id;S=_profs[_aid];saveState();}
function createProfile(id,data){_profs[id]=data;saveState();}
function deleteProfile(id){if(id==='default')return;delete _profs[id];if(_aid===id){_aid='default';if(!_profs.default)_profs.default=DEFAULT_PD();S=_profs.default;}saveState();}
function getProfiles(){
  const all=Object.entries(_profs).map(([id,d])=>({id,name:capitalize(d.profile.name)}));
  // Active profile always first
  return [all.find(p=>p.id===_aid),...all.filter(p=>p.id!==_aid)].filter(Boolean);
  gcalLoad();gcalUpdateBtn();
}

// ================================================================
// UNDO / REDO
// ================================================================
function snap(){return JSON.stringify({ov:S.overrides,co:S.conges,hi:S.history});}
function pushUndo(){_us.push(snap());if(_us.length>30)_us.shift();_rs=[];updateUrBtns();}
function undoAction(){if(!_us.length)return;_rs.push(snap());const p=JSON.parse(_us.pop());S.overrides=p.ov;S.conges=p.co;S.history=p.hi;saveState();render();updateUrBtns();}
function redoAction(){if(!_rs.length)return;_us.push(snap());const n=JSON.parse(_rs.pop());S.overrides=n.ov;S.conges=n.co;S.history=n.hi;saveState();render();updateUrBtns();}
function updateUrBtns(){const u=document.getElementById('undo-btn'),r=document.getElementById('redo-btn');if(u)u.disabled=!_us.length;if(r)r.disabled=!_rs.length;}

// ================================================================
// HELPERS
// ================================================================
function dk(d){return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}
function getMonday(d){const x=new Date(d);x.setHours(12,0,0,0);const dw=x.getDay();x.setDate(x.getDate()-(dw===0?6:dw-1));return x;}
function fmtH(min){if(min===0)return'0h00';const h=min/60;if(Number.isInteger(h))return h+'h00';return Math.floor(h)+'h'+String(min%60).padStart(2,'0');}
function fmtR(min){return(Math.round(min/60*100)/100).toFixed(2).replace('.',',')+'h';}
function fmtMin(min){if(isNaN(min)||min===undefined||min===null)return'0h00';return fmtH(Math.round(min));}
function capitalize(s){if(!s)return s;return s.charAt(0).toUpperCase()+s.slice(1);}
function nowHHMM(){const n=new Date();return String(n.getHours()).padStart(2,'0')+':'+String(n.getMinutes()).padStart(2,'0');}
function fmtDate(d){return JN[d.getDay()]+' '+d.getDate()+' '+MC[d.getMonth()]+' '+d.getFullYear();}
function parseHM(s){if(!s)return 0;const str=(s+'').trim().replace(',','.');var m;if((m=str.match(/^(\d+)h(\d{0,2})$/i)))return parseInt(m[1])*60+(parseInt(m[2]||'0')||0);if((m=str.match(/^(\d+(?:\.\d+)?)h?$/i))){const h=parseFloat(m[1]);return Math.round(h*60);}return 0;}
function isoWeek(date){const d=new Date(Date.UTC(date.getFullYear(),date.getMonth(),date.getDate()));const day=d.getUTCDay()||7;d.setUTCDate(d.getUTCDate()+4-day);const ys=new Date(Date.UTC(d.getUTCFullYear(),0,1));return Math.ceil(((d-ys)/864e5+1)/7);}
function getVAC(){return{...VAC_STD,...(S.customVacs||{})};}
function lineIdx(monday){const al=(S.profile&&S.profile.anchorLine!==undefined)?S.profile.anchorLine:ANCHOR_L;const diff=Math.round((monday-ANCHOR)/(7*864e5));return((al+diff)%14+14)%14;}
function getCycleVac(date){const dw=date.getDay(),idx=dw===0?6:dw-1,li=lineIdx(getMonday(date));return{cycleVac:CYCLE[li][idx],li};}
function getVac(date){
  const key=dk(date),{cycleVac,li}=getCycleVac(date),ov=(S.overrides||{})[key];
  if(ov&&ov.absent)return{vac:null,ov:true,absent:true,echange:false,ecSelf:false,fromSV:false,li,cycleVac};
  if(ov&&ov.echange===true){
    // Échange override: ecSelf=true means I work here, ecSelf=false means I give away
    var evac=ov.vac||cycleVac;
    return{vac:evac,ov:true,fromSV:!!ov.fromSV,absent:false,echange:true,ecSelf:!!ov.ecSelf,li,cycleVac};
  }
  if(ov&&ov.vac)return{vac:ov.vac,ov:true,fromSV:!!ov.fromSV,absent:false,echange:false,ecSelf:false,li,cycleVac};
  return{vac:cycleVac,ov:false,fromSV:false,absent:false,echange:false,ecSelf:false,li,cycleVac};
}
function getDur(date){const{vac}=getVac(date);const VAC=getVAC();return(vac&&vac!=='RH'&&VAC[vac])?VAC[vac].dur:0;}
function isPanier(date){const{vac}=getVac(date);const VAC=getVAC();return!!(vac&&vac!=='RH'&&VAC[vac]&&VAC[vac].panier);}
function isRHDay(date){return getCycleVac(date).cycleVac==='RH';}

function renduFactor(date){
  const key=dk(date),isFer=FERIES.has(key),isDim=date.getDay()===0,isRH=isRHDay(date);
  const sett=settingsForYM(date.getFullYear()*12+date.getMonth());
  let f=0;
  if(isFer&&sett.ferRendu){
    f+=2.0;
    // Dim et RH ne se cumulent pas : +50% si l'un ou l'autre
    if((isDim&&sett.dimRendu)||(isRH&&sett.rhRendu))f+=0.5;
  } else {
    // Dim et RH ne se cumulent pas
    if((isDim&&sett.dimRendu)||(isRH&&sett.rhRendu))f+=0.5;
  }
  return f;
}
function hsRenduFromSurplus(surplus){
  const hs1=Math.min(surplus,8*60),hs2=Math.max(0,surplus-8*60);
  return hs1*1.25+hs2*1.5;
}
function calcHSWeek(monday){
  const li=lineIdx(monday),weekBase=WEEK_DUR[li],VAC=getVAC();let weekWorked=0;
  for(let i=0;i<7;i++){const d=new Date(monday);d.setDate(monday.getDate()+i);const key=dk(d);const{vac,absent,echange}=getVac(d);if(!vac||vac==='RH'||absent)continue;if((S.conges||{})[key])continue;if(echange)continue;weekWorked+=VAC[vac]?VAC[vac].dur:0;}
  const isRam=isSemaineRamenée(monday);
  const weekWorkedWithRam=weekWorked+(isRam?7*60:0);
  const surplusTotal=Math.max(0,weekWorkedWithRam-weekBase);
  const surplusPure=Math.max(0,weekWorked-weekBase);
  const rendusTotal=hsRenduFromSurplus(surplusTotal);
  const rendusPure=hsRenduFromSurplus(surplusPure);
  const rendusRam=rendusTotal-rendusPure;
  // Raw brackets (no rate applied)
  const rawLow=Math.min(surplusTotal,480);
  const rawHigh=Math.max(0,surplusTotal-480);
  return{surplus:surplusTotal,weekBase,weekWorked:weekWorkedWithRam,
    rendusMin:rendusTotal,rendusH:Math.round(rendusTotal/60*100)/100,
    rendusMinHS:rendusPure,rendusMinRam:rendusRam,isRam,rawLow,rawHigh};
}
function isSemaineRamenée(monday){
  let hasFérié=false,hasWork=false,allCG=true;
  for(let i=0;i<6;i++){const d=new Date(monday);d.setDate(monday.getDate()+i);const key=dk(d),{vac,absent}=getVac(d);if(FERIES.has(key))hasFérié=true;if(vac&&vac!=='RH'&&!absent){hasWork=true;if((S.conges||{})[key]!=='cg')allCG=false;}}
  // Semaine ramenée si: contient un férié, a des jours travaillés, ET pas tous en congés
  // NB: jours en rendu = encore travaillés → semaine ramenée conservée
  return hasFérié&&hasWork&&!allCG;
}
function isWeekFullCG(monday){
  for(let i=0;i<7;i++){const d=new Date(monday);d.setDate(monday.getDate()+i);const key=dk(d),{vac,absent}=getVac(d);if(vac&&vac!=='RH'&&!absent&&!FERIES.has(key)&&(S.conges||{})[key]!=='cg')return false;}
  return true;
}
function settingsForYM(ym){
  const ss=S.settings||{},base={dimRendu:ss.dimRendu!==false,rhRendu:ss.rhRendu!==false,ferRendu:ss.ferRendu!==false,hsRendu:ss.hsRendu!==false};
  if(!ss.settingsHistory||!ss.settingsHistory.length)return base;
  let active=null;for(const h of ss.settingsHistory){const hym=parseInt(h.since.split('-')[0])*12+(parseInt(h.since.split('-')[1])-1);if(hym<=ym)active=h;}
  if(!active)return base;
  return{dimRendu:active.dimRendu!==false,rhRendu:active.rhRendu!==false,ferRendu:active.ferRendu!==false,hsRendu:active.hsRendu!==false};
}

// ================================================================
// BUILD GEN
// ================================================================
function buildGen(){
  const gen={};function add(ym,k,v){if(!gen[ym])gen[ym]={dim:0,fer:0,hs:0,ram:0,solde:0};gen[ym][k]+=v;}
  const START=2026*12,maxYM=CUR_YEAR*12+11,maxYMDisplay=(CUR_YEAR+2)*12+11,VAC=getVAC();
  const createdYM=(S.profile&&S.profile.ephSoldeCreatedYM!==undefined)?S.profile.ephSoldeCreatedYM:START;
  const solde=(S.profile&&S.profile.ephSolde)||0;
  if(solde>0)add(createdYM>0?createdYM-1:createdYM,'solde',solde*60);
  for(let y=2025;y<=2030;y++)for(let m=0;m<12;m++){
    const ym=y*12+m;if(ym<createdYM||ym>TODAY_YM&&ym>maxYMDisplay)continue;
    const last=new Date(y,m+1,0).getDate();
    for(let d=1;d<=last;d++){const date=new Date(y,m,d),key=dk(date);const v2e=getVac(date);const{vac,absent,echange,ecSelf}=v2e;if(!vac||vac==='RH'||absent)continue;if(echange&&!ecSelf)continue;// ec2: I give away, no rendu for me
const cKey=(S.conges||{})[key];if(cKey==='rend')continue;// rendu posé: no dim/fer rendu (still counted for HS)
const dur=VAC[vac]?VAC[vac].dur:0,factor=echange?renduFactorÉchange(date):renduFactor(date);if(factor===0)continue;const renduH=Math.round(dur*factor/60*100)/100;if(FERIES.has(key))add(ym,'fer',renduH*60);else add(ym,'dim',renduH*60);}
  }
  const seenHS=new Set();
  for(let y=2025;y<=2030;y++)for(let m=0;m<12;m++){
    const ym=y*12+m;if(ym<createdYM||ym>TODAY_YM&&ym>maxYM)continue;
    const last=new Date(y,m+1,0).getDate();
    for(let d=1;d<=last;d++){const date=new Date(y,m,d),mon=getMonday(date),mk2=dk(mon);if(seenHS.has(mk2))continue;seenHS.add(mk2);const mym=mon.getFullYear()*12+mon.getMonth();
      // Compute ferYm early — for ramenée weeks the ferie might be in the next month
      let ferYm=mym;
      for(let fi=0;fi<7;fi++){const fd2=new Date(mon);fd2.setDate(mon.getDate()+fi);if(FERIES.has(dk(fd2))){ferYm=fd2.getFullYear()*12+fd2.getMonth();break;}}
      // Skip if neither the week's month nor the ferie month is in scope
      const weekInScope=mym>=createdYM&&(mym<=TODAY_YM||mym<=maxYM);
      const ferInScope=ferYm>=createdYM&&(ferYm<=TODAY_YM||ferYm<=maxYM);
      if(!weekInScope&&!ferInScope)continue;
      const sett=settingsForYM(weekInScope?mym:ferYm);if(!sett.hsRendu)continue;
      const hsW=calcHSWeek(mon);if(hsW.rendusMin>0){
        if(hsW.rendusMinHS>0&&weekInScope)add(mym,'hs',hsW.rendusMinHS);
        if(hsW.rendusMinRam>0&&ferInScope)add(ferYm,'ram',hsW.rendusMinRam);
      }}
  }
  // Semaine ramenée: les 7h sont déjà intégrées dans calcHSWeek ci-dessus
  return gen;
}

function calcSoldes(){
  const gen=buildGen(),createdYM=(S.profile&&S.profile.ephSoldeCreatedYM!==undefined)?S.profile.ephSoldeCreatedYM:2026*12;
  let toDeduct=0;
  Object.keys(S.conges||{}).forEach(k=>{if(S.conges[k]==='rend')toDeduct+=getDur(new Date(k+'T12:00:00'));});
  const realEph={},prevEph={};
  for(let ym=createdYM;ym<=TODAY_YM;ym++)realEph[ym]=0;
  Object.keys(gen).forEach(ymStr=>{const ym=Number(ymStr),total=Object.values(gen[ym]).reduce((s,v)=>s+v,0),expYm=ym+((S.ephExtend&&S.ephExtend[ym])?6:3);if(ym>TODAY_YM){prevEph[ym]=total;return;}realEph[ym]=expYm<=TODAY_YM?0:total;});
  const realAvail={};Object.keys(realEph).map(Number).sort().forEach(ym=>realAvail[ym]=realEph[ym]);
  for(const ym of Object.keys(realAvail).map(Number).sort()){if(toDeduct<=0)break;const take=Math.min(realAvail[ym],toDeduct);realAvail[ym]-=take;toDeduct-=take;}
  let matelas=(S.profile&&S.profile.matelas)||0;if(toDeduct>0)matelas-=toDeduct;
  return{gen,realEph,realAvail,prevEph,matelas,totalReal:Object.values(realAvail).reduce((s,v)=>s+v,0),totalPrev:Object.keys(prevEph).map(Number).filter(ym=>ym<=CUR_YEAR*12+11).reduce((s,ym)=>s+(prevEph[ym]||0),0)};
}

function calcCongesUsed(){
  const cgKeys=Object.keys(S.conges||{}).filter(k=>S.conges[k]==='cg').sort();
  if(!cgKeys.length)return 0;
  const cgSet=new Set(cgKeys);

  // A week counts as 5 CP only if the pose covers from MONDAY
  // (i.e. Monday is either posed or non-worked, AND all worked days are posed)
  function isFullWeekCP(monday){
    // Full week = Monday must be in cgSet (posed)
    // If Mon is SV/RH (not worked), the week cannot be "full" since the pose didn't start Monday
    const monKey=dk(monday);
    if(!cgSet.has(monKey))return false;
    // All worked days in the week must be posed
    for(var i=0;i<7;i++){
      const d=new Date(monday);d.setDate(monday.getDate()+i);
      const k=dk(d);
      const v2=getVac(d);
      const isWorked=v2.vac&&v2.vac!=='RH'&&!v2.absent;
      if(isWorked&&!cgSet.has(k))return false;
    }
    return true;
  }

  // Collect full weeks (count 5 each) and remaining individual days
  const fullWeeks=new Set(); // monday keys of full weeks already counted
  const seenMon=new Set();
  let total=0;

  cgKeys.forEach(function(k){
    const d=new Date(k+'T12:00:00');
    const mon=getMonday(d);
    const mk=dk(mon);
    if(seenMon.has(mk))return;
    seenMon.add(mk);
    if(isFullWeekCP(mon)){
      fullWeeks.add(mk);
      total+=5;
    }
  });

  // For remaining days (not in full weeks): apply ecart rule
  const partialKeys=cgKeys.filter(function(k){
    const d=new Date(k+'T12:00:00');
    return!fullWeeks.has(dk(getMonday(d)));
  });

  if(!partialKeys.length)return total;

  function findReprise(fromDate){
    // Find next worked day - for partial groups, stop at any worked day
    // (full weeks are counted separately, so we don't skip days in cgSet)
    const sd=new Date(fromDate);sd.setDate(sd.getDate()+1);
    while(sd<=new Date('2031-01-01')){
      const v2=getVac(sd);
      if(v2.vac&&v2.vac!=='RH'&&!v2.absent)return new Date(sd);
      sd.setDate(sd.getDate()+1);
    }
    return null;
  }

  const groups={};
  partialKeys.forEach(function(k){
    const d=new Date(k+'T12:00:00');
    const r=findReprise(d);
    const rk=r?dk(r):'none';
    if(!groups[rk])groups[rk]={reprise:r,dates:[]};
    groups[rk].dates.push(d);
  });

  Object.values(groups).forEach(function(g){
    const nb=g.dates.length;
    if(!g.reprise){total+=nb;return;}
    const lastCp=new Date(Math.max.apply(null,g.dates));
    const ecart=Math.round((g.reprise-lastCp)/(864e5))-1;
    total+=nb+Math.max(0,ecart-2);
  });

  return total;
}

function getState(date){
  const key=dk(date),v2=getVac(date),{vac,fromSV,absent,echange,ecSelf}=v2;
  if(absent)return'absent';
  const c=(S.conges||{})[key];
  // Échange: ec=orange (I work it), ec2=grey (colleague covers)
  if(echange){
    if(!ecSelf)return FERIES.has(key)?'ec2-fer':'ec2'; // grey - colleague works this
    // ecSelf: I work the new vacation
    if(FERIES.has(key))return'ec-fer';
    return'ec';
  }
  if(FERIES.has(key)){
    if(c==='cg')return'cg-fer';
    if(c==='rend')return'rend-fer';
    if(absent)return'absent-fer';
    if(!ecSelf&&echange)return'ec2-fer';
    if(vac&&vac!=='RH')return'tv-fer';
    return'fer';
  }
  if(!vac)return'sv';if(vac==='RH')return'rh';
  if(c==='cg')return'cg';if(c==='rend')return'rend';
  return fromSV?'sv-vac':'tv';
}
function buildRameeSet(y,m){
  const set=new Set(),seen=new Set(),last=new Date(y,m+1,0).getDate();
  for(let d=1;d<=last;d++){const date=new Date(y,m,d),mon=getMonday(date),mk=dk(mon);if(seen.has(mk))continue;seen.add(mk);if(isSemaineRamenée(mon)){for(let i=0;i<7;i++){const dd=new Date(mon);dd.setDate(mon.getDate()+i);set.add(dk(dd));}}}
  return set;
}

function renderMonth(el_heads,el_cal){

  const rameeSet=buildRameeSet(curY,curM),first=new Date(curY,curM,1),last=new Date(curY,curM+1,0);
  let sdow=first.getDay();sdow=sdow===0?6:sdow-1;

    let lbl='';

  for(let r=0;r<cells.length/7;r++){

    const rowMon=firstReal?dk(getMonday(firstReal.date)):'';

    // Wkn color: ramenee > plein CG > semaine courante

    const rowCls=(rowRamee?'':'')+' '+(isCurWeek?'curweek':isFullCG?'cgweek':'');
    html+=`<tr class="${rowCls.trim()}"><td class="wkn ${wknCls}">${wn}</td>`;
    row.forEach(cell=>{
      if(!cell){html+='<td></td>';return;}
      html+=`<td><div class="dc s-${cell.st}" style="position:relative;"><div class="dci" onclick="openDay('${cell.key}')"><span class="dn">${cell.d}</span><span class="dv">${cell.lbl}</span></div>${cell.panDot}</div></td>`;
    });

  }
  el_cal.innerHTML=html;
}

function getDayVacs(dw,allVK){
  // lun-ven: A*, B*, C*, D*, P423 (pas de s/d suffixe)
  // sam: *s ou As*
  // dim: *d ou Ad*
  var night=['D1','D2','Es','Ed','Fs','Fd','P423'];
  var week=['A1','A2','A3','B1','C1','C2'];
  var sat=['As1','As2','As3','Cs','Es','Fs'];
  var sun=['Ad1','Ad2','Ad3','Cd','Ed','Fd'];
  var base;
  if(dw===6) base=[...new Set([...sat,...night.filter(v=>!sat.includes(v))])];
  else if(dw===0) base=[...new Set([...sun,...night.filter(v=>!sun.includes(v))])];
  else base=[...new Set([...week,...night.filter(v=>!week.includes(v))])];
  var std=base.filter(v=>allVK.includes(v));
  var stdAll=[...week,...sat,...sun,...night];
  var custom=allVK.filter(v=>!stdAll.includes(v));
  return [...std,...custom];
}

function removeCongé(){
  const key=pendingKey;
  if(!S.conges||!key)return;
  const type=S.conges[key];
  if(!type){saveState();closeModal();render();return;}
  // Find all days of the same type connected to this day (no worked-day gap)
  // Walk backward and forward
  const toRemove=new Set([key]);
  // Walk backward
  var d=new Date(key+'T12:00:00');
  for(var i=1;i<=365;i++){
    var prev=new Date(d);prev.setDate(prev.getDate()-i);
    var pk=dk(prev);
    var v2=getVac(prev);
    var isWorked=v2.vac&&v2.vac!=='RH'&&!v2.absent;
    if(isWorked){
      if(S.conges[pk]===type)toRemove.add(pk);
      else break; // gap found
    }
  }
  // Walk forward
  var d2=new Date(key+'T12:00:00');
  for(var j=1;j<=365;j++){
    var nxt=new Date(d2);nxt.setDate(nxt.getDate()+j);
    var nk=dk(nxt);
    var v2b=getVac(nxt);
    var isWorked2=v2b.vac&&v2b.vac!=='RH'&&!v2b.absent;
    if(isWorked2){
      if(S.conges[nk]===type)toRemove.add(nk);
      else break;
    }
  }
  toRemove.forEach(function(k){delete S.conges[k];removeHistoryForKey(k);});
  saveState();closeModal();render();if(gcalTokens)setTimeout(gcalSync,500);
}

function calcDispoAtDate(targetDate){
  // Heures disponibles à targetDate :
  // - heures réelles dispo aujourd'hui, non expirées à targetDate
  // - heures futures créées avant targetDate et non expirées à targetDate
  const cs=calcSoldes();
  let dispo=0;
  // Real months: include only if not expired at targetDate
  Object.keys(cs.realAvail).forEach(function(ymStr){
    const ym=Number(ymStr);
    const avail=cs.realAvail[ym];
    if(avail<=0)return;
    const expYm=ym+((S.ephExtend&&S.ephExtend[ym])?6:3);
    const expDate=new Date(Math.floor(expYm/12),expYm%12+1,0);
    if(expDate>=targetDate)dispo+=avail;
  });
  // Future months: created before targetDate, not expired at targetDate
  Object.keys(cs.prevEph).forEach(function(ymStr){
    const ym=Number(ymStr);
    const total=cs.prevEph[ym];
    if(total<=0)return;
    const lastDayOfMonth=new Date(Math.floor(ym/12),ym%12+1,0);
    if(lastDayOfMonth>targetDate)return; // not yet created at targetDate
    const expYm=ym+((S.ephExtend&&S.ephExtend[ym])?6:3);
    const expDate=new Date(Math.floor(expYm/12),expYm%12+1,0);
    if(expDate>=targetDate)dispo+=total;
  });
  return dispo;
}

function applyPose(type,startKey,unique){
  const endKey=unique?startKey:(document.getElementById('pose-until').value||startKey);
  const start=new Date(startKey+'T12:00:00');
  const end=new Date(endKey+'T12:00:00');

  // Validate rendus: check available hours at end date
  if(type==='rend'){
    var totalRend=0;
    var d0=new Date(start);
    while(d0<=end){
      const v2=getVac(d0);
      if(v2.vac&&v2.vac!=='RH'&&!v2.absent)totalRend+=getDur(d0);
      d0.setDate(d0.getDate()+1);
    }
    const dispo=calcDispoAtDate(end);
    if(totalRend>dispo){
      const manque=totalRend-dispo;
      document.getElementById('modal-root').innerHTML='<div class="overlay" style="z-index:400"><div class="sheet" style="max-height:220px"><div class="sh"></div>'
        +'<div class="st" style="color:var(--rendu-red-text)">Rendus insuffisants</div>'
        +'<div class="ss" style="margin-bottom:16px">Il manque <b>'+fmtMin(manque)+'</b> pour poser cette période.<br>Disponible : '+fmtMin(dispo)+' · Nécessaire : '+fmtMin(totalRend)+'</div>'
        +'<button class="mb wide" onclick="if(pendingKey)openDay(pendingKey);else closeModal()">Retour</button>'
        +'</div></div>';
      return;
    }

  }

  if(!S.conges)S.conges={};if(!S.overrides)S.overrides={};
  var d=new Date(start);
  while(d<=end){
    const k=dk(d);
    const v2=getVac(d);
    const isWorked=v2.vac&&v2.vac!=='RH'&&!v2.absent;
    if(isWorked){
      if(type==='absent'){S.overrides[k]={absent:true};delete S.conges[k];}
      else{S.conges[k]=type;}
    }
    d.setDate(d.getDate()+1);
  }
  const label=type==='cg'?'congé':type==='rend'?'rendu':'absent';
  const color=type==='cg'?'#5a9e3f':type==='rend'?'#b0443a':'#f0a030';
  logH(fmtDate(start)+' -> '+label+(unique?'':' au '+fmtDate(end)),color,startKey);
  saveState();closeModal();render();
  if(gcalTokens)setTimeout(gcalSync,500);
}

function computeSettForProfile(pr,targetYM,key){
  var ss=pr&&pr.settings?pr.settings:{};
  var base=ss[key]!==false;

  var active=null;
  for(var h of hist){var p2=h.since||'';if(!p2)continue;var py=parseInt(p2.split('-')[0]),pm=parseInt(p2.split('-')[1])-1;var hym=py*12+pm;if(hym<=targetYM)active=h;}

}

function cancelExchange(key){
  // Remove overrides for both days of the exchange
  if(!S.overrides)return;
  // Find the partner key: look for ec2 (the day we gave away) or ec (the day we took)
  const ov1=S.overrides[key];
  if(!ov1||!ov1.echange)return;
  delete S.overrides[key];
  // Also remove the partner if it references this exchange
  // Since we don't store a link, search all overrides for echange pairs in the same week
  const date=new Date(key+'T12:00:00'),mon=getMonday(date);
  for(let i=0;i<7;i++){
    const d=new Date(mon);d.setDate(mon.getDate()+i);const dk2=dk(d);
    const ov2=(S.overrides||{})[dk2];
    if(dk2!==key&&ov2&&ov2.echange)delete S.overrides[dk2];
  }
  removeHistoryForKey(key);
  saveState();closeModal();render();
}

function calcCongesUsedForKeys(monthKeys,allCgKeys){
  // Count CP for a specific set of days, using full ecart rule but limited to these keys
  if(!monthKeys.length)return 0;
  const cgSet=new Set(allCgKeys);
  const seenMon=new Set();let total=0;const fullWeeks=new Set();
  monthKeys.forEach(function(k){
    const d=new Date(k+'T12:00:00'),mon=getMonday(d),mk=dk(mon);
    if(seenMon.has(mk))return;seenMon.add(mk);
    if(!cgSet.has(mk))return;
    let ok=true;
    for(let i=0;i<7;i++){const dd=new Date(mon);dd.setDate(mon.getDate()+i);const v2=getVac(dd);if(v2.vac&&v2.vac!=='RH'&&!v2.absent&&!cgSet.has(dk(dd))){ok=false;break;}}
    if(ok){fullWeeks.add(mk);total+=5;}
  });
  const partial=monthKeys.filter(k=>!fullWeeks.has(dk(getMonday(new Date(k+'T12:00:00')))));
  function fR(from){const sd=new Date(from);sd.setDate(sd.getDate()+1);while(sd<=new Date('2031-01-01')){const v2=getVac(sd);if(v2.vac&&v2.vac!=='RH'&&!v2.absent)return new Date(sd);sd.setDate(sd.getDate()+1);}return null;}
  const groups={};
  partial.forEach(function(k){const d=new Date(k+'T12:00:00'),r=fR(d),rk=r?dk(r):'none';if(!groups[rk])groups[rk]={reprise:r,dates:[]};groups[rk].dates.push(d);});
  Object.values(groups).forEach(function(g){
    const nb=g.dates.length;if(!g.reprise){total+=nb;return;}
    const lc=new Date(Math.max.apply(null,g.dates));
    total+=nb+Math.max(0,Math.round((g.reprise-lc)/(864e5))-1-2);
  });
  return total;
}

(function(){
  var startY=0,startScroll=0,sheet=null,overlay=null,dragging=false;
  document.addEventListener('touchstart',function(e){
    var el=e.target.closest('.sheet');
    if(!el)return;
    sheet=el;overlay=el.closest('.overlay');
    startY=e.touches[0].clientY;
    startScroll=sheet.scrollTop;
    dragging=true;
    sheet.style.transition='none';
  },{passive:true});
  document.addEventListener('touchmove',function(e){
    if(!dragging||!sheet)return;
    var dy=e.touches[0].clientY-startY;
    // Only swipe down when at top of scroll
    if(dy>0&&sheet.scrollTop<=0){
      sheet.style.transform='translateY('+Math.min(dy,300)+'px)';
      if(overlay)overlay.style.background='rgba(0,0,0,'+Math.max(0,.45-dy/400)+')';
    }
  },{passive:true});
  document.addEventListener('touchend',function(e){
    if(!dragging||!sheet)return;
    dragging=false;
    var dy=e.changedTouches[0].clientY-startY;
    sheet.style.transition='transform .2s ease';
    if(dy>80){
      // Close
      sheet.style.transform='translateY(100%)';
      if(overlay)overlay.style.transition='background .2s ease';
      if(overlay)overlay.style.background='rgba(0,0,0,0)';
      setTimeout(closeModal,200);

})();

var EX_VACS={
  week:['A1','A2','A3','B1','C1','C2','D1','D2','P423'],
  sat: ['As1','As2','As3','Cs','Es','Fs'],
  sun: ['Ad1','Ad2','Ad3','Cd','Ed','Fd'],
};
function exVacsForDay(date){
  const dw=date.getDay();
  if(dw===6)return EX_VACS.sat;
  if(dw===0)return EX_VACS.sun;
  return EX_VACS.week;
}
// Rendus generés pour une vacation d'échange :
// - Ferié travaillé : OUI (+200%)
// - Dimanche travaillé : OUI (+50%)
// - RH travaillé : NON (pas de rendu RH en échange)
// - HS : NON (échange = pas de HS)
function renduFactorÉchange(date){
  const key=dk(date),isFer=FERIES.has(key),isDim=date.getDay()===0;
  const sett=settingsForYM(date.getFullYear()*12+date.getMonth());
  let f=0;
  if(isFer&&sett.ferRendu){f+=2.0;if(isDim&&sett.dimRendu)f+=0.5;}
  else if(isDim&&sett.dimRendu){f+=0.5;}
  // RH : pas de rendu en cas d'échange
  return f;
}

function exSelectDay(dk2){
  if(dk2===(pendingKey||_lpk))return;
  _exState.targetKey=dk2;
  _exState.step=2;
  _exState.targetVac=null;
  renderExchangeModal();
}
function exGoStep2(){if(!_exState.targetKey)return;_exState.step=2;renderExchangeModal();}
function exBackStep1(){_exState.step=1;renderExchangeModal();}
function exSelectVac(vn){_exState.targetVac=vn;confirmExchange();}
function confirmExchange(){
  var myKey=pendingKey||_lpk;
  if(!myKey||!_exState.targetKey||!_exState.targetVac)return;
  var date=new Date(myKey+'T12:00:00');
  var targetDate=new Date(_exState.targetKey+'T12:00:00');
  var myCycle=getCycleVac(date).cycleVac;
  var theirCycle=getCycleVac(targetDate).cycleVac;
  // Read my original vac BEFORE any override changes
  var myOrigVac=getVac(date);
  var myOrigVacName=myOrigVac.vac||myCycle;
  if(!S.overrides)S.overrides={};
  // myKey: mon jour original que je DONNE au collègue → je suis absent (gris)
  S.overrides[myKey]={vac:myOrigVacName,fromSV:false,echange:true,ecSelf:false};
  // targetKey: le jour que je PRENDS → je travaille la nouvelle vacation (orange)
  S.overrides[_exState.targetKey]={vac:_exState.targetVac,fromSV:!theirCycle||theirCycle==='RH',echange:true,ecSelf:true};
  logH('Échange: '+fmtDate(date)+' <-> '+fmtDate(targetDate)+' ('+_exState.targetVac+')','#d4a030',myKey);
  saveState();closeModal();render();
  if(gcalTokens)setTimeout(gcalSync,500);
}

  const wasOpen=el.style.display!=='none';
  document.querySelectorAll('.dropdown').forEach(d=>d.style.display='none');
  document.removeEventListener('click',_ddClose,true);
  if(!wasOpen){
    el.style.display='block';
    if(id==='dd-profil')renderProfilesDropdown();
    if(id==='dd-history')renderHistoryDropdown();
    setTimeout(()=>document.addEventListener('click',_ddClose,true),10);

}
function _ddClose(e){
  const dds=document.querySelectorAll('.dropdown');
  let anyOpen=false;
  dds.forEach(d=>{
    if(d.style.display!=='none'){
      anyOpen=true;
      if(!d.contains(e.target)&&!e.target.closest('[onclick*="toggleDropdown"]')){
        d.style.display='none';

}

function saveProfileFromDD(pid){
  const pr=_profs[pid];if(!pr)return;
  const n=document.getElementById('ps-name');if(n)pr.profile.name=n.value.trim()||pr.profile.name;
  const li=document.getElementById('ps-line');if(li)pr.profile.anchorLine=parseInt(li.value)||8;
  const mat=document.getElementById('ps-matelas');if(mat&&mat.value.trim()){const v=parseHM(mat.value);if(v>=0)pr.profile.matelas=v;}
  const cg=document.getElementById('ps-conges');if(cg){const v=parseInt(cg.value);if(!isNaN(v))pr.profile.congesInit=v;}
  const eph2=document.getElementById('ps-eph');if(eph2&&eph2.value.trim()){const ev=parseHM(eph2.value);pr.profile.ephSolde=Math.round(ev/60*100)/100;pr.profile.ephSoldeCreatedYM=TODAY_YM;}
  _profs[pid]=pr;if(pid===_aid)S=pr;saveState();render();renderProfilesDropdown();
}
function applySettingsFromDD(pid){
  const pr=_profs[pid];if(!pr)return;if(!pr.settings)pr.settings={};
  // Read new values from form
  const dimEl=document.getElementById('ps-dim'),rhEl=document.getElementById('ps-rh');
  const ferEl=document.getElementById('ps-fer'),hsEl=document.getElementById('ps-hs');
  if(!dimEl)return;
  const newDim=dimEl.checked,newRh=rhEl?rhEl.checked:true,newFer=ferEl?ferEl.checked:true,newHs=hsEl?hsEl.checked:true;
  // Get current effective settings for current month (don't change base)
  const cur=settingsForYM(TODAY_YM);
  const changed=cur.dimRendu!==newDim||cur.rhRendu!==newRh||cur.ferRendu!==newFer||cur.hsRendu!==newHs;
  if(changed){
    const now=new Date();let sy=now.getFullYear(),sm=now.getMonth()+2;
    if(sm>12){sy++;sm=1;}
    const since=sy+'-'+String(sm).padStart(2,'0');
    if(!pr.settings.settingsHistory)pr.settings.settingsHistory=[];
    // Remove any existing entry for same month
    pr.settings.settingsHistory=pr.settings.settingsHistory.filter(h=>h.since!==since);
    pr.settings.settingsHistory.push({since,dimRendu:newDim,rhRendu:newRh,ferRendu:newFer,hsRendu:newHs});
    pr.settings.settingsHistory.sort((a,b)=>a.since.localeCompare(b.since));
  }
  _profs[pid]=pr;if(pid===_aid)S=pr;saveState();render();renderProfilesDropdown();
}

function confirmCustomVac(){
  const name=(document.getElementById('custom-name')||{value:''}).value.trim();
  if(!name){alert('Nom requis');return;}
  const debStr=(document.getElementById('custom-deb')||{value:''}).value.trim();
  const finStr=(document.getElementById('custom-fin')||{value:''}).value.trim();
  const pauseMin=parseInt((document.getElementById('custom-pause')||{value:'0'}).value)||0;
  const debMin=parseHM(debStr),finMin=parseHM(finStr);
  if(!debMin||!finMin){alert('Heures invalides (format 08h00)');return;}
  let dur=finMin-debMin;let panier=false;
  if(pauseMin>=45){dur-=pauseMin;}else{if(coversMealSlot(debMin,finMin))panier=true;}
  if(dur<=0){alert('Duree invalide');return;}
  // Store in customVacs for dur/panier lookup, but not displayed in grid
  if(!S.customVacs)S.customVacs={};
  S.customVacs[name]={deb:debStr,fin:finStr,dur,panier,hidden:true};
  // Apply directly to the pending day
  if(pendingKey){
    const key=pendingKey;
    const date=new Date(key+'T12:00:00');
    const cv=getCycleVac(date).cycleVac;
    if(!S.overrides)S.overrides={};
    S.overrides[key]={vac:name,fromSV:!cv||cv==='RH',echange:false};
    logH(fmtDate(date)+' -> '+name,'#4ea0f7',key);
  }
  saveState();closeModal();render();
  if(gcalTokens)setTimeout(gcalSync,500);
}

function openAutreVacModal(){
  const VAC=getVAC();
  const key=pendingKey||_lpk;
  const dw=key?new Date(key+'T12:00:00').getDay():1;
  const isSam=dw===6,isDim=dw===0,isWeek=!isSam&&!isDim;

  function vacBtn(vn){
    const vi=VAC[vn];const dur=vi?vi.dur:0;
    return '<button class="mb" style="background:var(--blue-l);color:var(--blue);border:0.5px solid var(--border);width:100%;" onclick="avw(\''+vn+'\');closeModal();">'
      +'<div>'+vn+'</div>'
      +'<div style="font-size:9px;opacity:.7">'+fmtMin(dur)+'</div>'
      +'</button>';
  }
  function debMin(vn){const v=VAC[vn];if(!v)return 9999;const m=v.deb.match(/(\d+)h(\d*)/i);return m?parseInt(m[1])*60+(parseInt(m[2])||0):9999;}
  function section(title,vns){
    if(!vns.length)return'';
    const sorted=vns.slice().sort((a,b)=>debMin(a)-debMin(b));
    return'<div class="btit" style="margin-top:8px;margin-bottom:5px">'+title+'</div>'
      +'<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:6px">'
      +sorted.map(vacBtn).join('')+'</div>';
  }

  // Coord: M lun-ven, S tous les jours, Pj jeudi seul, Pv vendredi seul
  const coordVacs=[];
  if(isWeek||isSam||isDim)coordVacs.push('S');  // S dispo tous les jours
  if(isWeek)coordVacs.push('M');                 // M lun-ven
  if(dw===4)coordVacs.push('Pj');               // Pj jeudi seulement
  if(dw===5)coordVacs.push('Pv');               // Pv vendredi seulement
  // Video: MR+SR en semaine, Ms-R le sam, Md-R le dim
  const videoVacs=isWeek?['MR','SR']:isSam?['Ms-R']:['Md-R'];
  // Cadre: semaine=B2V C3V P422V; sam=BsV Ds; dim=BdV Dd
  const cadreVacs=isWeek?['B2V','C3V','P422V']:isSam?['BsV','Ds']:['BdV','Dd'];

  const html=section('Coordination',coordVacs)
    +section('Video',videoVacs)
    +section('Cadre',cadreVacs);

  document.getElementById('modal-root').innerHTML=
    '<div class="overlay" onclick="if(event.target===this)closeModal()"><div class="sheet">'
    +'<div class="sh"></div><div class="st">Autres vacations</div>'
    +(html||'<div style="font-size:12px;color:var(--text3);padding:10px 0">Aucune vacation disponible ce jour.</div>')
    +'<button class="mcancel" onclick="if(pendingKey)openDay(pendingKey);else closeModal()">Retour</button>'
    +'</div></div>';
}

function init(){
  // Auth check
  const authToken=localStorage.getItem('auth_token');
  const authUser=JSON.parse(localStorage.getItem('auth_user')||'null');
  if(!authToken||!authUser){window.location.replace('/PLANNING/');return;}
  window._authToken=authToken;
  window._authUser=authUser;
  // Show user name in header if needed
  const hdrTitle=document.getElementById('hdr-title');
  if(hdrTitle&&!hdrTitle.textContent)hdrTitle.textContent=authUser.name;
  loadState();applyTheme();
  const isIOS=/iphone|ipad|ipod/i.test(navigator.userAgent);
  if(isIOS&&!window.navigator.standalone)document.getElementById('pwa-banner').style.display='flex';
  updateUrBtns();render();
  cloudLoadAll(); // gcalLoad() called inside cloudLoadAll after profile loaded
  // Scroll to navigate months/years

  // Sticky header: show on scroll up
  let _lastScrollY=0;
  window.addEventListener('scroll',function(){
    const y=window.scrollY,hdr=document.querySelector('.hdr');
    if(!hdr)return;
    if(y<_lastScrollY||y<60){hdr.style.transform='translateY(0)';}
    else{hdr.style.transform='translateY(-100%)';}
    _lastScrollY=y;
  },{passive:true});

  // Swipe left/right to change month on calendar
  let _swipeStartX=0,_swipeStartY=0,_swipeActive=false;
  document.addEventListener('touchstart',function(e){
    if(e.target.closest('.sheet')||e.target.closest('.dropdown'))return; // ignore modals/dropdowns
    _swipeStartX=e.touches[0].clientX;
    _swipeStartY=e.touches[0].clientY;
    _swipeActive=true;
  },{passive:true});
  document.addEventListener('touchend',function(e){
    if(!_swipeActive)return;
    _swipeActive=false;
    const dx=e.changedTouches[0].clientX-_swipeStartX;
    const dy=e.changedTouches[0].clientY-_swipeStartY;
    if(Math.abs(dx)>50&&Math.abs(dx)>Math.abs(dy)*1.5){
      navDir(dx<0?1:-1); // left = next month, right = prev month
    }
  },{passive:true});
  document.addEventListener('touchmove',function(e){
    if(!_swipeActive)return;
    const dx=Math.abs(e.touches[0].clientX-_swipeStartX);
    const dy=Math.abs(e.touches[0].clientY-_swipeStartY);
    // If clearly horizontal swipe, prevent vertical scroll
    if(dx>dy*1.5&&dx>20)e.preventDefault();
  },{passive:false});
}

var CLOUD_API='https://planning-gcal.arthur-lebreton94.workers.dev';

function cloudHeaders(){return{'Content-Type':'application/json','Authorization':'Bearer '+(window._authToken||'')};}

async function cloudSave(pid){
  if(!window._authToken)return;
  try{
    await fetch(CLOUD_API+'/data/save',{method:'POST',headers:cloudHeaders(),body:JSON.stringify({profileId:pid,data:_profs[pid]})});
  }catch(e){console.warn('cloud save error',e);}
}

async function cloudLoad(pid){
  if(!window._authToken)return null;
  try{
    const res=await fetch(CLOUD_API+'/data/load',{method:'POST',headers:cloudHeaders(),body:JSON.stringify({profileId:pid})});
    const data=await res.json();
    return data.data||null;
  }catch(e){console.warn('cloud load error',e);return null;}
}

async function cloudLoadAll(){
  if(!window._authToken)return;
  try{
    const res=await fetch(CLOUD_API+'/data/list',{method:'POST',headers:cloudHeaders(),body:JSON.stringify({})});
    const data=await res.json();
    const profiles=data.profiles||{};
    // Load each profile from cloud and merge
    for(const pid of Object.keys(profiles)){
      const cloudData=await cloudLoad(pid);
      if(cloudData&&!_profs[pid]){
        _profs[pid]=cloudData;
      }
    }
    saveState();render();
    gcalLoad(); // load gcal tokens after profile is loaded from cloud
  }catch(e){console.warn('cloud load all error',e);}
  gcalLoad(); // also call if no cloud data (first load)
}

function signOut(){
  fetch(CLOUD_API+'/auth/logout',{method:'POST',headers:cloudHeaders(),body:JSON.stringify({})}).catch(()=>{});
  localStorage.removeItem('auth_token');
  localStorage.removeItem('auth_user');
  window.location.href='/PLANNING/';
}

function gcalLoad(){
  // Load tokens from current profile
  if(S.profile&&S.profile.gcalTokens){gcalTokens=S.profile.gcalTokens;}
  else{gcalTokens=null;}
  // Check for auth code in URL (OAuth callback) OR in localStorage (set by callback page)
  // Handle GitHub Pages SPA redirect (code may be in ?redirect= param)
  let searchStr=window.location.search;
  const redirectParam=new URLSearchParams(searchStr).get('redirect');
  if(redirectParam){
    // Clean the redirect param and extract the real code
    searchStr=decodeURIComponent(redirectParam).replace(/^.*?\?/,'?');
    history.replaceState({},'','/PLANNING/app/');
  }
  const urlParams=new URLSearchParams(searchStr);
  const urlCode=urlParams.get('code');
  const lsCode=localStorage.getItem('gcal_auth_code');
  const code=urlCode||lsCode;
  if(code){
    if(lsCode)localStorage.removeItem('gcal_auth_code');
    // Clean URL without reloading
    if(urlCode)history.replaceState({},'',window.location.pathname);
    gcalExchange(code);
  }
  gcalUpdateBtn();
}

function gcalSave(){
  if(S.profile)S.profile.gcalTokens=gcalTokens;
  saveState();
}

function gcalConnect(){
  const url='https://accounts.google.com/o/oauth2/v2/auth?'+new URLSearchParams({
    client_id:GCAL_CLIENT_ID,
    redirect_uri:GCAL_REDIRECT_URI,
    response_type:'code',
    scope:GCAL_SCOPE,
    access_type:'offline',
    prompt:'consent',
  });
  window.location.href=url;
}

async function gcalExchange(code){
  const btn=document.getElementById('gcal-btn');
  if(btn)btn.textContent='Connexion...';
  try{
    const res=await fetch(GCAL_FUNCTIONS+'/auth',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({action:'exchange',code}),
    });
    const data=await res.json();
    if(data.access_token){
      gcalTokens={
        access_token:data.access_token,
        refresh_token:data.refresh_token||gcalTokens&&gcalTokens.refresh_token,
        expiry:Date.now()+data.expires_in*1000,
      };
      gcalSave();gcalUpdateBtn();
      await gcalEnsureCalendar();
      gcalSync();
    } else {
      console.error('gcal exchange failed', data);
      if(btn)btn.textContent='G Agenda';
    }
  }catch(e){console.error('gcal exchange error',e);if(btn)btn.textContent='G Agenda';}
}

// ID of dedicated calendar, stored locally
var gcalCalendarId= localStorage.getItem('gcal_calendar_id') || 'primary';

async function gcalVerifyCalendar(){
  // If we have a stored calendarId, verify it still exists
  if(!gcalCalendarId||gcalCalendarId==='primary')return;
  const token=await gcalGetToken();if(!token)return;
  try{
    const res=await fetch(GCAL_FUNCTIONS+'/calendar',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({action:'listCalendars',access_token:gcalTokens.access_token,refresh_token:gcalTokens.refresh_token})});
    const data=await res.json();
    const exists=(data.items||[]).find(function(c){return c.id===gcalCalendarId;});
    if(!exists){
      console.log('Calendar not found, resetting');
      gcalCalendarId='primary';
      localStorage.removeItem('gcal_calendar_id');
    }
  }catch(e){}
}

async function gcalEnsureCalendar(){
  const token = await gcalGetToken();
  if(!token) return;
  // List calendars to find existing "Planning France Info"
  try {
    const res = await fetch(GCAL_FUNCTIONS+'/calendar',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({action:'listCalendars',access_token:token,refresh_token:gcalTokens.refresh_token}),
    });
    const data = await res.json();
    if(data.newToken){gcalTokens.access_token=data.newToken;gcalSave();}
    const existing = (data.items||[]).find(c=>c.summary==='Planning France Info');
    if(existing){
      gcalCalendarId = existing.id;
      localStorage.setItem('gcal_calendar_id', gcalCalendarId);
      return;
    }
    // Create dedicated calendar
    const res2 = await fetch(GCAL_FUNCTIONS+'/calendar',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        action:'createCalendar',
        access_token:gcalTokens.access_token,
        refresh_token:gcalTokens.refresh_token,
        event:{summary:'Planning France Info',timeZone:'Europe/Paris'},
      }),
    });
    const cal2 = await res2.json();
    if(cal2.id){
      gcalCalendarId = cal2.id;
    } else {
      gcalCalendarId = 'primary';
    }
    localStorage.setItem('gcal_calendar_id', gcalCalendarId);
  } catch(e){ console.error('ensureCalendar error',e); }
}

async function gcalGetToken(){
  if(!gcalTokens)return null;
  if(Date.now()>gcalTokens.expiry-60000){
    // Refresh
    try{
      const res=await fetch(GCAL_FUNCTIONS+'/auth',{
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({action:'refresh',refresh_token:gcalTokens.refresh_token}),
      });
      const data=await res.json();
      if(data.access_token){
        gcalTokens.access_token=data.access_token;
        gcalTokens.expiry=Date.now()+data.expires_in*1000;
        gcalSave();
      }
    }catch(e){console.error('refresh error',e);}
  }
  return gcalTokens.access_token;
}

function gcalBuildDayEvent(dateKey){
  const d=new Date(dateKey+'T12:00:00');
  const v2=getVac(d);
  const congesType=(S.conges||{})[dateKey];
  const vac=v2.vac||'';
  if(!vac)return null;
  let summary,colorId,description='';
  if(congesType==='cg'){summary='Congé';colorId='2';} // Sauge = vert
  else if(congesType==='rend'){const dur=getDur(d);summary='Rendu ('+fmtMin(dur)+')';colorId='11';description='Rendu éphémère – '+fmtMin(dur);} // Tomate = rouge
  else if(congesType==='absent'){summary='Absent';colorId='6';} // Tangerine = orange
  else if(vac==='RH'){return null;} // Don't sync RH
  else{
    const dur=getDur(d);
    const panier=isPanier(d)?' · panier':'';
    if(v2.echange&&!v2.ecSelf){summary=vac+' (donné)';colorId='8';} // Graphite = gris (vacation donnée, ecSelf=false)
    else if(v2.echange&&v2.ecSelf){summary=vac+' (échange)';colorId='3';} // Raisin = violet (vacation reçue, ecSelf=true)
    else if(v2.ov&&!v2.fromSV){summary=vac+' *';colorId='9';} // Myrtille = bleu foncé (ajout)
    else{summary=vac;colorId='7';} // Paon = bleu (cycle normal)
    description=fmtMin(dur)+panier;
  }
  // Use actual times if known
  let startObj,endObj;
  const tz='Europe/Paris';
  function makeDateTime(base,hhmm){
    const [h,m]=hhmm.split(':');
    const dt=new Date(base);dt.setHours(parseInt(h),parseInt(m),0,0);return dt;
  }
  
  // Check if it's a custom vacation with known hours
  const customVac=S.customVacs&&S.customVacs[vac];
  let vacStart=null,vacEnd=null;
  if(customVac&&customVac.debut&&customVac.fin){
    const ph=str=>{const m2=str.match(/(\d+)h(\d*)/);return m2?parseInt(m2[1])+':'+('0'+(m2[2]||0)).slice(-2):null;};
    vacStart=ph(customVac.debut);vacEnd=ph(customVac.fin);
  } else {
    const vsd=VAC_STD[vac];
    if(vsd&&vsd.deb&&vsd.fin){
      const ph=str=>{const m2=str.match(/(\d+)h(\d*)/);return m2?parseInt(m2[1])+':'+('0'+(m2[2]||0)).slice(-2):null;};
      vacStart=ph(vsd.deb);vacEnd=ph(vsd.fin);
    }
  }
  if(vacStart&&vacEnd&&congesType!=='cg'&&congesType!=='rend'&&congesType!=='absent'){
    const startDt=makeDateTime(d,vacStart);
    const endDt=makeDateTime(d,vacEnd);
    if(endDt<=startDt)endDt.setDate(endDt.getDate()+1);
    const fmt=function(dt){return dt.getFullYear()+'-'+String(dt.getMonth()+1).padStart(2,'0')+'-'+String(dt.getDate()).padStart(2,'0')+'T'+String(dt.getHours()).padStart(2,'0')+':'+String(dt.getMinutes()).padStart(2,'0')+':00';};
    startObj={dateTime:fmt(startDt),timeZone:tz};
    endObj={dateTime:fmt(endDt),timeZone:tz};
  } else {
    startObj={date:dateKey};endObj={date:dateKey};
  }
  return{summary,description,start:startObj,end:endObj,colorId,extendedProperties:{private:{planningKey:dateKey,planningProfile:(S.profile&&S.profile.name)||'',planningType:congesType||vac}}};
}

async function gcalSync(){
  await gcalVerifyCalendar();
  await gcalEnsureCalendar(); // create dedicated calendar if needed
  const token=await gcalGetToken();
  if(!token){gcalConnect();return;}
  const btn=document.getElementById('gcal-btn');
  if(btn)btn.textContent='Sync...';
  const startD=new Date();startD.setDate(startD.getDate()-30);
  const endD=new Date();endD.setMonth(endD.getMonth()+6);
  // If calendarId changed, clear stored IDs to avoid duplicates
  const storedCalId=localStorage.getItem('gcal_event_ids_cal_'+(_aid||'default'))||'primary';
  if(storedCalId!==gcalCalendarId){
    localStorage.removeItem('gcal_event_ids_'+(_aid||'default'));
    localStorage.setItem('gcal_event_ids_cal_'+(_aid||'default'),gcalCalendarId);
  }
  const _pid=_aid||'default';const stored=JSON.parse(localStorage.getItem('gcal_event_ids_'+_pid)||'{}');
  const batch=[];const currentKeys=new Set();
  const cur=new Date(startD);
  while(cur<=endD){
    const key=dk(cur);
    const ev=gcalBuildDayEvent(key);
    if(ev){currentKeys.add(key);batch.push({id:key,googleEventId:stored[key]||null,event:ev});}
    cur.setDate(cur.getDate()+1);
  }
  for(const[key,gid]of Object.entries(stored)){if(!currentKeys.has(key)){batch.push({id:key,googleEventId:gid,_delete:true});}}
  try{
    const chunkSize=10;const allResults=[]; // 10 events per Worker call to stay under 50 subrequest limit
    for(let i=0;i<batch.length;i+=chunkSize){
      const chunk=batch.slice(i,i+chunkSize);
      const res=await fetch(GCAL_FUNCTIONS+'/calendar',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({action:'batchSync',access_token:gcalTokens.access_token,refresh_token:gcalTokens.refresh_token,calendarId:gcalCalendarId,events:chunk})});
      const data=await res.json();
      if(data.newToken){gcalTokens.access_token=data.newToken;gcalSave();}
      allResults.push(...(data.results||[]));
      if(btn)btn.textContent='Sync '+(Math.min(i+chunkSize,batch.length))+'/'+batch.length;
    }
    for(const r of allResults){if(r.deleted){delete stored[r.id];}else if(r.googleEventId){stored[r.id]=r.googleEventId;}}
    localStorage.setItem('gcal_event_ids_'+_pid,JSON.stringify(stored));
    localStorage.setItem('gcal_event_ids_cal_'+(_aid||'default'),gcalCalendarId);
    localStorage.setItem('gcal_calendar_id',gcalCalendarId);
    if(btn){btn.textContent='↔ Google Agenda';btn.style.color='var(--green)';}
  }catch(e){console.error('sync error',e);if(btn){btn.textContent='↔ Erreur';btn.style.color='var(--rendu-red-text)';} const ico2=document.getElementById('gcal-status');if(ico2){ico2.innerHTML='<svg width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#ea4335"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#ea4335"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#ea4335"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#ea4335"/></svg>';}}
}

async function gcalClear(){
  const _pid2=_aid||'default';const stored=JSON.parse(localStorage.getItem('gcal_event_ids_'+_pid2)||'{}');
  const ids=Object.values(stored).filter(Boolean);
  if(!ids.length){alert('Aucun événement à supprimer.');return;}
  if(!confirm('Supprimer '+ids.length+' événements de Google Agenda ?'))return;
  const token=await gcalGetToken();
  if(!token)return;
  const btn=document.getElementById('gcal-clear-btn');
  if(btn)btn.textContent='⏳';
  const batch=Object.entries(stored).map(([id,gid])=>({id,googleEventId:gid,_delete:true}));
  const chunkSize=50;
  for(let i=0;i<batch.length;i+=chunkSize){
    const chunk=batch.slice(i,i+chunkSize);
    await fetch(GCAL_FUNCTIONS+'/calendar',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({action:'batchSync',access_token:gcalTokens.access_token,refresh_token:gcalTokens.refresh_token,calendarId:gcalCalendarId,events:chunk}),
    });
    if(btn)btn.textContent='🗑 '+(i+chunkSize)+'/'+batch.length;
  }
  localStorage.removeItem('gcal_event_ids_'+(_aid||'default'));
  localStorage.removeItem('gcal_event_ids_cal_'+(_aid||'default'));
  if(btn)btn.textContent='🗑';
  const syncBtn=document.getElementById('gcal-btn');
  if(syncBtn){syncBtn.textContent='↔ Google Agenda';syncBtn.style.color='var(--green)';}
}

function gcalDisconnect(){
  gcalTokens=null;
  if(S.profile)delete S.profile.gcalTokens;
  saveState();
  const pid=_aid||'default';
  localStorage.removeItem('gcal_event_ids_'+pid);
  localStorage.removeItem('gcal_event_ids_cal_'+pid);
  gcalCalendarId='primary';
  gcalUpdateBtn();
}

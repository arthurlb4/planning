<!DOCTYPE html>
<html>
<head><script>
// Only redirect for OAuth callback, otherwise go to root
var path = window.location.pathname;
var search = window.location.search;
if(path.indexOf('/auth/callback') >= 0) {
  // OAuth callback: pass code to index
  window.location.replace('https://arthurlb4.github.io/PLANNING/?redirect=' + encodeURIComponent(path + search));
} else {
  // Any other 404: just go to root
  window.location.replace('https://arthurlb4.github.io/PLANNING/');
}
</script></head>
<body></body>
</html>

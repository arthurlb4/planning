<!DOCTYPE html>
<html>
<head>
<script>
// GitHub Pages SPA redirect trick
// Redirects /PLANNING/auth/callback?code=xxx to /PLANNING/?code=xxx
var path = window.location.pathname;
var search = window.location.search;
var hash = window.location.hash;
// Pass the full path and query as a query param to index.html
var redirect = window.location.origin + '/PLANNING/?redirect=' + encodeURIComponent(path + search + hash);
window.location.replace(redirect);
</script>
</head>
<body></body>
</html>

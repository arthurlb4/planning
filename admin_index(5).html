<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin — Planning France Info</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
[data-theme=light]{--bg:#e8e8e4;--bg2:#deded9;--bg3:#d0cfc9;--text:#1a1a18;--text2:#4a4a46;--text3:#8a8880;--border:rgba(0,0,0,.18);}
:root{--bg:#18181b;--bg2:#27272a;--bg3:#3f3f46;--text:#f4f4f5;--text2:#d4d4d8;--text3:#71717a;--blue:#4ea0f7;--green:#5a9e3f;--red:#e24b4a;--orange:#f0a030;--border:rgba(255,255,255,.12);--r:8px;}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;min-height:100vh;padding:20px;}
.login-wrap{display:flex;align-items:center;justify-content:center;min-height:100vh;}
.card{background:var(--bg2);border:0.5px solid var(--border);border-radius:16px;padding:24px;width:100%;max-width:420px;}
h1{font-size:18px;font-weight:600;margin-bottom:4px;}
.sub{font-size:12px;color:var(--text3);margin-bottom:20px;}
.field{margin-bottom:14px;}
.field label{display:block;font-size:11px;color:var(--text3);margin-bottom:5px;text-transform:uppercase;letter-spacing:.05em;}
.field input{width:100%;padding:9px 12px;background:var(--bg);border:0.5px solid var(--border);border-radius:var(--r);color:var(--text);font-size:14px;outline:none;}
.field input:focus{border-color:var(--blue);}
.btn{padding:9px 16px;background:var(--blue);color:#fff;border:none;border-radius:var(--r);font-size:13px;font-weight:500;cursor:pointer;}
.btn:hover{opacity:.9;}
.btn-sm{padding:5px 10px;font-size:11px;}
.btn-red{background:var(--red);}
.btn-orange{background:var(--orange);}
.btn-green{background:var(--green);}
.btn-ghost{background:transparent;border:0.5px solid var(--border);color:var(--text2);}
.err{color:var(--red);font-size:12px;margin-top:8px;}
/* Admin layout */
#admin{display:none;}
.hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px;padding-bottom:16px;border-bottom:0.5px solid var(--border);}
.hdr h1{font-size:20px;}
.tabs{display:flex;gap:4px;margin-bottom:20px;background:var(--bg2);border-radius:var(--r);padding:3px;}
.tab{padding:7px 14px;border-radius:6px;cursor:pointer;font-size:13px;color:var(--text2);}
.tab.active{background:var(--bg3);color:var(--text);font-weight:500;}
.section{display:none;}
.section.active{display:block;}
table{width:100%;border-collapse:collapse;font-size:13px;}
th{text-align:left;padding:8px 10px;font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.05em;border-bottom:0.5px solid var(--border);}
td{padding:8px 10px;border-bottom:0.5px solid var(--border2,#1e1e3a);vertical-align:top;}
tr:hover td{background:var(--bg2);}
.badge{display:inline-block;padding:2px 8px;border-radius:10px;font-size:10px;font-weight:500;}
.badge-blue{background:var(--bg3);color:var(--blue);}
.badge-green{background:rgba(90,158,63,.2);color:#7ec85a;}
.badge-red{background:rgba(226,75,74,.2);color:#e24b4a;}
.chip{display:inline-block;padding:2px 6px;border-radius:4px;font-size:11px;background:var(--bg3);color:var(--text2);margin:1px;}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.6);display:flex;align-items:center;justify-content:center;z-index:100;}
.modal{background:var(--bg2);border:0.5px solid var(--border);border-radius:12px;padding:24px;width:100%;max-width:400px;}
.modal h2{font-size:16px;margin-bottom:16px;}
.modal-btns{display:flex;gap:8px;margin-top:16px;justify-content:flex-end;}
.line-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:8px;}
.line-card{background:var(--bg2);border:0.5px solid var(--border);border-radius:var(--r);padding:10px;}
.line-name{font-size:13px;font-weight:500;margin-bottom:6px;}
.line-user{font-size:11px;color:var(--text2);margin:2px 0;}
.empty{color:var(--text3);font-size:13px;padding:20px 0;text-align:center;}
.cycle-card{background:var(--bg2);border:0.5px solid var(--border);border-radius:var(--r);padding:14px;margin-bottom:10px;}
.cycle-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;}
.cycle-name{font-size:14px;font-weight:500;}
.cycle-dates{font-size:11px;color:var(--text3);}
textarea{width:100%;padding:9px 12px;background:var(--bg);border:0.5px solid var(--border);border-radius:var(--r);color:var(--text);font-size:12px;font-family:monospace;outline:none;resize:vertical;}
.row{display:flex;gap:8px;align-items:center;}
.flex1{flex:1;}
.mt8{margin-top:8px;}
.mt16{margin-top:16px;}
.alert{padding:10px 14px;border-radius:var(--r);font-size:12px;margin-bottom:12px;}
.alert-blue{background:rgba(78,160,247,.1);border:0.5px solid rgba(78,160,247,.3);color:var(--blue);}
</style>
</head>
<body>

<!-- Login -->
<div class="login-wrap" id="login-section">
  <div class="card">
    <h1>Administration</h1>
    <p class="sub">Planning France Info</p>
    <div class="field"><label>Mot de passe admin</label><input type="password" id="admin-pwd" placeholder="••••••••" onkeydown="if(event.key==='Enter')doAdminLogin()"></div>
    <button class="btn" onclick="doAdminLogin()">Se connecter</button>
    <div class="err" id="login-err"></div>
  </div>
</div>

<!-- Admin panel -->
<div id="admin">
  <div class="hdr">
    <h1>Administration — France Info</h1>
    <div style="display:flex;gap:8px;align-items:center">
      <button class="btn btn-sm btn-ghost" onclick="showChangePwd()">Changer MDP admin</button>
      <button class="btn btn-sm btn-ghost" onclick="adminLogout()">Déconnexion</button>
    </div>
  </div>

  <div class="tabs">
    <div class="tab active" onclick="switchTab('users')">Utilisateurs</div>
    <div class="tab" onclick="switchTab('lines')">Lignes</div>
    <div class="tab" onclick="switchTab('cycles')">Cycles</div>
    <div class="tab" onclick="switchTab('vacations')">Vacations</div>
  </div>

  <!-- Users -->
  <div class="section active" id="tab-users">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
      <span id="user-count" style="font-size:12px;color:var(--text3)"></span>
      <button class="btn btn-sm" onclick="loadUsers()">↻ Rafraîchir</button>
    </div>
    <div id="users-table"></div>
  </div>

  <!-- Lines -->
  <div class="section" id="tab-lines">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
      <span style="font-size:12px;color:var(--text3)">Lignes utilisées par les profils</span>
      <button class="btn btn-sm" onclick="loadLines()">↻ Rafraîchir</button>
    </div>
    <div id="lines-grid"></div>
  </div>

  <!-- Cycles -->
  <div class="section" id="tab-cycles">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
      <span style="font-size:12px;color:var(--text3)">Gestion des cycles de planning</span>
      <div style="display:flex;gap:6px">
        <button class="btn btn-sm btn-ghost" onclick="migrateHardcodedCycleIfNeeded().then(loadCycles).then(()=>switchTab('vacations'))">Migrer cycle initial</button>
        <button class="btn btn-sm btn-green" onclick="showCreateCycle()">+ Nouveau cycle</button>
      </div>
    </div>
    <div id="cycles-list"></div>
  </div>

  <!-- Vacations -->
  <div class="section" id="tab-vacations">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
      <span style="font-size:12px;color:var(--text3)">Vacations personnalisées (s'ajoutent aux standards)</span>
      <button class="btn btn-sm btn-green" onclick="showVacForm()">+ Ajouter</button>
    </div>
    <div id="vac-form" style="display:none;background:var(--bg2);border:0.5px solid var(--border);border-radius:var(--r);padding:16px;margin-bottom:16px">
      <h2 style="font-size:14px;margin-bottom:12px" id="vac-form-title">Nouvelle vacation</h2>
      <div class="row">
        <div class="flex1 field"><label>Nom (ex: E1)</label><input type="text" id="vf-name" placeholder="E1"></div>
        <div class="flex1 field"><label>Début</label><input type="time" id="vf-deb" step="900" placeholder="06:00"></div>
        <div class="flex1 field"><label>Fin</label><input type="time" id="vf-fin" step="900" placeholder="14:00"></div>
      </div>
      <div class="row">
        <div class="flex1 field"><label>Durée (min, auto si vide)</label><input type="number" id="vf-dur" placeholder="Auto"></div>
        <div class="flex1 field" style="display:flex;align-items:center;gap:8px;padding-top:20px">
          <input type="checkbox" id="vf-panier"> <label for="vf-panier" style="font-size:13px">Panier repas</label>
        </div>
        <div class="flex1 field"><label>Type</label>
          <select id="vf-type" style="width:100%;padding:8px;border:0.5px solid var(--border);border-radius:var(--r);background:var(--bg);color:var(--text);font-size:13px">
            <option value="week">Semaine</option>
            <option value="sat">Samedi</option>
            <option value="sun">Dimanche</option>
            <option value="all">Tous jours</option>
          </select>
        </div>
      </div>
      <div class="row">
        <button class="btn btn-green" onclick="saveVac()">Enregistrer</button>
        <button class="btn btn-ghost" onclick="document.getElementById(\'vac-form\').style.display=\'none\'">Annuler</button>
      </div>
      <div class="err" id="vf-err" style="margin-top:8px"></div>
    </div>
    <table>
      <thead><tr><th>Nom</th><th>Début</th><th>Fin</th><th>Durée</th><th>Panier</th><th>Type</th><th></th></tr></thead>
      <tbody id="vac-list"></tbody>
    </table>
  </div>

</div>

<!-- Modals -->
<div id="modal-bg" class="modal-bg" style="display:none" onclick="if(event.target===this)closeModal()">
  <div class="modal" id="modal-content"></div>
</div>

<script>
const API = 'https://planning-gcal.arthur-lebreton94.workers.dev';
var adminToken = sessionStorage.getItem('admin_token') || '';
var _adminCycles = [];

if (adminToken) { showAdmin(); }

async function doAdminLogin() {
  const pwd = document.getElementById('admin-pwd').value;
  const err = document.getElementById('login-err');
  err.textContent = '';
  try {
    const res = await fetch(API + '/admin/login', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ password: pwd }) });
    const data = await res.json();
    if (!res.ok) { err.textContent = data.error || 'Erreur'; return; }
    adminToken = data.token;
    sessionStorage.setItem('admin_token', adminToken);
    showAdmin();
  } catch(e) { err.textContent = 'Erreur réseau'; }
}

function adminHeaders() { return { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + adminToken }; }

function showAdmin() {
  document.getElementById('login-section').style.display = 'none';
  document.getElementById('admin').style.display = 'block';
  migrateHardcodedCycleIfNeeded().then(() => loadUsers());
}

// Default hardcoded cycle data
const DEFAULT_CYCLE_DATA = {
  name: 'Cycle France Info (initial)',
  startDate: '2026-05-04',
  anchor: '2026-05-04',
  endDate: null,
  weeks: [
    ['A1','A1',null,'RH','A2','As1','Ad1'],[null,null,'A2','A2','B1',null,'RH'],
    ['A3','A3',null,'RH','A1','As2','Ad2'],[null,null,'A1','A1','A3',null,'RH'],
    ['B1','B1','A3','A3',null,null,'RH'],['A2','A2','B1','B1',null,null,'RH'],
    [null,null,'RH','P423','P423','Es','Ed'],[null,null,'D2','D1','D1',null,'RH'],
    ['C1','C1','C1','C1',null,null,'RH'],['D2','D2',null,'RH','C1','Fs','Fd'],
    [null,null,'D1','D2','D2',null,'RH'],['C2','C2','C2','C2','C2',null,'RH'],
    ['D1','D1',null,null,'RH','Cs','Cd'],['P423','P423','P423',null,'RH','As3','Ad3'],
  ]
};

const DEFAULT_VACS_DATA = {
  A1:{deb:'03h45',fin:'10h45',dur:420,panier:false,type:'week'},
  A2:{deb:'03h45',fin:'11h45',dur:480,panier:false,type:'week'},
  A3:{deb:'04h45',fin:'12h45',dur:480,panier:false,type:'week'},
  Ad1:{deb:'04h45',fin:'11h45',dur:420,panier:false,type:'sun'},
  Ad2:{deb:'04h45',fin:'12h45',dur:480,panier:false,type:'sun'},
  Ad3:{deb:'05h45',fin:'14h15',dur:510,panier:false,type:'sun'},
  As1:{deb:'04h45',fin:'11h45',dur:420,panier:false,type:'sat'},
  As2:{deb:'04h45',fin:'12h45',dur:480,panier:false,type:'sat'},
  As3:{deb:'05h45',fin:'14h15',dur:510,panier:false,type:'sat'},
  B1:{deb:'07h45',fin:'15h15',dur:450,panier:true,type:'week'},
  C1:{deb:'12h15',fin:'21h15',dur:540,panier:true,type:'week'},
  C2:{deb:'13h15',fin:'21h15',dur:480,panier:false,type:'week'},
  Cd:{deb:'12h15',fin:'21h15',dur:540,panier:true,type:'sun'},
  Cs:{deb:'12h15',fin:'21h15',dur:540,panier:true,type:'sat'},
  D1:{deb:'15h45',fin:'00h30',dur:480,panier:false,type:'week'},
  D2:{deb:'15h45',fin:'00h15',dur:465,panier:false,type:'week'},
  Ed:{deb:'14h45',fin:'00h30',dur:540,panier:false,type:'sun'},
  Es:{deb:'15h15',fin:'00h30',dur:510,panier:false,type:'sat'},
  Fd:{deb:'15h45',fin:'00h15',dur:465,panier:false,type:'sun'},
  Fs:{deb:'15h45',fin:'00h15',dur:465,panier:false,type:'sat'},
  P423:{deb:'09h45',fin:'18h15',dur:390,panier:false,type:'week'},
  RH:{deb:'',fin:'',dur:0,panier:false,type:'all'},
};

async function migrateHardcodedCycleIfNeeded() {
  try {
    // Check if cycles already exist
    const res = await fetch(API + '/admin/cycles', { method: 'POST', headers: adminHeaders(), body: '{}' });
    const data = await res.json();
    const cycles = data.cycles || [];
    if (cycles.length > 0) return; // already migrated

    // Check vacations
    const vres = await fetch(API + '/admin/vacations', { method: 'POST', headers: adminHeaders(), body: '{}' });
    const vdata = await vres.json();
    const existingVacs = vdata.vacations || {};

    // Migrate vacations first
    const vacNames = Object.keys(DEFAULT_VACS_DATA);
    for (const name of vacNames) {
      if (existingVacs[name]) continue; // already exists
      const v = DEFAULT_VACS_DATA[name];
      await fetch(API + '/admin/vacation/save', {
        method: 'POST', headers: adminHeaders(),
        body: JSON.stringify({ vacation: { name, ...v } })
      });
    }

    // Create initial cycle
    const cycRes = await fetch(API + '/admin/cycle/create', {
      method: 'POST', headers: adminHeaders(),
      body: JSON.stringify({ cycle: DEFAULT_CYCLE_DATA })
    });
    const cycData = await cycRes.json();
    const cycleId = cycData.cycle && cycData.cycle.id;
    if (!cycleId) return;

    // Link all default vacations to this cycle
    for (const name of vacNames) {
      await fetch(API + '/admin/vacation/addcycle', {
        method: 'POST', headers: adminHeaders(),
        body: JSON.stringify({ name, cycleId })
      });
    }

    console.log('Migration done: cycle', cycleId, 'with', vacNames.length, 'vacations');
    alert('Cycle initial migré depuis le code. Rechargez la page.');
  } catch(e) {
    console.warn('Migration failed:', e);
  }
}



function adminLogout() {
  sessionStorage.removeItem('admin_token');
  adminToken = '';
  document.getElementById('login-section').style.display = '';
  document.getElementById('admin').style.display = 'none';
}

function switchTab(tab) {
  document.querySelectorAll('.tab').forEach((t,i) => t.classList.toggle('active', ['users','lines','cycles','vacations'][i] === tab));
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.getElementById('tab-' + tab).classList.add('active');
  if (tab === 'users') loadUsers();
  if (tab === 'lines') loadLines();
  if (tab === 'cycles') loadCycles();
  if (tab === 'vacations') loadVacations();
}

// VACATIONS
var _editingVac = null;
var _allCycles = [];
async function loadVacations() {
  const el = document.getElementById('vac-list');
  el.innerHTML = '<tr><td colspan="8" style="color:var(--text3);font-size:12px">Chargement...</td></tr>';
  try {
    // Load cycles and vacations in parallel
    const [vres, cres] = await Promise.all([
      fetch(API + '/admin/vacations', { method: 'POST', headers: adminHeaders(), body: '{}' }),
      fetch(API + '/admin/cycles', { method: 'POST', headers: adminHeaders(), body: '{}' })
    ]);
    const vdata = await vres.json();
    const cdata = await cres.json();
    const vacs = vdata.vacations || {};
    _allCycles = cdata.cycles || [];
    const types = { week: 'Sem.', sat: 'Sam.', sun: 'Dim.', all: 'Tous' };

    // Update table header
    const thead = document.querySelector('#tab-vacations table thead tr');
    thead.innerHTML = '<th>Nom</th><th>Début</th><th>Fin</th><th>Durée</th><th>Panier</th><th>Type</th>'
      + _allCycles.map(c => `<th style="font-size:10px;max-width:60px;word-break:break-word">${c.name||c.id}<br><span style="color:var(--text3);font-weight:400">${c.startDate}</span></th>`).join('')
      + '<th></th>';

    if (!Object.keys(vacs).length) {
      el.innerHTML = '<tr><td colspan="8" style="color:var(--text3);font-size:12px">Aucune vacation. Cliquez sur Migrer ou Ajouter.</td></tr>';
      return;
    }

    el.innerHTML = Object.entries(vacs).sort((a,b) => a[0].localeCompare(b[0])).map(([name, v]) => {
      const cycleCols = _allCycles.map(c => {
        const checked = (v.cycleIds || []).includes(c.id);
        return `<td style="text-align:center"><input type="checkbox" ${checked?'checked':''} onchange="toggleVacCycle('${name}','${c.id}',this.checked)"></td>`;
      }).join('');
      return `<tr>
        <td><b>${name}</b></td>
        <td style="font-size:11px">${v.deb||'—'}</td>
        <td style="font-size:11px">${v.fin||'—'}</td>
        <td style="font-size:11px">${v.dur||0} min</td>
        <td style="text-align:center">${v.panier ? '✓' : '—'}</td>
        <td style="font-size:11px">${types[v.type]||v.type||'—'}</td>
        ${cycleCols}
        <td style="display:flex;gap:4px;white-space:nowrap">
          <button class="btn btn-sm" onclick="editVac('${name}',${JSON.stringify(v).replace(/'/g,"\\'")})">✏️</button>
          <button class="btn btn-sm btn-red" onclick="deleteVac('${name}')">🗑</button>
        </td>
      </tr>`;
    }).join('');
  } catch(e) { el.innerHTML = '<tr><td colspan="8" class="err">Erreur réseau</td></tr>'; }
}

async function toggleVacCycle(vacName, cycleId, add) {
  const endpoint = add ? '/admin/vacation/addcycle' : '/admin/vacation/removecycle';
  try {
    await fetch(API + endpoint, { method: 'POST', headers: adminHeaders(), body: JSON.stringify({ name: vacName, cycleId }) });
  } catch(e) { alert('Erreur réseau'); }
}

function fmtTimeToHHMM(t) {
  if (!t) return '';
  // Convert '06h30' to '06:30' or keep 'HH:MM'
  return t.replace('h', ':').replace(/^(\d):/, '0$1:');
}
function fmtHHMMToH(t) {
  if (!t) return '';
  return t.replace(':', 'h');
}
function calcDur(deb, fin) {
  if (!deb || !fin) return 0;
  const [dh,dm] = deb.split(':').map(Number);
  const [fh,fm] = fin.split(':').map(Number);
  let mins = (fh*60+fm) - (dh*60+dm);
  if (mins <= 0) mins += 24*60; // overnight
  return mins;
}

function showVacForm(name, v) {
  _editingVac = name || null;
  document.getElementById('vac-form').style.display = 'block';
  document.getElementById('vac-form-title').textContent = name ? `Modifier ${name}` : 'Nouvelle vacation';
  document.getElementById('vf-name').value = name || '';
  document.getElementById('vf-name').disabled = !!name;
  document.getElementById('vf-deb').value = v ? fmtTimeToHHMM(v.deb) : '';
  document.getElementById('vf-fin').value = v ? fmtTimeToHHMM(v.fin) : '';
  document.getElementById('vf-dur').value = v ? v.dur : '';
  document.getElementById('vf-panier').checked = v ? !!v.panier : false;
  document.getElementById('vf-type').value = v ? (v.type||'week') : 'week';
  document.getElementById('vf-err').textContent = '';
}

function editVac(name, v) { showVacForm(name, v); }

async function saveVac() {
  const name = document.getElementById('vf-name').value.trim();
  const deb = document.getElementById('vf-deb').value;
  const fin = document.getElementById('vf-fin').value;
  const durInput = document.getElementById('vf-dur').value;
  const panier = document.getElementById('vf-panier').checked;
  const type = document.getElementById('vf-type').value;
  const errEl = document.getElementById('vf-err');
  if (!name || !deb || !fin) { errEl.textContent = 'Nom, début et fin requis.'; return; }
  const dur = durInput ? parseInt(durInput) : calcDur(deb, fin);
  const vacation = { name, deb: fmtHHMMToH(deb), fin: fmtHHMMToH(fin), dur, panier, type };
  try {
    const res = await fetch(API + '/admin/vacation/save', { method: 'POST', headers: adminHeaders(), body: JSON.stringify({ vacation }) });
    const data = await res.json();
    if (!res.ok) { errEl.textContent = data.error || 'Erreur'; return; }
    document.getElementById('vac-form').style.display = 'none';
    loadVacations();
  } catch(e) { errEl.textContent = 'Erreur réseau'; }
}

async function deleteVac(name) {
  if (!confirm(`Supprimer la vacation "${name}" ?`)) return;
  const res = await fetch(API + '/admin/vacation/delete', { method: 'POST', headers: adminHeaders(), body: JSON.stringify({ name }) });
  if (res.ok) loadVacations();
}


async function loadUsers() {
  const el = document.getElementById('users-table');
  el.innerHTML = '<div class="empty">Chargement...</div>';
  try {
    const res = await fetch(API + '/admin/users', { method: 'POST', headers: adminHeaders(), body: JSON.stringify({}) });
    const data = await res.json();
    if (!res.ok) { el.innerHTML = '<div class="err">' + (data.error||'Erreur') + '</div>'; return; }
    const users = data.users || [];
    document.getElementById('user-count').textContent = users.length + ' utilisateur(s)';
    if (!users.length) { el.innerHTML = '<div class="empty">Aucun utilisateur</div>'; return; }
    el.innerHTML = '<table><thead><tr><th>Nom</th><th>Email</th><th>Inscription</th><th>Profils / Lignes</th><th>Actions</th></tr></thead><tbody>'
      + users.map(u => {
        const date = u.createdAt ? new Date(u.createdAt).toLocaleDateString('fr-FR') : '—';
        const lines = (u.linesUsed || []).map(l => '<span class="chip">' + (l.name||l.profileId) + ': ' + l.ligne + '</span>').join('');
        return '<tr>'
          + '<td><b>' + (u.name||'—') + '</b></td>'
          + '<td style="color:var(--text2)">' + (u.email||'—') + '</td>'
          + '<td style="color:var(--text3)">' + date + '</td>'
          + '<td>' + (lines||'<span style="color:var(--text3)">—</span>') + '</td>'
          + '<td><div style="display:flex;gap:4px">'
          + '<button class="btn btn-sm btn-orange" onclick="showResetPwd(\'' + u.userId + '\',\'' + (u.name||'') + '\')">Reset MDP</button>'
          + '<button class="btn btn-sm btn-red" onclick="confirmDeleteUser(\'' + u.userId + '\',\'' + (u.name||'') + '\')">Supprimer</button>'
          + '</div></td>'
          + '</tr>';
      }).join('') + '</tbody></table>';
  } catch(e) { el.innerHTML = '<div class="err">Erreur réseau</div>'; }
}

function showResetPwd(userId, name) {
  document.getElementById('modal-content').innerHTML = '<h2>Reset MDP — ' + name + '</h2>'
    + '<div class="field"><label>Nouveau mot de passe</label><input type="text" id="new-pwd-input" placeholder="Nouveau mot de passe"></div>'
    + '<div class="modal-btns"><button class="btn btn-ghost" onclick="closeModal()">Annuler</button><button class="btn" onclick="doResetPwd(\'' + userId + '\')">Enregistrer</button></div>';
  document.getElementById('modal-bg').style.display = 'flex';
}

async function doResetPwd(userId) {
  const pwd = document.getElementById('new-pwd-input').value;
  if (!pwd || pwd.length < 4) return alert('Mot de passe trop court');
  const res = await fetch(API + '/admin/reset-password', { method: 'POST', headers: adminHeaders(), body: JSON.stringify({ userId, newPassword: pwd }) });
  const data = await res.json();
  if (res.ok) { closeModal(); alert('Mot de passe mis à jour'); }
  else alert(data.error || 'Erreur');
}

async function confirmDeleteUser(userId, name) {
  if (!confirm('Supprimer l\'utilisateur "' + name + '" et toutes ses données ?')) return;
  const res = await fetch(API + '/admin/delete-user', { method: 'POST', headers: adminHeaders(), body: JSON.stringify({ userId }) });
  const data = await res.json();
  if (res.ok) { loadUsers(); }
  else alert(data.error || 'Erreur');
}

// LINES
async function loadLines() {
  const el = document.getElementById('lines-grid');
  el.innerHTML = '<div class="empty">Chargement...</div>';
  try {
    const res = await fetch(API + '/admin/lines', { method: 'POST', headers: adminHeaders(), body: JSON.stringify({}) });
    const data = await res.json();
    const lines = data.lines || {};
    const keys = Object.keys(lines).sort();
    if (!keys.length) { el.innerHTML = '<div class="empty">Aucune ligne enregistrée</div>'; return; }
    el.innerHTML = '<div class="line-grid">' + keys.map(l => {
      const users = lines[l] || [];
      return '<div class="line-card">'
        + '<div class="line-name">' + l + '</div>'
        + users.map(u => '<div class="line-user">👤 ' + (u.userName||'?') + ' — ' + (u.profileName||u.profileId) + '</div>').join('')
        + '</div>';
    }).join('') + '</div>';
  } catch(e) { el.innerHTML = '<div class="err">Erreur réseau</div>'; }
}

// CYCLES
async function loadCycles() {
  const el = document.getElementById('cycles-list');
  el.innerHTML = '<div class="empty">Chargement...</div>';
  try {
    const res = await fetch(API + '/admin/cycles', { method: 'POST', headers: adminHeaders(), body: JSON.stringify({}) });
    const data = await res.json();
    const cycles = data.cycles || [];
    el.innerHTML = (cycles.length ? '' : '<div class="empty">Aucun cycle enregistré. Le cycle par défaut est celui du code.</div>')
      + '<button class="btn btn-sm" style="margin-bottom:8px" onclick="showEditCurrentCycle()">✏️ Modifier le cycle initial (hardcodé)</button>';
    _adminCycles = cycles;
    if (!cycles.length) return;
    el.innerHTML += cycles.map((c, idx) => {
      const start = c.startDate || '—';
      const end = c.endDate ? ' → ' + c.endDate : ' (sans fin)';
      const weeks = (c.weeks || []).length;
      return '<div class="cycle-card">'
        + '<div class="cycle-hdr"><div><div class="cycle-name">' + (c.name||'Cycle') + '</div><div class="cycle-dates">' + start + end + ' · ' + weeks + ' semaines</div></div>'
        + '<div style="display:flex;gap:6px">'
        + '<button class="btn btn-sm" onclick="showCreateCycle(_adminCycles[' + idx + '])">Modifier</button>'
        + '<button class="btn btn-sm btn-red" onclick="deleteCycle(\'' + c.id + '\')">Supprimer</button>'
        + '</div></div>'
        + (c.weekCountChanged ? '<div class="alert alert-blue">Les utilisateurs seront invités à choisir leur ligne</div>' : '')
        + '</div>';
    }).join('');
  } catch(e) { el.innerHTML = '<div class="err">Erreur réseau</div>'; }
}

async function showCreateCycle(prefillData) {
  // Load global vacations first
  let globalVacs = {};
  try {
    const res = await fetch(API + '/admin/vacations', { method: 'POST', headers: adminHeaders(), body: JSON.stringify({}) });
    const d = await res.json();
    globalVacs = d.vacations || {};
  } catch(e) {}
  // All vacation codes including custom
  const BASE_VACS = ['null','RH','A1','A2','A3','B1','C1','C2','D1','D2','P423','As1','As2','As3','Cs','Es','Fs','Ad1','Ad2','Ad3','Cd','Ed','Fd'];
  const CUSTOM_VACS = Object.keys(globalVacs).filter(v => !BASE_VACS.includes(v));
  const ALL_VACS = [...BASE_VACS, ...CUSTOM_VACS];
  const DAYS = ['Lu','Ma','Me','Je','Ve','Sa','Di'];
  const DEFAULT_CYCLE = [
    ['A1','A1',null,'RH','A2','As1','Ad1'],[null,null,'A2','A2','B1',null,'RH'],
    ['A3','A3',null,'RH','A1','As2','Ad2'],[null,null,'A1','A1','A3',null,'RH'],
    ['B1','B1','A3','A3',null,null,'RH'],['A2','A2','B1','B1',null,null,'RH'],
    [null,null,'RH','P423','P423','Es','Ed'],[null,null,'D2','D1','D1',null,'RH'],
    ['C1','C1','C1','C1',null,null,'RH'],['D2','D2',null,'RH','C1','Fs','Fd'],
    [null,null,'D1','D2','D2',null,'RH'],['C2','C2','C2','C2','C2',null,'RH'],
    ['D1','D1',null,null,'RH','Cs','Cd'],['P423','P423','P423',null,'RH','As3','Ad3'],
  ];
  const weeks = prefillData ? prefillData.weeks : DEFAULT_CYCLE;
  const makeOpts = (val) => ALL_VACS.map(v => `<option value="${v}"${(val===null&&v==='null')||(val===v)?' selected':''}>${v==='null'?'—':v}</option>`).join('');
  let gridHtml = `<table style="border-collapse:collapse;font-size:11px;width:100%"><tr><th style="padding:3px 6px;color:var(--text3)">S</th>${DAYS.map(d=>`<th style="padding:3px 6px;color:var(--text3)">${d}</th>`).join('')}</tr>`;
  weeks.forEach((week, wi) => {
    gridHtml += `<tr><td style="padding:3px 6px;color:var(--text3);font-weight:600">S${wi+1}</td>`;
    week.forEach((vac, di) => {
      gridHtml += `<td style="padding:2px"><select data-w="${wi}" data-d="${di}" style="font-size:10px;padding:2px;border:0.5px solid var(--border);border-radius:3px;background:var(--bg2);color:var(--text);width:60px">${makeOpts(vac)}</select></td>`;
    });
    gridHtml += '</tr>';
  });
  gridHtml += '</table>';

  document.getElementById('modal-content').innerHTML = '<h2>' + (prefillData ? 'Modifier le cycle' : 'Nouveau cycle') + '</h2>'
    + '<div class="field"><label>Nom</label><input type="text" id="cyc-name" value="' + (prefillData ? prefillData.name||'' : '') + '" placeholder="Ex: Cycle été 2026"></div>'
    + '<div class="row"><div class="flex1 field"><label>Date de début</label><input type="date" id="cyc-start" value="' + (prefillData ? prefillData.startDate||'' : '') + '"></div>'
    + '<div class="flex1 field"><label>Date de fin (optionnel)</label><input type="date" id="cyc-end" value="' + (prefillData&&prefillData.endDate ? prefillData.endDate : '') + '"></div></div>'
    + '<div class="field"><label>Grille du cycle (14 semaines × 7 jours)</label>'
    + '<div style="overflow-x:auto">' + gridHtml + '</div></div>'
    + '<div class="modal-btns"><button class="btn btn-ghost" onclick="closeModal()">Annuler</button><button class="btn btn-green" onclick="doSaveCycle(' + (prefillData?`'${prefillData.id}'`:'null') + ')">Enregistrer</button></div>'
    + '<div class="err" id="cyc-err" style="margin-top:8px"></div>';
  document.getElementById('modal-bg').style.display = 'flex';
}

function showEditCurrentCycle() {
  // Prefill with the default hardcoded cycle
  showCreateCycle({
    id: 'current',
    name: 'Cycle actuel',
    startDate: '2026-05-04',
    endDate: null,
    anchor: '2026-05-04',
    weeks: [
      ['A1','A1',null,'RH','A2','As1','Ad1'],[null,null,'A2','A2','B1',null,'RH'],
      ['A3','A3',null,'RH','A1','As2','Ad2'],[null,null,'A1','A1','A3',null,'RH'],
      ['B1','B1','A3','A3',null,null,'RH'],['A2','A2','B1','B1',null,null,'RH'],
      [null,null,'RH','P423','P423','Es','Ed'],[null,null,'D2','D1','D1',null,'RH'],
      ['C1','C1','C1','C1',null,null,'RH'],['D2','D2',null,'RH','C1','Fs','Fd'],
      [null,null,'D1','D2','D2',null,'RH'],['C2','C2','C2','C2','C2',null,'RH'],
      ['D1','D1',null,null,'RH','Cs','Cd'],['P423','P423','P423',null,'RH','As3','Ad3'],
    ]
  });
}

async function doSaveCycle(existingId) {
  const name = document.getElementById('cyc-name').value.trim();
  const startDate = document.getElementById('cyc-start').value;
  const endDate = document.getElementById('cyc-end').value || null;
  const anchor = startDate; // anchor = startDate (premier lundi du cycle)
  const errEl = document.getElementById('cyc-err');
  errEl.textContent = '';
  if (!name || !startDate) { errEl.textContent = 'Nom et date de début requis.'; return; }
  // Read grid
  const selects = document.querySelectorAll('select[data-w]');
  const weeks = [];
  selects.forEach(sel => {
    const wi = parseInt(sel.dataset.w), di = parseInt(sel.dataset.d);
    if (!weeks[wi]) weeks[wi] = [];
    weeks[wi][di] = sel.value === 'null' ? null : sel.value;
  });
  if (weeks.length !== 14 || weeks.some(w => !w || w.length !== 7)) { errEl.textContent = '14 semaines × 7 jours requis.'; return; }
  const endpoint = existingId ? '/admin/cycle/update' : '/admin/cycle/create';
  const body = { cycle: { id: existingId||undefined, name, startDate, endDate, anchor, weeks } };
  const res = await fetch(API + endpoint, { method: 'POST', headers: adminHeaders(), body: JSON.stringify(body) });
  const data = await res.json();
  if (res.ok) { closeModal(); loadCycles(); }
  else { errEl.textContent = data.error || 'Erreur'; }
}

async function deleteCycle(cycleId) {
  if (!confirm('Supprimer ce cycle ?')) return;
  const res = await fetch(API + '/admin/cycle/delete', { method: 'POST', headers: adminHeaders(), body: JSON.stringify({ cycleId }) });
  if (res.ok) loadCycles();
}

// Change admin password
function showChangePwd() {
  document.getElementById('modal-content').innerHTML = '<h2>Changer le mot de passe admin</h2>'
    + '<div class="field"><label>Nouveau mot de passe</label><input type="password" id="new-admin-pwd" placeholder="Min 6 caractères"></div>'
    + '<div class="modal-btns"><button class="btn btn-ghost" onclick="closeModal()">Annuler</button><button class="btn" onclick="doChangeAdminPwd()">Enregistrer</button></div>'
    + '<div class="err" id="admin-pwd-err" style="margin-top:8px"></div>';
  document.getElementById('modal-bg').style.display = 'flex';
}

async function doChangeAdminPwd() {
  const pwd = document.getElementById('new-admin-pwd').value;
  const err = document.getElementById('admin-pwd-err');
  if (!pwd || pwd.length < 6) { err.textContent = 'Min 6 caractères'; return; }
  const res = await fetch(API + '/admin/change-password', { method: 'POST', headers: adminHeaders(), body: JSON.stringify({ newPassword: pwd }) });
  const data = await res.json();
  if (res.ok) { closeModal(); alert('Mot de passe admin mis à jour'); }
  else { err.textContent = data.error || 'Erreur'; }
}

function closeModal() { document.getElementById('modal-bg').style.display = 'none'; }
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });
</script>

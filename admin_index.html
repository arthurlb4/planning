<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin — Planning France Info</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
[data-theme=light]{--bg:#e8e8e4;--bg2:#deded9;--bg3:#d0cfc9;--text:#1a1a18;--text2:#4a4a46;--text3:#8a8880;--border:rgba(0,0,0,.18);}
:root{--bg:#18181b;--bg2:#27272a;--bg3:#3f3f46;--text:#f4f4f5;--text2:#d4d4d8;--text3:#71717a;--blue:#4ea0f7;--green:#5a9e3f;--red:#e24b4a;--orange:#f0a030;--border:rgba(255,255,255,.12);--r:8px;}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;min-height:100vh;padding:20px;}
.login-wrap{display:flex;align-items:center;justify-content:center;min-height:100vh;}
.card{background:var(--bg2);border:0.5px solid var(--border);border-radius:16px;padding:24px;width:100%;max-width:420px;}
h1{font-size:18px;font-weight:600;margin-bottom:4px;}
.sub{font-size:12px;color:var(--text3);margin-bottom:20px;}
.field{margin-bottom:14px;}
.field label{display:block;font-size:11px;color:var(--text3);margin-bottom:5px;text-transform:uppercase;letter-spacing:.05em;}
.field input{width:100%;padding:9px 12px;background:var(--bg);border:0.5px solid var(--border);border-radius:var(--r);color:var(--text);font-size:14px;outline:none;}
.field input:focus{border-color:var(--blue);}
.btn{padding:9px 16px;background:var(--blue);color:#fff;border:none;border-radius:var(--r);font-size:13px;font-weight:500;cursor:pointer;}
.btn:hover{opacity:.9;}
.btn-sm{padding:5px 10px;font-size:11px;}
.btn-red{background:var(--red);}
.btn-orange{background:var(--orange);}
.btn-green{background:var(--green);}
.btn-ghost{background:transparent;border:0.5px solid var(--border);color:var(--text2);}
.err{color:var(--red);font-size:12px;margin-top:8px;}
/* Admin layout */
#admin{display:none;}
.hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px;padding-bottom:16px;border-bottom:0.5px solid var(--border);}
.hdr h1{font-size:20px;}
.tabs{display:flex;gap:4px;margin-bottom:20px;background:var(--bg2);border-radius:var(--r);padding:3px;}
.tab{padding:7px 14px;border-radius:6px;cursor:pointer;font-size:13px;color:var(--text2);}
.tab.active{background:var(--bg3);color:var(--text);font-weight:500;}
.section{display:none;}
.section.active{display:block;}
table{width:100%;border-collapse:collapse;font-size:13px;}
th{text-align:left;padding:8px 10px;font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.05em;border-bottom:0.5px solid var(--border);}
td{padding:8px 10px;border-bottom:0.5px solid var(--border2,#1e1e3a);vertical-align:top;}
tr:hover td{background:var(--bg2);}
.badge{display:inline-block;padding:2px 8px;border-radius:10px;font-size:10px;font-weight:500;}
.badge-blue{background:var(--bg3);color:var(--blue);}
.badge-green{background:rgba(90,158,63,.2);color:#7ec85a;}
.badge-red{background:rgba(226,75,74,.2);color:#e24b4a;}
.chip{display:inline-block;padding:2px 6px;border-radius:4px;font-size:11px;background:var(--bg3);color:var(--text2);margin:1px;}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.6);display:flex;align-items:center;justify-content:center;z-index:100;}
.modal{background:var(--bg2);border:0.5px solid var(--border);border-radius:12px;padding:24px;width:100%;max-width:400px;}
.modal h2{font-size:16px;margin-bottom:16px;}
.modal-btns{display:flex;gap:8px;margin-top:16px;justify-content:flex-end;}
.line-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:8px;}
.line-card{background:var(--bg2);border:0.5px solid var(--border);border-radius:var(--r);padding:10px;}
.line-name{font-size:13px;font-weight:500;margin-bottom:6px;}
.line-user{font-size:11px;color:var(--text2);margin:2px 0;}
.empty{color:var(--text3);font-size:13px;padding:20px 0;text-align:center;}
.cycle-card{background:var(--bg2);border:0.5px solid var(--border);border-radius:var(--r);padding:14px;margin-bottom:10px;}
.cycle-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;}
.cycle-name{font-size:14px;font-weight:500;}
.cycle-dates{font-size:11px;color:var(--text3);}
textarea{width:100%;padding:9px 12px;background:var(--bg);border:0.5px solid var(--border);border-radius:var(--r);color:var(--text);font-size:12px;font-family:monospace;outline:none;resize:vertical;}
.row{display:flex;gap:8px;align-items:center;}
.flex1{flex:1;}
.mt8{margin-top:8px;}
.mt16{margin-top:16px;}
.alert{padding:10px 14px;border-radius:var(--r);font-size:12px;margin-bottom:12px;}
.alert-blue{background:rgba(78,160,247,.1);border:0.5px solid rgba(78,160,247,.3);color:var(--blue);}
</style>
</head>
<body>

<!-- Login -->
<div class="login-wrap" id="login-section">
  <div class="card">
    <h1>Administration</h1>
    <p class="sub">Planning France Info</p>
    <div class="field"><label>Mot de passe admin</label><input type="password" id="admin-pwd" placeholder="••••••••" onkeydown="if(event.key==='Enter')doAdminLogin()"></div>
    <button class="btn" onclick="doAdminLogin()">Se connecter</button>
    <div class="err" id="login-err"></div>
  </div>
</div>

<!-- Admin panel -->
<div id="admin">
  <div class="hdr">
    <h1>Administration — France Info</h1>
    <div style="display:flex;gap:8px;align-items:center">
      <button class="btn btn-sm btn-ghost" onclick="showChangePwd()">Changer MDP admin</button>
      <button class="btn btn-sm btn-ghost" onclick="adminLogout()">Déconnexion</button>
    </div>
  </div>

  <div class="tabs">
    <div class="tab active" onclick="switchTab('users')">Utilisateurs</div>
    <div class="tab" onclick="switchTab('lines')">Lignes</div>
    <div class="tab" onclick="switchTab('cycles')">Cycles</div>
  </div>

  <!-- Users -->
  <div class="section active" id="tab-users">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
      <span id="user-count" style="font-size:12px;color:var(--text3)"></span>
      <button class="btn btn-sm" onclick="loadUsers()">↻ Rafraîchir</button>
    </div>
    <div id="users-table"></div>
  </div>

  <!-- Lines -->
  <div class="section" id="tab-lines">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
      <span style="font-size:12px;color:var(--text3)">Lignes utilisées par les profils</span>
      <button class="btn btn-sm" onclick="loadLines()">↻ Rafraîchir</button>
    </div>
    <div id="lines-grid"></div>
  </div>

  <!-- Cycles -->
  <div class="section" id="tab-cycles">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
      <span style="font-size:12px;color:var(--text3)">Gestion des cycles de planning</span>
      <button class="btn btn-sm btn-green" onclick="showCreateCycle()">+ Nouveau cycle</button>
    </div>
    <div id="cycles-list"></div>
  </div>
</div>

<!-- Modals -->
<div id="modal-bg" class="modal-bg" style="display:none" onclick="if(event.target===this)closeModal()">
  <div class="modal" id="modal-content"></div>
</div>

<script>
const API = 'https://planning-gcal.arthur-lebreton94.workers.dev';
var adminToken = sessionStorage.getItem('admin_token') || '';

if (adminToken) { showAdmin(); }

async function doAdminLogin() {
  const pwd = document.getElementById('admin-pwd').value;
  const err = document.getElementById('login-err');
  err.textContent = '';
  try {
    const res = await fetch(API + '/admin/login', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ password: pwd }) });
    const data = await res.json();
    if (!res.ok) { err.textContent = data.error || 'Erreur'; return; }
    adminToken = data.token;
    sessionStorage.setItem('admin_token', adminToken);
    showAdmin();
  } catch(e) { err.textContent = 'Erreur réseau'; }
}

function adminHeaders() { return { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + adminToken }; }

function showAdmin() {
  document.getElementById('login-section').style.display = 'none';
  document.getElementById('admin').style.display = 'block';
  loadUsers();
}

function adminLogout() {
  sessionStorage.removeItem('admin_token');
  adminToken = '';
  document.getElementById('login-section').style.display = '';
  document.getElementById('admin').style.display = 'none';
}

function switchTab(tab) {
  document.querySelectorAll('.tab').forEach((t,i) => t.classList.toggle('active', ['users','lines','cycles'][i] === tab));
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.getElementById('tab-' + tab).classList.add('active');
  if (tab === 'users') loadUsers();
  if (tab === 'lines') loadLines();
  if (tab === 'cycles') loadCycles();
}

// USERS
async function loadUsers() {
  const el = document.getElementById('users-table');
  el.innerHTML = '<div class="empty">Chargement...</div>';
  try {
    const res = await fetch(API + '/admin/users', { method: 'POST', headers: adminHeaders(), body: JSON.stringify({}) });
    const data = await res.json();
    if (!res.ok) { el.innerHTML = '<div class="err">' + (data.error||'Erreur') + '</div>'; return; }
    const users = data.users || [];
    document.getElementById('user-count').textContent = users.length + ' utilisateur(s)';
    if (!users.length) { el.innerHTML = '<div class="empty">Aucun utilisateur</div>'; return; }
    el.innerHTML = '<table><thead><tr><th>Nom</th><th>Email</th><th>Inscription</th><th>Profils / Lignes</th><th>Actions</th></tr></thead><tbody>'
      + users.map(u => {
        const date = u.createdAt ? new Date(u.createdAt).toLocaleDateString('fr-FR') : '—';
        const lines = (u.linesUsed || []).map(l => '<span class="chip">' + (l.name||l.profileId) + ': ' + l.ligne + '</span>').join('');
        return '<tr>'
          + '<td><b>' + (u.name||'—') + '</b></td>'
          + '<td style="color:var(--text2)">' + (u.email||'—') + '</td>'
          + '<td style="color:var(--text3)">' + date + '</td>'
          + '<td>' + (lines||'<span style="color:var(--text3)">—</span>') + '</td>'
          + '<td><div style="display:flex;gap:4px">'
          + '<button class="btn btn-sm btn-orange" onclick="showResetPwd(\'' + u.userId + '\',\'' + (u.name||'') + '\')">Reset MDP</button>'
          + '<button class="btn btn-sm btn-red" onclick="confirmDeleteUser(\'' + u.userId + '\',\'' + (u.name||'') + '\')">Supprimer</button>'
          + '</div></td>'
          + '</tr>';
      }).join('') + '</tbody></table>';
  } catch(e) { el.innerHTML = '<div class="err">Erreur réseau</div>'; }
}

function showResetPwd(userId, name) {
  document.getElementById('modal-content').innerHTML = '<h2>Reset MDP — ' + name + '</h2>'
    + '<div class="field"><label>Nouveau mot de passe</label><input type="text" id="new-pwd-input" placeholder="Nouveau mot de passe"></div>'
    + '<div class="modal-btns"><button class="btn btn-ghost" onclick="closeModal()">Annuler</button><button class="btn" onclick="doResetPwd(\'' + userId + '\')">Enregistrer</button></div>';
  document.getElementById('modal-bg').style.display = 'flex';
}

async function doResetPwd(userId) {
  const pwd = document.getElementById('new-pwd-input').value;
  if (!pwd || pwd.length < 4) return alert('Mot de passe trop court');
  const res = await fetch(API + '/admin/reset-password', { method: 'POST', headers: adminHeaders(), body: JSON.stringify({ userId, newPassword: pwd }) });
  const data = await res.json();
  if (res.ok) { closeModal(); alert('Mot de passe mis à jour'); }
  else alert(data.error || 'Erreur');
}

async function confirmDeleteUser(userId, name) {
  if (!confirm('Supprimer l\'utilisateur "' + name + '" et toutes ses données ?')) return;
  const res = await fetch(API + '/admin/delete-user', { method: 'POST', headers: adminHeaders(), body: JSON.stringify({ userId }) });
  const data = await res.json();
  if (res.ok) { loadUsers(); }
  else alert(data.error || 'Erreur');
}

// LINES
async function loadLines() {
  const el = document.getElementById('lines-grid');
  el.innerHTML = '<div class="empty">Chargement...</div>';
  try {
    const res = await fetch(API + '/admin/lines', { method: 'POST', headers: adminHeaders(), body: JSON.stringify({}) });
    const data = await res.json();
    const lines = data.lines || {};
    const keys = Object.keys(lines).sort();
    if (!keys.length) { el.innerHTML = '<div class="empty">Aucune ligne enregistrée</div>'; return; }
    el.innerHTML = '<div class="line-grid">' + keys.map(l => {
      const users = lines[l] || [];
      return '<div class="line-card">'
        + '<div class="line-name">' + l + '</div>'
        + users.map(u => '<div class="line-user">👤 ' + (u.userName||'?') + ' — ' + (u.profileName||u.profileId) + '</div>').join('')
        + '</div>';
    }).join('') + '</div>';
  } catch(e) { el.innerHTML = '<div class="err">Erreur réseau</div>'; }
}

// CYCLES
async function loadCycles() {
  const el = document.getElementById('cycles-list');
  el.innerHTML = '<div class="empty">Chargement...</div>';
  try {
    const res = await fetch(API + '/admin/cycles', { method: 'POST', headers: adminHeaders(), body: JSON.stringify({}) });
    const data = await res.json();
    const cycles = data.cycles || [];
    if (!cycles.length) { el.innerHTML = '<div class="empty">Aucun cycle enregistré. Le cycle par défaut est celui du code.</div>'; return; }
    el.innerHTML = cycles.map(c => {
      const start = c.startDate || '—';
      const end = c.endDate ? ' → ' + c.endDate : ' (sans fin)';
      const weeks = (c.weeks || []).length;
      return '<div class="cycle-card">'
        + '<div class="cycle-hdr"><div><div class="cycle-name">' + (c.name||'Cycle') + '</div><div class="cycle-dates">' + start + end + ' · ' + weeks + ' semaines</div></div>'
        + '<button class="btn btn-sm btn-red" onclick="deleteCycle(\'' + c.id + '\')">Supprimer</button></div>'
        + (c.weekCountChanged ? '<div class="alert alert-blue">Les utilisateurs seront invités à choisir leur ligne</div>' : '')
        + '</div>';
    }).join('');
  } catch(e) { el.innerHTML = '<div class="err">Erreur réseau</div>'; }
}

function showCreateCycle() {
  document.getElementById('modal-content').innerHTML = '<h2>Nouveau cycle</h2>'
    + '<div class="field"><label>Nom</label><input type="text" id="cyc-name" placeholder="Ex: Cycle été 2026"></div>'
    + '<div class="row"><div class="flex1 field"><label>Date de début</label><input type="date" id="cyc-start"></div>'
    + '<div class="flex1 field"><label>Date de fin (optionnel)</label><input type="date" id="cyc-end"></div></div>'
    + '<div class="field"><label>Anchor (date lundi semaine 1)</label><input type="date" id="cyc-anchor"></div>'
    + '<div class="field"><label>Semaines (JSON — tableau de 7 codes par ligne)</label>'
    + '<textarea id="cyc-weeks" rows="8" placeholder=\'[\n  ["A1","A2","A3","B1","SV","SV","RH"],\n  ["C1","C1","C1","C1","SV","SV","RH"]\n]\'></textarea></div>'
    + '<div class="alert alert-blue">Format : tableau de semaines, chaque semaine = 7 codes (Lu Ma Me Je Ve Sa Di)</div>'
    + '<div class="modal-btns"><button class="btn btn-ghost" onclick="closeModal()">Annuler</button><button class="btn btn-green" onclick="doCreateCycle()">Créer</button></div>'
    + '<div class="err" id="cyc-err" style="margin-top:8px"></div>';
  document.getElementById('modal-bg').style.display = 'flex';
}

async function doCreateCycle() {
  const name = document.getElementById('cyc-name').value.trim();
  const startDate = document.getElementById('cyc-start').value;
  const endDate = document.getElementById('cyc-end').value || null;
  const anchor = document.getElementById('cyc-anchor').value;
  const weeksRaw = document.getElementById('cyc-weeks').value.trim();
  const errEl = document.getElementById('cyc-err');
  errEl.textContent = '';
  if (!name || !startDate || !anchor || !weeksRaw) { errEl.textContent = 'Remplissez tous les champs obligatoires.'; return; }
  let weeks;
  try { weeks = JSON.parse(weeksRaw); } catch(e) { errEl.textContent = 'JSON invalide : ' + e.message; return; }
  if (!Array.isArray(weeks) || weeks.some(w => !Array.isArray(w) || w.length !== 7)) { errEl.textContent = 'Chaque semaine doit avoir exactement 7 codes.'; return; }
  const res = await fetch(API + '/admin/cycle/create', { method: 'POST', headers: adminHeaders(), body: JSON.stringify({ cycle: { name, startDate, endDate, anchor, weeks } }) });
  const data = await res.json();
  if (res.ok) { closeModal(); loadCycles(); }
  else { errEl.textContent = data.error || 'Erreur'; }
}

async function deleteCycle(cycleId) {
  if (!confirm('Supprimer ce cycle ?')) return;
  const res = await fetch(API + '/admin/cycle/delete', { method: 'POST', headers: adminHeaders(), body: JSON.stringify({ cycleId }) });
  if (res.ok) loadCycles();
}

// Change admin password
function showChangePwd() {
  document.getElementById('modal-content').innerHTML = '<h2>Changer le mot de passe admin</h2>'
    + '<div class="field"><label>Nouveau mot de passe</label><input type="password" id="new-admin-pwd" placeholder="Min 6 caractères"></div>'
    + '<div class="modal-btns"><button class="btn btn-ghost" onclick="closeModal()">Annuler</button><button class="btn" onclick="doChangeAdminPwd()">Enregistrer</button></div>'
    + '<div class="err" id="admin-pwd-err" style="margin-top:8px"></div>';
  document.getElementById('modal-bg').style.display = 'flex';
}

async function doChangeAdminPwd() {
  const pwd = document.getElementById('new-admin-pwd').value;
  const err = document.getElementById('admin-pwd-err');
  if (!pwd || pwd.length < 6) { err.textContent = 'Min 6 caractères'; return; }
  const res = await fetch(API + '/admin/change-password', { method: 'POST', headers: adminHeaders(), body: JSON.stringify({ newPassword: pwd }) });
  const data = await res.json();
  if (res.ok) { closeModal(); alert('Mot de passe admin mis à jour'); }
  else { err.textContent = data.error || 'Erreur'; }
}

function closeModal() { document.getElementById('modal-bg').style.display = 'none'; }
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Planning France Info</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
[data-theme=light]{--bg:#e8e8e4;--bg2:#deded9;--bg3:#d0cfc9;--text:#1a1a18;--text2:#4a4a46;--text3:#8a8880;--border:rgba(0,0,0,.18);}
:root{--bg:#18181b;--bg2:#27272a;--bg3:#3f3f46;--text:#f4f4f5;--text2:#d4d4d8;--text3:#71717a;--blue:#4ea0f7;--green:#5a9e3f;--border:rgba(255,255,255,.12);--r:10px;}
body,input,button{transition:background-color .25s ease,color .25s ease,border-color .25s ease;}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;}
.card{background:var(--bg2);border:0.5px solid var(--border);border-radius:16px;padding:32px;width:100%;max-width:380px;}
.logo{text-align:center;margin-bottom:24px;}
.logo h1{font-size:20px;font-weight:600;margin-bottom:4px;}
.logo p{font-size:12px;color:var(--text3);}
.tabs{display:flex;gap:4px;margin-bottom:24px;background:var(--bg);border-radius:var(--r);padding:3px;}
.tab{flex:1;padding:7px;text-align:center;font-size:13px;border-radius:6px;cursor:pointer;color:var(--text2);transition:all .15s;}
.tab.active{background:var(--bg2);color:var(--text);font-weight:500;}
.field{margin-bottom:14px;}
.field label{display:block;font-size:11px;color:var(--text3);margin-bottom:5px;text-transform:uppercase;letter-spacing:.05em;}
.field input{width:100%;padding:10px 12px;background:var(--bg);border:0.5px solid var(--border);border-radius:var(--r);color:var(--text);font-size:14px;outline:none;transition:border-color .15s;}
.field input:focus{border-color:var(--blue);}
.btn{width:100%;padding:11px;background:var(--blue);color:#fff;border:none;border-radius:var(--r);font-size:14px;font-weight:500;cursor:pointer;margin-top:4px;transition:opacity .15s;}
.btn:hover{opacity:.9;}
.btn:disabled{opacity:.5;cursor:not-allowed;}
.err{color:#e24b4a;font-size:12px;margin-top:8px;display:none;}
.ok{color:var(--green);font-size:12px;margin-top:8px;display:none;}
.forgot{text-align:right;font-size:11px;color:var(--text3);cursor:pointer;margin-top:-8px;margin-bottom:14px;}
.forgot:hover{color:var(--blue);}
#reset-section{display:none;}
.back{font-size:12px;color:var(--text3);cursor:pointer;margin-bottom:16px;display:inline-flex;align-items:center;gap:4px;}
.back:hover{color:var(--blue);}
</style>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
</head>
<body>
<div class="card">
  <div class="logo">
    <h1>Planning France Info</h1>
    
  </div>

  <!-- Reset password section -->
  <div id="reset-section">
    <div class="back" onclick="showReset(false)">← Retour</div>
    <div class="field"><label>Nouveau mot de passe</label><input type="password" id="new-pwd" placeholder="Minimum 6 caractères"></div>
    <button class="btn" onclick="doReset()">Enregistrer le mot de passe</button>
    <div class="err" id="reset-err"></div>
    <div class="ok" id="reset-ok"></div>
  </div>

  <!-- Login/Register section -->
  <div id="auth-section">
    <div class="tabs">
      <div class="tab active" id="tab-login" onclick="switchTab('login')">Connexion</div>
      <div class="tab" id="tab-register" onclick="switchTab('register')">Créer un compte</div>
    </div>

    <!-- Login form -->
    <form id="form-login" autocomplete="on" onsubmit="doLogin();return false;">
      <div class="field"><label>Email</label><input type="email" id="login-email" name="email" autocomplete="email" placeholder="votre@email.com"></div>
      <div class="field"><label>Mot de passe</label><input type="password" id="login-pwd" name="password" autocomplete="current-password" placeholder="••••••••"></div>
      <div style="display:flex;justify-content:space-between;align-items:center;margin-top:-6px;margin-bottom:14px">
        <label style="display:flex;align-items:center;gap:6px;font-size:12px;color:var(--text2);cursor:pointer">
          <input type="checkbox" id="remember-me" style="accent-color:var(--blue)"> Se souvenir de moi
        </label>
        <div class="forgot" style="margin:0" onclick="showForgot()">Mot de passe oublié ?</div>
      </div>
      <button class="btn" id="login-btn" onclick="doLogin()">Se connecter</button>
      <div class="err" id="login-err"></div>
    </form>

    <!-- Register form -->
    <div id="form-register" style="display:none">
      <div class="field"><label>Nom</label><input type="text" id="reg-name" name="name" autocomplete="name" placeholder="Votre nom"></div>
      <div class="field"><label>Email</label><input type="email" id="reg-email" name="email" autocomplete="email" placeholder="votre@email.com"></div>
      <div class="field"><label>Mot de passe</label><input type="password" id="reg-pwd" name="password" autocomplete="new-password" placeholder="Minimum 6 caractères"></div>
      <div class="field"><label>Ligne actuelle</label><select id="reg-line" style="width:100%;padding:10px 12px;background:var(--bg);border:0.5px solid var(--border);border-radius:var(--r);color:var(--text);font-size:14px;-webkit-appearance:none"></select></div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:14px">
        <div class="field" style="margin-bottom:0"><label>Matelas (h)</label><input type="text" id="reg-matelas" placeholder="ex: 5h30"></div>
        <div class="field" style="margin-bottom:0"><label>Congés / an</label><input type="number" id="reg-conges" value="25"></div>
      </div>
      <div class="field"><label>Rendus éphem. initiaux (h)</label><input type="text" id="reg-eph" placeholder="ex: 10h00"></div>
      <button class="btn" id="reg-btn" onclick="doRegister()">Créer mon compte</button>
      <div class="err" id="reg-err"></div>
    </div>

    <!-- Forgot password form -->
    <div id="form-forgot" style="display:none">
      <div class="back" onclick="showForgot(false)">← Retour</div>
      <div class="field"><label>Email</label><input type="email" id="forgot-email" placeholder="votre@email.com"></div>
      <button class="btn" onclick="doForgot()">Envoyer le lien</button>
      <div class="err" id="forgot-err"></div>
      <div class="ok" id="forgot-ok"></div>
    </div>
  </div>
</div>

<script>
const API = 'https://planning-gcal.arthur-lebreton94.workers.dev';

// Check if reset token in URL
const urlParams = new URLSearchParams(window.location.search);
const resetToken = urlParams.get('reset');
if (resetToken) {
  document.getElementById('auth-section').style.display = 'none';
  document.getElementById('reset-section').style.display = 'block';
}

// Pre-fill remembered credentials
const remembered = JSON.parse(localStorage.getItem('remember_creds') || 'null');
if (remembered) {
  document.getElementById('login-email').value = remembered.email || '';
  document.getElementById('login-pwd').value = remembered.password || '';
  document.getElementById('remember-me').checked = true;
}

// Check if already logged in
const stored = localStorage.getItem('auth_token');
if (stored && !resetToken) {
  window.location.replace('/planning/app2/');
}

function switchTab(tab) {
  document.getElementById('tab-login').classList.toggle('active', tab === 'login');
  document.getElementById('tab-register').classList.toggle('active', tab === 'register');
  document.getElementById('form-login').style.display = tab === 'login' ? '' : 'none';
  document.getElementById('form-register').style.display = tab === 'register' ? '' : 'none';
  if(tab === 'register') populateRegLine();
  document.getElementById('form-forgot').style.display = 'none';
}

function showForgot(show = true) {
  document.getElementById('form-login').style.display = show ? 'none' : '';
  document.getElementById('form-forgot').style.display = show ? '' : 'none';
  if (!show) document.getElementById('tab-login').classList.add('active');
}

function showReset(show = true) {
  document.getElementById('reset-section').style.display = show ? 'block' : 'none';
  document.getElementById('auth-section').style.display = show ? 'none' : '';
}

function showErr(id, msg) {
  const el = document.getElementById(id);
  el.textContent = msg;
  el.style.display = msg ? 'block' : 'none';
}

function showOk(id, msg) {
  const el = document.getElementById(id);
  el.textContent = msg;
  el.style.display = msg ? 'block' : 'none';
}

async function doLogin() {
  const email = document.getElementById('login-email').value.trim();
  const pwd = document.getElementById('login-pwd').value;
  showErr('login-err', '');
  if (!email || !pwd) return showErr('login-err', 'Remplissez tous les champs.');
  const btn = document.getElementById('login-btn');
  btn.disabled = true; btn.textContent = 'Connexion...';
  try {
    const res = await fetch(API + '/auth/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password: pwd }),
    });
    const data = await res.json();
    if (!res.ok) { showErr('login-err', data.error || 'Erreur'); btn.disabled = false; btn.textContent = 'Se connecter'; return; }
    localStorage.setItem('auth_token', data.token);
    localStorage.setItem('auth_user', JSON.stringify({ userId: data.userId, name: data.name, email: data.email }));
    if (document.getElementById('remember-me').checked) {
      localStorage.setItem('remember_creds', JSON.stringify({ email, password: pwd }));
    } else {
      localStorage.removeItem('remember_creds');
    }
    setTimeout(function(){ window.location.replace('/planning/app2/'); }, 100);
  } catch(e) { showErr('login-err', 'Erreur réseau'); btn.disabled = false; btn.textContent = 'Se connecter'; }
}

// Cycle data for line selection
const ANCHOR=new Date(2026,4,4); // lundi 4 mai 2026
const ANCHOR_L=8; // ligne S9 à cette date
// Fallback cycle hardcodé
const CYCLE_DEFAULT=[
  ['A1','A1',null,'RH','A2','As1','Ad1'],[null,null,'A2','A2','B1',null,'RH'],
  ['A3','A3',null,'RH','A1','As2','Ad2'],[null,null,'A1','A1','A3',null,'RH'],
  ['B1','B1','A3','A3',null,null,'RH'],['A2','A2','B1','B1',null,null,'RH'],
  [null,null,'RH','P423','P423','Es','Ed'],[null,null,'D2','D1','D1',null,'RH'],
  ['C1','C1','C1','C1',null,null,'RH'],['D2','D2',null,'RH','C1','Fs','Fd'],
  [null,null,'D1','D2','D2',null,'RH'],['C2','C2','C2','C2','C2',null,'RH'],
  ['D1','D1',null,null,'RH','Cs','Cd'],['P423','P423','P423',null,'RH','As3','Ad3'],
];
var CYCLE=CYCLE_DEFAULT;
function getMonday(d){const dt=new Date(d);const day=dt.getDay(),diff=dt.getDate()-day+(day===0?-6:1);dt.setDate(diff);dt.setHours(0,0,0,0);return dt;}
function weeksDiff(date){return Math.round((getMonday(date)-ANCHOR)/(7*864e5));}
function formatLineOption(idx){
  const lineData=CYCLE[idx];
  if(!lineData)return'—';
  return lineData.map(function(v){return(!v||v==='RH')?'—':v;}).join(' ');
}

async function populateRegLine(){
  const sel=document.getElementById('reg-line');
  if(!sel)return;
  // Try to load cycle from KV
  try{
    const res=await fetch(API+'/get-cycle',{method:'POST',headers:{'Content-Type':'application/json'},body:'{}'});
    const d=await res.json();
    if(d&&d.currentOverride&&d.currentOverride.weeks&&d.currentOverride.weeks.length===14){
      CYCLE=d.currentOverride.weeks;
    }
  }catch(e){}
  const diff=weeksDiff(new Date());
  const curVisual=((ANCHOR_L)+diff+14*1000)%14;
  sel.innerHTML=Array.from({length:14},function(_,i){
    return '<option value="'+i+'"'+(i===curVisual?' selected':'')+'>'+formatLineOption(i)+'</option>';
  }).join('');
}

async function doRegister() {
  const name = document.getElementById('reg-name').value.trim();
  const email = document.getElementById('reg-email').value.trim();
  const pwd = document.getElementById('reg-pwd').value;
  // Profile data
  const regLineIdx = parseInt(document.getElementById('reg-line')?.value||'0');
  const regConges = parseInt(document.getElementById('reg-conges')?.value||'25');
  const regMatelasRaw = document.getElementById('reg-matelas')?.value||'';
  const regEphRaw = document.getElementById('reg-eph')?.value||'';
  function parseHMLogin(str){const m=str.match(/(\d+)h(\d*)/i);return m?parseInt(m[1])*60+(parseInt(m[2])||0):0;}
  const regMatelas = regMatelasRaw ? parseHMLogin(regMatelasRaw) : 0;
  const regEph = regEphRaw ? parseHMLogin(regEphRaw) : 0;
  // Convert visual line index to anchorLine (0-based index that gives correct week at ANCHOR)
  const _diffNow=weeksDiff(new Date());
  const regAnchorLine=((regLineIdx-_diffNow)%14+14)%14;
  showErr('reg-err', '');
  if (!name || !email || !pwd) return showErr('reg-err', 'Remplissez tous les champs.');
  if (pwd.length < 6) return showErr('reg-err', 'Mot de passe trop court (min 6 caractères).');
  const btn = document.getElementById('reg-btn');
  btn.disabled = true; btn.textContent = 'Création...';
  try {
    const res = await fetch(API + '/auth/register', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password: pwd, name }),
    });
    const data = await res.json();
    if (!res.ok) { showErr('reg-err', data.error || 'Erreur'); btn.disabled = false; btn.textContent = 'Créer mon compte'; return; }
    localStorage.setItem('auth_token', data.token);
    localStorage.setItem('auth_user', JSON.stringify({ userId: data.userId, name: data.name, email: data.email }));
    // Save profile in the format expected by the app (pl_v8)
    const profileData = {
      profile:{name,anchorLine:regAnchorLine,matelas:regMatelas,congesInit:regConges,ephSolde:Math.round(regEph/60*100)/100,ephSoldeCreatedYM:new Date().getFullYear()*12+new Date().getMonth(),gcalAutoSync:false},
      settings:{dimRendu:true,rhRendu:true,ferRendu:true,hsRendu:true,theme:'dark'},
      overrides:{},conges:{},history:[],customVacs:{}
    };
    localStorage.setItem('pl_v8', JSON.stringify({p:{default:profileData},a:'default'}));
    localStorage.setItem('planning_aid', 'default');
    window.location.href = '/planning/app2/';
  } catch(e) { showErr('reg-err', 'Erreur réseau'); btn.disabled = false; btn.textContent = 'Créer mon compte'; }
}

async function doForgot() {
  const email = document.getElementById('forgot-email').value.trim();
  showErr('forgot-err', ''); showOk('forgot-ok', '');
  if (!email) return showErr('forgot-err', 'Entrez votre email.');
  try {
    await fetch(API + '/auth/forgot', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ email }) });
    showOk('forgot-ok', 'Si cet email existe, un lien vous a été envoyé.');
  } catch(e) { showErr('forgot-err', 'Erreur réseau'); }
}

async function doReset() {
  const pwd = document.getElementById('new-pwd').value;
  showErr('reset-err', ''); showOk('reset-ok', '');
  if (!pwd || pwd.length < 6) return showErr('reset-err', 'Mot de passe trop court (min 6 caractères).');
  try {
    const res = await fetch(API + '/auth/reset', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ token: resetToken, password: pwd }) });
    const data = await res.json();
    if (!res.ok) return showErr('reset-err', data.error || 'Lien invalide ou expiré.');
    showOk('reset-ok', 'Mot de passe mis à jour ! Redirection...');
    setTimeout(() => { history.replaceState({}, '', '/planning/'); window.location.href = '/planning/'; }, 2000);
  } catch(e) { showErr('reset-err', 'Erreur réseau'); }
}


</script>
<button id="login-theme-btn" onclick="toggleLoginTheme()" style="position:fixed;top:12px;right:12px;background:transparent;border:0.5px solid var(--border);border-radius:8px;padding:6px 10px;cursor:pointer;color:var(--text3)"><i class="ti ti-moon" id="login-theme-icon" style="font-size:13px"></i></button>
<script>
function toggleLoginTheme(){
  const isDark=document.documentElement.getAttribute('data-theme')!=='light';
  const newTheme=isDark?'light':'dark';
  document.documentElement.setAttribute('data-theme',newTheme);
  const icon=document.getElementById('login-theme-icon');
  if(icon){icon.className=newTheme==='light'?'ti ti-sun':'ti ti-moon';}
  localStorage.setItem('theme',newTheme);
}
// Apply saved theme immediately (before DOMContentLoaded)
(function(){
  const saved=localStorage.getItem('theme')||'dark';
  document.documentElement.setAttribute('data-theme',saved);
  document.addEventListener('DOMContentLoaded',function(){
    const icon=document.getElementById('login-theme-icon');
    if(icon)icon.className=saved==='light'?'ti ti-sun':'ti ti-moon';
  });
})();
</script>
<div style="text-align:center;padding:16px 0 8px;font-size:10px;color:var(--text3);opacity:.5">v4.44 — 24 mai 2026</div>
</body>
</html>

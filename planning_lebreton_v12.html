<script>
const VAC={
  A1:{deb:'03h45',fin:'10h45',dur:420},A2:{deb:'03h45',fin:'11h45',dur:480},A3:{deb:'04h45',fin:'12h45',dur:480},
  Ad1:{deb:'04h45',fin:'11h45',dur:420},Ad2:{deb:'04h45',fin:'12h45',dur:480},Ad3:{deb:'05h45',fin:'14h15',dur:510},
  As1:{deb:'04h45',fin:'11h45',dur:420},As2:{deb:'04h45',fin:'12h45',dur:480},As3:{deb:'05h45',fin:'14h15',dur:510},
  B1:{deb:'07h45',fin:'15h15',dur:450},B2:{deb:'07h45',fin:'16h15',dur:510},
  Bd:{deb:'07h15',fin:'15h45',dur:510},Bs:{deb:'07h15',fin:'15h45',dur:510},
  C1:{deb:'12h15',fin:'21h15',dur:540},C2:{deb:'13h15',fin:'21h15',dur:480},C3:{deb:'11h15',fin:'21h15',dur:540},
  Cd:{deb:'12h15',fin:'21h15',dur:540},Cs:{deb:'12h15',fin:'21h15',dur:540},
  D1:{deb:'15h45',fin:'00h30',dur:525},D2:{deb:'15h45',fin:'00h15',dur:510},
  Dd:{deb:'15h45',fin:'00h15',dur:510},Ds:{deb:'15h45',fin:'00h15',dur:510},
  Ed:{deb:'14h45',fin:'00h30',dur:585},Es:{deb:'15h15',fin:'00h30',dur:555},
  Fd:{deb:'15h45',fin:'00h15',dur:510},Fs:{deb:'15h45',fin:'00h15',dur:510},
  M:{deb:'08h00',fin:'19h00',dur:600,pause:'1h'},
  MIXTE:{deb:'09h35',fin:'18h05',dur:510},
  MR:{deb:'05h45',fin:'13h45',dur:480},
  P422:{deb:'07h45',fin:'17h15',dur:510},P423:{deb:'09h45',fin:'18h15',dur:510},
  S:{deb:'13h30',fin:'00h30',dur:600,pause:'1h'},
  SR:{deb:'11h45',fin:'21h15',dur:570},
};
const CYCLE=[
  ['A1','A1',null,'RH','A2','As1','Ad1'],
  [null,null,'A2','A2','B1',null,'RH'],
  ['A3','A3',null,'RH','A1','As2','Ad2'],
  [null,null,'A1','A1','A3',null,'RH'],
  ['B1','B1','A3','A3',null,null,'RH'],
  ['A2','A2','B1','B1',null,null,'RH'],
  [null,null,'RH','P423','P423','Es','Ed'],
  [null,null,'D2','D1','D1',null,'RH'],
  ['C1','C1','C1','C1',null,null,'RH'],
  ['D2','D2',null,'RH','C1','Fs','Fd'],
  [null,null,'D1','D2','D2',null,'RH'],
  ['C2','C2','C2','C2','C2',null,'RH'],
  ['D1','D1',null,null,'RH','Cs','Cd'],
  ['P423','P423','P423',null,'RH','As3','Ad3'],
];
const FERIES=new Set([
  '2025-01-01','2025-04-21','2025-05-01','2025-05-08','2025-05-29','2025-06-09','2025-07-14','2025-08-15','2025-11-01','2025-11-11','2025-12-25',
  '2026-01-01','2026-04-06','2026-05-01','2026-05-08','2026-05-14','2026-05-25','2026-07-14','2026-08-15','2026-11-01','2026-11-11','2026-12-25',
  '2027-01-01','2027-03-29','2027-05-01','2027-05-08','2027-05-13','2027-05-24','2027-07-14','2027-08-15','2027-11-01','2027-11-11','2027-12-25',
  '2028-01-01','2028-04-17','2028-05-01','2028-05-08','2028-05-25','2028-06-05','2028-07-14','2028-08-15','2028-11-01','2028-11-11','2028-12-25',
  '2029-01-01','2029-04-02','2029-05-01','2029-05-08','2029-05-10','2029-05-21','2029-07-14','2029-08-15','2029-11-01','2029-11-11','2029-12-25',
  '2030-01-01','2030-04-22','2030-05-01','2030-05-08','2030-05-30','2030-06-10','2030-07-14','2030-08-15','2030-11-01','2030-11-11','2030-12-25',
]);
const NOM_F={
  '2025-01-01':"Jour de l'an",'2025-04-21':'Pâques','2025-05-01':'Fête du Travail','2025-05-08':'Victoire 45','2025-05-29':'Ascension','2025-06-09':'Pentecôte','2025-07-14':'14 Juillet','2025-08-15':'Assomption','2025-11-01':'Toussaint','2025-11-11':'Armistice','2025-12-25':'Noël',
  '2026-01-01':"Jour de l'an",'2026-04-06':'Pâques','2026-05-01':'Fête du Travail','2026-05-08':'Victoire 45','2026-05-14':'Ascension','2026-05-25':'Pentecôte','2026-07-14':'14 Juillet','2026-08-15':'Assomption','2026-11-01':'Toussaint','2026-11-11':'Armistice','2026-12-25':'Noël',
  '2027-01-01':"Jour de l'an",'2027-03-29':'Pâques','2027-05-01':'Fête du Travail','2027-05-08':'Victoire 45','2027-05-13':'Ascension','2027-05-24':'Pentecôte','2027-07-14':'14 Juillet','2027-08-15':'Assomption','2027-11-01':'Toussaint','2027-11-11':'Armistice','2027-12-25':'Noël',
  '2028-01-01':"Jour de l'an",'2028-04-17':'Pâques','2028-05-01':'Fête du Travail','2028-05-08':'Victoire 45','2028-05-25':'Ascension','2028-06-05':'Pentecôte','2028-07-14':'14 Juillet','2028-08-15':'Assomption','2028-11-01':'Toussaint','2028-11-11':'Armistice','2028-12-25':'Noël',
  '2029-01-01':"Jour de l'an",'2029-04-02':'Pâques','2029-05-01':'Fête du Travail','2029-05-08':'Victoire 45','2029-05-10':'Ascension','2029-05-21':'Pentecôte','2029-07-14':'14 Juillet','2029-08-15':'Assomption','2029-11-01':'Toussaint','2029-11-11':'Armistice','2029-12-25':'Noël',
  '2030-01-01':"Jour de l'an",'2030-04-22':'Pâques','2030-05-01':'Fête du Travail','2030-05-08':'Victoire 45','2030-05-30':'Ascension','2030-06-10':'Pentecôte','2030-07-14':'14 Juillet','2030-08-15':'Assomption','2030-11-01':'Toussaint','2030-11-11':'Armistice','2030-12-25':'Noël',
};
const ANCHOR=new Date(2026,4,4);
const ANCHOR_L=8;
const MATELAS_INIT=162*60+27;
const CONGES_INIT=29;
const NOW=new Date();
const TODAY_YM=NOW.getFullYear()*12+NOW.getMonth();
const CUR_YEAR=NOW.getFullYear();

let overrides={},conges={};
let history=[]; // [{ts, key, action, detail, dotColor}]
let curY=2026,curM=4,pendingKey=null;

const MC=['jan','fév','mar','avr','mai','jun','jui','aoû','sep','oct','nov','déc'];
const ML=['Janvier','Février','Mars','Avril','Mai','Juin','Juillet','Août','Septembre','Octobre','Novembre','Décembre'];
const JNOMS=['dim.','lun.','mar.','mer.','jeu.','ven.','sam.'];
const MNOMS=['jan','fév','mar','avr','mai','jun','jui','aoû','sep','oct','nov','déc'];

function dk(d){return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}
function getMonday(d){const x=new Date(d);x.setHours(12,0,0,0);const dw=x.getDay();x.setDate(x.getDate()-(dw===0?6:dw-1));return x;}
function lineIdx(mon){const diff=Math.round((mon-ANCHOR)/(7*864e5));return((ANCHOR_L+diff)%14+14)%14;}
function getCycleVac(date){const dw=date.getDay(),idx=dw===0?6:dw-1,li=lineIdx(getMonday(date));return{cycleVac:CYCLE[li][idx],li};}
function getVac(date){
  const key=dk(date),{cycleVac,li}=getCycleVac(date);
  const ov=overrides[key];
  if(ov&&ov.absent)return{vac:null,ov:true,absent:true,fromSV:false,hs:false,hsType:'',li,cycleVac};
  if(ov&&ov.vac)return{vac:ov.vac,ov:true,fromSV:ov.fromSV||false,hs:ov.hs||false,hsType:ov.hsType||'',absent:false,li,cycleVac};
  return{vac:cycleVac,ov:false,fromSV:false,hs:false,hsType:'',absent:false,li,cycleVac};
}
function fmt(min){if(min===0)return'0h00';const neg=min<0;min=Math.abs(min);return(neg?'−':'')+Math.floor(min/60)+'h'+String(min%60).padStart(2,'0');}
function getDur(date){const{vac}=getVac(date);return(vac&&vac!=='RH'&&VAC[vac])?VAC[vac].dur:0;}
function hsRendu(dur,hsType){return hsType==='hs2'?Math.round(dur*1.5):Math.round(dur*1.25);}
function fmtDate(date){return JNOMS[date.getDay()]+' '+date.getDate()+' '+MNOMS[date.getMonth()]+' '+date.getFullYear();}
function nowHHMM(){const n=new Date();return String(n.getHours()).padStart(2,'0')+':'+String(n.getMinutes()).padStart(2,'0');}

// ── HISTORIQUE ────────────────────────────────────────────────────────────────
function logHistory(key,action,detail,dotColor){
  history.unshift({ts:nowHHMM(),key,action,detail,dotColor});
  if(history.length>6)history.pop();
  renderHistory();
}
function renderHistory(){
  const el=document.getElementById('hist-list');
  if(!history.length){el.innerHTML='<span class="hist-empty">Aucune modification.</span>';return;}
  el.innerHTML=history.map(h=>`
    <div class="hist-row">
      <div class="hist-dot" style="background:${h.dotColor};"></div>
      <span class="hist-date">${h.ts}</span>
      <span class="hist-desc">${h.detail}</span>
    </div>`).join('');
}

function isSemaineRamenee(monday){
  let hasFerie=false,hasWork=false,allCP=true;
  for(let i=0;i<6;i++){
    const d=new Date(monday);d.setDate(monday.getDate()+i);
    const key=dk(d),{vac,absent}=getVac(d);
    if(FERIES.has(key))hasFerie=true;
    if(vac&&vac!=='RH'&&!absent){hasWork=true;if(conges[key]!=='cg')allCP=false;}
  }
  return hasFerie&&hasWork&&!allCP;
}

function buildGenByMonth(){
  const gen={};
  function add(ym,k,v){if(!gen[ym])gen[ym]={dim:0,fer:0,hs:0,ram:0};gen[ym][k]+=v;}
  const maxYM=CUR_YEAR*12+11;
  for(let y=2025;y<=2030;y++)for(let m=0;m<12;m++){
    const ym=y*12+m;
    if(ym>TODAY_YM&&ym>maxYM)continue;
    const last=new Date(y,m+1,0).getDate();
    for(let d=1;d<=last;d++){
      const date=new Date(y,m,d),key=dk(date);
      const{vac,hs,hsType,absent}=getVac(date);
      if(!vac||vac==='RH'||absent)continue;
      const dur=VAC[vac]?VAC[vac].dur:0;
      if(FERIES.has(key))add(ym,'fer',Math.round(dur*2));
      else if(date.getDay()===0)add(ym,'dim',Math.round(dur*0.5));
      else if(hs)add(ym,'hs',hsRendu(dur,hsType));
    }
  }
  const seen=new Set();
  for(let y=2025;y<=2030;y++)for(let m=0;m<12;m++){
    const ym=y*12+m;
    if(ym>TODAY_YM&&ym>maxYM)continue;
    const last=new Date(y,m+1,0).getDate();
    for(let d=1;d<=last;d++){
      const date=new Date(y,m,d),mon=getMonday(date),mk2=dk(mon);
      if(seen.has(mk2))continue;seen.add(mk2);
      if(isSemaineRamenee(mon)){
        const mym=mon.getFullYear()*12+mon.getMonth();
        if(mym<=TODAY_YM||(mym>TODAY_YM&&mym<=maxYM))add(mym,'ram',525);
      }
    }
  }
  return gen;
}

function calcSoldes(){
  const gen=buildGenByMonth();
  let toDeduct=0;
  Object.keys(conges).forEach(k=>{if(conges[k]==='rend')toDeduct+=getDur(new Date(k+'T12:00:00'));});
  const realEph={},prevEph={};
  Object.keys(gen).forEach(ymStr=>{
    const ym=Number(ymStr),total=Object.values(gen[ym]).reduce((s,v)=>s+v,0),expYm=ym+3;
    if(ym>TODAY_YM){prevEph[ym]=total;return;}
    realEph[ym]=expYm<=TODAY_YM?0:total;
  });
  const realAvail={},ymsSorted=Object.keys(realEph).map(Number).sort();
  ymsSorted.forEach(ym=>realAvail[ym]=realEph[ym]);
  for(const ym of ymsSorted){
    if(toDeduct<=0)break;
    const take=Math.min(realAvail[ym],toDeduct);realAvail[ym]-=take;toDeduct-=take;
  }
  let matelas=MATELAS_INIT;
  if(toDeduct>0)matelas-=toDeduct;
  const totalReal=Object.values(realAvail).reduce((s,v)=>s+v,0);
  const totalPrev=Object.values(prevEph).reduce((s,v)=>s+v,0);
  return{gen,realEph,realAvail,prevEph,matelas,totalReal,totalPrev};
}

function calcCongesUsed(){return Object.values(conges).filter(v=>v==='cg').length;}

function getState(date){
  const key=dk(date),{vac,fromSV,absent}=getVac(date);
  if(absent)return'absent';
  if(FERIES.has(key))return'fer';
  if(!vac)return'sv';
  if(vac==='RH')return'rh';
  const c=conges[key];
  if(c==='cg')return'cg';
  if(c==='rend')return'rend';
  return fromSV?'sv-vac':'tv';
}

function updateAll(){
  const{gen,realEph,realAvail,prevEph,matelas,totalReal,totalPrev}=calcSoldes();
  const cRest=CONGES_INIT-calcCongesUsed();
  const totalDispo=totalReal+Math.max(0,matelas);
  const auto=calcChipsMois(curY,curM);
  const ramCount=countRameeMois(curY,curM);
  document.getElementById('ctr-global').innerHTML=`
    <div class="ctr main"><div class="clabel">Rendus éphémères dispo</div><div class="cval" style="color:#0C447C;">${fmt(totalReal)}</div><div class="csub">piochés en priorité</div></div>
    <div class="ctr main"><div class="clabel">Total dispo</div><div class="cval" style="color:#0C447C;">${fmt(totalDispo)}</div><div class="csub">éphémères + matelas</div></div>
    <div class="ctr"><div class="clabel">Congés classiques</div><div class="cval" style="color:#27500A;">${cRest} j</div><div class="csub">sur ${CONGES_INIT} jours</div></div>
    <div class="ctr"><div class="clabel">Prévis. ${CUR_YEAR}</div><div class="cval" style="color:var(--color-text-tertiary);">${fmt(totalPrev)}</div><div class="csub">non comptabilisé</div></div>`;
  document.getElementById('matelas-val').textContent=fmt(Math.max(0,matelas));
  // Éphémères
  const allYms=new Set([...Object.keys(realEph).map(Number),...Object.keys(prevEph).map(Number)]);
  const sorted=[...allYms].sort();
  const display=[...sorted.filter(ym=>ym<=TODAY_YM).slice(-5),...sorted.filter(ym=>ym>TODAY_YM).slice(0,4)];
  const maxV=Math.max(...display.map(ym=>gen[ym]?Object.values(gen[ym]).reduce((s,v)=>s+v,0):0),1);
  let html='';
  display.forEach(ym=>{
    const y=Math.floor(ym/12),m=ym%12;
    const expYm=ym+3,expY=Math.floor(expYm/12),expM=expYm%12;
    const isFut=ym>TODAY_YM,isExp=!isFut&&expYm<=TODAY_YM;
    const orig=gen[ym]?Object.values(gen[ym]).reduce((s,v)=>s+v,0):0;
    const avail=isFut?orig:(realAvail[ym]||0);
    const pct=orig>0?Math.round(avail/orig*100):0;
    const bar=isExp?'#D3D1C7':isFut?'#B5D4F4':pct>60?'#639922':pct>30?'#BA7517':'#E24B4A';
    const rowCls=`eph-row${isFut?' future':''}${isExp?' expired':''}`;
    const barPct=orig>0?Math.round(orig/maxV*100):0;
    const src=gen[ym]?[gen[ym].dim?`dim +${fmt(gen[ym].dim)}`:'',gen[ym].fer?`fér +${fmt(gen[ym].fer)}`:'',gen[ym].hs?`HS +${fmt(gen[ym].hs)}`:'',gen[ym].ram?`ram +${fmt(gen[ym].ram)}`:''].filter(Boolean).join(', '):'—';
    html+=`<div class="${rowCls}">
      <div class="eph-month-col">${MC[m]}&nbsp;${y}${isFut?`<span class="eph-prev-badge">prévis.</span>`:''}</div>
      <div class="eph-bar-col"><div class="eph-bar-wrap"><div class="eph-bar" style="width:${barPct}%;background:${bar};opacity:${isFut?.4:1};"></div></div></div>
      <div class="eph-val-col" title="${src}">${fmt(avail)}</div>
      <div class="eph-exp-col">${isExp?'expiré':'→ '+MC[expM]+' '+expY}</div>
    </div>`;
  });
  document.getElementById('eph-list').innerHTML=html||'<span style="font-size:12px;color:var(--color-text-tertiary);">Aucun rendu généré.</span>';
  const chips=[];
  if(auto.dimCount)chips.push(`<span class="chip cdim">${auto.dimCount} dim. → +${fmt(auto.dimR)}</span>`);
  if(auto.ferCount)chips.push(`<span class="chip cfer">${auto.ferCount} fér. → +${fmt(auto.ferR)}</span>`);
  if(auto.hsCount)chips.push(`<span class="chip chs">${auto.hsCount} HS → +${fmt(auto.hsR)}</span>`);
  if(ramCount)chips.push(`<span class="chip cram">${ramCount} sem. ramenée${ramCount>1?'s':''} → +${fmt(ramCount*525)}</span>`);
  document.getElementById('chips').innerHTML=chips.join('');
}

function calcChipsMois(y,m){
  let dimMin=0,ferMin=0,hsMin=0,dc=0,fc=0,hc=0;
  const last=new Date(y,m+1,0).getDate();
  for(let d=1;d<=last;d++){
    const date=new Date(y,m,d),key=dk(date),{vac,hs,hsType,absent}=getVac(date);
    if(!vac||vac==='RH'||absent)continue;
    const dur=VAC[vac]?VAC[vac].dur:0;
    if(FERIES.has(key)){ferMin+=dur;fc++;}
    else if(date.getDay()===0){dimMin+=dur;dc++;}
    else if(hs){hsMin+=hsRendu(dur,hsType);hc++;}
  }
  return{dimCount:dc,ferCount:fc,hsCount:hc,dimR:Math.round(dimMin*0.5),ferR:Math.round(ferMin*2),hsR:hsMin};
}

function countRameeMois(y,m){
  let c=0;const seen=new Set();
  const last=new Date(y,m+1,0).getDate();
  for(let d=1;d<=last;d++){const date=new Date(y,m,d),mon=getMonday(date),mk2=dk(mon);if(seen.has(mk2))continue;seen.add(mk2);if(isSemaineRamenee(mon))c++;}
  return c;
}

function buildRameeSet(y,m){
  const s=new Set(),seen=new Set();
  const last=new Date(y,m+1,0).getDate();
  for(let d=1;d<=last;d++){
    const date=new Date(y,m,d),mon=getMonday(date),mk2=dk(mon);
    if(seen.has(mk2))continue;seen.add(mk2);
    if(isSemaineRamenee(mon)){for(let i=0;i<7;i++){const dd=new Date(mon);dd.setDate(mon.getDate()+i);s.add(dk(dd));}}
  }
  return s;
}

function render(){
  document.getElementById('mlabel').textContent=ML[curM]+' '+curY;
  document.getElementById('heads').innerHTML=['L','M','Me','J','V','S','D'].map(j=>`<th>${j}</th>`).join('');
  const rameeSet=buildRameeSet(curY,curM);
  const first=new Date(curY,curM,1),last=new Date(curY,curM+1,0);
  let sdow=first.getDay();sdow=sdow===0?6:sdow-1;
  let html='<tr>';
  for(let i=0;i<sdow;i++)html+=`<td><div class="dc s-sv"><div class="dc-inner"></div></div></td>`;
  let col=sdow;
  for(let d=1;d<=last.getDate();d++){
    const date=new Date(curY,curM,d),key=dk(date);
    const st=getState(date),{vac,ov,fromSV,absent,hs}=getVac(date);
    const isFer=FERIES.has(key),isRamee=rameeSet.has(key);
    let lbl='';
    if(absent)lbl='abs.';
    else if(st==='sv')lbl='+';
    else if(isFer)lbl=NOM_F[key]||'Férié';
    else if(vac==='RH')lbl='RH';
    else if(vac)lbl=vac+(ov&&!fromSV?'*':'')+(hs?'ᴴ':'');
    html+=`<td${isRamee?' class="ramee-week"':''}>
      <div class="dc s-${st}"><div class="dc-inner" onclick="openDay('${key}')" style="cursor:pointer;">
        <span class="dc-n">${d}</span><span class="dc-v">${lbl}</span>
      </div></div></td>`;
    col++;
    if(col%7===0&&d<last.getDate())html+=`</tr><tr>`;
  }
  while(col%7!==0){html+=`<td><div class="dc s-sv"><div class="dc-inner"></div></div></td>`;col++;}
  html+=`</tr>`;
  document.getElementById('cal').innerHTML=html;
  updateAll();
}

function buildOpts(sel){
  return Object.keys(VAC).sort().map(v=>{const i=VAC[v],p=i.pause?' (-'+i.pause+')':'';return`<option value="${v}"${v===sel?' selected':''}>${v} — ${i.deb}→${i.fin}${p} = ${fmt(i.dur)}</option>`;}).join('');
}

function openDay(key){
  pendingKey=key;
  const date=new Date(key+'T12:00:00');
  const{vac,ov,fromSV,absent,li,cycleVac,hs,hsType}=getVac(date);
  const isFer=FERIES.has(key),isDim=date.getDay()===0;
  const hasCg=conges[key],dur=getDur(date);
  const{totalReal,matelas}=calcSoldes();
  const totalDispo=totalReal+Math.max(0,matelas);
  const cRest=CONGES_INIT-calcCongesUsed();
  const lbl=fmtDate(date);
  let typeTxt='';
  if(absent)typeTxt='Absent — échange collègue';
  else if(isFer)typeTxt=(NOM_F[key]||'Férié')+(vac&&vac!=='RH'?' — '+vac:'');
  else if(vac==='RH')typeTxt='Repos Hebdomadaire';
  else if(!vac&&!ov)typeTxt='Sans vacation — repos';
  else if(vac){const i=VAC[vac];typeTxt=vac+(i?' — '+i.deb+'→'+i.fin+(i.pause?' (-'+i.pause+')':''):'')+(isDim?' · Dim.':'')+(fromSV?' · Ajouté':'')+(hs?' · HS':'');}
  const isSVDay=!vac&&!ov&&!isFer&&!absent,isRH=vac==='RH',isWork=vac&&vac!=='RH'&&!absent,isAdded=isSVDay||fromSV;
  const ramee=isSemaineRamenee(getMonday(date));
  const rameeInfo=ramee?`<div class="minfo"><i class="ti ti-info-circle" aria-hidden="true" style="font-size:12px;vertical-align:-1px;margin-right:4px;"></i>Semaine ramenée — 7h HS×1.25 = +${fmt(525)}</div>`:'';

  let vacHtml='';
  if(!isRH){
    vacHtml=`
      <div class="mrow"><label>${isAdded?'Ajouter une vacation':'Changer la vacation'}</label>
        <select id="vac-sel">
          ${isAdded?`<option value="">— Choisir —</option>${buildOpts(ov?vac:'')}`:`<option value="">— Cycle auto (${cycleVac||'SV'})${ov&&!fromSV?' · modifié':''}—</option>${buildOpts(ov&&!fromSV?vac:'')}`}
        </select>
      </div>
      <label class="mcbrow"><input type="checkbox" id="vac-hs"${hs?' checked':''}> Compter comme HS → génère des rendus éphémères</label>
      <div class="mselrow" id="hs-type-row" style="${hs?'':'display:none;'}"><label>Type de HS</label>
        <select id="vac-hstype">
          <option value="hs1"${hsType!=='hs2'?' selected':''}>HS &lt; 8h sup — ×1.25</option>
          <option value="hs2"${hsType==='hs2'?' selected':''}>HS &gt; 8h sup — ×1.50</option>
        </select>
      </div>
      <div class="mbtns">
        <button class="mbtn" onclick="applyVac()"><i class="ti ti-check" aria-hidden="true" style="font-size:11px;vertical-align:-1px;margin-right:3px;"></i>Appliquer</button>
        ${ov?`<button class="mbtn del" onclick="resetVac()"><i class="ti ti-refresh" aria-hidden="true" style="font-size:11px;vertical-align:-1px;margin-right:3px;"></i>Remettre cycle</button>`:'<div></div>'}
      </div>`;
  }
  let absentHtml='';
  if(cycleVac&&cycleVac!=='RH'&&!isFer){
    absentHtml=`<div class="sep"></div><div class="mbtns">${absent
      ?`<button class="mbtn amber wide" onclick="resetAbsent()"><i class="ti ti-refresh" aria-hidden="true" style="font-size:11px;vertical-align:-1px;margin-right:3px;"></i>Annuler l'absence</button>`
      :`<button class="mbtn amber wide" onclick="setAbsent()"><i class="ti ti-arrows-exchange" aria-hidden="true" style="font-size:11px;vertical-align:-1px;margin-right:3px;"></i>Absent — échange collègue</button>`
    }</div>`;
  }
  let cgHtml='';
  if(isWork&&!hasCg){
    cgHtml=`<div class="sep"></div><div class="mbtns">
      <button class="mbtn" onclick="poseConge('cg')"${cRest<=0?' disabled':''}>
        <i class="ti ti-sun" aria-hidden="true" style="font-size:12px;vertical-align:-1px;"></i><br>Congé classique<br><span style="font-size:10px;color:var(--color-text-tertiary);">${cRest} j restants</span>
      </button>
      <button class="mbtn" onclick="poseConge('rend')"${totalDispo<dur?' disabled':''}>
        <i class="ti ti-clock" aria-hidden="true" style="font-size:12px;vertical-align:-1px;"></i><br>Rendu<br><span style="font-size:10px;color:var(--color-text-tertiary);">${fmt(totalDispo)} dispo</span>
      </button>
    </div>`;
  } else if(hasCg){
    cgHtml=`<div class="sep"></div><div class="mbtns"><button class="mbtn del wide" onclick="removeConge()"><i class="ti ti-x" aria-hidden="true" style="font-size:11px;vertical-align:-1px;margin-right:3px;"></i>Retirer le congé</button></div>`;
  }
  document.getElementById('modal-area').innerHTML=`
    <div class="modal-bg"><div class="modal">
      <div class="mtitle">${lbl}${dur?' — '+fmt(dur):''}</div>
      <div class="msub">${typeTxt}</div>
      ${rameeInfo}${vacHtml}${absentHtml}${cgHtml}
      <button class="mcancel" onclick="closeModal()">Fermer</button>
    </div></div>`;
  const cb=document.getElementById('vac-hs');
  if(cb)cb.addEventListener('change',()=>{const r=document.getElementById('hs-type-row');if(r)r.style.display=cb.checked?'':'none';});
}

function applyVac(){
  const sel=document.getElementById('vac-sel').value;
  const isHs=(document.getElementById('vac-hs')||{}).checked||false;
  const hsType=isHs?((document.getElementById('vac-hstype')||{}).value||'hs1'):'';
  const date=new Date(pendingKey+'T12:00:00');
  const{cycleVac}=getCycleVac(date);
  const prevVac=getVac(date);
  if(sel){
    overrides[pendingKey]={vac:sel,hs:isHs,hsType,fromSV:!cycleVac};
    const hsLabel=isHs?` (HS ${hsType==='hs2'?'>':'<'}8h)`:'';
    logHistory(pendingKey,'vac',`${fmtDate(date)} → vacation ${sel}${hsLabel}`,'#378ADD');
  } else if(overrides[pendingKey]){
    overrides[pendingKey]={...overrides[pendingKey],hs:isHs,hsType};
  }
  closeModal();render();
}
function resetVac(){
  const date=new Date(pendingKey+'T12:00:00');
  // Ne pas logger car retour à la version initiale (masqué)
  delete overrides[pendingKey];delete conges[pendingKey];
  closeModal();render();
}
function setAbsent(){
  const date=new Date(pendingKey+'T12:00:00');
  overrides[pendingKey]={absent:true};delete conges[pendingKey];
  logHistory(pendingKey,'absent',`${fmtDate(date)} → absent (échange collègue)`,'#BA7517');
  closeModal();render();
}
function resetAbsent(){
  // Retour à la version initiale → masqué de l'historique
  delete overrides[pendingKey];closeModal();render();
}
function poseConge(t){
  const date=new Date(pendingKey+'T12:00:00');
  const label=t==='cg'?'congé classique':`rendu (${fmt(getDur(date))})`;
  const color=t==='cg'?'#27500A':'#0C447C';
  conges[pendingKey]=t;
  logHistory(pendingKey,t,`${fmtDate(date)} → ${label}`,color);
  closeModal();render();
}
function removeConge(){
  const date=new Date(pendingKey+'T12:00:00');
  const prev=conges[pendingKey];
  delete conges[pendingKey];
  // Suppression d'un congé = retour à l'état normal → masqué
  closeModal();render();
}
function closeModal(){document.getElementById('modal-area').innerHTML='';pendingKey=null;render();}
function nav(d){curM+=d;if(curM<0){curM=11;curY--;}if(curM>11){curM=0;curY++;}render();}
function setYear(y,btn){curY=y;curM=0;document.querySelectorAll('.ytab').forEach(t=>t.classList.remove('on'));btn.classList.add('on');render();}
(function(){
  const wrap=document.getElementById('ytabs');
  [2025,2026,2027,2028,2029,2030].forEach(y=>{
    const b=document.createElement('button');b.className='ytab'+(y===2026?' on':'');b.textContent=y;
    b.onclick=()=>setYear(y,b);wrap.appendChild(b);
  });
})();
render();
</script>

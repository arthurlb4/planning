<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin — Planning France Info</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
[data-theme=light]{--bg:#e8e8e4;--bg2:#deded9;--bg3:#d0cfc9;--text:#1a1a18;--text2:#4a4a46;--text3:#8a8880;--border:rgba(0,0,0,.18);}
:root{--bg:#18181b;--bg2:#27272a;--bg3:#3f3f46;--text:#f4f4f5;--text2:#d4d4d8;--text3:#71717a;--blue:#4ea0f7;--green:#5a9e3f;--red:#e24b4a;--orange:#f0a030;--border:rgba(255,255,255,.12);--r:8px;}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;min-height:100vh;padding:20px;}
.login-wrap{display:flex;align-items:center;justify-content:center;min-height:100vh;}
.card{background:var(--bg2);border:0.5px solid var(--border);border-radius:16px;padding:24px;width:100%;max-width:420px;}
h1{font-size:18px;font-weight:600;margin-bottom:4px;}
.sub{font-size:12px;color:var(--text3);margin-bottom:20px;}
.field{margin-bottom:14px;}
.field label{display:block;font-size:11px;color:var(--text3);margin-bottom:5px;text-transform:uppercase;letter-spacing:.05em;}
.field input{width:100%;padding:9px 12px;background:var(--bg);border:0.5px solid var(--border);border-radius:var(--r);color:var(--text);font-size:14px;outline:none;}
.field input:focus{border-color:var(--blue);}
.btn{padding:9px 16px;background:var(--blue);color:#fff;border:none;border-radius:var(--r);font-size:13px;font-weight:500;cursor:pointer;}
.btn:hover{opacity:.9;}
.btn-sm{padding:5px 10px;font-size:11px;}
.btn-red{background:var(--red);}
.btn-orange{background:var(--orange);}
.btn-green{background:var(--green);}
.btn-ghost{background:transparent;border:0.5px solid var(--border);color:var(--text2);}
.err{color:var(--red);font-size:12px;margin-top:8px;}
/* Admin layout */
#admin{display:none;}
.hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px;padding-bottom:16px;border-bottom:0.5px solid var(--border);}
.hdr h1{font-size:20px;}
.tabs{display:flex;gap:4px;margin-bottom:20px;background:var(--bg2);border-radius:var(--r);padding:3px;}
.tab{padding:7px 14px;border-radius:6px;cursor:pointer;font-size:13px;color:var(--text2);}
.tab.active{background:var(--bg3);color:var(--text);font-weight:500;}
.section{display:none;}
.section.active{display:block;}
table{width:100%;border-collapse:collapse;font-size:13px;}
th{text-align:left;padding:8px 10px;font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.05em;border-bottom:0.5px solid var(--border);}
td{padding:8px 10px;border-bottom:0.5px solid var(--border2,#1e1e3a);vertical-align:top;}
tr:hover td{background:var(--bg2);}
.badge{display:inline-block;padding:2px 8px;border-radius:10px;font-size:10px;font-weight:500;}
.badge-blue{background:var(--bg3);color:var(--blue);}
.badge-green{background:rgba(90,158,63,.2);color:#7ec85a;}
.badge-red{background:rgba(226,75,74,.2);color:#e24b4a;}
.chip{display:inline-block;padding:2px 6px;border-radius:4px;font-size:11px;background:var(--bg3);color:var(--text2);margin:1px;}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.6);display:flex;align-items:center;justify-content:center;z-index:100;}
.modal{background:var(--bg2);border:0.5px solid var(--border);border-radius:12px;padding:24px;width:100%;max-width:400px;}
.modal h2{font-size:16px;margin-bottom:16px;}
.modal-btns{display:flex;gap:8px;margin-top:16px;justify-content:flex-end;}
.line-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:8px;}
.line-card{background:var(--bg2);border:0.5px solid var(--border);border-radius:var(--r);padding:10px;}
.line-name{font-size:13px;font-weight:500;margin-bottom:6px;}
.line-user{font-size:11px;color:var(--text2);margin:2px 0;}
.empty{color:var(--text3);font-size:13px;padding:20px 0;text-align:center;}
.cycle-card{background:var(--bg2);border:0.5px solid var(--border);border-radius:var(--r);padding:14px;margin-bottom:10px;}
.cycle-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;}
.cycle-name{font-size:14px;font-weight:500;}
.cycle-dates{font-size:11px;color:var(--text3);}
textarea{width:100%;padding:9px 12px;background:var(--bg);border:0.5px solid var(--border);border-radius:var(--r);color:var(--text);font-size:12px;font-family:monospace;outline:none;resize:vertical;}
.row{display:flex;gap:8px;align-items:center;}
.flex1{flex:1;}
.mt8{margin-top:8px;}
.mt16{margin-top:16px;}
.alert{padding:10px 14px;border-radius:var(--r);font-size:12px;margin-bottom:12px;}
.alert-blue{background:rgba(78,160,247,.1);border:0.5px solid rgba(78,160,247,.3);color:var(--blue);}
.alert-green{background:rgba(90,158,63,.1);border:0.5px solid rgba(90,158,63,.3);color:#7ec85a;}
.alert-orange{background:rgba(240,160,48,.1);border:0.5px solid rgba(240,160,48,.3);color:var(--orange);}
.modal-wide{max-width:700px!important;}
.pdf-grid-preview{overflow:auto;max-height:320px;margin:10px 0;border:0.5px solid var(--border);border-radius:var(--r);}
.pdf-grid-preview table{border-collapse:collapse;font-size:11px;width:100%;}
.pdf-grid-preview th{padding:4px 8px;color:var(--text3);background:var(--bg3);position:sticky;top:0;}
.pdf-grid-preview td{padding:3px 8px;text-align:center;border:0.5px solid var(--border);}
.pdf-grid-preview tr:hover td{background:var(--bg3);}
</style>
</head>
<body>

<!-- Login -->
<div class="login-wrap" id="login-section">
  <div class="card">
    <h1>Administration</h1>
    <p class="sub">Planning France Info</p>
    <div class="field"><label>Mot de passe admin</label><input type="password" id="admin-pwd" placeholder="••••••••" onkeydown="if(event.key==='Enter')doAdminLogin()"></div>
    <button class="btn" onclick="doAdminLogin()">Se connecter</button>
    <div class="err" id="login-err"></div>
  </div>
</div>

<!-- Admin panel -->
<div id="admin">
  <div class="hdr">
    <h1>Administration — France Info</h1>
    <div style="display:flex;gap:8px;align-items:center">
      <span style="font-size:10px;color:var(--text3);opacity:.5">v4.08</span>
      <button class="btn btn-sm btn-ghost" onclick="showChangePwd()">Changer MDP admin</button>
      <button class="btn btn-sm btn-ghost" onclick="adminLogout()">Déconnexion</button>
    </div>
  </div>

  <div class="tabs">
    <div class="tab active" onclick="switchTab('users')">Utilisateurs</div>
    <div class="tab" onclick="switchTab('lines')">Lignes</div>
    <div class="tab" onclick="switchTab('cycles')">Cycles</div>
    <div class="tab" onclick="switchTab('vacations')">Vacations</div>
  </div>

  <!-- Users -->
  <div class="section active" id="tab-users">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
      <span id="user-count" style="font-size:12px;color:var(--text3)"></span>
      <button class="btn btn-sm" onclick="loadUsers()">↻ Rafraîchir</button>
    </div>
    <div id="users-table"></div>
  </div>

  <!-- Lines -->
  <div class="section" id="tab-lines">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
      <span style="font-size:12px;color:var(--text3)">Lignes utilisées par les profils</span>
      <button class="btn btn-sm" onclick="loadLines()">↻ Rafraîchir</button>
    </div>
    <div id="lines-grid"></div>
  </div>

  <!-- Cycles -->
  <div class="section" id="tab-cycles">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
      <span style="font-size:12px;color:var(--text3)">Gestion des cycles de planning</span>
      <div style="display:flex;gap:6px">
        <button class="btn btn-sm btn-ghost" onclick="migrateHardcodedCycleIfNeeded().then(loadCycles).then(()=>switchTab('vacations'))">Migrer cycle initial</button>
        <button class="btn btn-sm btn-ghost" onclick="importCycleFromPDF()" title="Parsing client-side via pdf.js">📄 Import PDF</button>
        <button class="btn btn-sm btn-ghost" onclick="importCycleFromText()" title="Coller le texte issu d'un convertisseur PDF">📋 Coller texte</button>
        <button class="btn btn-sm btn-orange" onclick="showImportPDF()" title="Analyse par IA (Claude) — extrait aussi les vacations">🤖 Import IA</button>
        <button class="btn btn-sm btn-green" onclick="showCreateCycle()">+ Nouveau cycle</button>
      </div>
    </div>
    <div id="cycles-list"></div>
  </div>

  <!-- Vacations -->
  <div class="section" id="tab-vacations">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;gap:8px;flex-wrap:wrap">
      <div id="vac-tabs" style="display:flex;gap:4px;flex-wrap:wrap;background:var(--bg2);border-radius:var(--r);padding:3px;"></div>
      <button class="btn btn-sm btn-green" onclick="showVacForm()">+ Ajouter</button>
    </div>
    <div id="vac-form" style="display:none;background:var(--bg2);border:0.5px solid var(--border);border-radius:var(--r);padding:16px;margin-bottom:16px">
      <h2 style="font-size:14px;margin-bottom:12px" id="vac-form-title">Nouvelle vacation</h2>
      <div class="row">
        <div class="flex1 field"><label>Nom (ex: E1)</label><input type="text" id="vf-name" placeholder="E1"></div>
        <div class="flex1 field"><label>Début</label><input type="time" id="vf-deb" step="900" placeholder="06:00"></div>
        <div class="flex1 field"><label>Fin</label><input type="time" id="vf-fin" step="900" placeholder="14:00"></div>
      </div>
      <div class="row">
        <div class="flex1 field"><label>Durée (min, auto si vide)</label><input type="number" id="vf-dur" placeholder="Auto"></div>
        <div class="flex1 field" style="display:flex;align-items:center;gap:8px;padding-top:20px">
          <input type="checkbox" id="vf-panier"> <label for="vf-panier" style="font-size:13px">Panier repas</label>
          &nbsp;&nbsp;
          <input type="checkbox" id="vf-mixte"> <label for="vf-mixte" style="font-size:13px">Mixte</label>
        </div>
        <div class="flex1 field"><label>Type</label>
          <select id="vf-type" style="width:100%;padding:8px;border:0.5px solid var(--border);border-radius:var(--r);background:var(--bg);color:var(--text);font-size:13px">
            <option value="week">Semaine</option>
            <option value="sat">Samedi</option>
            <option value="sun">Dimanche</option>
            <option value="all">Tous jours</option>
          </select>
        </div>
      </div>
      <div class="row">
        <button class="btn btn-green" onclick="saveVac()">Enregistrer</button>
        <button class="btn btn-ghost" onclick="document.getElementById('vac-form').style.display='none'">Annuler</button>
      </div>
      <div class="err" id="vf-err" style="margin-top:8px"></div>
    </div>
    <table>
      <thead><tr><th>Nom</th><th>Début</th><th>Fin</th><th>Durée</th><th>Panier</th><th>Mixte</th><th>Type</th><th></th></tr></thead>
      <tbody id="vac-list"></tbody>
    </table>
  </div>

</div>

<!-- Modals -->
<div id="modal-bg" class="modal-bg" style="display:none" onclick="if(event.target===this)closeModal()">
  <div class="modal" id="modal-content"></div>
</div>

<script>
const API = 'https://planning-gcal.arthur-lebreton94.workers.dev';
var adminToken = sessionStorage.getItem('admin_token') || '';
var _adminCycles = [];

if (adminToken) { showAdmin(); }

async function doAdminLogin() {
  const pwd = document.getElementById('admin-pwd').value;
  const err = document.getElementById('login-err');
  err.textContent = '';
  try {
    const res = await fetch(API + '/admin/login', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ password: pwd }) });
    const data = await res.json();
    if (!res.ok) { err.textContent = data.error || 'Erreur'; return; }
    adminToken = data.token;
    sessionStorage.setItem('admin_token', adminToken);
    showAdmin();
  } catch(e) { err.textContent = 'Erreur réseau'; }
}

function adminHeaders() { return { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + adminToken }; }

function showAdmin() {
  document.getElementById('login-section').style.display = 'none';
  document.getElementById('admin').style.display = 'block';
  migrateHardcodedCycleIfNeeded().then(() => patchVacationData()).then(() => { loadUsers(); loadVacations(); });
}

// Default hardcoded cycle data
const DEFAULT_CYCLE_DATA = {
  name: 'Cycle France Info (initial)',
  startDate: '2026-05-04',
  anchor: '2026-05-04',
  endDate: null,
  weeks: [
    ['A1','A1',null,'RH','A2','As1','Ad1'],[null,null,'A2','A2','B1',null,'RH'],
    ['A3','A3',null,'RH','A1','As2','Ad2'],[null,null,'A1','A1','A3',null,'RH'],
    ['B1','B1','A3','A3',null,null,'RH'],['A2','A2','B1','B1',null,null,'RH'],
    [null,null,'RH','P423','P423','Es','Ed'],[null,null,'D2','D1','D1',null,'RH'],
    ['C1','C1','C1','C1',null,null,'RH'],['D2','D2',null,'RH','C1','Fs','Fd'],
    [null,null,'D1','D2','D2',null,'RH'],['C2','C2','C2','C2','C2',null,'RH'],
    ['D1','D1',null,null,'RH','Cs','Cd'],['P423','P423','P423',null,'RH','As3','Ad3'],
  ]
};

const DEFAULT_VACS_DATA = {
  A1:{deb:'03h45',fin:'10h45',dur:420,panier:false,type:'week'},
  A2:{deb:'03h45',fin:'11h45',dur:480,panier:false,type:'week'},
  A3:{deb:'04h45',fin:'12h45',dur:480,panier:false,type:'week'},
  Ad1:{deb:'04h45',fin:'11h45',dur:420,panier:false,type:'sun'},
  Ad2:{deb:'04h45',fin:'12h45',dur:480,panier:false,type:'sun'},
  Ad3:{deb:'05h45',fin:'14h15',dur:510,panier:false,type:'sun'},
  As1:{deb:'04h45',fin:'11h45',dur:420,panier:false,type:'sat'},
  As2:{deb:'04h45',fin:'12h45',dur:480,panier:false,type:'sat'},
  As3:{deb:'05h45',fin:'14h15',dur:510,panier:false,type:'sat'},
  B1:{deb:'07h45',fin:'15h15',dur:450,panier:true,type:'week'},
  C1:{deb:'12h15',fin:'21h15',dur:540,panier:false,type:'week'},
  C2:{deb:'13h15',fin:'21h15',dur:480,panier:false,type:'week'},
  Cd:{deb:'11h15',fin:'20h15',dur:540,panier:true,type:'sun'},
  Cs:{deb:'11h15',fin:'20h15',dur:540,panier:true,type:'sat'},
  D1:{deb:'15h45',fin:'00h30',dur:480,panier:false,type:'week'},
  D2:{deb:'15h45',fin:'00h15',dur:465,panier:false,type:'week'},
  Ed:{deb:'14h45',fin:'00h30',dur:540,panier:false,type:'sun'},
  Es:{deb:'15h15',fin:'00h30',dur:510,panier:false,type:'sat'},
  Fd:{deb:'15h45',fin:'00h15',dur:465,panier:false,type:'sun'},
  Fs:{deb:'15h45',fin:'00h15',dur:465,panier:false,type:'sat'},
  P423:{deb:'09h45',fin:'18h15',dur:450,panier:false,type:'week'},
  RH:{deb:'',fin:'',dur:0,panier:false,type:'all'},
};

async function migrateHardcodedCycleIfNeeded() {
  try {
    // Check if cycles already exist
    const res = await fetch(API + '/admin/cycles', { method: 'POST', headers: adminHeaders(), body: '{}' });
    const data = await res.json();
    const cycles = data.cycles || [];
    if (cycles.length > 0) return; // already migrated

    // Check vacations
    const vres = await fetch(API + '/admin/vacations', { method: 'POST', headers: adminHeaders(), body: '{}' });
    const vdata = await vres.json();
    const existingVacs = vdata.vacations || {};

    // Migrate vacations first
    const vacNames = Object.keys(DEFAULT_VACS_DATA);
    for (const name of vacNames) {
      if (existingVacs[name]) continue; // already exists
      const v = DEFAULT_VACS_DATA[name];
      await fetch(API + '/admin/vacation/save', {
        method: 'POST', headers: adminHeaders(),
        body: JSON.stringify({ vacation: { name, ...v } })
      });
    }

    // Create initial cycle
    const cycRes = await fetch(API + '/admin/cycle/create', {
      method: 'POST', headers: adminHeaders(),
      body: JSON.stringify({ cycle: DEFAULT_CYCLE_DATA })
    });
    const cycData = await cycRes.json();
    const cycleId = cycData.cycle && cycData.cycle.id;
    if (!cycleId) return;

    // Link all default vacations to this cycle
    for (const name of vacNames) {
      await fetch(API + '/admin/vacation/addcycle', {
        method: 'POST', headers: adminHeaders(),
        body: JSON.stringify({ name, cycleId })
      });
    }

    console.log('Migration done: cycle', cycleId, 'with', vacNames.length, 'vacations');
    alert('Cycle initial migré depuis le code. Rechargez la page.');
  } catch(e) {
    console.warn('Migration failed:', e);
  }
}

// One-time patch: fix data errors in already-migrated vacations.
// Keyed by patch version so each patch runs exactly once per browser.
const VAC_PATCHES = {
  'v2': [
    { name:'C1',  deb:'12h15', fin:'21h15', dur:540, panier:false, type:'week' },
    { name:'Cs',  deb:'11h15', fin:'20h15', dur:540, panier:true,  type:'sat'  },
    { name:'Cd',  deb:'11h15', fin:'20h15', dur:540, panier:true,  type:'sun'  },
    { name:'P423',deb:'09h45', fin:'18h15', dur:450, panier:false, type:'week' },
  ],
};
async function patchVacationData() {
  for (const [ver, patches] of Object.entries(VAC_PATCHES)) {
    const key = 'vac_patch_' + ver;
    if (localStorage.getItem(key)) continue;
    try {
      for (const vacation of patches) {
        await fetch(API + '/admin/vacation/save', { method:'POST', headers:adminHeaders(),
          body: JSON.stringify({ vacation }) });
      }
      localStorage.setItem(key, '1');
      console.log('Vacation patch applied:', ver);
    } catch(e) {
      console.warn('Vacation patch failed:', ver, e);
    }
  }
}


function adminLogout() {
  sessionStorage.removeItem('admin_token');
  adminToken = '';
  document.getElementById('login-section').style.display = '';
  document.getElementById('admin').style.display = 'none';
}

function switchTab(tab) {
  document.querySelectorAll('.tab').forEach((t,i) => t.classList.toggle('active', ['users','lines','cycles','vacations'][i] === tab));
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.getElementById('tab-' + tab).classList.add('active');
  if (tab === 'users') loadUsers();
  if (tab === 'lines') loadLines();
  if (tab === 'cycles') loadCycles();
  if (tab === 'vacations') loadVacations();
}

// VACATIONS
var _editingVac = null;
var _allCycles = [];
var _allVacs = {};
var _vacActiveTab = null; // cycle id or 'none'

async function loadVacations() {
  const el = document.getElementById('vac-list');
  el.innerHTML = '<tr><td colspan="8" style="color:var(--text3);font-size:12px">Chargement...</td></tr>';
  try {
    const [vres, cres] = await Promise.all([
      fetch(API + '/admin/vacations', { method: 'POST', headers: adminHeaders(), body: '{}' }),
      fetch(API + '/admin/cycles', { method: 'POST', headers: adminHeaders(), body: '{}' })
    ]);
    const vdata = await vres.json();
    const cdata = await cres.json();
    _allVacs = vdata.vacations || {};
    _allCycles = (cdata.cycles || []).sort((a,b) => a.startDate < b.startDate ? -1 : 1);
    // Default to first cycle tab
    if (_vacActiveTab === null && _allCycles.length) {
      const today = new Date().toISOString().slice(0, 10);
      const sorted = [..._allCycles].sort((a,b) => a.startDate < b.startDate ? -1 : 1);
      let activeCyc = null;
      sorted.forEach(c => { if (c.startDate <= today && (!c.endDate || c.endDate >= today)) activeCyc = c; });
      _vacActiveTab = activeCyc ? activeCyc.id : _allCycles[0].id;
    }
    renderVacTabs();
    renderVacList();
  } catch(e) { el.innerHTML = '<tr><td colspan="8" class="err">Erreur réseau</td></tr>'; }
}

function renderVacTabs() {
  const el = document.getElementById('vac-tabs');
  if (!el) return;
  const tabs = _allCycles.map(c => {
    const active = _vacActiveTab === c.id;
    return `<div class="tab${active?' active':''}" onclick="switchVacTab('${c.id}')" style="font-size:12px;padding:5px 10px;max-width:180px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${c.name||c.id}">${c.name||c.id}</div>`;
  });
  tabs.push(`<div class="tab${_vacActiveTab==='none'?' active':''}" onclick="switchVacTab('none')" style="font-size:12px;padding:5px 10px">Sans cycle</div>`);
  el.innerHTML = tabs.join('');
}

function switchVacTab(id) {
  _vacActiveTab = id;
  renderVacTabs();
  renderVacList();
  document.getElementById('vac-form').style.display = 'none';
}

function renderVacList() {
  const el = document.getElementById('vac-list');
  const types = { week: 'Sem.', sat: 'Sam.', sun: 'Dim.', all: 'Tous' };
  const entries = Object.entries(_allVacs).sort((a,b) => a[0].localeCompare(b[0]));
  const filtered = entries.filter(([name, v]) => {
    if (_vacActiveTab === 'none') return !v.cycleIds || !v.cycleIds.length;
    return (v.cycleIds || []).includes(_vacActiveTab);
  });
  if (!filtered.length) {
    const msg = Object.keys(_allVacs).length === 0
      ? 'Aucune vacation. Cliquez sur Migrer ou Ajouter.'
      : 'Aucune vacation dans cet onglet.';
    el.innerHTML = `<tr><td colspan="8" style="color:var(--text3);font-size:12px">${msg}</td></tr>`;
    return;
  }
  el.innerHTML = filtered.map(([name, v]) => {
    const cycleNames = (_allCycles||[]).filter(c => (v.cycleIds||[]).includes(c.id)).map(c => c.name||c.id).join(', ');
    return `<tr>
      <td><b>${name}</b>${cycleNames&&_allCycles.length>1?`<div style="font-size:10px;color:var(--text3);margin-top:2px">${cycleNames}</div>`:''}</td>

function fmtTimeToHHMM(t) {
  if (!t) return '';
  // Convert '06h30' to '06:30' or keep 'HH:MM'
  return t.replace('h', ':').replace(/^(\d):/, '0$1:');
}
function fmtHHMMToH(t) {
  if (!t) return '';
  return t.replace(':', 'h');
}
function calcDur(deb, fin) {
  if (!deb || !fin) return 0;
  const [dh,dm] = deb.split(':').map(Number);
  const [fh,fm] = fin.split(':').map(Number);
  let mins = (fh*60+fm) - (dh*60+dm);
  if (mins <= 0) mins += 24*60; // overnight
  return mins;
}

  const name = document.getElementById('vf-name').value.trim();
  const deb = document.getElementById('vf-deb').value;
  const fin = document.getElementById('vf-fin').value;
  const durInput = document.getElementById('vf-dur').value;

  if (!name || !deb || !fin) { errEl.textContent = 'Nom, début et fin requis.'; return; }
  const dur = durInput ? parseInt(durInput) : calcDur(deb, fin);
  const vacation = { name, deb: fmtHHMMToH(deb), fin: fmtHHMMToH(fin), dur, panier, ...(mixte?{mixte:true}:{}), type };
  try {
    const res = await fetch(API + '/admin/vacation/save', { method: 'POST', headers: adminHeaders(), body: JSON.stringify({ vacation }) });

    if (!res.ok) { errEl.textContent = data.error || 'Erreur'; return; }

function _buildCycleGridHtml(weeks) {

  const ALL_VACS = [...BASE_VACS, ...extra];
  const makeOpts = (val) => ALL_VACS.map(v => `<option value="${v}"${(val===null&&v==='null')||(val===v)?' selected':''}>${v==='null'?'—':v}</option>`).join('');
  const DAYS = ['Lu','Ma','Me','Je','Ve','Sa','Di'];
  const SEL_STYLE = 'font-size:10px;padding:2px;border:0.5px solid var(--border);border-radius:3px;background:var(--bg2);color:var(--text);width:58px';
  let h = `<table id="cyc-grid-table" style="border-collapse:collapse;font-size:11px"><tr><th style="padding:3px 6px;color:var(--text3)">S</th>${DAYS.map(d=>`<th style="padding:3px 8px;color:var(--text3)">${d}</th>`).join('')}<th></th></tr>`;
  weeks.forEach((week, wi) => {
    h += `<tr><td style="padding:3px 6px;color:var(--text3);font-weight:600">S${wi+1}</td>`;
    week.forEach((vac, di) => {
      h += `<td style="padding:2px"><select data-w="${wi}" data-d="${di}" style="${SEL_STYLE}">${makeOpts(vac)}</select></td>`;
    });
    h += `<td><button onclick="removeCycleWeek(${wi})" style="font-size:10px;padding:1px 4px;border:0.5px solid var(--border);border-radius:3px;background:transparent;color:var(--text3);cursor:pointer">✕</button></td></tr>`;
  });
  return h + '</table>';
}

async function doParsePDF() {
  var fileInput = document.getElementById('pdf-file-input');
  var errEl = document.getElementById('pdf-import-err');
  var btn = document.getElementById('pdf-parse-btn');
  if (!fileInput || !fileInput.files[0]) { errEl.textContent = 'Sélectionnez un fichier PDF.'; return; }
  var file = fileInput.files[0];
  if (file.type !== 'application/pdf' && !file.name.endsWith('.pdf')) { errEl.textContent = 'Le fichier doit être un PDF.'; return; }
  btn.disabled = true;
  btn.textContent = 'Analyse en cours…';
  errEl.textContent = '';
  try {
    var base64 = await new Promise(function(resolve, reject) {
      var reader = new FileReader();
      reader.onload = function(e) { resolve(e.target.result.split(',')[1]); };
      reader.onerror = reject;
      reader.readAsDataURL(file);
    });
    var res = await fetch(API + '/admin/parse-cycle-pdf', { method: 'POST', headers: adminHeaders(), body: JSON.stringify({ pdfBase64: base64 }) });
    var data = await res.json();
    if (!res.ok) { errEl.textContent = data.error || 'Erreur serveur'; btn.disabled = false; btn.textContent = 'Analyser le PDF'; return; }
    _parsedCycleData = data.data;
    showParsedPreview();
  } catch(e) { errEl.textContent = 'Erreur réseau: ' + e.message; btn.disabled = false; btn.textContent = 'Analyser le PDF'; }
}

    + vacKeys.map(function(name) {

      return '<tr><td style="padding:3px 8px;font-weight:600">' + name + '</td>'
        + '<td style="padding:3px 8px">' + (v.deb||'—') + '</td>'
        + '<td style="padding:3px 8px">' + (v.fin||'—') + '</td>'
        + '<td style="padding:3px 8px">' + (v.dur||0) + ' min</td></tr>';
    }).join('')
    + '</tbody></table></div>' : '<div class="empty">Aucune vacation extraite</div>';

  document.getElementById('modal-content').innerHTML = '<h2>Aperçu — ' + lines.length + ' lignes, ' + vacKeys.length + ' vacations</h2>'
    + '<div class="row" style="margin-bottom:12px">'
    + '<div class="flex1 field"><label>Nom du cycle</label><input type="text" id="cyc-import-name" value="' + (d.title||'').replace(/"/g,'&quot;') + '" placeholder="Nom du cycle"></div>'
    + '<div class="flex1 field"><label>Date de début</label><input type="date" id="cyc-import-start"></div>'
    + '</div>'
    + grid
    + '<div style="font-size:11px;color:var(--text3);margin-bottom:6px">' + vacKeys.length + ' vacation(s) extraite(s) — nouvelles créées, mêmes horaires réutilisées, horaires différents → renommées automatiquement (ex: A1b)</div>'
    + vacTable
    + '<div class="err" id="pdf-save-err" style="margin-top:4px"></div>'
    + '<div class="modal-btns">'
    + '<button class="btn btn-ghost" onclick="showImportPDF()">Retour</button>'
    + '<button class="btn btn-green" onclick="doSaveImportedCycle()">Créer le cycle</button>'
    + '</div>';
  document.getElementById('modal-bg').style.display = 'flex';
}

async function doSaveImportedCycle() {
  var d = _parsedCycleData;
  if (!d) return;
  var name = document.getElementById('cyc-import-name').value.trim();
  var startDate = document.getElementById('cyc-import-start').value;
  var errEl = document.getElementById('pdf-save-err');
  if (!name) { errEl.textContent = 'Nom du cycle requis.'; return; }
  if (!startDate) { errEl.textContent = 'Date de début requise.'; return; }
  errEl.textContent = '';
  var saveBtn = document.querySelector('#modal-content .btn-green');
  if (saveBtn) { saveBtn.disabled = true; saveBtn.textContent = 'Enregistrement…'; }

  var vacs = d.vacations || {};

  try {
    // 1. Resolve vacation renames
    var resolved = await _resolveVacRename(vacs);
    var rename = resolved.rename, existing = resolved.existing;

    // 2. Build weeks grid applying renames
    var weeks = (d.lines || []).map(function(line) {
      return (line.schedule || []).map(function(code) { return !code ? null : rename[code] || code; });
    });

    // 3. Create cycle
    var cycRes = await fetch(API + '/admin/cycle/create', {
      method: 'POST', headers: adminHeaders(),
      body: JSON.stringify({ cycle: { name: name, startDate: startDate, anchor: startDate, endDate: null, weeks: weeks } })
    });
    var cycData = await cycRes.json();
    if (!cycRes.ok) { errEl.textContent = cycData.error || 'Erreur création cycle'; if (saveBtn) { saveBtn.disabled = false; saveBtn.textContent = 'Créer le cycle'; } return; }
    var cycleId = cycData.cycle && cycData.cycle.id;

    // 4. Save/link vacations
    var renamed = Object.keys(vacs).length ? await _saveVacationsAndLink(cycleId, vacs, rename, existing) : [];

    closeModal();
    loadCycles();
    var msg = 'Cycle "' + name + '" créé avec ' + vacNames.length + ' vacation(s).';
    if (renamed.length) msg += '\n\nVacations renommées (horaires différents) :\n' + renamed.join('\n');
    msg += '\n\nPensez à vérifier le panier repas dans l\'onglet Vacations.';
    alert(msg);
  } catch(e) {
    errEl.textContent = 'Erreur réseau: ' + e.message;
    if (saveBtn) { saveBtn.disabled = false; saveBtn.textContent = 'Créer le cycle'; }
  }
}

function _parseAndPreviewText() {
  const raw = document.getElementById('cycle-text-input').value;
  const err = document.getElementById('cycle-text-err');
  err.style.display = 'none';
  if (!raw.trim()) { err.textContent = 'Aucun texte fourni.'; err.style.display = ''; return; }
  const result = _parseCycleText(raw);
  if (!result || !result.detected) {
    err.textContent = 'Impossible de détecter les colonnes de jours. Vérifiez que le texte contient les noms LUNDI, MARDI… DIMANCHE.';
    err.style.display = ''; return;
  }
  result.name = 'Cycle (texte collé)';
  _showPDFPreview(result);
}

function _parseCycleText(rawText) {
  const lines = rawText.split('\n');
  const DAY_NAMES = ['LUNDI','MARDI','MERCREDI','JEUDI','VENDREDI','SAMEDI','DIMANCHE'];
  const DAY_IDX = {LUNDI:0,MARDI:1,MERCREDI:2,JEUDI:3,VENDREDI:4,SAMEDI:5,DIMANCHE:6};
  const WORD_BLOCK = new Set(['LUNDI','MARDI','MERCREDI','JEUDI','VENDREDI','SAMEDI','DIMANCHE',
    'SEMAINE','CYCLE','TOTAL','POOL','CADRE','ANTENNE','LIGNE','INFO','FRANCE','MOY','HEBDO',
    'SEM','MED','NOM','DATE','AGENT','ROULEMENT','TECHNIQUE']);

  // Find header line (first line with ≥5 day names)
  let colPos = null, headerIdx = -1, stopIdx = lines.length;
  for (let i = 0; i < lines.length; i++) {
    const line = lines[i];
    const found = {};
    for (const day of DAY_NAMES) { const p = line.indexOf(day); if (p >= 0) found[DAY_IDX[day]] = p; }
    if (Object.keys(found).length >= 5) {
      if (!colPos) {
        colPos = Array(7).fill(null);
        for (const [di, p] of Object.entries(found)) colPos[+di] = p;
        headerIdx = i;
      } else { stopIdx = i; break; }
    }
    if (colPos && /pool/i.test(line)) { stopIdx = i; break; }
  }
  if (!colPos) return { weeks: [], vacations: {}, detected: false };

  // Interpolate missing columns
  const known = colPos.map((p,i) => p !== null ? [i,p] : null).filter(Boolean);
  const sp = (known[known.length-1][1] - known[0][1]) / (known[known.length-1][0] - known[0][0]);
  for (let i = 0; i < 7; i++) if (colPos[i] === null) colPos[i] = Math.round(known[0][1] + (i - known[0][0]) * sp);
  const colSpacing = sp;

  function extractTimes(line) {
    const r = []; let m;
    const re = /\b(\d{1,2})h(\d{2})\b/g;
    while ((m = re.exec(line)) !== null)
      r.push({ pos: m.index, h: +m[1], min: +m[2], str: m[0] });
    return r;
  }

  // Group consecutive time items (within 15 chars) into pairs, assign each pair to nearest column
  function groupPairs(times) {
    const colPair = Array(7).fill(null);
    const ts = [...times].sort((a,b) => a.pos - b.pos);
    let i = 0;
    while (i < ts.length) {
      let pair;
      if (i+1 < ts.length && ts[i+1].pos - ts[i].pos <= 15) { pair = [ts[i], ts[i+1]]; i += 2; }
      else { pair = [ts[i]]; i++; }
      const center = pair.reduce((s,t) => s+t.pos, 0) / pair.length;
      let best = -1, bestD = Infinity;
      for (let di = 0; di < 7; di++) { const d = Math.abs(center - colPos[di]); if (d < bestD) { bestD = d; best = di; } }
      if (best >= 0 && bestD < colSpacing * 0.7 && !colPair[best]) colPair[best] = pair;
    }
    return colPair;
  }

  function findCol(pos) {
    let best = -1, bestD = Infinity;
    for (let di = 0; di < 7; di++) { const d = Math.abs(pos - colPos[di]); if (d < bestD) { bestD = d; best = di; } }
    return bestD < colSpacing * 0.6 ? best : -1;
  }

  const weeks = [], vacMap = {};

  for (let i = headerIdx + 1; i < stopIdx; i++) {
    const line = lines[i];
    // Find code candidates: start with uppercase, 2-5 chars, known pattern
    const cands = [];
    let m;
    const cre = /\b([A-Za-z]\w{0,4})\b/g;
    while ((m = cre.exec(line)) !== null) {
      const s = m[1];
      if (s.length < 2 || s.length > 5) continue;
      if (/^\d+$/.test(s) || /^[a-z]+$/.test(s)) continue;
      if (WORD_BLOCK.has(s.toUpperCase())) continue;
      if (!/^[A-Z]/.test(s)) continue;
      if (/^\d{1,2}h\d{2}$/.test(s)) continue;
      if (!/^([A-Z][a-z]?\d{0,2}[a-z]?|P\d{3,4}|[A-Z]{2,5})$/.test(s)) continue;
      cands.push({ pos: m.index, str: s });
    }
    if (!cands.length) continue;

    const rowCodes = Array(7).fill(null);
    for (const c of cands) { const di = findCol(c.pos); if (di >= 0 && !rowCodes[di]) rowCodes[di] = /^sv$/i.test(c.str) ? null : c.str; }
    if (rowCodes.filter(Boolean).length < 2) continue;

    // Find time lines above and below
    let ta = [], tb = [];
    for (let k = i-1; k >= Math.max(headerIdx, i-4); k--) { const tl = extractTimes(lines[k]); if (tl.length >= 2) { ta = tl; break; } }
    for (let k = i+1; k <= Math.min(stopIdx-1, i+4); k++) { const tl = extractTimes(lines[k]); if (tl.length >= 2) { tb = tl; break; } }

    const pairsAbove = groupPairs(ta), pairsBelow = groupPairs(tb);
    weeks.push(rowCodes.slice());

    for (let di = 0; di < 7; di++) {
      const code = rowCodes[di];
      if (!code || /^(SV|RH)$/i.test(code) || vacMap[code]) continue;
      const pa = pairsAbove[di], pb = pairsBelow[di];
      if (!pa || pa.length < 2) continue;
      const debItem = pa[0], finItem = pa[pa.length-1];
      const deb = debItem.str, fin = finItem.str;
      let dur;
      if (pb && pb.length >= 2) {
        dur = pb[pb.length-1].h * 60 + pb[pb.length-1].min;
      } else if (pb && pb.length === 1) {
        const val = pb[0].h * 60 + pb[0].min;
        const base = (finItem.h*60+finItem.min) - (debItem.h*60+debItem.min);
        const baseAdj = base < 0 ? base+1440 : base;
        dur = val < baseAdj/2 ? baseAdj - val : val;
      } else {
        dur = (finItem.h*60+finItem.min) - (debItem.h*60+debItem.min);
        if (dur < 0) dur += 1440;
      }
      vacMap[code] = { deb, fin, dur: Math.max(0, dur) };
    }
  }

  // Detect start date from text
  let startDate = '';
  for (const line of lines) {
    let dm;
    if ((dm = line.match(/(\d{1,2})[\/\-\.](\d{1,2})[\/\-\.](\d{4})/)))
      { startDate = `${dm[3]}-${dm[2].padStart(2,'0')}-${dm[1].padStart(2,'0')}`; break; }
  }

  return { weeks, startDate, detected: weeks.length > 0, rawRows: [], vacations: vacMap };
}

async function _loadPDFJS() {
  if (window.pdfjsLib) return;
  await new Promise((resolve, reject) => {
    const s = document.createElement('script');
    s.src = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js';
    s.onload = resolve; s.onerror = () => reject(new Error('Impossible de charger PDF.js (vérifiez votre connexion)'));
    document.head.appendChild(s);
  });
  window.pdfjsLib.GlobalWorkerOptions.workerSrc =
    'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
}

async function importCycleFromPDF() {
  const input = document.createElement('input');
  input.type = 'file';
  input.accept = '.pdf,application/pdf';
  input.onchange = async (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const mc = document.getElementById('modal-content');
    mc.className = 'modal';
    mc.innerHTML = '<h2>Import PDF</h2><div style="text-align:center;padding:24px;color:var(--text3)">Analyse du PDF en cours…</div>';
    document.getElementById('modal-bg').style.display = 'flex';
    try {
      await _loadPDFJS();
      const buf = await file.arrayBuffer();
      const pdf = await window.pdfjsLib.getDocument({ data: buf }).promise;
      // Extract text items with x,y positions from all pages
      const allItems = [];
      let pageOffsetY = 0;
      for (let p = 1; p <= pdf.numPages; p++) {
        const page = await pdf.getPage(p);
        const vp = page.getViewport({ scale: 1 });
        const content = await page.getTextContent();
        for (const item of content.items) {
          const s = (item.str || '').trim();
          if (s) allItems.push({ str: s, x: item.transform[4], y: pageOffsetY + (vp.height - item.transform[5]) });
        }
        pageOffsetY += vp.height + 60;
      }
      // Try to get PDF title for cycle name
      let cycleName = file.name.replace(/\.pdf$/i, '');
      const meta = await pdf.getMetadata().catch(() => ({}));
      if (meta && meta.info && meta.info.Title) cycleName = meta.info.Title;
      const result = _parsePDFGrid(allItems);
      result.name = cycleName;
      _showPDFPreview(result);
    } catch(err) {
      const mc2 = document.getElementById('modal-content');
      mc2.innerHTML = '<h2>Erreur d\'import</h2>'
        + '<p style="color:var(--red);font-size:13px;margin-bottom:16px">' + _esc(err.message || 'Impossible de lire ce PDF') + '</p>'
        + '<div class="modal-btns"><button class="btn btn-ghost" onclick="closeModal()">Fermer</button></div>';
    }
  };
  input.click();
}

const _VAC_SET = new Set(['RH','A1','A2','A3','B1','C1','C2','D1','D2','P423',
  'As1','As2','As3','Cs','Es','Fs','Ad1','Ad2','Ad3','Cd','Ed','Fd']);
const _VAC_CODE_RE = /^([A-Z][a-z]?\d{0,2}[a-z]?|P\d{3,4})$/;
// Mots français courants qui ne sont pas des codes vacances
const _WORD_BLOCK = /^(LUNDI|MARDI|MERCREDI|JEUDI|VENDREDI|SAMEDI|DIMANCHE|SEMAINE|CYCLE|REPOS|PAUSE|DUREE|DEBUT|TOTAL|POOL|CADRE|ANTENNE|LIGNE|ROULEMENT|AGENT|NOM|PRENOM|DATE)$/;

function _toVacCode(str) {
  const s = str.trim().replace(/\s/g, '');
  if (!s || s === '-' || s === '—' || s === '–' || s === '/') return null;
  if (/^r\.?h\.?$/i.test(s)) return 'RH';
  if (/^sv$/i.test(s)) return null;
  if (_VAC_SET.has(s)) return s;
  const sl = s.toLowerCase();
  for (const v of _VAC_SET) { if (v.toLowerCase() === sl) return v; }
  // Codes tout-majuscules type MIXTE, JOUR, NUIT, etc.
  if (/^[A-Z]{2,8}$/.test(s) && !_WORD_BLOCK.test(s)) return s;
  if (_VAC_CODE_RE.test(s)) return s;
  return undefined;
}

function _parsePDFGrid(items) {
  const Y_TOL = 8;
  const rows = [];
  for (const item of [...items].sort((a, b) => a.y - b.y)) {
    let placed = false;
    for (const row of rows) {
      if (Math.abs(row.y - item.y) <= Y_TOL) { row.items.push(item); placed = true; break; }
    }
    if (!placed) rows.push({ y: item.y, items: [item] });
  }
  for (const row of rows) {
    row.items.sort((a, b) => a.x - b.x);
    row.text = row.items.map(i => i.str).join(' ');
  }
  const rawRows = rows.map(r => r.text);

  // Détection de la date dans tout le document
  let detectedDate = '';
  for (const row of rows) {
    if (detectedDate) break;
    let dm;
    if ((dm = row.text.match(/(\d{1,2})[\/\-\.](\d{1,2})[\/\-\.](\d{4})/)))
      detectedDate = `${dm[3]}-${dm[2].padStart(2,'0')}-${dm[1].padStart(2,'0')}`;
    else if ((dm = row.text.match(/(\d{4})-(\d{2})-(\d{2})/))) detectedDate = dm[0];
  }

  // Trouver la ligne d'en-tête des jours
  // Couvre : L/Lu/Lun/Lundi, M/Ma/Mar/Mardi, Me/Mer/Mercredi, J/Je/Jeu/Jeudi, V/Ve/Ven/Vendredi, S/Sa/Sam/Samedi, D/Di/Dim/Dimanche
  const DAY_MAP = { l:0,lu:0,lun:0,lundi:0, m:1,ma:1,mar:1,mardi:1, me:2,mer:2,mercredi:2,
    j:3,je:3,jeu:3,jeudi:3, v:4,ve:4,ven:4,vendredi:4, s:5,sa:5,sam:5,samedi:5, d:6,di:6,dim:6,dimanche:6 };
  let dayColX = null, headerY = -1;
  for (const row of rows) {
    const hits = row.items.map(it => {
      const k = it.str.trim().toLowerCase();
      return DAY_MAP.hasOwnProperty(k) ? { col: DAY_MAP[k], x: it.x } : null;
    }).filter(Boolean);
    if (new Set(hits.map(h => h.col)).size >= 5) {
      const cols = Array(7).fill(null);
      for (const h of hits) { if (cols[h.col] === null) cols[h.col] = h.x; }
      dayColX = cols; headerY = row.y; break;
    }
  }

  // Détecter la limite de la section Antenne (Pool Cadre ou 2ème header de jours)
  let stopY = Infinity;
  for (const row of rows) {
    if (row.y <= headerY) continue;
    if (row.items.some(it => /pool/i.test(it.str.trim()))) { stopY = row.y; break; }
    const hits2 = row.items.map(it => { const k = it.str.trim().toLowerCase(); return DAY_MAP.hasOwnProperty(k) ? k : null; }).filter(Boolean);
    if (new Set(hits2).size >= 5) { stopY = row.y; break; }
  }

  // ── Méthode A : alignement par colonnes (principal) ────────────────────────
  // Fonctionne même sans numéros de semaine (format avec noms de personnes)
  let weeks = [];
  let colSpacing = 50;
  if (dayColX && dayColX.some(x => x !== null)) {
    // Interpoler les positions manquantes
    const known = dayColX.reduce((a, x, i) => x !== null ? [...a, {i, x}] : a, []);
    if (known.length >= 2) {
      const spacing = (known[known.length-1].x - known[0].x) / (known[known.length-1].i - known[0].i);
      for (let i = 0; i < 7; i++) {
        if (dayColX[i] === null) dayColX[i] = known[0].x + (i - known[0].i) * spacing;
      }
    }
    // Espacement moyen entre colonnes pour les tolérances dynamiques
    const knownPts = dayColX.filter(x => x !== null).sort((a,b) => a-b);
    if (knownPts.length >= 2) {
      const diffs = [];
      for (let i = 1; i < knownPts.length; i++) diffs.push(knownPts[i] - knownPts[i-1]);
      colSpacing = diffs.reduce((s,d) => s+d, 0) / diffs.length;
    }

    // Calibration : affiner dayColX depuis les positions réelles des codes dans les données
    // Les en-têtes sont souvent alignés à gauche du texte, les codes sont centrés dans la cellule
    const calSums = Array(7).fill(0), calCounts = Array(7).fill(0);
    const CAL_TOL = colSpacing * 0.9;
    for (const row of rows) {
      if (row.y <= headerY || row.y >= stopY) continue;
      for (const item of row.items) {
        if (_toVacCode(item.str) === undefined) continue;
        let bestDi = -1, bestDist = Infinity;
        for (let di = 0; di < 7; di++) {
          if (dayColX[di] === null) continue;
          const d = Math.abs(item.x - dayColX[di]);
          if (d < CAL_TOL && d < bestDist) { bestDist = d; bestDi = di; }
        }
        if (bestDi >= 0) { calSums[bestDi] += item.x; calCounts[bestDi]++; }
      }
    }
    for (let di = 0; di < 7; di++) {
      if (calCounts[di] >= 2) dayColX[di] = calSums[di] / calCounts[di];
    }

    // Fusionner les lignes très proches (ligne PDF découpée en 2 parties dans le rendu)
    const gridRows = [];
    for (const row of rows) {
      if (row.y <= headerY || row.y >= stopY) continue;
      const last = gridRows[gridRows.length - 1];
      if (last && row.y - last.y <= 20) {
        for (const it of row.items) last.items.push(it);
      } else {
        gridRows.push({ y: row.y, items: [...row.items] });
      }
    }

    const X_TOL = colSpacing * 0.45;
    for (const row of gridRows) {
      // Pour chaque colonne jour, trouver l'item le plus proche
      const dayCodes = Array(7).fill(undefined);
      let found = 0;
      for (let di = 0; di < 7; di++) {
        let best = null, bestDist = Infinity;
        for (const item of row.items) {
          const d = Math.abs(item.x - dayColX[di]);
          if (d < X_TOL && d < bestDist) { bestDist = d; best = item; }
        }
        if (best) {
          const c = _toVacCode(best.str);
          if (c !== undefined) { dayCodes[di] = c; found++; }
        }
      }
      // Inclure la ligne si au moins 2 colonnes ont un code reconnu
      if (found >= 2) weeks.push(dayCodes.map(c => c === undefined ? null : c));
    }
  }

  // ── Méthode B : détection par numéros de semaine (S1…S52) ─────────────────
  if (weeks.length === 0) {
    const weekRows = [];
    for (const row of rows) {
      if (row.y >= stopY) continue;
      const tokens = row.items.map(i => i.str.trim()).filter(Boolean);
      let wn = null, skip = 1;
      const m1 = (tokens[0]||'').match(/^S?(\d{1,2})$/i);
      if (m1) { const n = parseInt(m1[1]); if (n>=1&&n<=52) wn = n; }
      if (wn === null) {
        const m2 = tokens.slice(0,3).join(' ').match(/\bsem\.?\s*(\d{1,2})\b/i);
        if (m2) { const n = parseInt(m2[1]); if (n>=1&&n<=52) { wn=n; skip=2; } }
      }
      if (wn === null) continue;
      const codes = [];
      for (let ti = skip; ti < tokens.length && codes.length < 7; ti++) {
        const c = _toVacCode(tokens[ti]); if (c !== undefined) codes.push(c);
      }
      while (codes.length < 7) codes.push(null);
      if (codes.some(c => c !== null)) weekRows.push({ wn, vacs: codes.slice(0,7) });
    }
    weekRows.sort((a,b) => a.wn - b.wn);
    const seen = new Set();
    weeks = weekRows.filter(r => seen.has(r.wn) ? false : (seen.add(r.wn),true)).map(r => r.vacs);
  }

  // ── Méthode C : détection séquentielle (dernier recours) ──────────────────
  if (weeks.length === 0) {
    for (const row of rows) {
      if (row.y >= stopY) continue;
      const tokens = row.items.map(i => i.str.trim()).filter(Boolean);
      const codes = [];
      for (const tok of tokens) { const c = _toVacCode(tok); if (c !== undefined) codes.push(c); }
      if (codes.length >= 3) {
        const w = codes.slice(0,7); while (w.length < 7) w.push(null); weeks.push(w);
      }
    }
  }

  const vacations = dayColX ? _parsePDFVacations(items, rows, dayColX, colSpacing, stopY) : {};
  return { weeks, startDate: detectedDate, detected: weeks.length > 0, rawRows, vacations };
}

function _parsePDFVacations(allItems, rows, dayColX, colSpacing, stopY = Infinity) {
  const TIME_RE = /^(\d{1,2})h(\d{2})$/;
  const CODE_RE = /^([A-Z]{2,8}|[A-Z][a-z]?\d{0,2}[a-z]?|P\d{3,4})$/;
  const WORD_BLOCK = /^(LUNDI|MARDI|MERCREDI|JEUDI|VENDREDI|SAMEDI|DIMANCHE|SEMAINE|CYCLE|REPOS|PAUSE|DUREE|DEBUT|TOTAL|POOL|CADRE|ANTENNE|LIGNE)$/;
  const isCode = s => CODE_RE.test(s) && !WORD_BLOCK.test(s);
  const X_TOL = colSpacing ? colSpacing * 0.55 : 45;
  const vacMap = {};

  // Index plat de tous les items horaires avec leur y brut (pas groupé), section Antenne seulement
  const allTimeItems = allItems
    .filter(it => it.y < stopY)
    .map(it => { const m = TIME_RE.exec(it.str.trim()); return m ? { h: +m[1], min: +m[2], str: it.str.trim(), x: it.x, y: it.y } : null; })
    .filter(Boolean);

  for (const row of rows) {
    if (row.y >= stopY) continue;
    for (let di = 0; di < 7; di++) {
      if (dayColX[di] === null) continue;
      let code = null, codeY = row.y, codeX = dayColX[di];
      for (const item of row.items) {
        if (Math.abs(item.x - dayColX[di]) < X_TOL) {
          const s = item.str.trim().replace(/\s/g, '');
          if (isCode(s)) {
            code = s;
            codeY = item.y !== undefined ? item.y : row.y;
            codeX = item.x;
            break;
          }
        }
      }
      if (!code || vacMap[code]) continue;

      // Les heures apparaissent légèrement au-dessus ou en-dessous du code, à droite de codeX
      // Ligne deb/fin : à gauche/droite (codeX + ~20px et +~42px)
      // Ligne pause/dur : même structure, quelques pixels en-dessous
      const nearby = allTimeItems.filter(t =>
        t.x >= codeX - 5 && t.x <= codeX + colSpacing &&
        t.y >= codeY - 10 && t.y <= codeY + 60
      );
      if (nearby.length < 2) continue;

      // Regroupe par niveau y avec tolérance 8px
      const byY = [];
      for (const t of nearby) {
        const g = byY.find(g => Math.abs(g.y - t.y) <= 8);
        if (g) g.times.push(t); else byY.push({ y: t.y, times: [t] });
      }
      byY.sort((a, b) => a.y - b.y);
      for (const g of byY) g.times.sort((a, b) => a.x - b.x);
      // Ligne 1 = deb (gauche) + fin (droite)
      // Vérifier que deb/fin sont bien dans la même cellule (≤28px sous le code)
      if (byY[0].times.length < 2 || byY[0].y - codeY > 28) continue;
      const debItem = byY[0].times[0];
      const finItem = byY[0].times[byY[0].times.length - 1];
      const deb = debItem.str, fin = finItem.str;

      // Ligne 2 = pause (gauche) + dur_effectif (droite) — lire dur directement dans le PDF
      let dur;
      if (byY.length >= 2) {
        const bot = byY[1].times;
        if (bot.length >= 2) {
          // droite = temps de travail effectif (affiché dans le PDF)
          dur = bot[bot.length - 1].h * 60 + bot[bot.length - 1].min;
        } else {
          // une seule valeur : petite → pause (soustraire), grande → dur direct
          const val = bot[0].h * 60 + bot[0].min;
          const base = (finItem.h*60 + finItem.min) - (debItem.h*60 + debItem.min);
          const baseAdj = base < 0 ? base + 1440 : base;
          dur = val < baseAdj / 2 ? baseAdj - val : val;
        }
      } else {
        dur = (finItem.h*60 + finItem.min) - (debItem.h*60 + debItem.min);
        if (dur < 0) dur += 1440;
      }

      vacMap[code] = { deb, fin, dur: Math.max(0, dur) };
    }
  }
  return vacMap;
}

function _showPDFPreview(result) {
  const { weeks, startDate, detected, name, rawRows, vacations } = result;
  window._pdfVacations = vacations || {};
  const DAYS = ['Lu','Ma','Me','Je','Ve','Sa','Di'];
  const mc = document.getElementById('modal-content');
  mc.className = 'modal modal-wide';

  let status, grid;
  if (detected && weeks.length > 0) {
    status = `<div class="alert alert-green" style="margin-bottom:10px">✓ ${weeks.length} semaine(s) détectée(s) dans le PDF</div>`;
    grid = '<div class="pdf-grid-preview"><table>'
      + '<tr><th>S</th>' + DAYS.map(d => `<th>${d}</th>`).join('') + '</tr>'
      + weeks.map((w, wi) => '<tr><td style="font-weight:600;color:var(--text3)">S'+(wi+1)+'</td>'
          + w.map(v => `<td>${v !== null ? v : '<span style="color:var(--text3)">—</span>'}</td>`).join('')
          + '</tr>').join('')
      + '</table></div>';
  } else {
    status = '<div class="alert alert-orange" style="margin-bottom:10px">⚠ Aucune grille détectée. Consultez le texte extrait ci-dessous.</div>';
    grid = '';
  }

  const vacKeys = Object.keys(window._pdfVacations).sort();
  const vacHtml = vacKeys.length
    ? '<div style="font-size:11px;color:var(--text3);margin:8px 0 4px">' + vacKeys.length + ' vacation(s) extraite(s)</div>'
      + '<div class="pdf-grid-preview" style="max-height:150px"><table>'
      + '<tr><th>Code</th><th>Début</th><th>Fin</th><th>Durée</th><th>Pause</th><th>Panier</th></tr>'
      + vacKeys.map(function(n){ var v=window._pdfVacations[n]; var pause=_calcPauseMin(v.deb,v.fin,v.dur); var pan=_calcPanier(v.deb,v.fin,v.dur); return '<tr><td style="font-weight:600">'+n+'</td><td>'+_esc(v.deb||'—')+'</td><td>'+_esc(v.fin||'—')+'</td><td>'+(v.dur||0)+' min</td><td>'+(pause!==null?pause+' min':'—')+'</td><td>'+(pan?'✓':'')+'</td></tr>'; }).join('')
      + '</table></div>'
    : '<div style="font-size:11px;color:var(--text3);margin:8px 0">Aucune vacation extraite (horaires non lisibles dans ce PDF)</div>';

  const debugHtml = (rawRows && rawRows.length)
    ? '<details style="margin-top:10px"><summary style="font-size:11px;color:var(--text3);cursor:pointer;user-select:none">▶ Texte extrait du PDF (' + rawRows.length + ' lignes)</summary>'
      + '<textarea readonly style="width:100%;height:180px;margin-top:6px;font-size:10px;font-family:monospace;background:var(--bg);border:0.5px solid var(--border);border-radius:var(--r);color:var(--text2);padding:8px">'
      + _esc(rawRows.slice(0, 80).join('\n')) + '</textarea></details>'
    : '';

  mc.innerHTML = '<h2>Import PDF — Aperçu</h2>'
    + status
    + '<div class="field"><label>Nom du cycle</label><input type="text" id="pdf-cyc-name" value="' + _esc(name || '') + '" placeholder="Nom du cycle"></div>'
    + '<div class="row"><div class="flex1 field"><label>Date de début</label><input type="date" id="pdf-cyc-start" value="' + _esc(startDate || '') + '"></div>'
    + '<div class="flex1 field"><label>Date de fin (optionnel)</label><input type="date" id="pdf-cyc-end"></div></div>'
    + grid
    + vacHtml
    + debugHtml
    + '<div class="modal-btns">'
    + '<button class="btn btn-ghost" onclick="closeModal()">Annuler</button>'
    + '<button class="btn" onclick="_pdfOpenInEditor()">Ouvrir dans l\'éditeur</button>'
    + '<button class="btn btn-green" onclick="_pdfSaveDirect()">Créer le cycle</button>'
    + '</div>'
    + '<div class="err" id="pdf-err" style="margin-top:8px"></div>';
  window._pdfWeeks = weeks.length > 0 ? weeks : null;
}

// Step 1: compute rename map (no side effects)
async function _resolveVacRename(vacs) {
  if (!vacs || !Object.keys(vacs).length) return { rename: {}, existing: {} };
  const existing = ((await (await fetch(API+'/admin/vacations',{method:'POST',headers:adminHeaders(),body:'{}'})).json()).vacations)||{};
  const rename = {}, allNames = new Set(Object.keys(existing)), sfx = 'bcdefghijklmnopqrstuvwxyz'.split('');
  for (const [vname, v] of Object.entries(vacs)) {
    const ex = existing[vname];
    if (!ex) { rename[vname] = vname; allNames.add(vname); continue; }
    if (ex.deb === v.deb && ex.fin === v.fin) { rename[vname] = vname; continue; }
    const base = vname.replace(/[b-z]$/i, '');
    let found = null;
    for (const s of sfx) { if (!allNames.has(base+s)) { found = base+s; break; } }
    if (!found) found = vname + '_new';
    rename[vname] = found; allNames.add(found);
  }
  return { rename, existing };
}
function _toMin(t) {
  const m = /^(\d{1,2})h(\d{2})$/.exec((t || '').trim());
  return m ? +m[1] * 60 + +m[2] : null;
}
function _calcPauseMin(deb, fin, dur_min) {
  const d = _toMin(deb), f0 = _toMin(fin);
  if (d === null || f0 === null) return null;
  const f = f0 <= d ? f0 + 1440 : f0;
  return Math.max(0, (f - d) - (dur_min || 0));
}
// Returns true when the shift fully covers a meal window (11h30-14h30 or 18h30-21h30)
// AND no adequate 45-min break is accounted for within that window.
function _calcPanier(deb, fin, dur_min) {
  const d = _toMin(deb), f0 = _toMin(fin);
  if (d === null || f0 === null) return false;
  const f = f0 <= d ? f0 + 1440 : f0;
  const pause = Math.max(0, (f - d) - (dur_min || 0));
  return (d < 690 && f > 870 && pause < 45) ||   // covers 11h30–14h30
         (d < 1110 && f > 1290 && pause < 45);   // covers 18h30–21h30
}
// Step 2: save new vacations + link all to cycle
async function _saveVacationsAndLink(cycleId, vacs, rename, existing) {
  const renamed = [];
  for (const [vname, v] of Object.entries(vacs)) {
    const fn = rename[vname];
    if (!existing[fn]) {
      await fetch(API+'/admin/vacation/save', { method:'POST', headers:adminHeaders(),
        body: JSON.stringify({ vacation: { name:fn, ...(fn!==vname?{label:vname}:{}), deb:v.deb||'', fin:v.fin||'', dur:v.dur||0, panier:_calcPanier(v.deb,v.fin,v.dur), type:'week' } }) });
    }
    await fetch(API+'/admin/vacation/addcycle', { method:'POST', headers:adminHeaders(), body: JSON.stringify({ name:fn, cycleId }) });
    if (fn !== vname) renamed.push(vname + ' → ' + fn);
  }
  return renamed;
}

function _pdfOpenInEditor() {
  const name = document.getElementById('pdf-cyc-name').value.trim();
  const startDate = document.getElementById('pdf-cyc-start').value;
  const endDate = document.getElementById('pdf-cyc-end').value || null;
  closeModal();
  setTimeout(() => showCreateCycle({ name, startDate, endDate, weeks: window._pdfWeeks || [] }), 80);
}

async function _pdfSaveDirect() {
  const name = document.getElementById('pdf-cyc-name').value.trim();
  const startDate = document.getElementById('pdf-cyc-start').value;
  const endDate = document.getElementById('pdf-cyc-end').value || null;
  const err = document.getElementById('pdf-err');
  if (!name || !startDate) { err.textContent = 'Nom et date de début requis.'; return; }
  const btn = document.querySelector('#modal-content .btn-green');
  if (btn) { btn.disabled = true; btn.textContent = 'Enregistrement…'; }
  try {
    const vacs = window._pdfVacations || {};
    const { rename, existing } = await _resolveVacRename(vacs);
    const rawWeeks = window._pdfWeeks || [[null,null,null,null,null,null,'RH']];
    const weeks = rawWeeks.map(w => w.map(c => (!c || c === 'SV') ? null : rename[c] || c));
    const res = await fetch(API + '/admin/cycle/create', {
      method: 'POST', headers: adminHeaders(),
      body: JSON.stringify({ cycle: { name, startDate, endDate, anchor: startDate, weeks } })
    });
    const data = await res.json();
    if (!res.ok) { err.textContent = data.error || 'Erreur'; if (btn) { btn.disabled = false; btn.textContent = 'Créer le cycle'; } return; }
    const cycleId = data.cycle && data.cycle.id;
    const renamed = Object.keys(vacs).length ? await _saveVacationsAndLink(cycleId, vacs, rename, existing) : [];
    closeModal(); loadCycles();
    var msg = 'Cycle "' + name + '" créé' + (Object.keys(vacs).length ? ' avec ' + Object.keys(vacs).length + ' vacation(s).' : '.');
    if (renamed.length) msg += '\n\nVacations renommées :\n' + renamed.join('\n');
    if (Object.keys(vacs).length) msg += '\n\nPensez à vérifier le panier repas dans l\'onglet Vacations.';
    alert(msg);
  } catch(e) { err.textContent = 'Erreur : ' + e.message; if (btn) { btn.disabled = false; btn.textContent = 'Créer le cycle'; } }
}

function _esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── END PDF IMPORT ────────────────────────────────────────────────────────────

function closeModal() { document.getElementById('modal-bg').style.display = 'none'; document.getElementById('modal-content').className = 'modal'; }
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });
</script>

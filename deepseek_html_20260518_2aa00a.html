<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Planning</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Planning">
<meta name="theme-color" id="theme-color-meta" content="#18181b">
<link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='22' fill='%230C447C'/%3E%3Ctext y='.9em' font-size='70' x='10' fill='white'%3E%F0%9F%93%85%3C/text%3E%3C/svg%3E">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.47.0/tabler-icons.min.css">
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');
/* Thème sombre par défaut — fond immédiat, pas de transparent */
:root{
  --bg:#18181b;
  --bg2:#26262a;
  --bg3:#323237;
  --text:#f0f0f1;
  --text2:#c8c8cc;
  --text3:#8a8a96;
  --border:rgba(255,255,255,.12);
  --border2:rgba(255,255,255,.06);
  --r:10px;
  --rl:14px;
  --blue:#4ea0f7;
  --blue-l:#1a2d45;
  --blue-m:#2a4a6e;
  --green:#5a9e3f;
  --green-l:#1a2e10;
  --green-m:#2a4a1a;
  --amber:#e09830;
  --red:#c0392b;
  --gold:#b8941e;
  --gold-dark:#9a7a18;
  --gold-l:rgba(184,148,30,.15);
  --gold-b:rgba(184,148,30,.35);
  --rendu-red:#b0443a;
  --rendu-red-l:rgba(176,68,58,.18);
  --rendu-red-text:#d4776f;
  --fer-bg:#7a5c14;
  --fer-bg-light:#8f6e1a;
  --fer-text:#e8d5a3;
  --font:'Inter',-apple-system,sans-serif;
}

[data-theme=light]{
  background:#e8e8e4;
  --bg:#e8e8e4;
  --bg2:#deded9;
  --bg3:#d0cfc9;
  --text:#1a1a18;
  --text2:#4a4a46;
  --text3:#8a8880;
  --border:rgba(0,0,0,.18);
  --border2:rgba(0,0,0,.10);
  --blue:#0C447C;
  --blue-l:#d0e4f5;
  --blue-m:#a0c4e8;
  --green:#3d6b18;
  --green-l:#ddeece;
  --green-m:#b8d898;
  --gold-l:rgba(184,148,30,.15);
  --gold-b:rgba(184,148,30,.30);
  --rendu-red:#b0443a;
  --rendu-red-l:rgba(176,68,58,.10);
  --rendu-red-text:#b0443a;
  --fer-bg:#dbc98a;
  --fer-bg-light:#e5d5a0;
  --fer-text:#7a5c14;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;font-family:var(--font);}
/* Fond immédiat — pas de flash */
body{background:var(--bg);color:var(--text);padding-top:60px;}
input,select,button,textarea{font-family:var(--font);}
input[type=number]::-webkit-inner-spin-button,input[type=number]::-webkit-outer-spin-button{-webkit-appearance:none;margin:0;}
input[type=number]{-moz-appearance:textfield;appearance:textfield;}
#app{display:block;}
.app-outer{max-width:1080px;margin:0 auto;padding:10px 12px 60px;}
@media (orientation:portrait){body{padding-top:68px;}.app-outer{padding-top:0;}}
.layout{display:flex;gap:14px;align-items:flex-start;}
.cal-col{flex:1;min-width:0;position:relative;}
.side-col{width:260px;flex-shrink:0;display:flex;flex-direction:column;gap:8px;padding-top:38px;}
@media(max-width:720px){.layout{flex-direction:column;}.side-col{width:100%;padding-top:0;}}

/* HEADER */
.hdr{display:flex;align-items:center;justify-content:flex-end;padding:14px 20px;left:0;right:0;background:var(--bg2);border-bottom:0.5px solid var(--border);position:fixed;top:0;z-index:200;}

.hdr-btns{display:flex;gap:5px;align-items:center;}
.ibtn{background:transparent;border:0.5px solid var(--border);border-radius:var(--r);padding:6px 9px;font-size:12px;cursor:pointer;color:var(--text2);display:flex;align-items:center;gap:4px;transition:background .1s;}
.ibtn:active{opacity:.7;}
.ibtn:disabled{opacity:.3;pointer-events:none;}

/* NAV */
.mbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;gap:4px;position:relative;}
.mnav{background:transparent;border:0.5px solid var(--border);border-radius:var(--r);padding:6px 12px;font-size:14px;cursor:pointer;color:var(--text);transition:background .1s;}
.mnav.today{font-size:12px;padding:6px 12px;font-weight:500;background:transparent;color:var(--text);border-color:var(--border);}
.mtit{font-size:15px;font-weight:500;cursor:pointer;padding:4px 8px;border-radius:var(--r);transition:background .1s;position:absolute;left:50%;transform:translateX(-50%);white-space:nowrap;}
#month-view{transition:opacity .18s ease,transform .18s ease;}
.slide-left{animation:slideLeft .2s ease forwards;}
.slide-right{animation:slideRight .2s ease forwards;}
@keyframes slideLeft{from{opacity:1;transform:translateX(0)}to{opacity:0;transform:translateX(-28px)}}
@keyframes slideRight{from{opacity:1;transform:translateX(0)}to{opacity:0;transform:translateX(28px)}}
.slide-in-left{animation:slideInLeft .2s ease forwards;}
.slide-in-right{animation:slideInRight .2s ease forwards;}
@keyframes slideInLeft{from{opacity:0;transform:translateX(28px)}to{opacity:1;transform:translateX(0)}}
@keyframes slideInRight{from{opacity:0;transform:translateX(-28px)}to{opacity:1;transform:translateX(0)}}

/* Month view */
#month-view{transition:opacity .2s ease,transform .2s ease;}

/* Annual view */
.ann-wrap{overflow:hidden;pointer-events:none;opacity:0;visibility:hidden;position:absolute;top:0;left:0;right:0;transition:opacity .2s ease;}
.ann-wrap.open{pointer-events:all;opacity:1;display:block;visibility:visible;overflow:visible;position:relative;}
.annual-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:10px;width:100%;box-sizing:border-box;}
@media(max-width:600px){.annual-grid{grid-template-columns:repeat(3,1fr);}}
.ann-month{background:var(--bg2);border:2px solid transparent;border-radius:var(--r);padding:8px;cursor:pointer;transition:background .1s;}
.ann-month.sel{border-color:var(--border);background:var(--bg2);}
[data-theme=light] .ann-month.sel{border-color:var(--border);background:var(--bg2);}
.ann-month.cur-month{background:var(--blue-l);border-color:var(--blue-m);}
[data-theme=light] .ann-month.cur-month{background:var(--blue-l);border-color:var(--blue-m);}
.ann-mname{font-size:12px;font-weight:500;color:var(--text);margin-bottom:5px;}
.ann-mini{display:grid;grid-template-columns:repeat(7,1fr);gap:1px;}
.ann-day{width:100%;aspect-ratio:1;border-radius:2px;outline:0.5px solid rgba(255,255,255,.07);}
[data-theme=light] .ann-day{outline:0.5px solid rgba(0,0,0,.07);}
.ann-day.tv{background:var(--blue-l);}
.ann-day.cg{background:var(--green-l);}
.ann-day.rend{background:var(--rendu-red-l);}
.ann-day.fer{background:var(--gold-l);}
.ann-day.tv-fer{background:var(--blue-l);outline:1.5px solid var(--gold);}
.ann-day.ec,.ann-day.ec-fer{background:rgba(124,92,191,.18);}
.ann-day.ec2,.ann-day.ec2-fer{background:var(--bg3);}
.ann-day.cg-fer{background:var(--green-l);outline:1.5px solid var(--gold);}
.ann-day.rend-fer{background:var(--rendu-red-l);outline:1.5px solid var(--gold);}
.ann-day.absent-fer{background:var(--bg3);outline:1.5px solid var(--gold);}
.ann-day.absent{background:var(--bg3);}
.ann-day.sv,.ann-day.rh{background:rgba(255,255,255,.03);}
[data-theme=light] .ann-day.sv,[data-theme=light] .ann-day.rh{background:rgba(0,0,0,.03);}
.ann-day.ram{background:var(--gold-l);}

/* Calendar */
.cal-wrap{background:var(--bg2);border:0.5px solid var(--border);box-shadow:0 2px 12px rgba(0,0,0,.25);border-radius:var(--rl);overflow:hidden;margin-bottom:8px;width:100%;box-sizing:border-box;}
.cal{width:100%;border-collapse:collapse;table-layout:fixed;}
.cal th{font-size:10px;color:var(--text3);text-align:center;padding:4px 2px 3px;font-weight:400;}
.cal th.wkh{width:20px;padding:0;}
.cal td{text-align:center;padding:4px;}
.cal tr.curweek td{background:rgba(78,160,247,.06);}
[data-theme=light] .cal tr.curweek td{background:rgba(12,68,124,.05);}
.cal tr.cgweek td{background:rgba(90,158,63,.07);}
[data-theme=light] .cal tr.cgweek td{background:rgba(61,107,24,.06);}
.wkn{font-size:9px;color:var(--text3);text-align:center;vertical-align:middle;width:20px;padding:1px 2px;border-radius:4px;}
.wkn.wcur{background:var(--blue-l);color:var(--blue);font-weight:600;}

.dc{width:100%;padding-top:80%;position:relative;border-radius:var(--r);display:block;}
.dci{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1px;border-radius:var(--r);transition:background .1s;cursor:pointer;}
.dn{font-size:13px;font-weight:500;line-height:1;}
.dv{font-size:10px;line-height:1;opacity:.85;}

/* Day states */
.s-tv .dci{background:var(--blue-l);color:var(--blue);cursor:pointer;}
.s-rh .dci{color:#b080c0;cursor:pointer;}
.s-sv-ov .dci{background:rgba(128,128,128,.18);color:var(--text3);cursor:pointer;}
.s-sv .dci{color:var(--text3);cursor:pointer;}
.s-fer .dci{background:transparent;color:var(--gold);box-shadow:inset 0 0 0 1.5px var(--gold);cursor:pointer;}
[data-theme=light] .s-fer .dci{color:var(--gold-dark);box-shadow:inset 0 0 0 1.5px var(--gold);}
.s-cg .dci{background:var(--green-l);color:var(--green);cursor:pointer;}
.s-rend .dci{background:var(--rendu-red-l);color:var(--rendu-red-text);cursor:pointer;}
.s-sv-vac .dci{background:rgba(7,224,210,.18);color:#07E0D2;cursor:pointer;}
.s-sv-vac-fer .dci{background:rgba(7,224,210,.18);color:#07E0D2;cursor:pointer;box-shadow:inset 0 0 0 1.5px var(--gold);}
[data-theme=light] .s-sv-vac .dci{background:rgba(7,224,210,.15);color:#059688;}
.s-absent .dci{background:rgba(128,128,128,.18);color:var(--text3);cursor:pointer;}
.s-tv-fer .dci,.s-cg-fer .dci,.s-rend-fer .dci,.s-absent-fer .dci,.s-ec2-fer .dci{box-shadow:inset 0 0 0 1.5px var(--gold);}
.s-tv-fer .dci{background:var(--blue-l);color:var(--blue);cursor:pointer;}
.s-cg-fer .dci{background:var(--green-l);color:var(--green);cursor:pointer;}
.s-rend-fer .dci{background:var(--rendu-red-l);color:var(--rendu-red-text);cursor:pointer;}
.s-absent-fer .dci{background:var(--bg3);color:var(--text3);cursor:pointer;}
.s-ec2-fer .dci{background:var(--bg3);color:var(--text3);cursor:pointer;}
.s-ec .dci{background:rgba(124,92,191,.20);color:#9b7fe0;cursor:pointer;}
.s-ec-fer .dci{background:rgba(124,92,191,.20);color:#9b7fe0;box-shadow:inset 0 0 0 1.5px var(--gold);cursor:pointer;}
.s-ec2 .dci{background:var(--bg3);color:var(--text3);cursor:pointer;}
.wdot{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:18px;filter:grayscale(1);pointer-events:none;z-index:2;border-radius:var(--r);}
.pdot{position:absolute;top:3px;right:3px;width:5px;height:5px;border-radius:50%;background:#FFB300;}

/* Legend */
.leg{display:flex;flex-wrap:nowrap;gap:0;margin-bottom:8px;align-items:center;justify-content:space-between;width:100%;}
.li{display:flex;align-items:center;gap:3px;color:var(--text2);font-size:clamp(8px,2vw,10px);white-space:nowrap;flex:1;justify-content:center;min-width:0;}
.ld{width:clamp(7px,1.8vw,9px);height:clamp(7px,1.8vw,9px);border-radius:2px;flex-shrink:0;}
.li{display:flex;align-items:center;gap:3px;color:var(--text2);}

/* Side counters */
.ctr-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;}
.ctr{background:var(--bg2);border-radius:var(--r);padding:9px 10px;border:0.5px solid var(--border);}
.ctr.clk{cursor:pointer;transition:background .1s;}
.ctr.wide{grid-column:1/-1;}
.ctr-wide-inner{display:flex;align-items:flex-start;justify-content:space-between;gap:6px;}
.ctr-detail{display:flex;flex-direction:column;gap:2px;padding-top:1px;min-height:56px;justify-content:flex-start;}
.ctr-dot-row{display:flex;align-items:center;gap:4px;font-size:9px;color:var(--text2);}
.rdot{width:6px;height:6px;border-radius:50%;flex-shrink:0;}
.clbl{font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:.05em;margin-bottom:2px;}
.cval{font-size:17px;font-weight:600;line-height:1;}
.csub{font-size:9px;color:var(--text3);margin-top:1px;}

.bloc{background:var(--bg2);border:0.5px solid var(--border);border-radius:var(--rl);padding:10px 12px;}
.bloc.clk{cursor:pointer;transition:background .1s;}
.bloc.clk.active,.ctr.clk.active{background:var(--bg3);}
.btit{font-size:10px;font-weight:500;color:var(--text3);text-transform:uppercase;letter-spacing:.07em;margin-bottom:7px;}

/* Eph table */
.eph-row{display:flex;align-items:center;font-size:11px;gap:4px;padding:2px 0;}
.eph-mc{width:54px;flex-shrink:0;color:var(--text2);white-space:nowrap;}
.eph-bc{flex:1;min-width:0;}
.eph-bw{width:100%;height:4px;background:var(--bg3);border-radius:3px;overflow:hidden;}
.eph-b{height:4px;border-radius:3px;transition:width .3s;}
.eph-vc{width:48px;text-align:right;flex-shrink:0;font-weight:500;white-space:nowrap;}
.eph-ec{width:46px;text-align:right;flex-shrink:0;font-size:10px;color:var(--text3);white-space:nowrap;}
.eph-rbtn{font-size:8px;padding:1px 4px;border:0.5px solid var(--border);border-radius:4px;background:transparent;color:var(--text3);cursor:pointer;flex-shrink:0;width:26px;text-align:center;}
.eph-row.exp .eph-vc{color:var(--text3);text-decoration:line-through;}
.eph-row.fut .eph-mc,.eph-row.fut .eph-vc{color:var(--text3);}

/* History */
.hrow{display:flex;align-items:flex-start;gap:6px;padding:5px 0;border-bottom:0.5px solid var(--border2);font-size:11px;}
.hrow:last-child{border-bottom:none;}
.hdot{width:6px;height:6px;border-radius:50%;flex-shrink:0;margin-top:3px;}
.htime{color:var(--text3);font-size:10px;min-width:32px;}
.hdesc{color:var(--text);flex:1;}

/* Modal */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:200;display:flex;align-items:flex-end;justify-content:center;}
.overlay.behind{z-index:100;}
.sheet{background:var(--bg2);border-radius:20px 20px 0 0;padding:16px 16px 44px;width:100%;max-width:520px;max-height:90vh;overflow-y:auto;touch-action:pan-x;user-select:none;transition:transform .2s ease;}
.sh{width:36px;height:4px;background:var(--border);border-radius:2px;margin:0 auto 14px;}
.st{font-size:15px;font-weight:600;margin-bottom:3px;}
.ss{font-size:12px;color:var(--text2);margin-bottom:12px;}
.mrow{display:flex;flex-direction:column;gap:3px;margin-bottom:8px;}
.mrow label{font-size:11px;color:var(--text2);}
.mrow select,.mrow input{padding:10px 12px;border:0.5px solid var(--border);border-radius:var(--r);font-size:14px;background:var(--bg2);color:var(--text);width:100%;-webkit-appearance:none;}
.mr2{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px;align-items:end;}
.mr2>div{display:flex;flex-direction:column;gap:3px;}
.mr2>div label{font-size:11px;color:var(--text2);}
.mr2>div select,.mr2>div input{padding:10px 12px;border:0.5px solid var(--border);border-radius:var(--r);font-size:14px;background:var(--bg2);color:var(--text);width:100%;-webkit-appearance:none;}
.mcb{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--text2);margin-bottom:6px;cursor:pointer;padding:4px 0;}
.mcb input[type=checkbox]{width:18px;height:18px;accent-color:var(--blue);cursor:pointer;}
.mbtns{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px;}
.mb{padding:6px 6px;border:0.5px solid var(--border);border-radius:var(--r);font-size:13px;cursor:pointer;background:var(--bg2);color:var(--text);text-align:center;line-height:1.4;transition:opacity .1s;min-height:42px;display:flex;align-items:center;justify-content:center;flex-direction:column;}
.mb:active{opacity:.7;}
.mb.pri{background:var(--blue);color:#fff;border-color:transparent;}
.mb.del{border-color:#d09595;color:var(--red);background:rgba(192,57,43,.1);}
.mb.amb{border-color:#c09030;color:#d4a030;background:rgba(200,160,48,.1);}
.mb.grn{background:var(--green-l);color:var(--green);border-color:var(--green-m);}
.mb.wide{grid-column:1/-1;}
.mb.ghost{background:transparent;}
.mcancel{width:100%;padding:11px;border:none;background:transparent;font-size:14px;color:var(--text3);cursor:pointer;margin-top:4px;}
.sep{height:0.5px;background:var(--border2);margin:10px 0;}
.minfo{font-size:12px;color:var(--blue);background:var(--blue-l);border-radius:var(--r);padding:8px 12px;margin-bottom:8px;}
.chip-info{font-size:10px;padding:2px 6px;border-radius:10px;background:var(--gold-l);color:var(--gold-dark);}

/* Exchange */
.exchange-days{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:8px;}
.exchange-day{flex:0 0 auto;padding:6px 10px;border-radius:var(--r);border:0.5px solid var(--border);background:var(--bg2);cursor:pointer;font-size:11px;text-align:center;transition:all .1s;min-width:38px;}
.exchange-day.sel{background:var(--blue-l);border-color:var(--blue-m);color:var(--blue);font-weight:600;}
.exchange-day.current{background:var(--blue);color:#fff;border-color:var(--blue);}

/* Settings / profile */
.srow{display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:0.5px solid var(--border2);}
.srow:last-child{border-bottom:none;}
.slbl{font-size:13px;color:var(--text);}
.tgl{position:relative;width:44px;height:26px;flex-shrink:0;}
.tgl input{opacity:0;width:0;height:0;}
.tgl-s{position:absolute;inset:0;background:var(--bg3);border-radius:13px;cursor:pointer;transition:.2s;}
.tgl input:checked+.tgl-s{background:var(--blue);}
.tgl-s:before{content:'';position:absolute;width:20px;height:20px;left:3px;top:3px;background:#fff;border-radius:50%;transition:.2s;}
.tgl input:checked+.tgl-s:before{transform:translateX(18px);}
.pit{display:flex;align-items:center;justify-content:space-between;padding:8px 10px;border-radius:var(--r);cursor:pointer;border:0.5px solid transparent;margin-bottom:0;transition:background .1s;min-height:40px;}
.pit.act{background:var(--bg3);border-color:var(--border);cursor:default;}
.pit:not(.act){background:var(--bg2);opacity:.8;}
.pname{font-size:13px;font-weight:500;}
.pdel,.pgear{background:transparent;border:none;color:var(--text3);cursor:pointer;font-size:13px;padding:2px 5px;}
.pit-wrap{margin-bottom:4px;}
.ps-panel{display:block;padding:8px 10px 10px;border-radius:0 0 var(--r) var(--r);background:var(--bg3);border:none;border-top:none;margin-top:-2px;}
.svi{display:flex;align-items:center;justify-content:space-between;padding:7px 10px;background:var(--bg2);border-radius:var(--r);margin-bottom:5px;font-size:12px;}
.svn{font-weight:500;}.svd{color:var(--text3);font-size:11px;}
.svdel{background:transparent;border:none;color:var(--text3);cursor:pointer;font-size:13px;}
.np-toggle{width:100%;padding:11px;border:0.5px solid var(--border);border-radius:var(--r);font-size:13px;cursor:pointer;background:var(--bg2);color:var(--text);text-align:left;display:flex;align-items:center;gap:8px;margin-top:8px;}
.np-body{display:none;overflow:hidden;max-height:800px;opacity:1;transition:max-height .3s ease,opacity .25s;}
.np-body.open{display:block;}

/* Dropdown */
.dropdown{position:absolute;right:0;top:calc(100% + 4px);background:var(--bg3);border:none;border-radius:var(--rl);box-shadow:0 8px 32px rgba(0,0,0,.25);width:300px;overflow:visible;padding:12px 14px 16px;z-index:300;}
.dd-title{font-size:13px;font-weight:600;margin-bottom:10px;color:var(--text);}

/* PWA */
.pwa{background:var(--blue-l);border:0.5px solid var(--blue-m);border-radius:var(--r);padding:9px 12px;margin-bottom:8px;font-size:12px;color:var(--blue);display:flex;align-items:center;gap:8px;}
.pwa button{background:transparent;border:none;color:var(--text3);font-size:16px;cursor:pointer;margin-left:auto;}

/* Recap */
.recap-row{display:flex;justify-content:space-between;font-size:11px;padding:2px 0;color:var(--text2);}

function getMonday(d){const x=new Date(d);x.setHours(12,0,0,0);const dw=x.getDay();x.setDate(x.getDate()-(dw===0?6:dw-1));return x;}
function weeksDiff(date){return Math.round((getMonday(date)-ANCHOR)/(7*864e5));}
function capitalize(s){if(!s)return s;return s.charAt(0).toUpperCase()+s.slice(1);}
function dk(d){return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}
function fmtH(min){if(min===0)return'0h00';const h=min/60;if(Number.isInteger(h))return h+'h00';return Math.floor(h)+'h'+String(min%60).padStart(2,'0');}
function fmtMin(min){if(isNaN(min)||min===undefined||min===null)return'0h00';return fmtH(Math.round(min));}
function fmtDate(d){return JN[d.getDay()]+' '+d.getDate()+' '+MC[d.getMonth()]+' '+d.getFullYear();}
function parseHM(s){if(!s)return 0;const str=(s+'').trim().replace(',','.');var m;if((m=str.match(/^(\d+)h(\d{0,2})$/i)))return parseInt(m[1])*60+(parseInt(m[2]||'0')||0);if((m=str.match(/^(\d+(?:\.\d+)?)h?$/i))){const h=parseFloat(m[1]);return Math.round(h*60);}return 0;}
function isoWeek(date){const d=new Date(Date.UTC(date.getFullYear(),date.getMonth(),date.getDate()));const day=d.getUTCDay()||7;d.setUTCDate(d.getUTCDate()+4-day);const ys=new Date(Date.UTC(d.getUTCFullYear(),0,1));return Math.ceil(((d-ys)/864e5+1)/7);}

function getAnchorLineAtDate(date){
  if(!S.profile.lineHistory||S.profile.lineHistory.length===0){
    return S.profile.anchorLine;
  }
  const dateStr=dk(date);
  const sorted=[...S.profile.lineHistory].sort((a,b)=>b.fromDate.localeCompare(a.fromDate));
  for(const entry of sorted){
    if(entry.fromDate<=dateStr){
      return entry.anchorLine;
    }
  }
  return S.profile.anchorLine;
}

function getLineIdxAtDate(date){
  const anchor=getAnchorLineAtDate(date);
  const diff=weeksDiff(date);
  return ((anchor+diff)%14+14)%14;
}

function getCycleVac(date){
  const dw=date.getDay(),idx=dw===0?6:dw-1;
  const li=getLineIdxAtDate(date);
  return{cycleVac:CYCLE[li][idx],li};
}

    const fromMondayStr=dk(fromMonday);
    const existingHistory=S.profile.lineHistory||[];
    const newHistory=existingHistory.filter(h=>h.fromDate<fromMondayStr);
    newHistory.push({anchorLine:newAnchorLine,fromDate:fromMondayStr});
    newHistory.sort((a,b)=>a.fromDate.localeCompare(b.fromDate));
    S.profile.lineHistory=newHistory;
    for(const key in S.overrides){
      const d=new Date(key+'T12:00:00');
      if(d>=fromMonday)delete S.overrides[key];
    }
    for(const key in S.conges){

      if(d>=fromMonday)delete S.conges[key];
    }
    S.history=[];
    const pid2=_aid||'default';

    for(const key in storedIds){

      if(d>=fromMonday)delete storedIds[key];
    }
    localStorage.setItem('gcal_event_ids_'+pid2,JSON.stringify(storedIds));

function getVac(date){

function getDur(date){const{vac}=getVac(date);const VAC=getVAC();return(vac&&vac!=='RH'&&VAC[vac])?VAC[vac].dur:0;}
function isPanier(date){const{vac}=getVac(date);const VAC=getVAC();return!!(vac&&vac!=='RH'&&VAC[vac]&&VAC[vac].panier);}

function renduFactor(date){
  const key=dk(date),isFer=FERIES.has(key),isDim=date.getDay()===0,isRH=isRHDay(date);
  const sett=settingsForYM(date.getFullYear()*12+date.getMonth());
  let f=0;

  if(isDim&&sett.dimRendu)f+=0.5;

function hsRenduFromSurplus(surplus){const hs1=Math.min(surplus,8*60),hs2=Math.max(0,surplus-8*60);return hs1*1.25+hs2*1.5;}
function calcHSWeek(monday){
  const li=getLineIdxAtDate(monday),weekBase=WEEK_DUR[li],VAC=getVAC();let weekWorked=0;
  for(let i=0;i<7;i++){const d=new Date(monday);d.setDate(monday.getDate()+i);const key=dk(d);const{vac,absent,echange,ecSelf,cycleVac}=getVac(d);if(absent)continue;const _cg=(S.conges||{})[key];if(_cg&&_cg!=='rend'&&_cg!=='cg')continue;
    if(echange){
      if(ecSelf&&vac&&vac!=='RH')weekWorked+=VAC[vac]?VAC[vac].dur:0;
      else if(cycleVac&&cycleVac!=='RH')weekWorked+=VAC[cycleVac]?VAC[cycleVac].dur:0;
    }else{
      if(!vac||vac==='RH')continue;
      weekWorked+=VAC[vac]?VAC[vac].dur:0;
    }
  }
  const isRam=isSemaineRamenée(monday);
  if(isRam){
    const ramMin=7*60;
    const normalSurplus=Math.max(0,weekWorked-weekBase);
    const surplusTotal=ramMin+normalSurplus;
    const rendusTotal=hsRenduFromSurplus(surplusTotal);
    const rendusPure=hsRenduFromSurplus(normalSurplus);
    const rendusRam=rendusTotal-rendusPure;
    return{surplus:surplusTotal,weekBase,weekWorked:weekBase+surplusTotal,rendusMin:rendusTotal,rendusMinHS:rendusPure,rendusMinRam:rendusRam,isRam};
  }
  const surplusTotal=Math.max(0,weekWorked-weekBase);
  const rendusTotal=hsRenduFromSurplus(surplusTotal);
  return{surplus:surplusTotal,weekBase,weekWorked,rendusMin:rendusTotal,rendusMinHS:rendusTotal,rendusMinRam:0,isRam:false};
}
function isSemaineRamenée(monday){

  for(let i=0;i<6;i++){const d=new Date(monday);d.setDate(monday.getDate()+i);const key=dk(d),{vac,absent,echange,ecSelf}=getVac(d);if(FERIES.has(key))hasFérié=true;if(absent)hasAbsent=true;const isGivenAway=echange&&!ecSelf;if(vac&&vac!=='RH'&&!absent&&!isGivenAway){hasWork=true;if((S.conges||{})[key]!=='cg')allCG=false;}}

}

  for(let i=0;i<7;i++){const d=new Date(monday);d.setDate(monday.getDate()+i);const key=dk(d),{vac,absent}=getVac(d);if(vac&&vac!=='RH'&&!absent&&!FERIES.has(key)&&(S.conges||{})[key]!=='cg')return false;}

function settingsForYM(ym){

function buildGen(){

  const createdYM=(S.profile&&S.profile.ephSoldeCreatedYM!==undefined)?S.profile.ephSoldeCreatedYM:START;
  const solde=(S.profile&&S.profile.ephSolde)||0;
  if(solde>0)add(createdYM>0?createdYM-1:createdYM,'solde',solde*60);
  for(let y=2025;y<=2030;y++)for(let m=0;m<12;m++){
    const ym=y*12+m;if(ym<createdYM||ym>TODAY_YM&&ym>maxYMDisplay)continue;
    const last=new Date(y,m+1,0).getDate();
    for(let d=1;d<=last;d++){const date=new Date(y,m,d),key=dk(date);const v2e=getVac(date);const{vac,absent,echange,ecSelf}=v2e;if(!vac||vac==='RH'||absent)continue;if(echange&&!ecSelf)continue;
const cKey=(S.conges||{})[key];if(cKey==='rend')continue;
const dur=VAC[vac]?VAC[vac].dur:0;
      const isFer2=FERIES.has(key),isDim2=date.getDay()===0,isRH2=isRHDay(date);
      const sett2b=settingsForYM(ym);
      const ferF=isFer2&&sett2b.ferRendu?2.0:0;

      const rhF=(!echange&&!isDim2&&isRH2&&sett2b.rhRendu)?0.5:0;
      const totF=ferF+dimF+rhF;
      if(totF===0)continue;
      if(ferF>0)add(ym,'fer',Math.round(dur*ferF/60*100)/100*60);
      if(dimF>0)add(ym,'dim',Math.round(dur*dimF/60*100)/100*60);
      if(rhF>0)add(ym,'rh',Math.round(dur*rhF/60*100)/100*60);}
  }
  const seenHS=new Set();
  for(let y=2025;y<=2030;y++)for(let m=0;m<12;m++){
    const ym=y*12+m;if(ym<createdYM||ym>TODAY_YM&&ym>maxYM)continue;
    const last=new Date(y,m+1,0).getDate();
    for(let d=1;d<=last;d++){const date=new Date(y,m,d),mon=getMonday(date),mk2=dk(mon);if(seenHS.has(mk2))continue;seenHS.add(mk2);const mym=mon.getFullYear()*12+mon.getMonth();
      let ferYm=mym;
      for(let fi=0;fi<7;fi++){const fd2=new Date(mon);fd2.setDate(mon.getDate()+fi);if(FERIES.has(dk(fd2))){ferYm=fd2.getFullYear()*12+fd2.getMonth();break;}}
      const weekInScope=mym>=createdYM&&(mym<=TODAY_YM||mym<=maxYM);
      const ferInScope=ferYm>=createdYM&&(ferYm<=TODAY_YM||ferYm<=maxYM);

}

function calcSoldes(){
  const gen=buildGen(),createdYM=(S.profile&&S.profile.ephSoldeCreatedYM!==undefined)?S.profile.ephSoldeCreatedYM:2026*12;
  const realEph={},prevEph={};
  for(let ym=createdYM;ym<=TODAY_YM;ym++)realEph[ym]=0;
  Object.keys(gen).forEach(ymStr=>{const ym=Number(ymStr),total=Object.values(gen[ym]).reduce((s,v)=>s+v,0),expYm=getExpYm(ym);if(ym>TODAY_YM){prevEph[ym]=total;return;}realEph[ym]=expYm<=TODAY_YM?0:total;});
  const _rendKeys=Object.keys(S.conges||{}).filter(k=>S.conges[k]==='rend').sort();
  const _sim={};
  Object.keys(realEph).forEach(function(ym){_sim[ym]=realEph[ym];});
  Object.keys(prevEph).forEach(function(ym){_sim[ym]=(_sim[ym]||0)+prevEph[ym];});
  _rendKeys.forEach(function(k){
    const _d=new Date(k+'T12:00:00'),_poseYm=_d.getFullYear()*12+_d.getMonth(),_dur=getDur(_d);
    let _left=_dur;
    const _yms=Object.keys(_sim).map(Number).sort();
    for(const _ym of _yms){
      if(_sim[_ym]<=0||getExpYm(_ym)<=_poseYm)continue;
      const _take=Math.min(_sim[_ym],_left);_sim[_ym]-=_take;_left-=_take;
      if(_left<=0)break;
    }
  });
  Object.keys(realEph).forEach(function(ym){realEph[ym]=Math.max(0,_sim[ym]||0);});
  Object.keys(prevEph).forEach(function(ym){prevEph[ym]=Math.max(0,_sim[ym]||0);});
  const realAvail={};Object.keys(realEph).map(Number).sort().forEach(ym=>realAvail[ym]=realEph[ym]);

  return{gen,realEph,realAvail,prevEph,matelas,totalReal:Object.values(realAvail).reduce((s,v)=>s+v,0),totalPrev:Object.keys(prevEph).map(Number).filter(ym=>ym<=CUR_YEAR*12+11).reduce((s,ym)=>s+(prevEph[ym]||0),0)};
}

function calcCongesUsed(){
  const cgKeys=Object.keys(S.conges||{}).filter(k=>S.conges[k]==='cg').sort();
  if(!cgKeys.length)return 0;
  const cgSet=new Set(cgKeys);
  function isFullWeekCP(monday){
    const monKey=dk(monday);
    if(!cgSet.has(monKey))return false;
    for(var i=0;i<7;i++){
      const d=new Date(monday);d.setDate(monday.getDate()+i);
      const k=dk(d);
      const v2=getVac(d);
      const isWorked=v2.vac&&v2.vac!=='RH'&&!v2.absent;
      if(isWorked&&!cgSet.has(k))return false;
    }
    return true;
  }
  const fullWeeks=new Set();
  const seenMon=new Set();
  let total=0;
  cgKeys.forEach(function(k){
    const d=new Date(k+'T12:00:00');
    const mon=getMonday(d);
    const mk=dk(mon);
    if(seenMon.has(mk))return;
    seenMon.add(mk);
    if(isFullWeekCP(mon)){
      fullWeeks.add(mk);
      total+=5;
    }
  });
  const partialKeys=cgKeys.filter(function(k){
    const d=new Date(k+'T12:00:00');
    return!fullWeeks.has(dk(getMonday(d)));
  });
  if(!partialKeys.length)return total;
  function findReprise(fromDate){
    const sd=new Date(fromDate);sd.setDate(sd.getDate()+1);
    while(sd<=new Date('2031-01-01')){
      const v2=getVac(sd);
      if(v2.vac&&v2.vac!=='RH'&&!v2.absent)return new Date(sd);
      sd.setDate(sd.getDate()+1);
    }
    return null;
  }
  const groups={};
  partialKeys.forEach(function(k){
    const d=new Date(k+'T12:00:00');
    const r=findReprise(d);
    const rk=r?dk(r):'none';
    if(!groups[rk])groups[rk]={reprise:r,dates:[]};
    groups[rk].dates.push(d);
  });
  Object.values(groups).forEach(function(g){
    const nb=g.dates.length;
    if(!g.reprise){total+=nb;return;}
    const lastCp=new Date(Math.max.apply(null,g.dates));
    const ecart=Math.round((g.reprise-lastCp)/(864e5))-1;
    total+=nb+Math.max(0,ecart-2);
  });
  return total;
}

function getState(date){
  const key=dk(date),v2=getVac(date),{vac,fromSV,absent,echange,ecSelf}=v2;
  if(absent)return'absent';
  const c=(S.conges||{})[key];
  if(echange){
    if(!ecSelf)return FERIES.has(key)?'ec2-fer':'ec2';
    if(FERIES.has(key))return'ec-fer';
    return'ec';
  }
  if(FERIES.has(key)){
    if(c==='cg')return'cg-fer';
    if(c==='rend')return'rend-fer';
    if(absent)return'absent-fer';
    if(!ecSelf&&echange)return'ec2-fer';
    if(vac&&vac!=='RH')return fromSV?'sv-vac-fer':'tv-fer';
    return'fer';
  }
  if(!vac){
    const _ovr=(S.overrides||{})[key];
    return(_ovr&&_ovr.fromSV&&!_ovr.echange)?'sv-ov':'sv';
  }

function buildRameeSet(y,m){

function exSelectVac(vn){

  const targetKey=window._exTarget;
  if(!myKey||!targetKey)return;
  const date=new Date(myKey+'T12:00:00');
  const targetDate=new Date(targetKey+'T12:00:00');
  const myCycle=getCycleVac(date).cycleVac;
  const theirCycle=getCycleVac(targetDate).cycleVac;
  const myOrigVac=getVac(date);
  const myOrigVacName=myOrigVac.vac||myCycle;
  if(!S.overrides)S.overrides={};
  S.overrides[myKey]={vac:myOrigVacName,fromSV:false,echange:true,ecSelf:false};
  S.overrides[targetKey]={vac:vn,fromSV:!theirCycle||theirCycle==='RH',echange:true,ecSelf:true};

function cancelExchange(key){
  if(!S.overrides)return;
  const ov1=S.overrides[key];
  if(!ov1||!ov1.echange)return;
  delete S.overrides[key];
  const date=new Date(key+'T12:00:00'),mon=getMonday(date);
  for(let i=0;i<7;i++){
    const d=new Date(mon);d.setDate(mon.getDate()+i);const dk2=dk(d);
    const ov2=(S.overrides||{})[dk2];
    if(ov2&&ov2.echange)delete S.overrides[dk2];
  }

  if(gcalTokens)setTimeout(gcalTriggerTargeted,500);
}

function confirmCustomVac(){
  const name=(document.getElementById('custom-name')||{value:''}).value.trim();
  if(!name){alert('Nom requis');return;}
  const debStr=(document.getElementById('custom-deb')||{value:''}).value.trim();
  const finStr=(document.getElementById('custom-fin')||{value:''}).value.trim();
  const pauseMin=parseInt((document.getElementById('custom-pause')||{value:'0'}).value)||0;
  const debMin=parseHM(debStr),finMin=parseHM(finStr);
  if(!debMin||!finMin){alert('Heures invalides (format 08h00)');return;}
  let dur=finMin-debMin;let panier=false;
  function coversMealSlot(deb,fin){return(deb<=690&&fin>=870)||(deb<=1110&&fin>=1290);}
  if(pauseMin>=45){dur-=pauseMin;}else{if(coversMealSlot(debMin,finMin))panier=true;}
  if(dur<=0){alert('Durée invalide');return;}
  if(!S.customVacs)S.customVacs={};
  S.customVacs[name]={deb:debStr,fin:finStr,dur,panier,hidden:true};
  saveState();render();
  if(pendingKey){avw(name);return;}
  closeModal();
}

  if(isIOS&&!window.navigator.standalone)document.getElementById('pwa-banner').style.display='flex';
  updateUrBtns();
  cloudLoadAll().then(()=>{render();const hpn=document.getElementById('hdr-profile-name');if(hpn&&S.profile)hpn.textContent=S.profile.name||'Profil';});
}
init();

var gcalTokens=null;
function gSvg(c){return `<svg width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="${c}"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="${c}"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="${c}"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="${c}"/></svg>`;}
function gcalLoad(){
  if(S.profile&&S.profile.gcalTokens)gcalTokens=S.profile.gcalTokens;
  else gcalTokens=null;
  gcalUpdateBtn();
}
function gcalSave(){
  if(S.profile)S.profile.gcalTokens=gcalTokens;
  saveState();
}
function gcalUpdateBtn(){
  const ico=document.getElementById('gcal-status');
  if(ico){
    const autoSync=S.profile&&S.profile.gcalAutoSync!==false;
    const color=gcalTokens?(autoSync?'#34a853':'#f0a030'):gcalTokens===false?'#ea4335':'#888';
    ico.innerHTML=gSvg(color);
  }
  const btn=document.getElementById('gcal-btn');
  const connRow=document.getElementById('gcal-connected-btns');
  if(btn)btn.style.display=gcalTokens?'none':'';
  if(connRow)connRow.style.display=gcalTokens?'grid':'none';
  const autoSyncBtn=document.getElementById('gcal-autosync-btn');
  if(autoSyncBtn){
    const auto=S.profile&&S.profile.gcalAutoSync!==false;
    autoSyncBtn.style.background=auto?'var(--blue)':'';
    autoSyncBtn.style.color=auto?'#fff':'var(--text2)';
  }
}
function gcalConnect(){
  const url='https://accounts.google.com/o/oauth2/v2/auth?'+new URLSearchParams({client_id:GCAL_CLIENT_ID,redirect_uri:GCAL_REDIRECT_URI,response_type:'code',scope:GCAL_SCOPE,access_type:'offline',prompt:'consent'});
  window.location.href=url;
}
function gcalHandleClick(){
  if(!gcalTokens){gcalConnect();return;}
  const ico=document.getElementById('gcal-status');
  if(ico)ico.innerHTML=gSvg('#4ea0f7');
  gcalSync();
}
function gcalSetAutoSync(enabled){
  if(S.profile)S.profile.gcalAutoSync=enabled;
  saveState();gcalUpdateBtn();
}
function gcalToggleAutoSync(){
  const cur=S.profile&&S.profile.gcalAutoSync!==false;
  gcalSetAutoSync(!cur);
  if(!cur&&gcalTokens)setTimeout(gcalSync,500);
}
function gcalClearDateId(dateKey){}
var _gcalSyncTimer=null;
function gcalTriggerTargeted(){
  if(!gcalTokens)return;
  clearTimeout(_gcalSyncTimer);
  _gcalSyncTimer=setTimeout(gcalSync,1000);
}
function gcalSync(){}
function gcalClear(){
  alert('Fonctionnalité à implémenter avec le worker');
}
function gcalDisconnect(){
  gcalTokens=null;
  if(S.profile)delete S.profile.gcalTokens;
  saveState();gcalUpdateBtn();
}
</script>

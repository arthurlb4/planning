<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Planning France Info</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
[data-theme=light]{--bg:#e8e8e4;--bg2:#deded9;--bg3:#d0cfc9;--text:#1a1a18;--text2:#4a4a46;--text3:#8a8880;--border:rgba(0,0,0,.18);}
:root{--bg:#18181b;--bg2:#27272a;--bg3:#3f3f46;--text:#f4f4f5;--text2:#d4d4d8;--text3:#71717a;--blue:#4ea0f7;--green:#5a9e3f;--border:rgba(255,255,255,.12);--r:10px;}
body,input,button{transition:background-color .25s ease,color .25s ease,border-color .25s ease;}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;}
body.reg-active{align-items:flex-start;padding-top:12px;}
.card{background:var(--bg2);border:0.5px solid var(--border);border-radius:16px;padding:32px;width:100%;max-width:380px;}
body.reg-active .card{padding:20px 18px;}
.logo{text-align:center;margin-bottom:24px;}
.logo h1{font-size:20px;font-weight:600;margin-bottom:4px;}
.logo p{font-size:12px;color:var(--text3);}
body.reg-active .logo{margin-bottom:14px;}
body.reg-active .logo h1{font-size:18px;}
.tabs{display:flex;gap:4px;margin-bottom:24px;background:var(--bg);border-radius:var(--r);padding:3px;}
.tab{flex:1;padding:7px;text-align:center;font-size:13px;border-radius:6px;cursor:pointer;color:var(--text2);transition:all .15s;}
.tab.active{background:var(--bg2);color:var(--text);font-weight:500;}
body.reg-active .tabs{margin-bottom:16px;}
.field{margin-bottom:14px;}
.field label{display:block;font-size:11px;color:var(--text3);margin-bottom:5px;text-transform:uppercase;letter-spacing:.05em;}
.field input,.field select{width:100%;padding:10px 12px;background:var(--bg);border:0.5px solid var(--border);border-radius:var(--r);color:var(--text);font-size:14px;outline:none;transition:border-color .15s;}
.field input:focus,.field select:focus{border-color:var(--blue);}
#form-register .field{margin-bottom:9px;}
#form-register .field label{font-size:10px;margin-bottom:3px;}
#form-register .field input,#form-register .field select{padding:8px 10px;font-size:13px;}
#reg-palier,#reg-anc,#reg-pct,#reg-groupe{font-style:italic;}
.btn{width:100%;padding:11px;background:var(--blue);color:#fff;border:none;border-radius:var(--r);font-size:14px;font-weight:500;cursor:pointer;margin-top:4px;transition:opacity .15s;}
.btn:hover{opacity:.9;}
.btn:disabled{opacity:.5;cursor:not-allowed;}
.err{color:#e24b4a;font-size:12px;margin-top:8px;display:none;}
.ok{color:var(--green);font-size:12px;margin-top:8px;display:none;}
.forgot{text-align:right;font-size:11px;color:var(--text3);cursor:pointer;margin-top:-8px;margin-bottom:14px;}
.forgot:hover{color:var(--blue);}
#reset-section{display:none;}
.back{font-size:12px;color:var(--text3);cursor:pointer;margin-bottom:16px;display:inline-flex;align-items:center;gap:4px;}
.back:hover{color:var(--blue);}
.tgl{position:relative;display:inline-block;width:36px;height:20px;flex-shrink:0;}
.tgl input{opacity:0;width:0;height:0;}
.tgl-s{position:absolute;inset:0;background:var(--bg3);border-radius:20px;transition:.2s;}
.tgl-s:before{content:'';position:absolute;width:14px;height:14px;left:3px;bottom:3px;background:#fff;border-radius:50%;transition:.2s;}
.tgl input:checked+.tgl-s{background:var(--blue);}
.tgl input:checked+.tgl-s:before{transform:translateX(16px);}
#form-slider{position:relative;overflow:hidden;transition:height .4s cubic-bezier(.4,0,.2,1);}
.card{transition:box-shadow .4s;}
</style>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
</head>
<body>
<div class="card">
  <div class="logo">
    <h1>planning franceinfo</h1>
    
  </div>

  <!-- Reset password section -->
  <div id="reset-section">
    <div class="back" onclick="showReset(false)">← Retour</div>
    <div class="field"><label>Nouveau mot de passe</label><input type="password" id="new-pwd" placeholder="Minimum 6 caractères"></div>
    <button class="btn" onclick="doReset()">Enregistrer le mot de passe</button>
    <div class="err" id="reset-err"></div>
    <div class="ok" id="reset-ok"></div>
  </div>

  <!-- Login/Register section -->
  <div id="auth-section">
    <div class="tabs">
      <div class="tab active" id="tab-login" onclick="switchTab('login')">Connexion</div>
      <div class="tab" id="tab-register" onclick="switchTab('register')">Créer un compte</div>
    </div>

    <!-- Login / Register slider -->
    <div id="form-slider">

      <!-- Login form -->
      <form id="form-login" autocomplete="on" onsubmit="doLogin();return false;">
        <div class="field"><label>Email</label><input type="email" id="login-email" name="email" autocomplete="email" placeholder="votre@email.com"></div>
        <div class="field"><label>Mot de passe</label><input type="password" id="login-pwd" name="password" autocomplete="current-password" placeholder="••••••••"></div>
        <div style="display:flex;justify-content:space-between;align-items:center;margin-top:-6px;margin-bottom:14px">
          <label style="display:flex;align-items:center;gap:6px;font-size:12px;color:var(--text2);cursor:pointer">
            <input type="checkbox" id="remember-me" style="accent-color:var(--blue)"> Se souvenir de moi
          </label>
          <div class="forgot" style="margin:0" onclick="showForgot()">Mot de passe oublié ?</div>
        </div>
        <button class="btn" id="login-btn" onclick="doLogin()">Se connecter</button>
        <div class="err" id="login-err"></div>
      </form>

      <!-- Register form -->
      <div id="form-register" style="display:none">
        <div class="field"><label>Nom</label><input type="text" id="reg-name" name="name" autocomplete="name" placeholder="Votre nom"></div>
        <div class="field"><label>Email</label><input type="email" id="reg-email" name="email" autocomplete="email" placeholder="votre@email.com"></div>
        <div class="field"><label>Mot de passe</label><input type="password" id="reg-pwd" name="password" autocomplete="new-password" placeholder="Minimum 6 caractères"></div>
        <div class="field"><label>Ligne actuelle</label><select id="reg-line"></select></div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:14px">
          <div class="field" style="margin-bottom:0"><label>Matelas (h)</label><input type="text" id="reg-matelas" placeholder="ex: 5h30"></div>
          <div class="field" style="margin-bottom:0"><label>Rendus éphem. (h)</label><input type="text" id="reg-eph" placeholder="ex: 10h00"></div>
        </div>
        <div style="font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.05em;margin-bottom:6px;margin-top:2px">Paie <span style="font-style:italic;font-weight:400;text-transform:none">(optionnel)</span></div>
        <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-bottom:7px">
          <div class="field" style="margin-bottom:0"><label>Palier</label><select id="reg-palier"><option value="">—</option></select></div>
          <div class="field" style="margin-bottom:0"><label>Anc. (ans)</label><select id="reg-anc"><option value="">—</option></select></div>
          <div class="field" style="margin-bottom:0"><label>Contrat (%)</label><select id="reg-pct"><option value="">—</option></select></div>
        </div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:10px">
          <div class="field" style="margin-bottom:0"><label>Groupe</label><select id="reg-groupe" style="font-style:italic"><option value="">—</option><option value="1">Gr. 1 — 20 €</option><option value="2">Gr. 2 — 52 €</option><option value="3">Gr. 3 — 62 €</option><option value="4">Gr. 4 — 128 €</option><option value="5">Gr. 5 — 154 €</option><option value="6">Gr. 6 — 159 €</option><option value="7">Gr. 7 — 172 €</option><option value="8">Gr. 8 — 187 €</option><option value="9">Gr. 9 — 231 €</option></select></div>
          <div class="field" style="margin-bottom:0;text-align:center"><label>PFA<br>mens.</label><div style="display:flex;justify-content:center;padding-top:6px"><label class="tgl"><input type="checkbox" id="reg-pfamens"><span class="tgl-s"></span></label></div></div>
        </div>
        <div style="margin-bottom:10px">
          <div style="font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.05em;margin-bottom:6px">Génération des rendus</div>
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:4px">
            <div style="display:flex;justify-content:space-between;align-items:center;padding:5px 8px;border:0.5px solid var(--border);border-radius:8px"><span style="font-size:12px">Dimanches</span><label class="tgl"><input type="checkbox" id="reg-dim" checked><span class="tgl-s"></span></label></div>
            <div style="display:flex;justify-content:space-between;align-items:center;padding:5px 8px;border:0.5px solid var(--border);border-radius:8px"><span style="font-size:12px">RH travaillés</span><label class="tgl"><input type="checkbox" id="reg-rh" checked><span class="tgl-s"></span></label></div>
            <div style="display:flex;justify-content:space-between;align-items:center;padding:5px 8px;border:0.5px solid var(--border);border-radius:8px"><span style="font-size:12px">Fériés</span><label class="tgl"><input type="checkbox" id="reg-fer" checked><span class="tgl-s"></span></label></div>
            <div style="display:flex;justify-content:space-between;align-items:center;padding:5px 8px;border:0.5px solid var(--border);border-radius:8px"><span style="font-size:12px">Heures sup.</span><label class="tgl"><input type="checkbox" id="reg-hs" checked><span class="tgl-s"></span></label></div>
          </div>
        </div>
        <button class="btn" id="reg-btn" onclick="doRegister()">Créer mon compte</button>
        <div class="err" id="reg-err"></div>
      </div>

    </div><!-- /#form-slider -->

    <!-- Forgot password form -->
    <div id="form-forgot" style="display:none">
      <div class="back" onclick="showForgot(false)">← Retour</div>
      <div class="field"><label>Email</label><input type="email" id="forgot-email" placeholder="votre@email.com"></div>
      <button class="btn" onclick="doForgot()">Envoyer le lien</button>
      <div class="err" id="forgot-err"></div>
      <div class="ok" id="forgot-ok"></div>
    </div>
  </div>
</div>

<script>
const API = 'https://planning-gcal.arthur-lebreton94.workers.dev';

// Check if reset token in URL
const urlParams = new URLSearchParams(window.location.search);
const resetToken = urlParams.get('reset');
if (resetToken) {
  document.getElementById('auth-section').style.display = 'none';
  document.getElementById('reset-section').style.display = 'block';
}

// Auto-switch to register tab if coming from account deletion
if (urlParams.get('tab') === 'register') {
  switchTab('register');
}
// Populate palier select immediately in case user is on register tab
document.addEventListener('DOMContentLoaded', populateRegPalier);

// Pre-fill remembered credentials
const remembered = JSON.parse(localStorage.getItem('remember_creds') || 'null');
if (remembered) {
  document.getElementById('login-email').value = remembered.email || '';
  document.getElementById('login-pwd').value = remembered.password || '';
  document.getElementById('remember-me').checked = true;
}

// Check if already logged in
const stored = localStorage.getItem('auth_token');
if (stored && !resetToken) {
  window.location.replace('/planning/app/');
}

function switchTab(tab) {
  const isReg = tab === 'register';
  document.body.classList.toggle('reg-active', isReg);
  document.getElementById('tab-login').classList.toggle('active', !isReg);
  document.getElementById('tab-register').classList.toggle('active', isReg);
  document.getElementById('form-forgot').style.display = 'none';

  const slider = document.getElementById('form-slider');
  const out = document.getElementById(isReg ? 'form-login' : 'form-register');
  const inn = document.getElementById(isReg ? 'form-register' : 'form-login');
  const dir = isReg ? 1 : -1;

  if (isReg) populateRegLine();

  // Fix slider at current height so transition has a start point
  slider.style.height = out.offsetHeight + 'px';

  // Show incoming off-screen (absolute so it doesn't stretch the slider)
  inn.style.cssText = 'display:block;position:absolute;top:0;left:0;right:0;opacity:0;transform:translateX(' + (dir * 28) + 'px);pointer-events:none';

  const targetH = inn.offsetHeight;

  requestAnimationFrame(function() {
    // Animate slider height
    slider.style.height = targetH + 'px';
    // Outgoing slides & fades out
    out.style.transition = 'opacity .22s ease, transform .34s cubic-bezier(.4,0,.2,1)';
    out.style.opacity = '0';
    out.style.transform = 'translateX(' + (-dir * 28) + 'px)';
    // Incoming slides & fades in (slight delay for overlap feel)
    requestAnimationFrame(function() {
      inn.style.transition = 'opacity .28s ease .06s, transform .36s cubic-bezier(.4,0,.2,1)';
      inn.style.opacity = '1';
      inn.style.transform = 'translateX(0)';
      inn.style.pointerEvents = '';
    });
  });

  setTimeout(function() {
    out.removeAttribute('style');
    out.style.display = 'none';
    inn.removeAttribute('style');
    slider.style.height = 'auto';
  }, 400);
}

function showForgot(show = true) {
  const slider = document.getElementById('form-slider');
  if (show) {
    slider.style.display = 'none';
    document.getElementById('form-forgot').style.display = '';
  } else {
    slider.style.display = '';
    slider.style.height = 'auto';
    document.getElementById('form-login').style.display = '';
    document.getElementById('form-register').style.display = 'none';
    document.getElementById('form-forgot').style.display = 'none';
    document.getElementById('tab-login').classList.add('active');
    document.getElementById('tab-register').classList.remove('active');
  }
}

function showReset(show = true) {
  document.getElementById('reset-section').style.display = show ? 'block' : 'none';
  document.getElementById('auth-section').style.display = show ? 'none' : '';
}

function showErr(id, msg) {
  const el = document.getElementById(id);
  el.textContent = msg;
  el.style.display = msg ? 'block' : 'none';
}

function showOk(id, msg) {
  const el = document.getElementById(id);
  el.textContent = msg;
  el.style.display = msg ? 'block' : 'none';
}

async function doLogin() {
  const email = document.getElementById('login-email').value.trim();
  const pwd = document.getElementById('login-pwd').value;
  showErr('login-err', '');
  if (!email || !pwd) return showErr('login-err', 'Remplissez tous les champs.');
  const btn = document.getElementById('login-btn');
  btn.disabled = true; btn.textContent = 'Connexion...';
  try {
    const res = await fetch(API + '/auth/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password: pwd }),
    });
    const data = await res.json();
    if (!res.ok) { showErr('login-err', data.error || 'Erreur'); btn.disabled = false; btn.textContent = 'Se connecter'; return; }
    localStorage.setItem('auth_token', data.token);
    localStorage.setItem('auth_user', JSON.stringify({ userId: data.userId, name: data.name, email: data.email }));
    if (document.getElementById('remember-me').checked) {
      localStorage.setItem('remember_creds', JSON.stringify({ email, password: pwd }));
    } else {
      localStorage.removeItem('remember_creds');
    }
    setTimeout(function(){ window.location.replace('/planning/app/'); }, 100);
  } catch(e) { showErr('login-err', 'Erreur réseau'); btn.disabled = false; btn.textContent = 'Se connecter'; }
}

// Cycle data for line selection
const ANCHOR=new Date(2026,4,4); // lundi 4 mai 2026
const ANCHOR_L=8; // ligne S9 à cette date
// Fallback cycle hardcodé
const CYCLE_DEFAULT=[
  ['A1','A1',null,'RH','A2','As1','Ad1'],[null,null,'A2','A2','B1',null,'RH'],
  ['A3','A3',null,'RH','A1','As2','Ad2'],[null,null,'A1','A1','A3',null,'RH'],
  ['B1','B1','A3','A3',null,null,'RH'],['A2','A2','B1','B1',null,null,'RH'],
  [null,null,'RH','P423','P423','Es','Ed'],[null,null,'D2','D1','D1',null,'RH'],
  ['C1','C1','C1','C1',null,null,'RH'],['D2','D2',null,'RH','C1','Fs','Fd'],
  [null,null,'D1','D2','D2',null,'RH'],['C2','C2','C2','C2','C2',null,'RH'],
  ['D1','D1',null,null,'RH','Cs','Cd'],['P423','P423','P423',null,'RH','As3','Ad3'],
];
var CYCLE=CYCLE_DEFAULT;
function getMonday(d){const dt=new Date(d);const day=dt.getDay(),diff=dt.getDate()-day+(day===0?-6:1);dt.setDate(diff);dt.setHours(0,0,0,0);return dt;}
function weeksDiff(date){return Math.round((getMonday(date)-ANCHOR)/(7*864e5));}
function formatLineOption(idx){
  const lineData=CYCLE[idx];
  if(!lineData)return'—';
  return lineData.map(function(v){return(!v||v==='RH')?'—':v;}).join(' ');
}

function calcPalierSalaireReg(n){const base=2091.75;if(n<1)return base;if(n<=44)return Math.floor(base*Math.pow(1.015,n-19)*100)/100;const p44=Math.floor(base*Math.pow(1.015,25)*100)/100;return Math.floor(p44*Math.pow(1.0075,n-44)*100)/100;}
function calcAncPrimeReg(y){const base=2091.75;if(y<=0)return 0;if(y<=20)return Math.round(y*0.01*base*100)/100;return Math.round((20*0.01+(y-20)*0.005)*base*100)/100;}
function fmtEuroReg(v){return v.toLocaleString('fr-FR',{minimumFractionDigits:2,maximumFractionDigits:2})+' €';}
function populateRegContrat(){const sel=document.getElementById('reg-pct');if(!sel||sel.options.length>1)return;for(let p=5;p<=100;p+=5){const o=document.createElement('option');o.value=p;const h=Math.round(p*151.67/100*100)/100;o.textContent=p+'% | '+h.toLocaleString('fr-FR',{minimumFractionDigits:2,maximumFractionDigits:2})+' h';if(p===100)o.selected=true;sel.appendChild(o);}}
function populateRegAnc(){const sel=document.getElementById('reg-anc');if(!sel||sel.options.length>1)return;for(let i=0;i<=50;i++){const o=document.createElement('option');o.value=i;const label=i===0?'0 an':(i===1?'1 an':i+' ans');o.textContent=label+' | '+fmtEuroReg(calcAncPrimeReg(i));sel.appendChild(o);}}
function populateRegPalier(){
  const sel=document.getElementById('reg-palier');
  if(!sel||sel.options.length>1)return;
  for(let i=1;i<=100;i++){const o=document.createElement('option');o.value=i;o.textContent='P'+i+' | '+fmtEuroReg(calcPalierSalaireReg(i));sel.appendChild(o);}
  const oc=document.createElement('option');oc.value='christophe';oc.textContent='Christophe | '+fmtEuroReg(100000);sel.appendChild(oc);
}

async function populateRegLine(){
  populateRegPalier();
  populateRegContrat();
  populateRegAnc();
  const sel=document.getElementById('reg-line');
  if(!sel)return;
  // Try to load cycle from KV
  try{
    const res=await fetch(API+'/get-cycle',{method:'POST',headers:{'Content-Type':'application/json'},body:'{}'});
    const d=await res.json();
    if(d&&d.currentOverride&&d.currentOverride.weeks&&d.currentOverride.weeks.length===14){
      CYCLE=d.currentOverride.weeks;
    }
  }catch(e){}
  const diff=weeksDiff(new Date());
  const curVisual=((ANCHOR_L)+diff+14*1000)%14;
  sel.innerHTML=Array.from({length:14},function(_,i){
    return '<option value="'+i+'"'+(i===curVisual?' selected':'')+'>'+formatLineOption(i)+'</option>';
  }).join('');
}

async function doRegister() {
  const name = document.getElementById('reg-name').value.trim();
  const email = document.getElementById('reg-email').value.trim();
  const pwd = document.getElementById('reg-pwd').value;
  // Profile data
  const regLineIdx = parseInt(document.getElementById('reg-line')?.value||'0');
  const regMatelasRaw = document.getElementById('reg-matelas')?.value||'';
  const regEphRaw = document.getElementById('reg-eph')?.value||'';
  const regPalierVal = document.getElementById('reg-palier')?.value||'';
  const regPalier = parseInt(regPalierVal);
  const regAnc = parseFloat(document.getElementById('reg-anc')?.value||'');
  const regPct = parseFloat(document.getElementById('reg-pct')?.value||'');
  const regPfaMens = document.getElementById('reg-pfamens')?.checked||false;
  const regGroupe = parseInt(document.getElementById('reg-groupe')?.value||'');
  function parseHMLogin(str){
    if(!str)return 0;
    str=str.trim().replace(',','.');
    // 5h30 / 5H30 / 5h / 5H
    let m=str.match(/^(\d+)[hH](\d*)$/);if(m)return parseInt(m[1])*60+(parseInt(m[2]||'0')||0);
    // 5:30 / 5h30m
    m=str.match(/^(\d+)[:\s](\d{1,2})$/);if(m)return parseInt(m[1])*60+parseInt(m[2]);
    // 5.5 / 5,5 (decimal hours)
    m=str.match(/^(\d+)\.(\d+)$/);if(m)return Math.round(parseFloat(m[1]+'.'+m[2])*60);
    // plain minutes: 330
    m=str.match(/^(\d+)min$/i);if(m)return parseInt(m[1]);
    // plain number assumed hours: 5
    m=str.match(/^(\d+)$/);if(m)return parseInt(m[1])*60;
    return 0;
  }
  const regMatelas = regMatelasRaw ? parseHMLogin(regMatelasRaw) : 0;
  const regEph = regEphRaw ? parseHMLogin(regEphRaw) : 0;
  // Convert visual line index to anchorLine (0-based index that gives correct week at ANCHOR)
  const _diffNow=weeksDiff(new Date());
  const regAnchorLine=((regLineIdx-_diffNow)%14+14)%14;
  showErr('reg-err', '');
  if (!name || !email || !pwd) return showErr('reg-err', 'Remplissez tous les champs.');
  if (pwd.length < 6) return showErr('reg-err', 'Mot de passe trop court (min 6 caractères).');
  const btn = document.getElementById('reg-btn');
  btn.disabled = true; btn.textContent = 'Création...';
  try {
    const res = await fetch(API + '/auth/register', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password: pwd, name }),
    });
    const data = await res.json();
    if (!res.ok) { showErr('reg-err', data.error || 'Erreur'); btn.disabled = false; btn.textContent = 'Créer mon compte'; return; }
    localStorage.setItem('auth_token', data.token);
    localStorage.setItem('auth_user', JSON.stringify({ userId: data.userId, name: data.name, email: data.email }));
    // Save profile in the format expected by the app (pl_v8)
    const _todayYM = new Date().getFullYear()*12+new Date().getMonth();
    const profileData = {
      profile:{
        name, anchorLine:regAnchorLine, matelas:regMatelas, congesInit:25,
        ephSolde:Math.round(regEph/60*100)/100, ephSoldeCreatedYM:_todayYM,
        gcalAutoSync:false, pfaMensuelle:regPfaMens, hasSeenPayPrompt:true,
        ...(!isNaN(regGroupe)&&regGroupe>=1 ? {groupeClassif:regGroupe} : {}),
        ...(regPalierVal==='christophe' ? {salaireQualif:100000} : (!isNaN(regPalier)&&regPalier>=1 ? {palierNum:regPalier,salaireQualif:calcPalierSalaireReg(regPalier)} : {})),
        ...(!isNaN(regAnc)&&regAnc>=0 ? {ancYears:regAnc, ancRefYM:_todayYM} : {}),
        ...(!isNaN(regPct)&&regPct>0 ? {heuresMensuelles:Math.round(regPct*151.67/100*100)/100} : {}),
      },
      settings:{dimRendu:!!document.getElementById('reg-dim')?.checked,rhRendu:!!document.getElementById('reg-rh')?.checked,ferRendu:!!document.getElementById('reg-fer')?.checked,hsRendu:!!document.getElementById('reg-hs')?.checked,theme:'dark'},
      overrides:{},conges:{},history:[],customVacs:{}
    };
    localStorage.setItem('pl_v8', JSON.stringify({p:{default:profileData},a:'default'}));
    localStorage.setItem('planning_aid', 'default');
    window.location.href = '/planning/app/';
  } catch(e) { showErr('reg-err', 'Erreur réseau'); btn.disabled = false; btn.textContent = 'Créer mon compte'; }
}

async function doForgot() {
  const email = document.getElementById('forgot-email').value.trim();
  showErr('forgot-err', ''); showOk('forgot-ok', '');
  if (!email) return showErr('forgot-err', 'Entrez votre email.');
  try {
    await fetch(API + '/auth/forgot', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ email }) });
    showOk('forgot-ok', 'Si cet email existe, un lien vous a été envoyé.');
  } catch(e) { showErr('forgot-err', 'Erreur réseau'); }
}

async function doReset() {
  const pwd = document.getElementById('new-pwd').value;
  showErr('reset-err', ''); showOk('reset-ok', '');
  if (!pwd || pwd.length < 6) return showErr('reset-err', 'Mot de passe trop court (min 6 caractères).');
  try {
    const res = await fetch(API + '/auth/reset', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ token: resetToken, password: pwd }) });
    const data = await res.json();
    if (!res.ok) return showErr('reset-err', data.error || 'Lien invalide ou expiré.');
    showOk('reset-ok', 'Mot de passe mis à jour ! Redirection...');
    setTimeout(() => { history.replaceState({}, '', '/planning/'); window.location.href = '/planning/'; }, 2000);
  } catch(e) { showErr('reset-err', 'Erreur réseau'); }
}


</script>
<script>
function toggleLoginTheme(){
  const isDark=document.documentElement.getAttribute('data-theme')!=='light';
  const newTheme=isDark?'light':'dark';
  document.documentElement.setAttribute('data-theme',newTheme);
  const icon=document.getElementById('login-theme-icon');
  if(icon){icon.className=newTheme==='light'?'ti ti-sun':'ti ti-moon';}
  localStorage.setItem('theme',newTheme);
}
// Apply saved theme immediately (before DOMContentLoaded)
(function(){
  const saved=localStorage.getItem('theme')||'dark';
  document.documentElement.setAttribute('data-theme',saved);
  document.addEventListener('DOMContentLoaded',function(){
    const icon=document.getElementById('login-theme-icon');
    if(icon)icon.className=saved==='light'?'ti ti-sun':'ti ti-moon';
  });
})();
</script>

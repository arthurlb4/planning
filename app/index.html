<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<style>html{background:#1a1a1a}</style>
<meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<title>planning franceinfo</title>
<meta name="app-version" content="v4.87">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Planning">
<meta name="theme-color" id="theme-color-meta" content="#18181b">
<link rel="apple-touch-icon" href="/planning/app/apple-touch-icon-v8.png">
<link rel="icon" type="image/png" href="/planning/app/favicon9.png">
<link rel="manifest" href="./manifest.json">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.47.0/tabler-icons.min.css">
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
:root{
  --bg:transparent;--bg0:#1a1a1a;--bg2:#252525;--bg2h:#2c2c2c;--bg3:#373737;
  --text:#f4f4f4;--text2:#d8d8d8;--text3:#9a9a9a;
  --border:rgba(255,255,255,.12);--border2:rgba(255,255,255,.06);
  --r:12px;--rl:16px;
  --shadow-s:0 1px 3px rgba(0,0,0,.22),0 2px 8px rgba(0,0,0,.14);
  --shadow-m:0 2px 6px rgba(0,0,0,.25),0 6px 20px rgba(0,0,0,.18);
  --blue:#62aadc;--blue-l:#1a3050;--blue-m:#243c62;
  --green:#6a9878;--green-l:#1c2e22;--green-m:#243828;
  --orange:#c88048;--orange-l:rgba(188,120,64,.26);
  --amber:#e09830;--red:#c0392b;
  --gold:#b8941e;--gold-dark:#9a7a18;--gold-l:rgba(184,148,30,.15);--gold-b:rgba(184,148,30,.35);--gold-pay:#FFE169;
  --rend:#A8BF7A;--rend-l:rgba(168,191,122,.45);--rend-text:#A8BF7A;--rend-bar:#7ab83a;
  --teal:#2abcc8;--teal-l:rgba(42,188,200,.22);
  --fer-bg:#7a5c14;--fer-bg-light:#8f6e1a;--fer-text:#e8d5a3;
  --font:'Inter',-apple-system,sans-serif;
}

[data-theme=light]{
  background:#b8b8b8;
  --bg0:#c8c8c8;--bg:#b8b8b8;--bg2:#eeeeee;--bg2h:#e8e8e8;--bg3:#d8d8d8;
  --text:#181818;--text2:#383838;--text3:#5a5a5a;
  --border:rgba(0,0,0,.22);--border2:rgba(0,0,0,.12);
  --blue:#1c508a;--blue-l:#cce0f4;--blue-m:#7ab2d4;
  --green:#185c2e;--green-l:#bcd8be;--green-m:#88b098;
  --orange:#882c08;--orange-l:rgba(136,44,8,.16);
  --amber:#7a5000;
  --red:#a02020;
  --gold:#7a6000;--gold-dark:#5a4600;--gold-l:rgba(120,96,0,.14);--gold-b:rgba(120,96,0,.28);--gold-pay:#9a7800;
  --rend:#3e680a;--rend-l:rgba(62,104,10,.28);--rend-text:#3a6008;--rend-bar:#306006;
  --teal:#0a7486;--teal-l:rgba(10,116,134,.16);
  --fer-bg:#e0ce88;--fer-bg-light:#e8d8a4;--fer-text:#584008;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;font-family:var(--font);user-select:none;-webkit-user-select:none;}
/* No transitions - avoid flash on render */
html{scrollbar-gutter:stable;}html,body{overflow-x:hidden;}body{padding-top:60px;background:var(--bg);color:var(--text);}
input,select,textarea{font-family:var(--font);user-select:text;-webkit-user-select:text;}button{font-family:var(--font);user-select:none;-webkit-user-select:none;}
input[type=number]::-webkit-inner-spin-button,input[type=number]::-webkit-outer-spin-button{-webkit-appearance:none;margin:0;}
input[type=number]{-moz-appearance:textfield;appearance:textfield;}
#app{display:block;}
.app-outer{max-width:1440px;margin:0 auto;padding:0 20px;overflow-x:hidden;}
@media (orientation:portrait){body{padding-top:68px;}}
.mbar{display:flex;align-items:center;justify-content:space-between;padding:10px 0 8px;gap:4px;position:relative;width:100%;}
.layout{display:flex;gap:0;align-items:flex-start;}
.cal-col{flex:1;min-width:0;position:relative;overflow:visible;padding:0 0 20px;display:flex;flex-direction:column;align-items:stretch;}
.col-sep{display:none;}
.side-col{width:510px;flex-shrink:0;display:flex;flex-direction:column;gap:16px;padding-top:0;padding-bottom:20px;padding-left:12px;position:relative;z-index:1;}
@media(max-width:720px){.layout{flex-direction:column;align-items:stretch;}.side-col{width:100%;padding-left:0;}.col-sep{display:none;}.cal-col{padding-bottom:8px;}.hdr-ver{display:none!important;}}
.layout.side-below{flex-direction:column;align-items:stretch;}
.layout.side-below .side-col{width:100%;padding-left:0;}
.layout.side-below .col-sep{display:none;}
.layout.side-below .cal-col{padding-bottom:8px;}
@media(max-width:480px){.hdr{padding:6px 10px 10px!important;}.ibtn-lbl{display:none;}body{padding-top:52px;}.hdr-btns{gap:6px!important;}.ibtn{padding:7px 9px!important;}.ibtn i{font-size:16px!important;}}
.det-mob{display:none;}

/* HEADER */
.hdr{display:flex;align-items:center;justify-content:space-between;padding:14px 20px;left:0;right:0;width:100%;background:var(--bg2);border-bottom:0.5px solid var(--border);box-shadow:0 2px 12px rgba(0,0,0,.18);position:fixed;top:0;z-index:200;}

.hdr-btns{display:flex;gap:8px;align-items:center;margin-left:auto;}
.hdr-sep{width:1px;height:18px;background:var(--border);margin:0 3px;flex-shrink:0;}
.ibtn{background:transparent;border:1px solid rgba(128,128,128,.38);border-radius:var(--r);padding:8px 11px;font-size:12px;cursor:pointer;color:var(--text2);display:flex;align-items:center;gap:4px;transition:background .1s;}
.ibtn i{font-size:16px;}
.ibtn:active{opacity:.7;}
.ibtn:disabled{opacity:.3;pointer-events:none;}
#warn-icon-btn{border-color:var(--red)!important;}

/* NAV */
.mnav{background:transparent;border:0.5px solid var(--border);border-radius:var(--r);padding:6px 12px;font-size:14px;cursor:pointer;color:var(--text);transition:background .1s;}
.mnav.today{font-size:12px;padding:6px 12px;font-weight:500;background:transparent;color:var(--text);border-color:var(--border);max-width:80px;overflow:hidden;transform:translateX(0);transition:max-width .22s ease,opacity .22s ease,padding .22s ease,border-color .22s ease,transform .22s ease;}
.mnav.today.hide-l{max-width:0;opacity:0;padding-left:0;padding-right:0;border-color:transparent;pointer-events:none;transform:translateX(-10px);}
.mnav.today.hide-r{max-width:0;opacity:0;padding-left:0;padding-right:0;border-color:transparent;pointer-events:none;transform:translateX(10px);}
.mtit{font-size:15px;font-weight:500;cursor:pointer;padding:4px 8px;border-radius:var(--r);transition:background .1s;position:absolute;left:50%;transform:translateX(-50%);white-space:nowrap;}
#month-view{transition:opacity .18s ease,transform .18s ease;}
.slide-left{animation:slideLeft .2s ease forwards;}
.slide-right{animation:slideRight .2s ease forwards;}
@keyframes slideLeft{from{opacity:1;transform:translateX(0)}to{opacity:0;transform:translateX(-28px)}}
@keyframes slideRight{from{opacity:1;transform:translateX(0)}to{opacity:0;transform:translateX(28px)}}
.slide-in-left{animation:slideInLeft .2s ease forwards;}
.slide-in-right{animation:slideInRight .2s ease forwards;}
@keyframes slideInLeft{from{opacity:0;transform:translateX(28px)}to{opacity:1;transform:translateX(0)}}
@keyframes slideInRight{from{opacity:0;transform:translateX(-28px)}to{opacity:1;transform:translateX(0)}}

/* Month view */
#month-view{transition:opacity .2s ease,transform .2s ease;}

/* Annual view */
.ann-wrap{overflow:hidden;pointer-events:none;opacity:0;visibility:hidden;position:absolute;top:0;left:0;right:0;transition:opacity .2s ease;width:100%;}
.ann-wrap.open{pointer-events:all;opacity:1;display:block;visibility:visible;overflow:visible;position:relative;}
.annual-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:10px;width:100%;box-sizing:border-box;}
@media(max-width:600px){.annual-grid{grid-template-columns:repeat(3,1fr);}}
.ann-month{background:var(--bg0);border:1px solid var(--border2);border-radius:var(--r);padding:6px;cursor:pointer;transition:background .1s;}
[data-theme=light] .ann-month{background:var(--bg3);}
.ann-month.sel{border-color:rgba(255,255,255,.38);}
[data-theme=light] .ann-month.sel{border-color:rgba(0,0,0,.3);}
.ann-month.cur-month{border-color:rgba(98,170,220,.6);}
[data-theme=light] .ann-month.cur-month{border-color:rgba(42,94,138,.65);}
.ann-mname{font-size:12px;font-weight:500;color:var(--text);margin-bottom:5px;}
.ann-mini{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;}
.ann-day{width:100%;height:var(--ann-d-h,auto);border-radius:3px;}
.ann-day.tv-am{background:var(--blue-l);}
.ann-day.tv-am-fer{background:var(--blue-l);outline:1.5px solid var(--gold);}
.ann-day.tv{background:var(--blue-l);}
.ann-day.tv-pm{background:var(--blue-l);}
.ann-day.tv-pm-fer{background:var(--blue-l);outline:1.5px solid var(--gold);}
.ann-day.cg{background:var(--green-l);}
.ann-day.rend{background:var(--rend-l);}
.ann-day.fer{background:transparent;outline:1.5px solid var(--gold);}
.ann-day.tv-fer{background:var(--blue-l);outline:1.5px solid var(--gold);}
.ann-day.ec{background:rgba(192,57,43,.3);}
.ann-day.ec-fer{background:rgba(192,57,43,.3);outline:1.5px solid var(--gold);}
.ann-day.tv-ov{background:rgba(192,57,43,.3);}
.ann-day.tv-ov-fer{background:rgba(192,57,43,.3);outline:1.5px solid var(--gold);}
.ann-day.ec2{background:transparent;}
.ann-day.ec2-fer{background:transparent;outline:1.5px solid var(--gold);}
.ann-day.cg-fer{background:var(--green-l);outline:1.5px solid var(--gold);}
.ann-day.rend-fer{background:var(--rend-l);outline:1.5px solid var(--gold);}
.ann-day.absent-fer{background:var(--bg3);outline:1.5px solid var(--gold);}
.ann-day.absent{background:var(--bg3);}
.ann-day.sv-vac{background:rgba(192,57,43,.3);}
.ann-day.sv-vac-fer{background:rgba(192,57,43,.3);outline:1.5px solid var(--gold);}
.ann-day.sv,.ann-day.rh{background:transparent;outline:none;}

/* Calendar */
.cal-wrap{background:var(--bg0);border:0.5px solid rgba(255,255,255,.14);box-shadow:0 6px 32px rgba(0,0,0,.55),0 0 0 1px rgba(255,255,255,.05);border-radius:var(--rl);overflow:hidden;margin-bottom:8px;width:100%;box-sizing:border-box;position:relative;}
#month-view{position:relative;width:100%;}
[data-theme=light] .cal-wrap{border-color:rgba(0,0,0,.22);box-shadow:0 2px 32px rgba(0,0,0,.2),0 0 0 1px rgba(0,0,0,.10);}
.cal{width:100%;border-collapse:collapse;table-layout:fixed;}
.cal th{font-size:10px;color:var(--text3);text-align:center;padding:4px 2px 3px;font-weight:400;}
.cal th.wkh{width:20px;padding:0;}
.cal td{text-align:center;padding:7px;}
/* ramtr row bg removed - only wkn.wram is colored */
.cal tr.curweek td{background:rgba(98,170,220,.06);}
[data-theme=light] .cal tr.curweek td{background:rgba(42,94,138,.05);}
/* Week number - base */
.wkn{font-size:9px;color:var(--text3);text-align:center;vertical-align:middle;width:20px;padding:1px 2px;border-radius:4px;}
/* New cycle start */
.cyc-badge{position:absolute;left:0;right:0;z-index:50;pointer-events:none;border-top:3px solid rgba(192,57,43,.55);display:flex;align-items:flex-start;transform:translateY(-1.5px);}
[data-theme=light] .cyc-badge{border-top-color:rgba(160,30,20,.4);}
.cyc-label{margin-left:20px;background:rgba(192,57,43,.55);color:rgba(255,255,255,.92);font-size:8px;font-weight:600;padding:1px 7px 3px;border-radius:0 0 4px 4px;letter-spacing:.04em;white-space:nowrap;flex-shrink:0;}
[data-theme=light] .cyc-label{background:rgba(160,30,20,.45);}
/* Exchange given-away days */
.s-ec2 .dn,.s-ec2 .dv{color:var(--red);}
/* Today outline — pseudo-element renders above .dci backgrounds */
.dc.today::after{content:'';position:absolute;inset:0;border:1.5px solid var(--blue);border-radius:var(--r);pointer-events:none;z-index:1;}
/* Colored week numbers */

.wkn.wcur{font-weight:600;}.wkn.wram{}.wkn.wcg{}


.dc{width:100%;aspect-ratio:6/5;position:relative;border-radius:var(--r);display:block;}
.dci{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1px;border-radius:var(--r);transition:background .15s,transform .1s;cursor:pointer;}
.dci:active{transform:scale(.88);transition:transform .07s;}
.dn{font-size:16px;font-weight:700;line-height:1;letter-spacing:-.01em;color:rgba(255,255,255,.72);}
.dv{font-size:11px;font-weight:500;line-height:1;opacity:.82;letter-spacing:.02em;color:rgba(255,255,255,.72);min-height:11px;white-space:nowrap;overflow:hidden;text-overflow:clip;max-width:calc(100% - 8px);}
[data-theme=light] .dn,[data-theme=light] .dv{color:var(--text2);}
.s-fer .dn,.s-fer .dv,.s-tv-fer .dn,.s-tv-fer .dv,.s-tv-am-fer .dn,.s-tv-am-fer .dv,.s-tv-pm-fer .dn,.s-tv-pm-fer .dv,.s-cg-fer .dn,.s-cg-fer .dv,.s-rend-fer .dn,.s-rend-fer .dv,.s-ec2-fer .dn,.s-ec2-fer .dv,.s-absent-fer .dn,.s-absent-fer .dv{color:var(--gold);}
[data-theme=light] .s-fer .dn,[data-theme=light] .s-fer .dv,[data-theme=light] .s-tv-fer .dn,[data-theme=light] .s-tv-fer .dv,[data-theme=light] .s-tv-am-fer .dn,[data-theme=light] .s-tv-am-fer .dv,[data-theme=light] .s-tv-pm-fer .dn,[data-theme=light] .s-tv-pm-fer .dv,[data-theme=light] .s-cg-fer .dn,[data-theme=light] .s-cg-fer .dv,[data-theme=light] .s-rend-fer .dn,[data-theme=light] .s-rend-fer .dv,[data-theme=light] .s-ec2-fer .dn,[data-theme=light] .s-ec2-fer .dv,[data-theme=light] .s-absent-fer .dn,[data-theme=light] .s-absent-fer .dv{color:var(--gold-dark);}

/* Day states */
/* Jours travaillés classiques : fond bleu */
.s-tv .dci,.s-tv-am .dci,.s-tv-pm .dci{background:var(--blue-l);cursor:pointer;}
[data-theme=light] .s-tv .dci,[data-theme=light] .s-tv-am .dci,[data-theme=light] .s-tv-pm .dci{background:var(--blue-m);}
/* Modifiés / ajout / échange : fond bleu + texte turquoise */
.s-tv-ov .dci,.s-sv-vac .dci,.s-ec .dci{background:var(--blue-l);cursor:pointer;}
[data-theme=light] .s-tv-ov .dci,[data-theme=light] .s-sv-vac .dci,[data-theme=light] .s-ec .dci{background:var(--blue-m);}
/* Texte turquoise pour les modifs */
.s-tv-ov .dn,.s-tv-ov .dv,.s-sv-vac .dn,.s-sv-vac .dv{color:var(--red);}.s-ec .dn,.s-ec .dv{color:var(--red);}
.s-tv-ov-fer .dn,.s-tv-ov-fer .dv,.s-sv-vac-fer .dn,.s-sv-vac-fer .dv,.s-ec-fer .dn,.s-ec-fer .dv{color:var(--red);}
/* Congés et rendus : fond coloré */
.s-cg .dci{background:var(--green-l);cursor:pointer;}
.s-rend .dci{background:var(--rend-l);cursor:pointer;}
[data-theme=light] .s-cg .dci{background:var(--green-l);}
[data-theme=light] .s-rend .dci{background:var(--rend-l);}
/* Autres états non-travaillés : pas de fond */
.s-rh .dci,.s-sv-ov .dci,.s-sv .dci,.s-absent .dci,.s-ec2 .dci{cursor:pointer;}
/* Textes des non-travaillés */
/* Fériés : bordure dorée, pas de fond (sauf travaillés-fériés) */
.s-fer .dci{background:transparent;box-shadow:inset 0 0 0 1.5px var(--gold);cursor:pointer;}
[data-theme=light] .s-fer .dci{box-shadow:inset 0 0 0 1.5px var(--gold);}
/* Travaillés classiques-fériés : fond bleu + bordure dorée */
.s-tv-fer .dci,.s-tv-am-fer .dci,.s-tv-pm-fer .dci{background:var(--blue-l);box-shadow:inset 0 0 0 1.5px var(--gold);cursor:pointer;}
[data-theme=light] .s-tv-fer .dci,[data-theme=light] .s-tv-am-fer .dci,[data-theme=light] .s-tv-pm-fer .dci{background:var(--blue-m);}
/* Modifiés-fériés : fond bleu + bordure dorée */
.s-tv-ov-fer .dci,.s-sv-vac-fer .dci,.s-ec-fer .dci{background:var(--blue-l);box-shadow:inset 0 0 0 1.5px var(--gold);cursor:pointer;}
[data-theme=light] .s-tv-ov-fer .dci,[data-theme=light] .s-sv-vac-fer .dci,[data-theme=light] .s-ec-fer .dci{background:var(--blue-m);}
/* Congés-fériés et rendus-fériés : fond coloré + bordure dorée */
.s-cg-fer .dci{background:var(--green-l);box-shadow:inset 0 0 0 1.5px var(--gold);cursor:pointer;}
.s-rend-fer .dci{background:var(--rend-l);box-shadow:inset 0 0 0 1.5px var(--gold);cursor:pointer;}
/* Autres non-travaillés-fériés : juste bordure dorée */
.s-absent-fer .dci,.s-ec2-fer .dci{box-shadow:inset 0 0 0 1.5px var(--gold);cursor:pointer;}
[data-theme=light] .ann-day.tv-fer{background:var(--blue-m);}
.wdot{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:18px;filter:grayscale(1);pointer-events:none;z-index:2;border-radius:var(--r);}
.sdot{position:absolute;top:3px;right:3px;width:5px;height:5px;border-radius:50%;}
.sdot-ok{background:#4caf50;}
.sdot-no{background:var(--red);}

/* Quintic week view cells — compact, non-interactive, no ferie border */
#week-view-overlay .dc{height:39px!important;aspect-ratio:unset!important;padding-top:0!important;min-width:0}
#week-view-overlay .dci{cursor:default!important;pointer-events:none!important;box-shadow:none!important}
#week-view-overlay .dci:active{transform:none!important}
#week-view-overlay .dv{font-size:9px!important;letter-spacing:0!important;color:rgba(255,255,255,.72);}
[data-theme=light] #week-view-overlay .dv{color:var(--text2);}
#week-view-overlay .s-tv-ov .dv,#week-view-overlay .s-sv-vac .dv,#week-view-overlay .s-ec .dv{color:var(--red);}
/* Quintic week picker */
#wv-picker{position:absolute;left:0;right:0;bottom:0;background:var(--bg0);z-index:5;overflow-y:auto;-webkit-overflow-scrolling:touch;animation:wvFadeIn .15s ease}
@keyframes wvFadeIn{from{opacity:0}to{opacity:1}}
.wv-wgrid{display:grid;grid-template-columns:repeat(5,1fr);gap:6px;padding:14px 12px}
.wv-wpill{background:var(--bg2);border:0.5px solid var(--border);border-radius:8px;padding:8px 4px;text-align:center;cursor:pointer;transition:background .1s}
.wv-wpill:active{background:var(--bg3)}
.wv-wpill.wv-cur{background:var(--blue);border-color:transparent}
.wv-wpill.wv-sel{border-color:var(--blue)}
.wv-wpnum{font-size:13px;font-weight:600;color:var(--text)}
.wv-wpdate{font-size:9px;color:var(--text3);margin-top:2px}
.wv-wpill.wv-cur .wv-wpnum,.wv-wpill.wv-cur .wv-wpdate{color:#fff}
.wv-wpill.wv-sel .wv-wpnum{color:var(--blue)}
.wv-skel{background:var(--bg2);border-radius:4px;animation:wvPulse 1.4s ease-in-out infinite;}
@keyframes wvPulse{0%,100%{opacity:.3}50%{opacity:.75}}

/* Legend */
.leg{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:6px;align-items:center;justify-content:center;width:100%;}
.li{display:flex;align-items:center;gap:3px;color:var(--text3);font-size:10px;white-space:nowrap;}
.ld{width:8px;height:8px;border-radius:2px;flex-shrink:0;}
@media(max-width:480px){.leg{gap:4px;flex-wrap:nowrap;overflow-x:auto;}.li{font-size:9px;gap:2px;}.ld{width:6px;height:6px;}.dc{aspect-ratio:auto;padding-top:105%;}.dn{font-size:15px;}.dv{font-size:11px;}.cal td{padding:4px;}}

/* Side counters */
.ctr-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;}
.ctr{background:var(--bg2);border-radius:var(--r);padding:12px 12px;border:0.5px solid var(--border);box-shadow:var(--shadow-s);}
.ctr.clk{cursor:pointer;transition:background .15s;}
@media(hover:hover){.ctr.clk:hover{background:var(--bg2h);}}
.ctr.clk:active{transform:scale(.96);box-shadow:none;transition:transform .08s,box-shadow .08s;}
/* "Créés ce mois" wide with detail */
.ctr.wide{grid-column:1/-1;}
.ctr-wide-inner{display:flex;align-items:flex-start;justify-content:space-between;gap:6px;}
.ctr-detail{display:flex;flex-direction:column;gap:2px;padding-top:1px;min-height:56px;justify-content:flex-start;}
.ctr-dot-row{display:flex;align-items:center;gap:3px;font-size:10px;color:var(--text3);}
.rdot{width:6px;height:6px;border-radius:50%;flex-shrink:0;}
.clbl{font-size:11px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.07em;margin-bottom:4px;}
.cval{font-size:17px;font-weight:600;line-height:1;font-variant-numeric:tabular-nums;letter-spacing:-.01em;}
.csub{font-size:10px;color:var(--text3);margin-top:2px;}

.bloc{background:var(--bg2);border:0.5px solid var(--border);border-radius:var(--rl);padding:10px 12px;box-shadow:var(--shadow-m);}
.bloc.clk{cursor:pointer;transition:background .15s,transform .12s,box-shadow .15s;}
@media(hover:hover){.bloc.clk:hover{background:var(--bg2h);}}
.bloc.clk:active{transform:scale(.985);box-shadow:var(--shadow-s);transition:transform .08s,box-shadow .08s;}
.bloc.clk.active,.ctr.clk.active{background:var(--bg3);}
.btit{font-size:11px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.07em;margin-bottom:7px;}

/* Eph soldes row */
.eph-soldes{display:flex;align-items:center;margin-bottom:14px;padding-top:10px;padding-bottom:14px;border-bottom:0.5px solid var(--border2);}
.eph-sol{flex:1;text-align:center;padding:6px 4px;}
.eph-sol-lbl{font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:.04em;margin-bottom:3px;}
.eph-sol-val{font-size:17px;font-weight:600;color:var(--blue);line-height:1;}
.eph-sol-sub{font-size:9px;color:var(--text3);margin-top:2px;}
.eph-sol-sep{width:0.5px;background:var(--border);flex-shrink:0;align-self:stretch;margin:2px 4px;}
/* Eph unified table */
.eph-urow{display:flex;align-items:flex-start;font-size:11px;gap:4px;padding:3px 0;}
.eph-u-mc{width:42px;flex-shrink:0;color:var(--text2);font-size:10px;padding-top:1px;}
.eph-u-flow{flex:1;display:flex;align-items:center;gap:2px;min-width:0;}
.eph-u-cre{font-size:9px;color:var(--text3);}
.eph-u-dispo{font-weight:500;}
.eph-u-exp{width:48px;text-align:right;flex-shrink:0;font-size:9px;color:var(--text3);padding-top:1px;}
.eph-urow.expired{opacity:.45;}
.eph-urow.fut .eph-u-mc,.eph-urow.fut .eph-u-dispo{color:var(--text3);}
.eph-rep-btns{display:flex;gap:2px;justify-content:flex-end;align-items:center;}
.eph-rep-btn{font-size:9px;padding:2px 4px;border-radius:3px;border:1px solid var(--border2);background:transparent;color:var(--text3);cursor:pointer;font-family:inherit;line-height:1.3;-webkit-tap-highlight-color:transparent;}
.eph-rep-btn.rep-on{background:var(--blue);border-color:var(--blue);color:#fff;}
.eph-rep-btn.rep-warn{border-color:var(--rend-text);color:var(--rend-text);}
.eph-rep-btn.rep-1m{background:var(--orange);border-color:var(--orange);color:#fff;}
/* Eph table — responsive bar (legacy, still used in modals) */
.eph-row{display:flex;align-items:center;font-size:11px;gap:4px;padding:2px 0;}
.eph-mc{width:54px;flex-shrink:0;color:var(--text2);white-space:nowrap;}
.eph-bc{flex:1;min-width:0;}
.eph-bw{width:100%;height:4px;background:var(--bg3);border-radius:3px;overflow:hidden;position:relative;}
.eph-b,.eph-b2{height:4px;border-radius:3px;position:absolute;top:0;left:0;transition:width .3s;}
.eph-vc{width:48px;text-align:right;flex-shrink:0;font-weight:500;white-space:nowrap;}
.eph-ec{width:46px;text-align:right;flex-shrink:0;font-size:10px;color:var(--text3);white-space:nowrap;}
.eph-rbtn{font-size:8px;padding:1px 4px;border:0.5px solid var(--border);border-radius:4px;background:transparent;color:var(--text3);cursor:pointer;flex-shrink:0;width:26px;text-align:center;}
.eph-row.exp .eph-vc{color:var(--text3);text-decoration:line-through;}
.eph-row.fut .eph-mc,.eph-row.fut .eph-vc{color:var(--text3);}

/* History */
.hrow{display:flex;align-items:flex-start;gap:6px;padding:5px 0;border-bottom:0.5px solid var(--border2);font-size:11px;}
.hrow:last-child{border-bottom:none;}
.hdot{width:6px;height:6px;border-radius:50%;flex-shrink:0;margin-top:3px;}
.htime{color:var(--text3);font-size:10px;min-width:32px;}
.hdesc{color:var(--text);flex:1;}

/* Entrance animations */
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes cellPop{0%{transform:scale(1)}40%{transform:scale(1.12)}75%{transform:scale(.96)}100%{transform:scale(1)}}
.dci.pop{animation:cellPop .38s cubic-bezier(.34,1.56,.64,1);}

/* Modal */
@keyframes sheetUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
@keyframes overlayIn{from{opacity:0}to{opacity:1}}
@keyframes dialogIn{from{opacity:0;transform:scale(.96)}to{opacity:1;transform:scale(1)}}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);z-index:200;display:flex;align-items:flex-end;justify-content:center;}
.overlay.behind{z-index:100;}
.sheet{background:var(--bg2);border-radius:20px 20px 0 0;padding:16px 16px 44px;width:100%;max-width:520px;max-height:90vh;overflow-y:auto;touch-action:pan-y;overscroll-behavior:contain;user-select:none;-webkit-user-select:none;-webkit-touch-callout:none;animation:sheetUp .32s cubic-bezier(.32,.72,0,1);}
@media(min-width:721px){
  .overlay{align-items:center;}
  .sheet{border-radius:14px;padding:24px 24px 20px;animation:dialogIn .15s ease;max-height:85vh;touch-action:auto;}
  .sh{display:none;}
}
.sh-x{display:none;width:28px;height:28px;border-radius:50%;border:none;background:transparent;cursor:pointer;align-items:center;justify-content:center;color:var(--text3);padding:0;font-size:16px;transition:background .1s;flex-shrink:0;}
.sh-x:hover{background:var(--bg3);}
.sh-hdr{display:none;justify-content:flex-end;margin-bottom:10px;}
.stabs-row{display:flex;align-items:center;gap:8px;margin:0 0 14px;flex-shrink:0}
.stabs-bar{flex:1;display:flex;background:var(--bg3);border-radius:10px;padding:3px;gap:2px;position:relative;z-index:0}
.stabs-sp{display:none}
@media(min-width:721px){.sh-x{display:flex;}.sh-hdr{display:flex;}
.st{display:flex;justify-content:space-between;align-items:center;}
.smod{display:flex;flex-direction:column;overflow:hidden}
.stabs-bar{flex:1}
.stabs-bar5{flex:1}
.stabs-sp{display:block;width:28px;flex-shrink:0}
.stabs-body{flex:1;overflow-y:auto;min-height:0}}
.sh{width:36px;height:4px;background:var(--border);border-radius:2px;margin:0 auto 14px;}
.st{font-size:15px;font-weight:600;margin-bottom:3px;}
.ss{font-size:12px;color:var(--text2);margin-bottom:12px;}
.mrow{display:flex;flex-direction:column;gap:3px;margin-bottom:8px;}
.mrow label{font-size:11px;color:var(--text2);}
.mrow select,.mrow input{padding:10px 12px;border:0.5px solid var(--border);border-radius:var(--r);font-size:14px;background:var(--bg2);color:var(--text);width:100%;-webkit-appearance:none;}
.mr2{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px;align-items:end;}
.mr2>div{display:flex;flex-direction:column;gap:3px;}
.mr2>div label{font-size:11px;color:var(--text2);}
.mr2>div select,.mr2>div input{padding:10px 12px;border:0.5px solid var(--border);border-radius:var(--r);font-size:14px;background:var(--bg2);color:var(--text);width:100%;-webkit-appearance:none;}
.sheet select{touch-action:auto;}
.mcb{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--text2);margin-bottom:6px;cursor:pointer;padding:4px 0;}
.mcb input[type=checkbox]{width:18px;height:18px;accent-color:var(--blue);cursor:pointer;}
.mbtns{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px;}
.mb{padding:6px 6px;border:0.5px solid var(--border);border-radius:var(--r);font-size:13px;cursor:pointer;background:var(--bg2);color:var(--text);text-align:center;line-height:1.4;transition:opacity .1s;min-height:42px;display:flex;align-items:center;justify-content:center;flex-direction:column;}
.mb:hover{opacity:.82;}.mb:active{opacity:.65;}
.mb.pri{background:var(--blue);color:#fff;border-color:transparent;}
.mb.del{border-color:#d09595;color:var(--red);background:rgba(192,57,43,.1);}
.mb.amb{border-color:#c09030;color:#d4a030;background:rgba(200,160,48,.1);}
.mb.grn{background:var(--green-l);color:var(--green);border-color:var(--green-m);}
[data-theme=light] .mb.grn{color:var(--green);}
.mb.wide{grid-column:1/-1;}
.mb.ghost{background:transparent;}
.mcancel{width:100%;padding:11px;border:none;background:transparent;font-size:14px;color:var(--text3);cursor:pointer;margin-top:4px;}
.mcancel.mclose{display:none;}
.sep{height:0.5px;background:var(--border2);margin:10px 0;}
.minfo{font-size:12px;color:var(--blue);background:var(--blue-l);border-radius:var(--r);padding:8px 12px;margin-bottom:8px;}
.chip-info{font-size:10px;padding:2px 6px;border-radius:10px;background:var(--gold-l);color:var(--gold-dark);}
.stag{background:rgba(255,255,255,0.11);border:0.5px solid var(--border);border-radius:5px;padding:1px 6px;font-size:11px;font-weight:600;}
[data-theme=light] .stag{background:rgba(0,0,0,0.09);}

/* Exchange */
.exchange-days{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:8px;}
.exchange-day{flex:0 0 auto;padding:6px 10px;border-radius:var(--r);border:0.5px solid var(--border);background:var(--bg2);cursor:pointer;font-size:11px;text-align:center;transition:all .1s;min-width:38px;}
.exchange-day.sel{background:var(--blue-l);border-color:var(--blue-m);color:var(--blue);font-weight:600;}
.exchange-day.current{background:var(--blue);color:#fff;border-color:var(--blue);}

/* Settings / profile */
.srow{display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:0.5px solid var(--border2);}
.srow:last-child{border-bottom:none;}
.slbl{font-size:13px;color:var(--text);}
.tgl{position:relative;width:44px;height:26px;flex-shrink:0;}
.tgl input{opacity:0;width:0;height:0;}
.tgl-s{position:absolute;inset:0;background:var(--bg3);border-radius:13px;cursor:pointer;transition:.2s;}
.tgl input:checked+.tgl-s{background:var(--blue);}
.tgl-s:before{content:'';position:absolute;width:20px;height:20px;left:3px;top:3px;background:#fff;border-radius:50%;transition:.2s;}
.tgl input:checked+.tgl-s:before{transform:translateX(18px);}
.pit{display:flex;align-items:center;justify-content:space-between;padding:8px 10px;border-radius:var(--r);cursor:pointer;border:0.5px solid transparent;margin-bottom:0;transition:background .1s;min-height:40px;}
.pit.act{background:var(--bg3);border-color:var(--border);cursor:default;}
.pit:not(.act){background:var(--bg2);opacity:.8;}
.pname{font-size:13px;font-weight:500;}
.pdel,.pgear{background:transparent;border:none;color:var(--text2);cursor:pointer;font-size:13px;padding:2px 5px;border-radius:var(--r);}
.pdel:hover{color:#c0392b;background:rgba(192,57,43,.12);}
.pit-wrap{margin-bottom:4px;}
.ps-panel{display:block;padding:8px 10px 10px;border-radius:0 0 var(--r) var(--r);background:var(--bg3);border:none;border-top:none;margin-top:-2px;}
.svi{display:flex;align-items:center;justify-content:space-between;padding:7px 10px;background:var(--bg2);border-radius:var(--r);margin-bottom:5px;font-size:12px;}
.svn{font-weight:500;}.svd{color:var(--text3);font-size:11px;}
.svdel{background:transparent;border:none;color:var(--text3);cursor:pointer;font-size:13px;}
.np-toggle{width:100%;padding:11px;border:0.5px solid var(--border);border-radius:var(--r);font-size:13px;cursor:pointer;background:var(--bg2);color:var(--text);text-align:left;display:flex;align-items:center;gap:8px;margin-top:8px;}
.np-body{display:none;overflow:hidden;max-height:800px;opacity:1;transition:max-height .3s ease,opacity .25s;}
.np-body.open{display:block;}

/* Dropdown */
.dropdown{position:absolute;right:0;top:calc(100% + 4px);background:var(--bg3);border:none;border-radius:var(--rl);box-shadow:0 8px 32px rgba(0,0,0,.25);width:300px;max-width:calc(100vw - 16px);max-height:calc(100vh - 80px);overflow-y:auto;overflow-x:hidden;padding:12px 14px 16px;z-index:300;}
.dd-title{font-size:13px;font-weight:600;margin-bottom:10px;color:var(--text);}
.dd-acc{border-bottom:0.5px solid var(--border);}
.dd-acc:last-of-type{border-bottom:none;}
.dd-acc-hdr{display:flex;align-items:center;justify-content:space-between;padding:9px 0;cursor:pointer;font-size:11px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.05em;}
.dd-acc-hdr:hover{color:var(--text);}
.dd-acc-chev{font-size:13px;color:var(--text3);transition:transform .15s;line-height:1;display:inline-block;}
.dd-acc-hdr.open .dd-acc-chev{transform:rotate(90deg);}
.dd-acc-body{display:none;height:180px;overflow-y:auto;}

/* PWA */
.pwa{background:var(--blue-l);border:0.5px solid var(--blue-m);border-radius:var(--r);padding:9px 12px;margin-bottom:8px;font-size:12px;color:var(--blue);display:flex;align-items:center;gap:8px;}
.pwa button{background:transparent;border:none;color:var(--text3);font-size:16px;cursor:pointer;margin-left:auto;}

/* Recap */
.recap-row{display:flex;justify-content:space-between;align-items:center;min-height:22px;font-size:11px;padding:2px 0;color:var(--text2);}
.recap-row b{font-weight:600;}
@keyframes gcal-breathe{0%,100%{opacity:.25;}50%{opacity:1;}}
@keyframes gcal-done{0%,100%{opacity:.3;}50%{opacity:1;}}
@keyframes gcal-spin{to{transform:rotate(360deg);}}
.gcal-pending #gcal-status{animation:gcal-breathe 2.5s ease-in-out infinite;}
.gcal-clearing #gcal-progress-circle{stroke:#b87878 !important;stroke-dashoffset:20.42;animation:gcal-spin 1s linear infinite;transform-origin:center;transform-box:fill-box;}
.gcal-syncing #gcal-status{animation:gcal-breathe 2.5s ease-in-out infinite;}
.gcal-syncing #gcal-progress-circle{stroke:#62aadc !important;stroke-dashoffset:61.26;animation:gcal-spin 1s linear infinite;transform-origin:center;transform-box:fill-box;}
.gcal-done-anim #gcal-status{animation:gcal-done 1.5s ease-in-out 3;}
#gcal-status{transition:opacity .3s;}
#gcal-progress-circle{transition:stroke-dashoffset .2s linear;}
input[type=number]::-webkit-inner-spin-button,input[type=number]::-webkit-outer-spin-button{-webkit-appearance:none;margin:0;}input[type=number]{-moz-appearance:textfield;}
/* Transparent scrollbar */
::-webkit-scrollbar{width:6px;height:6px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:rgba(128,128,128,.3);border-radius:3px;}
* {scrollbar-width:thin;scrollbar-color:rgba(128,128,128,.3) transparent;}


.bloc.clk:active{background:var(--bg2h);}
.ctr.clk:active{background:var(--bg2h);}
body.modal-open .bloc.clk:hover,body.modal-open .ctr.clk:hover{background:var(--bg2) !important;}
body.modal-open{overflow:hidden;position:fixed;width:100%;left:0;right:0;overscroll-behavior:none;}
@media (hover:hover){
.bloc.clk:hover{background:var(--bg2h);}
.ctr.clk:hover{background:var(--bg2h);}
.ibtn:hover{background:var(--bg3);}
.mnav:hover{background:var(--bg3);}
.mtit:hover{background:var(--bg3);}
.ann-month:hover{background:var(--bg2);}[data-theme=light] .ann-month:hover{background:var(--bg2);}
.cal td:hover .dci{filter:brightness(1.22);}
.s-sv .dci:hover,.s-rh .dci:hover,.s-ec2 .dci:hover{background:rgba(255,255,255,.08);}
.ctr.clk:hover{background:var(--bg2h);}
.bloc.clk.active:hover,.ctr.clk.active:hover{background:var(--bg2h);}
.eph-rbtn:hover{background:var(--bg3);}
.exchange-day:hover{background:var(--bg3);}
.pit:not(.act):hover{opacity:.92;background:var(--bg3);}
.pgear:hover{color:var(--blue);}
::-webkit-scrollbar-thumb:hover{background:rgba(128,128,128,.5);}
}</style>

  const dr=_toMinApp(rv.deb),fr0=_toMinApp(rv.fin);

    const fm=fm0<=dm?fm0+1440:fm0,fr=fr0<=dr?fr0+1440:fr0;

function calcSoldes(){
  const gen=buildGen(),createdYM=(S.profile&&S.profile.ephSoldeCreatedYM!==undefined)?S.profile.ephSoldeCreatedYM:2026*12;
  const realEph={},prevEph={};
  for(let ym=createdYM;ym<=TODAY_YM;ym++)realEph[ym]=0;
  Object.keys(gen).forEach(ymStr=>{const ym=Number(ymStr),total=Object.values(gen[ym]).reduce((s,v)=>s+v,0),expYm=getExpYm(ym);if(ym>TODAY_YM){prevEph[ym]=total;return;}realEph[ym]=expYm<TODAY_YM?0:total;});

  const _fifoWarnKeys=new Set();
  const preExpiry={};
  {
    const _mK=new Set(Object.keys(S.matelasKeys||{}));
    const _rendKeys=Object.keys(S.conges||{}).filter(k=>S.conges[k]==='rend').sort();
    const _sim={};
    // Use historical gen totals (not expiry-zeroed realEph) so past rendu days consume the correct month's stock.
    // Per-day expiry is enforced by the getBaseExpYm(_ym)<_poseYm check in the loop below.
    Object.keys(realEph).forEach(function(ym){var ymN=Number(ym);_sim[ymN]=gen[ymN]?Object.values(gen[ymN]).reduce(function(s,v){return s+v;},0):0;});
    Object.keys(prevEph).forEach(function(ym){_sim[ym]=(_sim[ym]||0)+prevEph[ym];});
    _rendKeys.forEach(function(k){
      const _d=new Date(k+'T12:00:00'),_poseYm=_d.getFullYear()*12+_d.getMonth(),_dur=getDur(_d);
      let _left=_dur;
      const _yms=Object.keys(_sim).map(Number).sort();
      for(const _ym of _yms){
        if(_sim[_ym]<=0||getBaseExpYm(_ym)<_poseYm||_ym>_poseYm)continue;
        const _take=Math.min(_sim[_ym],_left);_sim[_ym]-=_take;_left-=_take;
        if(_left<=0)break;
      }
      if(_left>0&&!_mK.has(k))_fifoWarnKeys.add(k);
    });
    // Capture pre-expiry balance for expired months before zeroing (needed for auto-report check)
    Object.keys(realEph).forEach(function(ym){var ymN=Number(ym);if(getExpYm(ymN)<TODAY_YM)preExpiry[ymN]=Math.max(0,_sim[ymN]||0);});

}

function calcCongesUsedForYear(year){
  // Filter conges keys to that year only, then apply full calcCongesUsed logic
  const allCgKeys=Object.keys(S.conges||{}).filter(k=>S.conges[k]==='cg').sort();
  const yearKeys=allCgKeys.filter(k=>k.startsWith(String(year)+'-'));
  if(!yearKeys.length)return 0;
  const cgSet=new Set(allCgKeys);// full set for écart rule

  function isFullWeekCP(monday){
    const monKey=dk(monday);

    for(var i=0;i<7;i++){
      const d=new Date(monday);d.setDate(monday.getDate()+i);
      const v2=getVac(d);
      const isWorked=v2.vac&&v2.vac!=='RH'&&!v2.absent;
      if(isWorked&&!cgSet.has(dk(d)))return false;
    }
    return true;
  }

  yearKeys.forEach(function(k){
    const d=new Date(k+'T12:00:00'),mon=getMonday(d),mk=dk(mon);
    if(seenMon.has(mk))return;seenMon.add(mk);
    if(isFullWeekCP(mon)){fullWeeks.add(mk);total+=5;}
  });
  const partialKeys=yearKeys.filter(function(k){
    const d=new Date(k+'T12:00:00');return!fullWeeks.has(dk(getMonday(d)));
  });
  if(!partialKeys.length)return total;
  function findReprise(fromDate){
    const sd=new Date(fromDate);sd.setDate(sd.getDate()+1);
    while(sd<=new Date('2031-01-01')){

  }

function computeCongesRest(year){

function getCongesAnc(year){const pr=S.profile||{};const ym=year*12+11;let yrs=0;if(pr.ancYears!=null&&pr.ancRefYM!=null){const anni=typeof pr.ancMoisAnni==='number'&&pr.ancMoisAnni>=0?pr.ancMoisAnni:-1;yrs=pr.ancYears;if(anni>=0){const minYM=Math.min(pr.ancRefYM,ym),maxYM=Math.max(pr.ancRefYM,ym);let cnt=0;for(let y=Math.floor(minYM/12);y<=Math.floor(maxYM/12)+1;y++){const aym=y*12+anni;if(aym>minYM&&aym<=maxYM)cnt++;}yrs=ym>=pr.ancRefYM?yrs+cnt:yrs-cnt;}yrs=Math.max(0,yrs);}else if(pr.ancYears!=null)yrs=pr.ancYears;return calcCongesAncJours(yrs);}

function tvSlot(vac){
  const deb=_toMinApp((getVAC()[vac]||{}).deb);
  if(deb===null||deb===undefined||isNaN(deb))return'tv';
  if(deb<480)return'tv-am';
  if(deb<840)return'tv';
  return'tv-pm';
}
function getState(date){
  const key=dk(date),v2=getVac(date),{vac,ov,fromSV,absent,echange,ecSelf}=v2;
  if(absent)return'absent';
  const c=(S.conges||{})[key];
  // Échange: ec=rouge (I work it), ec2=grey (colleague covers)
  if(echange){
    if(!ecSelf)return FERIES.has(key)?'ec2-fer':'ec2';
    if(FERIES.has(key))return'ec-fer';
    return'ec';
  }
  if(FERIES.has(key)){
    if(c==='cg')return'cg-fer';
    if(c==='rend'||c==='rend-hist')return'rend-fer';
    if(absent)return'absent-fer';
    if(!ecSelf&&echange)return'ec2-fer';
    if(vac&&vac!=='RH')return fromSV?'sv-vac-fer':(tvSlot(vac)+'-fer');
    return'fer';
  }
  if(!vac){
    const _ovr=(S.overrides||{})[key];
    return(_ovr&&_ovr.fromSV&&!_ovr.echange)?'sv-ov':'sv';
  }
  if(vac==='RH')return'rh';
  if(c==='cg')return'cg';if(c==='rend'||c==='rend-hist')return'rend';
  if(ov&&!fromSV&&vac&&vac!=='RH')return FERIES.has(key)?'tv-ov-fer':'tv-ov';
  return fromSV?'sv-vac':tvSlot(vac);
}
function buildRameeSet(y,m){
  const set=new Set(),seen=new Set(),last=new Date(y,m+1,0).getDate();
  for(let d=1;d<=last;d++){const date=new Date(y,m,d),mon=getMonday(date),mk=dk(mon);if(seen.has(mk))continue;seen.add(mk);if(isSemaineRamenée(mon)){for(let i=0;i<7;i++){const dd=new Date(mon);dd.setDate(mon.getDate()+i);set.add(dk(dd));}}}
  return set;
}

function getISOWeek(date){
  const d=new Date(Date.UTC(date.getFullYear(),date.getMonth(),date.getDate()));
  const dayNum=d.getUTCDay()||7;
  d.setUTCDate(d.getUTCDate()+4-dayNum);
  const yearStart=new Date(Date.UTC(d.getUTCFullYear(),0,1));
  return Math.ceil((((d-yearStart)/86400000)+1)/7);
}

// Auto-report: at the start of the expiry month, if remaining balance ≤7h,
// silently extend by 1 month. Warning phase (month before): green color only.
function autoReportEph(){
  if(!S.autoExtend)S.autoExtend={};
  const saved=Object.assign({},S.autoExtend);
  Object.keys(S.autoExtend).forEach(function(k){delete S.autoExtend[k];});
  const{preExpiry}=calcSoldes();
  let changed=false;
  const manExt=S.ephExtend||{};
  const allYms=new Set([...Object.keys(saved).map(Number),...Object.keys(preExpiry).map(Number),...Object.keys(manExt).map(Number)]);
  allYms.forEach(function(ym){
    if(ym>TODAY_YM)return;
    const prevAuto=saved[ym]||0;
    const manLevel=typeof manExt[ym]==='number'?manExt[ym]:(manExt[ym]?1:0);
    const currentLevel=Math.max(prevAuto,manLevel);
    const expAtLevel=ym+3+currentLevel*3;
    if(expAtLevel>=TODAY_YM){
      // Not yet expired at current level — preserve existing auto level
      if(prevAuto>0){S.autoExtend[ym]=prevAuto;if(saved[ym]!==prevAuto)changed=true;}
      return;
    }
    // Past expiry at current level — try to escalate
    const avail=preExpiry[ym]||0;
    if(avail>0&&avail<=420&&currentLevel<3){
      S.autoExtend[ym]=currentLevel+1;
      if(saved[ym]!==currentLevel+1)changed=true;
    } else if(avail>0&&avail<=420&&currentLevel>=3){
      S.autoExtend[ym]=3;
      if(saved[ym]!==3)changed=true;
    }
  });
  if(changed){recalcAllMatelas();saveState();}
}
function ephBarColor(moLeft,isExp){

  if(moLeft<=1){
    const t=moLeft;
    const r=Math.round(226+(186-226)*t);const g=Math.round(75+(152-75)*t);const b=Math.round(74+(23-74)*t);
    return'rgb('+r+','+g+','+b+')';
  } else {

    return'rgb('+r+','+g+','+b+')';
  }
}

function calcNuitMinShift(v){
  if(!v||!v.deb||!v.fin)return 0;
  let deb=_toMinApp(v.deb),fin=_toMinApp(v.fin);
  if(deb===null||fin===null)return 0;
  if(fin<deb)fin+=1440;
  const n1=Math.max(0,Math.min(fin,360)-Math.max(deb,0));     // 0h-6h (matin)
  const n2=Math.max(0,Math.min(fin,1440)-Math.max(deb,1260)); // 21h-24h
  const n3=Math.max(0,Math.min(fin,1800)-Math.max(deb,1440)); // 0h-6h (après minuit)
  return n1+n2+n3;
}
function calcNuitWeek(monday){
  const VAC=getVAC();let nuit=0;
  for(let i=0;i<7;i++){
    const d=new Date(monday);d.setDate(monday.getDate()+i);
    const key=dk(d);const{vac,absent,echange,ecSelf}=getVac(d);
    if(absent)continue;
    const _cg=(S.conges||{})[key];
    if(_cg&&(_cg==='cg'||_cg==='rend'||_cg==='rend-hist'||_cg==='absent'))continue;
    if(echange&&!ecSelf)continue;
    if(!vac||vac==='RH')continue;
    nuit+=calcNuitMinShift(VAC[vac]);
  }
  return nuit;

function calcNuitMois(y,m){

function getDayVacs(dw,allVK){
  // lun-ven: A*, B*, C*, D*, P423 (pas de s/d suffixe)
  // sam: *s ou As*
  // dim: *d ou Ad*
  var night=['D1','D2','Es','Ed','Fs','Fd','P423'];
  var week=['A1','A2','A3','B1','C1','C2'];
  var sat=['As1','As2','As3','Cs','Es','Fs'];
  var sun=['Ad1','Ad2','Ad3','Cd','Ed','Fd'];
  var base;
  if(dw===6) base=[...new Set([...sat,...night.filter(v=>!sat.includes(v))])];
  else if(dw===0) base=[...new Set([...sun,...night.filter(v=>!sun.includes(v))])];
  else base=[...new Set([...week,...night.filter(v=>!week.includes(v))])];
  var std=base.filter(v=>allVK.includes(v));
  var stdAll=[...week,...sat,...sun,...night];
  var custom=allVK.filter(v=>!stdAll.includes(v));

}

  });
}

function calcDispoAtDate(targetDate){
  // Heures disponibles à targetDate :
  // - heures réelles dispo aujourd'hui, non expirées à targetDate
  // - heures futures créées avant targetDate et non expirées à targetDate
  const cs=calcSoldes();
  let dispo=0;
  // Real months: include only if not expired at targetDate
  Object.keys(cs.realAvail).forEach(function(ymStr){
    const ym=Number(ymStr);
    const avail=cs.realAvail[ym];
    if(avail<=0)return;
    const expYm=getExpYm(ym);
    const expDate=new Date(Math.floor(expYm/12),expYm%12+1,0);
    if(expDate>=targetDate)dispo+=avail;
  });
  // Future months: created before targetDate, not expired at targetDate
  Object.keys(cs.prevEph).forEach(function(ymStr){
    const ym=Number(ymStr);
    const total=cs.prevEph[ym];
    if(total<=0)return;
    const lastDayOfMonth=new Date(Math.floor(ym/12),ym%12+1,0);
    if(lastDayOfMonth>targetDate)return; // not yet created at targetDate
    const expYm=getExpYm(ym);
    const expDate=new Date(Math.floor(expYm/12),expYm%12+1,0);
    if(expDate>=targetDate)dispo+=total;
  });
  return dispo;
}

// Returns truly free ephemeral minutes for a given viewed month.
// Future rendus run with >viewedYM credits preferred first; they only fall back
// to ≤viewedYM credits when those are actually accessible (expiry >= their poseYm).
// Remaining ≤viewedYM eligible credits after all passes = dispo.
function calcTrueDispo(viewedYM){
  const gen=buildGen();
  const createdYM=(S.profile&&S.profile.ephSoldeCreatedYM!==undefined)?S.profile.ephSoldeCreatedYM:2026*12;
  const _sim={};
  for(let ym=createdYM;ym<=TODAY_YM;ym++)_sim[ym]=0;
  Object.keys(gen).forEach(function(ymStr){
    const ym=Number(ymStr),total=Object.values(gen[ym]).reduce(function(s,v){return s+v;},0);
    _sim[ym]=total; // use gen totals; per-day getExpYm<_pym check handles expiry; step 3 filters by current expiry
  });
  const _all=Object.keys(S.conges||{}).filter(function(k){return S.conges[k]==='rend';}).sort();
  const _sortedYms=Object.keys(_sim).map(Number).sort();
  // Snapshot brut before step 1
  const genSnapshot=[];
  _sortedYms.forEach(function(ym){if(ym<=viewedYM&&getExpYm(ym)>=viewedYM&&_sim[ym]>0)genSnapshot.push({ym,amount:_sim[ym],expYm:getExpYm(ym)});});
  // Step 1: FIFO for rendus ≤ viewedYM (they have priority, use all ≤ their month)
  _all.filter(function(k){const d=new Date(k+'T12:00:00');return d.getFullYear()*12+d.getMonth()<=viewedYM;})
    .forEach(function(k){
      const _d=new Date(k+'T12:00:00'),_pym=_d.getFullYear()*12+_d.getMonth(),_dur=getDur(_d);
      let _lft=_dur;
      _sortedYms.forEach(function(_ym){
        if(_lft<=0||_sim[_ym]<=0||getBaseExpYm(_ym)<_pym||_ym>_pym)return;
        const _tk=Math.min(_sim[_ym],_lft);_sim[_ym]-=_tk;_lft-=_tk;
      });
    });
  // Snapshot stock actif after step 1 (before future rendus consume any)
  let stockActif=0;
  _sortedYms.forEach(function(ym){if(ym<=viewedYM&&getExpYm(ym)>=viewedYM)stockActif+=(_sim[ym]||0);});
  const afterStep1=[];
  _sortedYms.forEach(function(ym){if(ym<=viewedYM&&getExpYm(ym)>=viewedYM&&_sim[ym]>0)afterStep1.push({ym,amount:_sim[ym],expYm:getExpYm(ym)});});
  // Step 2: Future rendus — prefer >viewedYM credits first, then fall back to ≤viewedYM
  const reservedMonths=new Set();
  const reservedDetail=[];
  _all.filter(function(k){const d=new Date(k+'T12:00:00');return d.getFullYear()*12+d.getMonth()>viewedYM;})
    .forEach(function(k){
      const _d=new Date(k+'T12:00:00'),_pym=_d.getFullYear()*12+_d.getMonth(),_dur=getDur(_d);
      let _lft=_dur;
      _sortedYms.forEach(function(_ym){
        if(_lft<=0||_sim[_ym]<=0||getExpYm(_ym)<_pym||_ym>_pym||_ym<=viewedYM)return;
        const _tk=Math.min(_sim[_ym],_lft);_sim[_ym]-=_tk;_lft-=_tk;
      });
      if(_lft>0){
        const beforeFallback=_lft;
        _sortedYms.forEach(function(_ym){
          if(_lft<=0||_sim[_ym]<=0||getExpYm(_ym)<_pym||_ym>_pym||_ym>viewedYM)return;
          const _tk=Math.min(_sim[_ym],_lft);_sim[_ym]-=_tk;_lft-=_tk;
        });
        const consumed=beforeFallback-_lft;
        if(consumed>0){reservedMonths.add(_pym);reservedDetail.push({poseYm:_pym,amount:consumed});}
      }
    });
  // Step 3: remaining ≤viewedYM credits with expiry ≥viewedYM = what's genuinely free
  let dispo=0;
  const breakdown=[];
  _sortedYms.forEach(function(ym){
    if(ym<=viewedYM&&getExpYm(ym)>=viewedYM&&_sim[ym]>0){
      dispo+=_sim[ym];
      breakdown.push({ym,amount:_sim[ym]});
    }
  });
  const reserved=Math.max(0,stockActif-dispo);
  return{total:Math.max(0,dispo),breakdown,stockActif,reserved,reservedMonths,afterStep1,reservedDetail,genSnapshot};
}

function canPlaceRendu(newKeys){
  // Double FIFO: compare existing-only deficit vs existing+new deficit.
  // Blocks if new keys are uncovered OR if they increase existing rendus' deficit.
  function _fifo(allKeys,trackSet){
    const gen=buildGen();
    const createdYM=(S.profile&&S.profile.ephSoldeCreatedYM!==undefined)?S.profile.ephSoldeCreatedYM:2026*12;
    const _sim={};
    for(let ym=createdYM;ym<=TODAY_YM;ym++)_sim[ym]=0;
    Object.keys(gen).forEach(function(ymStr){
      const ym=Number(ymStr),total=Object.values(gen[ym]).reduce(function(s,v){return s+v;},0);
      _sim[ym]=total; // use gen totals; per-day expiry check handles expiry
    });
    let tracked=0,other=0;
    allKeys.forEach(function(k){
      const _d=new Date(k+'T12:00:00'),_pym=_d.getFullYear()*12+_d.getMonth(),_dur=getDur(_d);
      let _lft=_dur;
      Object.keys(_sim).map(Number).sort().forEach(function(_ym){
        if(_lft<=0||_sim[_ym]<=0||getBaseExpYm(_ym)<_pym||_ym>_pym)return;
        const _tk=Math.min(_sim[_ym],_lft);_sim[_ym]-=_tk;_lft-=_tk;
      });
      if(_lft>0){if(trackSet&&trackSet.has(k))tracked+=_lft;else other+=_lft;}
    });
    return{tracked,other};
  }
  const _newSet=new Set(newKeys);
  const _existing=Object.keys(S.conges||{}).filter(function(k){return S.conges[k]==='rend'&&!_newSet.has(k);}).sort();
  const baseline=_fifo(_existing,null);
  const withNew=_fifo([..._existing,...newKeys].sort(),_newSet);
  // Deficit = uncovered new keys + additional burden placed on existing rendus
  return withNew.tracked+Math.max(0,withNew.other-baseline.other);
}

function _applyPoseMatelas(type,startKey,endKey){

  if(!S.conges)S.conges={};
  var _s=new Date(startKey+'T12:00:00'),_e=new Date(endKey+'T12:00:00'),_d=new Date(_s);
  var _label=type==='rend'?'rendu':'congé';

  while(_d<=_e){var k=dk(_d);var v2=getVac(_d);if(v2.vac&&v2.vac!=='RH'&&!v2.absent){var _mym=_d.getFullYear()*12+_d.getMonth();S.conges[k]=(type==='rend'&&_mym<_createdYM_m)?'rend-hist':type;}_d.setDate(_d.getDate()+1);}

}
function applyPose(type,startKey,unique){
  const endKey=unique?startKey:(document.getElementById('pose-until').value||startKey);
  const start=new Date(startKey+'T12:00:00');
  const end=new Date(endKey+'T12:00:00');

  // Conflict check: rend ↔ cg
  if(type==='cg'||type==='rend'){
    const _oppT=type==='cg'?['rend','rend-hist']:['cg'];
    var _cf=[];var _dCf=new Date(start);
    while(_dCf<=end){const _kCf=dk(_dCf),_vCf=getVac(_dCf);if(_vCf.vac&&_vCf.vac!=='RH'&&!_vCf.absent){const _exCf=(S.conges||{})[_kCf];if(_oppT.indexOf(_exCf)>=0)_cf.push(_kCf);}_dCf.setDate(_dCf.getDate()+1);}
    if(_cf.length>0){const _oppLbl=type==='cg'?'rendu':'congé';showBlockAlert('Conflit',_cf.length+' jour'+(_cf.length>1?'s':'')+' déjà posé'+(_cf.length>1?'s':'')+' comme '+_oppLbl+'. Supprimez-les avant de continuer.');return;}
  }

  // Solde check: congés
  if(type==='cg'){
    const _cgByY={};var _dCg=new Date(start);
    while(_dCg<=end){const _kCg=dk(_dCg),_vCg=getVac(_dCg);if(_vCg.vac&&_vCg.vac!=='RH'&&!_vCg.absent&&(S.conges||{})[_kCg]!=='cg'){const _yCg=_dCg.getFullYear();_cgByY[_yCg]=(_cgByY[_yCg]||0)+1;}_dCg.setDate(_dCg.getDate()+1);}
    var _cgShort=0,_cgShortY=null;
    Object.keys(_cgByY).forEach(function(_y2){const _r=computeCongesRest(Number(_y2));if(_cgByY[_y2]>_r){_cgShort=_cgByY[_y2]-_r;_cgShortY=Number(_y2);}});
    if(_cgShort>0){showBlockAlert('Solde insuffisant','Il manque '+_cgShort+' jour'+(_cgShort>1?'s':'')+' pour '+_cgShortY+'. Disponible : '+Math.max(0,computeCongesRest(_cgShortY))+' j.');return;}
  }

  // Validate rendus: full FIFO simulation including new days
  if(type==='rend'){
    const _createdYM_v=(S.profile&&S.profile.ephSoldeCreatedYM!==undefined)?S.profile.ephSoldeCreatedYM:2026*12;
    var totalRend=0;
    var _newKeys=[];
    var d0=new Date(start);
    while(d0<=end){
      const v2=getVac(d0);
      if(v2.vac&&v2.vac!=='RH'&&!v2.absent){
        const _d0ym=d0.getFullYear()*12+d0.getMonth();
        if(_d0ym>=_createdYM_v){totalRend+=getDur(d0);_newKeys.push(dk(d0));}
      }
      d0.setDate(d0.getDate()+1);
    }
    if(totalRend>0){
      const deficit=canPlaceRendu(_newKeys);
      if(deficit>0){
        const matelasAvail=(S.profile&&S.profile.matelas)||0;
        const canMatelas=matelasAvail>0&&deficit<=matelasAvail;
        const matelasBtn=canMatelas?'<button class="mb" style="background:rgba(220,160,30,.18);color:var(--amber);border-color:transparent;flex:1" onclick="_applyPoseMatelas(\''+type+'\',\''+startKey+'\',\''+endKey+'\')">Matelas <span style="font-size:11px;opacity:.8">('+fmtMin(matelasAvail)+')</span></button>':'';
        const btnsRow=canMatelas
          ?'<div style="display:flex;gap:8px">'+matelasBtn+'<button class="mb" style="flex:1" onclick="if(pendingKey)openDay(pendingKey);else closeModal()">Retour</button></div>'
          :'<button class="mb wide" onclick="if(pendingKey)openDay(pendingKey);else closeModal()">Retour</button>';
        document.getElementById('modal-root').innerHTML='<div class="overlay" style="z-index:400"><div class="sheet" style="max-height:260px"><div class="sh"></div>'
          +'<div class="st" style="color:var(--rend-text)">Rendus insuffisants</div>'
          +'<div class="ss" style="margin-bottom:16px">Il manque <b>'+fmtMin(deficit)+'</b> pour poser cette période.<br>Nécessaire : '+fmtMin(totalRend)+'</div>'
          +btnsRow
          +'</div></div>';
        return;
      }
    }

  }

  pushUndo();
  if(!S.conges)S.conges={};if(!S.overrides)S.overrides={};
  const _createdYM_w=(S.profile&&S.profile.ephSoldeCreatedYM!==undefined)?S.profile.ephSoldeCreatedYM:2026*12;
  var d=new Date(start);
  while(d<=end){
    const k=dk(d);
    const v2=getVac(d);
    const isWorked=v2.vac&&v2.vac!=='RH'&&!v2.absent;
    if(isWorked){
      if(type==='absent'){S.overrides[k]={absent:true};S.conges[k]='absent';}
      else if(type==='rend'){const _dym=d.getFullYear()*12+d.getMonth();S.conges[k]=_dym<_createdYM_w?'rend-hist':'rend';}
      else{S.conges[k]=type;}
    }
    d.setDate(d.getDate()+1);
  }
  const label=type==='cg'?'congé':type==='rend'?'rendu':'absent';
  const color=type==='cg'?'#6a9878':type==='rend'?'#A8BF7A':'#c88048';
  logH(fmtDate(start)+' -> '+label+(unique?'':' au '+fmtDate(end)),color,startKey);
  saveState();closeModal();render();
  gcalTrigger();
}

function computeSettForProfile(pr,targetYM,key){
  var ss=pr&&pr.settings?pr.settings:{};
  var base=ss[key]!==false;
  var hist=ss.settingsHistory||[];
  var active=null;
  for(var h of hist){var p2=h.since||'';if(!p2)continue;var py=parseInt(p2.split('-')[0]),pm=parseInt(p2.split('-')[1])-1;var hym=py*12+pm;if(hym<=targetYM)active=h;}
  return active?active[key]!==false:base;
}

function cancelExchange(key){
  if(!S.overrides)return;
  pushUndo();
  // Find the partner key: look for ec2 (the day we gave away) or ec (the day we took)
  const ov1=S.overrides[key];
  if(!ov1||!ov1.echange)return;
  delete S.overrides[key];
  // Also remove the partner if it references this exchange
  // Since we don't store a link, search all overrides for echange pairs in the same week
  const date=new Date(key+'T12:00:00'),mon=getMonday(date);
  for(let i=0;i<7;i++){
    const d=new Date(mon);d.setDate(mon.getDate()+i);const dk2=dk(d);
    const ov2=(S.overrides||{})[dk2];
    if(ov2&&ov2.echange){gcalClearDateId(dk2);if(dk2!==key)delete S.overrides[dk2];}
  }
  gcalClearDateId(key);delete S.overrides[key];
  removeHistoryForKey(key);
  saveState();closeModal();render();popCell(key);
  gcalTrigger();
}
function openMonthSettingsModal(mym){
  const y=Math.floor(mym/12),m=mym%12;
  const ML=['Janvier','Février','Mars','Avril','Mai','Juin','Juillet','Août','Septembre','Octobre','Novembre','Décembre'];
  const keys=['dimRendu','rhRendu','ferRendu','hsRendu'];
  const labels=['Dimanches','RH travaillés','Fériés travaillés','Heures sup.'];
  const ids=['dim','rh','fer','hs'];
  const eff=settingsForYM(mym);
  const hasAnyBp=keys.some(k=>!!_smhGet(k,mym)||(S.profile.settingsMonthly&&S.profile.settingsMonthly[mym]&&k in S.profile.settingsMonthly[mym]));
  function _tgl(i){
    const k=keys[i],id=ids[i],lbl=labels[i];
    const hasBp=!!_smhGet(k,mym);
    return '<div style="display:flex;align-items:center;justify-content:space-between;padding:7px 0;border-top:0.5px solid var(--border2)">'
      +'<span style="font-size:13px;color:var(--text2)">'+lbl+(hasBp?'<span style="margin-left:6px;font-size:9px;padding:1px 5px;border-radius:8px;background:var(--blue);color:#fff">●</span>':'')+'</span>'
      +'<label class="tgl"><input type="checkbox" id="mo-'+id+'"'+(eff[k]?' checked':'')+'><span class="tgl-s"></span></label>'
      +'</div>';
  }
  document.getElementById('modal-root').innerHTML=
    '<div class="overlay" onclick="if(event.target===this)openMergedMoisModal('+mym+',1)"><div class="sheet">'
    +'<div class="sh"></div>'
    +'<div class="st">Rendus — '+ML[m]+' '+y+'</div>'
    +'<div class="ss" style="margin-bottom:12px">Les valeurs changées se propagent aux mois suivants jusqu\'au prochain point.</div>'
    +ids.map((_,i)=>_tgl(i)).join('')
    +(hasAnyBp?'<button onclick="resetMonthSettings('+mym+')" style="margin-top:14px;width:100%;height:32px;font-size:11px;color:var(--text3);background:transparent;border:0.5px solid var(--border);border-radius:var(--r);cursor:pointer;font-family:var(--font)">Supprimer les points de ce mois</button>':'')
    +'<div style="display:flex;gap:8px;margin-top:10px">'
    +'<button class="mb" style="flex:1;font-size:11px;border:none" onclick="saveMonthSettings('+mym+',false)">Ce mois</button>'
    +'<button class="mb" style="flex:1;font-size:11px;border:none" onclick="saveMonthSettings('+mym+',true)">Ce mois et les suivants</button>'
    +'</div>'
    +'<button class="mcancel" onclick="openMergedMoisModal('+mym+',1)">Annuler</button>'
    +'</div></div>';
}
function saveMonthSettings(mym,propagate){
  const keys=['dimRendu','rhRendu','ferRendu','hsRendu'];
  const ids=['dim','rh','fer','hs'];
  const eff=settingsForYM(mym);
  for(let i=0;i<4;i++){
    const k=keys[i];
    const newVal=!!document.getElementById('mo-'+ids[i]).checked;
    if(newVal!==eff[k]){
      if(!propagate){
        _smhDel(k,mym);
        if(!S.profile.settingsMonthly)S.profile.settingsMonthly={};
        if(!S.profile.settingsMonthly[mym])S.profile.settingsMonthly[mym]={};
        S.profile.settingsMonthly[mym][k]=newVal;
      }else{
        if(S.profile.settingsMonthly){
          Object.keys(S.profile.settingsMonthly).forEach(function(mStr){
            var m=Number(mStr);
            if(m>=mym&&S.profile.settingsMonthly[m]&&k in S.profile.settingsMonthly[m]){
              delete S.profile.settingsMonthly[m][k];
              if(!Object.keys(S.profile.settingsMonthly[m]).length)delete S.profile.settingsMonthly[m];
            }
          });
        }
        if(S.profile.settingsMonthlyHistory&&S.profile.settingsMonthlyHistory[k]){
          S.profile.settingsMonthlyHistory[k]=S.profile.settingsMonthlyHistory[k].filter(function(e){return e.ym<=mym;});
        }
        _smhSet(k,mym,newVal);
      }
    }
  }
  saveState();render();openMergedMoisModal(mym,1);
}
function resetMonthSettings(mym){
  if(S.profile.settingsMonthly&&S.profile.settingsMonthly[mym])
    delete S.profile.settingsMonthly[mym];
  _SMH_KEYS.forEach(k=>_smhDel(k,mym));
  saveState();render();openMergedMoisModal(mym,1);
}

  var tfoot='<tfoot><tr style="border-top:2px solid '+(_hasSel?'var(--blue)':'var(--border2)')

    +'</tr></tfoot>';
  // Column headers with Total
  const _allSel12=Array.from({length:12},(_,m)=>y*12+m).every(ym=>_annualSel.has(ym));
  const colHeaders='<th style="padding:4px;text-align:left"><button onclick="selectAllAnnual()" style="font-size:11px;padding:2px 7px;border-radius:6px;font-family:var(--font);font-weight:500;cursor:pointer;border:'+(_allSel12?'none':'0.5px solid var(--border)')+';background:'+(_allSel12?'var(--blue)':'rgba(128,128,128,.13)')+';color:'+(_allSel12?'#fff':'var(--text2)')+'">Tout</button></th>'

  // Action buttons — fixed height container (no dotsRow, dots are in tfoot)
  var actionContent='';
  if(_hasSel){
    var sc=_annualSel.size;

        +'<button onclick="applyAnnualSel(false)" style="flex:1;height:28px;font-size:11px;font-family:var(--font);background:var(--blue);color:#fff;border:0.5px solid var(--blue);border-radius:var(--r);cursor:pointer">Appliquer</button>'
        +'</div>';

  }
  // Capture current table for outgoing animation before wiping DOM
  let _oldTblClone=null;
  if(dir){const _ot=document.querySelector('#modal-root .annual-tbl-wrap table');if(_ot)_oldTblClone=_ot.cloneNode(true);}
  document.getElementById('modal-root').innerHTML=

    +'<button onclick="_annualSel.clear();openSettingsModal(2)" style="background:transparent;border:none;color:var(--blue);cursor:pointer;font-size:11px;padding:0;display:flex;align-items:center;gap:3px">‹ Paramètres</button>'
    +'</div>'
    +'<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:6px">'
    +'<button onclick="_annualSel.clear();openAnnualSettingsModal('+(y-1)+',\'prev\')" style="background:transparent;border:none;color:var(--text2);cursor:pointer;font-size:18px;padding:0 8px">‹</button>'
    +'<span onclick="jumpToCurrentYear()" style="font-size:16px;font-weight:600;cursor:pointer;padding:2px 10px;border-radius:6px;background:rgba(128,128,128,.1)">'+y+'</span>'

    +'<div class="annual-tbl-wrap">'

    +'</div>'

    +'</div></div>';
  // Smooth dual-direction slide animation
  const _newWrap=document.querySelector('#modal-root .annual-tbl-wrap');
  const _newTbl=_newWrap?_newWrap.querySelector('table'):null;
  if(dir&&_oldTblClone&&_newWrap&&_newTbl){
    const h=_newWrap.offsetHeight;
    _newWrap.style.cssText='position:relative;overflow:hidden;height:'+h+'px';
    _newTbl.style.cssText='width:100%;border-collapse:collapse;table-layout:fixed;position:absolute;top:0;left:0;transform:translateX('+(dir==='next'?'100%':'-100%')+')';
    _oldTblClone.style.cssText='width:100%;border-collapse:collapse;table-layout:fixed;position:absolute;top:0;left:0';
    _newWrap.appendChild(_oldTblClone);
    requestAnimationFrame(function(){requestAnimationFrame(function(){
      var tr='transform .32s cubic-bezier(.4,0,.2,1)';
      _oldTblClone.style.transition=tr;_oldTblClone.style.transform='translateX('+(dir==='next'?'-100%':'100%')+')';
      _newTbl.style.transition=tr;_newTbl.style.transform='translateX(0)';
    });});
    setTimeout(function(){
      if(_oldTblClone.parentNode)_oldTblClone.parentNode.removeChild(_oldTblClone);

  const _sh2=document.querySelector('#modal-root .sheet');
  if(_sh2){
    let _sx=0,_sy=0,_sb=false;
    _sh2.addEventListener('touchstart',function(e){_sx=e.touches[0].clientX;_sy=e.touches[0].clientY;_sb=!!e.target.closest('input,select,textarea');},{passive:true});
    _sh2.addEventListener('touchend',function(e){
      if(_sb||_dAct2)return;
      const dx=e.changedTouches[0].clientX-_sx,dy=Math.abs(e.changedTouches[0].clientY-_sy);

      _annualSel.clear();
      openAnnualSettingsModal(dx<0?y+1:y-1,dx<0?'next':'prev');

  if(_tb2){

      tr.style.background=sel?'rgba(59,130,246,.10)':'';

      if(!_dDir){if(dx>8||dy>8)_dDir=dx>dy?'h':'v';else return;}
      if(_dDir==='h')return; // horizontal → will navigate in touchend
      // Vertical drag-to-select
      e.preventDefault();e.stopPropagation();
      if(!_dAct){
        _dAct=true;_dAct2=true;_annualPending=null;_dLast=_dSYm;
        if(_dMode)_annualSel.add(_dSYm);else _annualSel.delete(_dSYm);

      let td2=el.closest('td[data-ym]');
      if(!td2){const tr2=el.closest('tr[data-row]');if(tr2)td2=tr2.querySelector('td[data-ym]');}

    },{passive:false});
    _tb2.addEventListener('touchend',function(e){
      if(_dSYm<0)return;
      e.stopPropagation(); // prevent global sheet-close handler
      const sYm=_dSYm;_dSYm=-1;
      if(_dDir==='h'){
        const dx=e.changedTouches[0].clientX-_dSX,dy=Math.abs(e.changedTouches[0].clientY-_dSY);

      // tap (_dDir===null): onclick on td fires and calls toggleAnnualSel
    },{passive:true});
  }
}
function selectAnnualCell(ym,key){
  if(_annualPending&&_annualPending.ym===ym&&_annualPending.key===key){
    _annualPending=null;openAnnualSettingsModal(_annualSelYear);return;
  }
  _annualPending={ym,key};openAnnualSettingsModal(_annualSelYear);
}
function applyAnnualCell(ym,key,propagate){
  const newVal=!settingsForYM(ym)[key];
  if(!propagate){
    // Ce mois uniquement: exact isolated override, remove any breakpoint at this month
    _smhDel(key,ym);
    if(!S.profile.settingsMonthly)S.profile.settingsMonthly={};
    if(!S.profile.settingsMonthly[ym])S.profile.settingsMonthly[ym]={};
    S.profile.settingsMonthly[ym][key]=newVal;
  }else{
    // Ce mois et les suivants: propagating breakpoint — clear everything for this key after ym
    // so neither settingsMonthly exact overrides nor later settingsMonthlyHistory entries shadow it
    if(S.profile.settingsMonthly){
      Object.keys(S.profile.settingsMonthly).forEach(function(mStr){
        var m=Number(mStr);
        if(m>=ym&&S.profile.settingsMonthly[m]&&key in S.profile.settingsMonthly[m]){
          delete S.profile.settingsMonthly[m][key];
          if(!Object.keys(S.profile.settingsMonthly[m]).length)delete S.profile.settingsMonthly[m];
        }
      });
    }
    if(S.profile.settingsMonthlyHistory&&S.profile.settingsMonthlyHistory[key]){
      S.profile.settingsMonthlyHistory[key]=S.profile.settingsMonthlyHistory[key].filter(function(e){return e.ym<=ym;});
    }
    _smhSet(key,ym,newVal);
  }
  _annualPending=null;saveState();render();openAnnualSettingsModal(_annualSelYear);
}
function _initAnnualDots(){
  ['dimRendu','rhRendu','ferRendu','hsRendu'].forEach(k=>{
    const vals=Array.from(_annualSel).map(ym=>!!settingsForYM(ym)[k]);
    _annualActionState[k]=vals.every(v=>v)?true:vals.every(v=>!v)?false:null;
  });
  _annualActionManual=false;
}
function toggleAnnualSel(ym){
  const prev=_annualSel.size;
  if(_annualSel.has(ym))_annualSel.delete(ym);else _annualSel.add(ym);
  if(_annualSel.size===0){_annualActionManual=false;}
  else if(prev===0||!_annualActionManual){_initAnnualDots();}
  openAnnualSettingsModal(_annualSelYear);
}
function clearAnnualSel(){_annualActionManual=false;_annualSel.clear();openAnnualSettingsModal(_annualSelYear);}
function toggleAnnualDot(key){_annualActionManual=true;_annualActionState[key]=(_annualActionState[key]!==true)?true:false;openAnnualSettingsModal(_annualSelYear);}
function selectAllAnnual(){
  const allYms=Array.from({length:12},(_,m)=>_annualSelYear*12+m);
  const allSel=allYms.every(ym=>_annualSel.has(ym));
  const prev=_annualSel.size;
  allYms.forEach(ym=>allSel?_annualSel.delete(ym):_annualSel.add(ym));
  if(_annualSel.size===0){_annualActionManual=false;}
  else if(prev===0||!_annualActionManual){_initAnnualDots();}
  openAnnualSettingsModal(_annualSelYear);
}
function applyAnnualSel(propagate){
  const keys=['dimRendu','rhRendu','ferRendu','hsRendu'];
  if(propagate&&_annualSel.size===1){
    const ym=Array.from(_annualSel)[0];
    keys.forEach(function(k){
      if(_annualActionState[k]===null)return;
      const newVal=_annualActionState[k];
      if(S.profile.settingsMonthly){
        Object.keys(S.profile.settingsMonthly).forEach(function(mStr){
          var m=Number(mStr);
          if(m>=ym&&S.profile.settingsMonthly[m]&&k in S.profile.settingsMonthly[m]){
            delete S.profile.settingsMonthly[m][k];
            if(!Object.keys(S.profile.settingsMonthly[m]).length)delete S.profile.settingsMonthly[m];
          }
        });
      }
      if(S.profile.settingsMonthlyHistory&&S.profile.settingsMonthlyHistory[k]){
        S.profile.settingsMonthlyHistory[k]=S.profile.settingsMonthlyHistory[k].filter(function(e){return e.ym<=ym;});
      }
      _smhSet(k,ym,newVal);
    });
  }else{
    if(!S.profile.settingsMonthly)S.profile.settingsMonthly={};
    _annualSel.forEach(function(ym){
      keys.forEach(function(k){
        if(_annualActionState[k]===null)return;

function calcCongesUsedForKeys(monthKeys,allCgKeys){
  // Count CP for a specific set of days, using full ecart rule but limited to these keys
  if(!monthKeys.length)return 0;
  const cgSet=new Set(allCgKeys);
  const seenMon=new Set();let total=0;const fullWeeks=new Set();
  monthKeys.forEach(function(k){
    const d=new Date(k+'T12:00:00'),mon=getMonday(d),mk=dk(mon);
    if(seenMon.has(mk))return;seenMon.add(mk);
    if(!cgSet.has(mk))return;
    // Only count full week if monday is in this month (avoids double-counting cross-month weeks)
    const monM=mon.getFullYear()*12+mon.getMonth();
    const dayM=d.getFullYear()*12+d.getMonth();
    if(monM!==dayM)return; // monday in different month — will be counted there
    let ok=true;
    for(let i=0;i<7;i++){const dd=new Date(mon);dd.setDate(mon.getDate()+i);const v2=getVac(dd);if(v2.vac&&v2.vac!=='RH'&&!v2.absent&&!cgSet.has(dk(dd))){ok=false;break;}}
    if(ok){fullWeeks.add(mk);total+=5;}
  });
  const partial=monthKeys.filter(k=>{
    const mk=dk(getMonday(new Date(k+'T12:00:00')));
    // Exclude days whose week was already counted as a full week (even from another month)
    if(fullWeeks.has(mk))return false;
    // Also check if this week is a full week globally (counted in a previous month)
    const mon=getMonday(new Date(k+'T12:00:00'));
    let ok=true;
    for(let i=0;i<7;i++){const dd=new Date(mon);dd.setDate(mon.getDate()+i);const v2=getVac(dd);if(v2.vac&&v2.vac!=='RH'&&!v2.absent&&!cgSet.has(dk(dd))){ok=false;break;}}
    return ok===false; // only include in partial if week is NOT full
  });
  function fR(from){const sd=new Date(from);sd.setDate(sd.getDate()+1);while(sd<=new Date('2031-01-01')){const v2=getVac(sd);if(v2.vac&&v2.vac!=='RH'&&!v2.absent)return new Date(sd);sd.setDate(sd.getDate()+1);}return null;}
  const groups={};
  partial.forEach(function(k){const d=new Date(k+'T12:00:00'),r=fR(d),rk=r?dk(r):'none';if(!groups[rk])groups[rk]={reprise:r,dates:[]};groups[rk].dates.push(d);});
  Object.values(groups).forEach(function(g){
    const nb=g.dates.length;if(!g.reprise){total+=nb;return;}
    const lc=new Date(Math.max.apply(null,g.dates));
    total+=nb+Math.max(0,Math.round((g.reprise-lc)/(864e5))-1-2);
  });
  return total;
}

function _wvInitSwipe(el){
  var _sx=0,_sy=0,_active=false;
  el.addEventListener('touchstart',function(e){
    if(e.target.closest('button'))return;
    _sx=e.touches[0].clientX;_sy=e.touches[0].clientY;_active=true;
  },{passive:true});
  el.addEventListener('touchend',function(e){
    if(!_active)return;_active=false;
    var dx=e.changedTouches[0].clientX-_sx,dy=e.changedTouches[0].clientY-_sy;
    if(Math.abs(dx)>60&&Math.abs(dx)>Math.abs(dy)*1.2)weekViewNav(dx<0?1:-1);

function _wvLimits(){

function _wvPickerHtml(){
  var curMon=dk(getMonday(NOW));
  var curDate=new Date(curMon+'T12:00:00');
  var _MC=['jan','fév','mar','avr','mai','jun','jui','aoû','sep','oct','nov','déc'];
  var _MCL=['Janvier','Février','Mars','Avril','Mai','Juin','Juillet','Août','Septembre','Octobre','Novembre','Décembre'];
  var html='',lastMK=-1,pills='';
  function flush(){if(pills){html+='<div class="wv-wgrid">'+pills+'</div>';pills='';}}
  for(var w=-4;w<=26;w++){
    var wMon=new Date(curDate.getTime()+w*7*864e5);
    var wKey=dk(wMon);
    var wNum=isoWeek(wMon);
    var wSun=new Date(wMon.getTime()+6*864e5);
    var mk=wSun.getFullYear()*12+wSun.getMonth();
    if(mk!==lastMK){
      flush();
      html+='<div style="padding:8px 12px 2px;font-size:11px;font-weight:600;color:var(--text3);letter-spacing:.03em">'+_MCL[wSun.getMonth()]+' '+wSun.getFullYear()+'</div>';
      lastMK=mk;
    }
    var isCur=wKey===curMon,isSel=wKey===_weekViewMon;
    var cls='wv-wpill'+(isCur?' wv-cur':'')+(isSel&&!isCur?' wv-sel':'');
    pills+='<div class="'+cls+'" onclick="wvGoWeek(\''+wKey+'\')">'
      +'<div class="wv-wpnum">S'+wNum+'</div>'
      +'<div class="wv-wpdate">'+wMon.getDate()+' '+_MC[wMon.getMonth()]+'</div>'
      +'</div>';

var _wvPendingKey=null;
async function _wvLoad(monKey,delta){
  var el=document.getElementById('week-view-overlay');
  if(!el)return;
  _wvPendingKey=monKey;
  // Update header in-place or create fresh
  var hdrEl=document.getElementById('wv-header');
  var _ht=document.createElement('div');_ht.innerHTML=_wvHeader(monKey);
  if(hdrEl){hdrEl.replaceWith(_ht.firstChild);}
  else{el.innerHTML='';el.appendChild(_ht.firstChild);}
  // Ensure body wrapper
  var wrap=document.getElementById('wv-body-wrap');
  if(!wrap){
    wrap=document.createElement('div');
    wrap.id='wv-body-wrap';
    wrap.style.cssText='flex:1;overflow:hidden;position:relative;';
    el.appendChild(wrap);
  }
  // Remove any stale outgoing body
  var outEl=document.getElementById('wv-body-out');
  if(outEl)outEl.remove();
  var oldBody=document.getElementById('wv-body');
  var newBody=document.createElement('div');
  newBody.id='wv-body';
  newBody.style.cssText='position:absolute;inset:0;overflow:auto;-webkit-overflow-scrolling:touch;background:var(--bg0);';
  newBody.innerHTML=_wvBodyHtml(null,monKey);
  if(delta&&oldBody){
    oldBody.id='wv-body-out';
    var dx=delta>0?'100%':'-100%',dx2=delta>0?'-100%':'100%';
    newBody.style.transform='translateX('+dx+')';
    wrap.appendChild(newBody);
    requestAnimationFrame(function(){requestAnimationFrame(function(){
      newBody.style.transition='transform .22s ease';
      newBody.style.transform='translateX(0)';
      oldBody.style.transition='transform .22s ease';
      oldBody.style.transform='translateX('+dx2+')';
      setTimeout(function(){if(oldBody.parentNode)oldBody.remove();},240);
    });});
  } else {
    if(oldBody)oldBody.remove();
    wrap.appendChild(newBody);
  }
  if(!window._authToken)return;
  try{
    const res=await fetch(CLOUD_API+'/lines/week',{method:'POST',headers:cloudHeaders(),body:JSON.stringify({monday:monKey})});
    const data=await res.json();
    if(_wvPendingKey!==monKey)return;
    var bEl=document.getElementById('wv-body');
    if(bEl)bEl.innerHTML=_wvBodyHtml(data,monKey);
  }catch(e){}
}
function _wvHeader(monKey){
  var isCurrent=monKey===dk(getMonday(NOW));
  var lim=_wvLimits();
  var atMin=monKey<=lim.min,atMax=monKey>=lim.max;
  var monDate=new Date(monKey+'T12:00:00');
  var sunDate=new Date(monDate);sunDate.setDate(sunDate.getDate()+6);

// Swipe down to close modal
(function(){
  var startY=0,startX=0,startScroll=0,prevClientY=0,sheet=null,overlay=null,dragging=false,dirLocked=null;
  document.addEventListener('touchstart',function(e){
    var el=e.target.closest('.sheet');
    if(!el)return;
    startY=e.touches[0].clientY;
    startX=e.touches[0].clientX;
    prevClientY=e.touches[0].clientY;
    if(e.target.closest('select,input,textarea'))return;
    sheet=el;overlay=el.closest('.overlay');
    startScroll=sheet.scrollTop;
    dragging=true;dirLocked=null;
    sheet.style.transition='none';
  },{passive:true});
  document.addEventListener('touchmove',function(e){
    // Block body scroll through overlay without overflow:hidden (keeps keyboard working)
    if(document.body.classList.contains('modal-open')&&!e.target.closest('.sheet')){
      e.preventDefault();return;
    }
    // Touch started on a button (dragging=false): scroll the sheet manually, block body
    if(document.body.classList.contains('modal-open')&&!dragging){
      var sh=e.target.closest('.sheet');
      if(sh){
        e.preventDefault();
        var delta=prevClientY-e.touches[0].clientY;
        sh.scrollTop+=delta;
      } else {
        e.preventDefault();
      }
      prevClientY=e.touches[0].clientY;
      return;
    }
    if(!dragging||!sheet)return;
    var dx=Math.abs(e.touches[0].clientX-startX);
    var dy=e.touches[0].clientY-startY;
    var dyAbs=Math.abs(dy);
    // Lock direction on first decisive movement
    if(!dirLocked){
      if(dx>10||dyAbs>10) dirLocked=dx>dyAbs?'h':'v';
      else return;
    }
    if(dirLocked==='h'){dragging=false;sheet.style.transform='';sheet.style.transition='';if(overlay)overlay.style.background='';return;}
    // Swipe down at top = close gesture; swipe up at bottom = prevent body overscroll
    if(dy>0&&sheet.scrollTop<=0){
      e.preventDefault();
      sheet.style.transform='translateY('+Math.min(dy,300)+'px)';
      var _bg='rgba(0,0,0,'+Math.max(0,.45-dy/400)+')';
      var _bl='blur('+Math.max(0,6-dy*6/200)+'px)';
      if(overlay){overlay.style.background=_bg;overlay.style.backdropFilter=_bl;overlay.style.webkitBackdropFilter=_bl;}
    }else if(dy<0&&sheet.scrollTop+sheet.clientHeight>=sheet.scrollHeight-1){
      e.preventDefault();
    }
  },{passive:false});
  document.addEventListener('touchend',function(e){
    if(!dragging||!sheet)return;
    dragging=false;
    var dy=e.changedTouches[0].clientY-startY;
    sheet.style.transition='transform .2s ease';
    if(dy>80){
      sheet.style.transform='translateY(100%)';
      var _tr='background .2s ease,backdrop-filter .2s ease,-webkit-backdrop-filter .2s ease';
      if(overlay){overlay.style.transition=_tr;overlay.style.background='rgba(0,0,0,0)';overlay.style.backdropFilter='blur(0px)';overlay.style.webkitBackdropFilter='blur(0px)';}
      setTimeout(closeModal,200);
    }else{
      sheet.style.transform='';
      if(overlay){overlay.style.background='';overlay.style.backdropFilter='';overlay.style.webkitBackdropFilter='';}
    }
    sheet=null;overlay=null;
  },{passive:true});
})();

// Rendus generés pour une vacation d'échange :
// - Ferié travaillé : OUI (+200%)
// - Dimanche travaillé : OUI (+50%)
// - RH travaillé : NON (pas de rendu RH en échange)
// - HS : NON (échange = pas de HS)
function renduFactorÉchange(date){
  const key=dk(date),isFer=FERIES.has(key),isDim=date.getDay()===0;
  const sett=settingsForYM(date.getFullYear()*12+date.getMonth());
  let f=0;
  if(isFer&&sett.ferRendu){f+=2.0;if(isDim&&sett.dimRendu)f+=0.5;}
  else if(isDim&&sett.dimRendu){f+=0.5;}
  // RH : pas de rendu en cas d'échange
  return f;
}

  pushUndo();

  S.overrides[myKey]={vac:myOrigVacName,fromSV:false,echange:true,ecSelf:false,hs:hsEx};

function _fitDropdown(el){

    const pr=el.offsetParent?el.offsetParent.getBoundingClientRect():{left:0,right:vw};
    el.style.right='auto';
    el.style.left=(margin-pr.left)+'px';
  }
}
function toggleDropdown(id){
  const el=document.getElementById(id);if(!el)return;

function _ddClose(e){
  const dds=document.querySelectorAll('.dropdown');

    if(d.style.display!=='none'){

<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<title>Planning</title>
<meta name="app-version" content="v4.42">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Planning">
<meta name="theme-color" id="theme-color-meta" content="#18181b">
<link rel="apple-touch-icon" href="/planning/app/apple-touch-icon.png">
<link rel="icon" type="image/png" href="/planning/app/favicon3.png">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.47.0/tabler-icons.min.css">
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');
:root{
  --bg:transparent;--bg2:#26262a;--bg3:#323237;
  --text:#f0f0f1;--text2:#c8c8cc;--text3:#8a8a96;
  --border:rgba(255,255,255,.12);--border2:rgba(255,255,255,.06);
  --r:10px;--rl:14px;
  --blue:#4ea0f7;--blue-l:#1a2d45;--blue-m:#2a4a6e;
  --green:#5a9e3f;--green-l:#1a2e10;--green-m:#2a4a1a;
  --amber:#e09830;--red:#c0392b;
  --gold:#b8941e;--gold-dark:#9a7a18;--gold-l:rgba(184,148,30,.15);--gold-b:rgba(184,148,30,.35);
  --rendu-red:#b0443a;--rendu-red-l:rgba(176,68,58,.18);--rendu-red-text:#d4776f;
  --fer-bg:#7a5c14;--fer-bg-light:#8f6e1a;--fer-text:#e8d5a3;
  --font:'Inter',-apple-system,sans-serif;
}

[data-theme=light]{
  background:#e8e8e4;
  --bg:#e8e8e4;--bg2:#deded9;--bg3:#d0cfc9;
  --text:#1a1a18;--text2:#4a4a46;--text3:#8a8880;
  --border:rgba(0,0,0,.18);--border2:rgba(0,0,0,.10);
  --blue:#0C447C;--blue-l:#d0e4f5;--blue-m:#a0c4e8;
  --green:#3d6b18;--green-l:#ddeece;--green-m:#b8d898;
  --gold-l:rgba(184,148,30,.15);--gold-b:rgba(184,148,30,.30);
  --rendu-red:#b0443a;--rendu-red-l:rgba(176,68,58,.10);--rendu-red-text:#b0443a;
  --fer-bg:#dbc98a;--fer-bg-light:#e5d5a0;--fer-text:#7a5c14;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;font-family:var(--font);}
/* No transitions - avoid flash on render */
html,body{overflow-x:hidden;}body{height:100%;padding-top:60px;background:var(--bg);color:var(--text);}
input,select,button,textarea{font-family:var(--font);}
input[type=number]::-webkit-inner-spin-button,input[type=number]::-webkit-outer-spin-button{-webkit-appearance:none;margin:0;}
input[type=number]{-moz-appearance:textfield;appearance:textfield;}
#app{display:block;}
.app-outer{max-width:1080px;margin:0 auto;padding:10px 12px 60px;overflow-x:hidden;}
@media (orientation:portrait){body{padding-top:68px;}.app-outer{padding-top:0;}}
.layout{display:flex;gap:14px;align-items:flex-start;}
.cal-col{flex:1;min-width:0;position:relative;}
.side-col{width:260px;flex-shrink:0;display:flex;flex-direction:column;gap:8px;padding-top:38px;}
@media(max-width:720px){.layout{flex-direction:column;align-items:stretch;}.side-col{width:100%;padding-top:0;}}
@media(max-width:480px){.hdr{padding:12px 10px;justify-content:flex-end;}.hdr-ver{display:none;}}

/* HEADER */
.hdr{display:flex;align-items:center;justify-content:space-between;padding:14px 20px;left:0;right:0;width:100%;background:var(--bg2);border-bottom:0.5px solid var(--border);position:fixed;top:0;z-index:200;}

.hdr-btns{display:flex;gap:5px;align-items:center;}
.ibtn{background:transparent;border:0.5px solid var(--border);border-radius:var(--r);padding:6px 9px;font-size:12px;cursor:pointer;color:var(--text2);display:flex;align-items:center;gap:4px;transition:background .1s;}
.ibtn:active{opacity:.7;}
.ibtn:disabled{opacity:.3;pointer-events:none;}

/* NAV */
.mbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;gap:4px;position:relative;}
.mnav{background:transparent;border:0.5px solid var(--border);border-radius:var(--r);padding:6px 12px;font-size:14px;cursor:pointer;color:var(--text);transition:background .1s;}
.mnav.today{font-size:12px;padding:6px 12px;font-weight:500;background:transparent;color:var(--text);border-color:var(--border);}
.mtit{font-size:15px;font-weight:500;cursor:pointer;padding:4px 8px;border-radius:var(--r);transition:background .1s;position:absolute;left:50%;transform:translateX(-50%);white-space:nowrap;}
#month-view{transition:opacity .18s ease,transform .18s ease;}
.slide-left{animation:slideLeft .2s ease forwards;}
.slide-right{animation:slideRight .2s ease forwards;}
@keyframes slideLeft{from{opacity:1;transform:translateX(0)}to{opacity:0;transform:translateX(-28px)}}
@keyframes slideRight{from{opacity:1;transform:translateX(0)}to{opacity:0;transform:translateX(28px)}}
.slide-in-left{animation:slideInLeft .2s ease forwards;}
.slide-in-right{animation:slideInRight .2s ease forwards;}
@keyframes slideInLeft{from{opacity:0;transform:translateX(28px)}to{opacity:1;transform:translateX(0)}}
@keyframes slideInRight{from{opacity:0;transform:translateX(-28px)}to{opacity:1;transform:translateX(0)}}

/* Month view */
#month-view{transition:opacity .2s ease,transform .2s ease;}

/* Annual view */
.ann-wrap{overflow:hidden;pointer-events:none;opacity:0;visibility:hidden;position:absolute;top:0;left:0;right:0;transition:opacity .2s ease;}
.ann-wrap.open{pointer-events:all;opacity:1;display:block;visibility:visible;overflow:visible;position:relative;}
.annual-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:10px;width:100%;box-sizing:border-box;}
@media(max-width:600px){.annual-grid{grid-template-columns:repeat(3,1fr);}}
.ann-month{background:var(--bg2);border:2px solid transparent;border-radius:var(--r);padding:8px;cursor:pointer;transition:background .1s;}
.ann-month.sel{border-color:var(--border);background:var(--bg2);}
[data-theme=light] .ann-month.sel{border-color:var(--border);background:var(--bg2);}
.ann-month.cur-month{background:var(--blue-l);border-color:var(--blue-m);}
[data-theme=light] .ann-month.cur-month{background:var(--blue-l);border-color:var(--blue-m);}
.ann-mname{font-size:12px;font-weight:500;color:var(--text);margin-bottom:5px;}
.ann-mini{display:grid;grid-template-columns:repeat(7,1fr);gap:1px;}
.ann-day{width:100%;aspect-ratio:1;border-radius:2px;outline:0.5px solid rgba(255,255,255,.15);}
[data-theme=light] .ann-day{outline:0.5px solid rgba(0,0,0,.14);}
.ann-day.tv{background:var(--blue-l);}
.ann-day.cg{background:var(--green-l);}
.ann-day.rend{background:var(--rendu-red-l);}
.ann-day.fer{background:transparent;outline:1.5px solid var(--gold);}
.ann-day.tv-fer{background:var(--blue-l);outline:1.5px solid var(--gold);}
.ann-day.ec{background:rgba(124,92,191,.18);}
.ann-day.ec-fer{background:rgba(124,92,191,.18);outline:1.5px solid var(--gold);}
.ann-day.ec2{background:var(--bg3);}
.ann-day.ec2-fer{background:var(--bg3);outline:1.5px solid var(--gold);}
.ann-day.cg-fer{background:var(--green-l);outline:1.5px solid var(--gold);}
.ann-day.rend-fer{background:var(--rendu-red-l);outline:1.5px solid var(--gold);}
.ann-day.absent-fer{background:var(--bg3);outline:1.5px solid var(--gold);}
.ann-day.absent{background:var(--bg3);}
.ann-day.sv,.ann-day.rh{background:transparent;outline:none;}

/* Calendar */
.cal-wrap{background:var(--bg2);border:0.5px solid var(--border);box-shadow:0 2px 12px rgba(0,0,0,.25);border-radius:var(--rl);overflow:hidden;margin-bottom:8px;width:100%;box-sizing:border-box;}
.cal{width:100%;border-collapse:collapse;table-layout:fixed;}
.cal th{font-size:10px;color:var(--text3);text-align:center;padding:4px 2px 3px;font-weight:400;}
.cal th.wkh{width:20px;padding:0;}
.cal td{text-align:center;padding:4px;}
/* ramtr row bg removed - only wkn.wram is colored */
.cal tr.curweek td{background:rgba(78,160,247,.06);}
[data-theme=light] .cal tr.curweek td{background:rgba(12,68,124,.05);}
.cal tr.cgweek td{background:rgba(90,158,63,.07);}
[data-theme=light] .cal tr.cgweek td{background:rgba(61,107,24,.06);}
/* Week number - base */
.wkn{font-size:9px;color:var(--text3);text-align:center;vertical-align:middle;width:20px;padding:1px 2px;border-radius:4px;}
/* Colored week numbers */

.wkn.wcur{background:var(--blue-l);color:var(--blue);font-weight:600;}.wkn.wram{}.wkn.wcg{}


.dc{width:100%;padding-top:80%;position:relative;border-radius:var(--r);display:block;}
.dci{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1px;border-radius:var(--r);transition:background .1s;cursor:pointer;}
.dn{font-size:13px;font-weight:500;line-height:1;}
.dv{font-size:10px;line-height:1;opacity:.85;}

/* Day states */
.s-tv .dci{background:var(--blue-l);color:var(--blue);cursor:pointer;box-shadow:inset 0 0 0 0.5px rgba(78,160,247,.22);}
[data-theme=light] .s-tv .dci{box-shadow:inset 0 0 0 0.5px rgba(12,68,124,.18);}
[data-theme=light] .s-tv .dci{background:var(--blue-m);color:var(--blue);}
.s-rh .dci{color:#b080c0;cursor:pointer;}
.s-sv-ov .dci{background:rgba(128,128,128,.18);color:var(--text3);cursor:pointer;}
.s-sv .dci{color:var(--text3);cursor:pointer;}
/* Fériés: bordure dorée, pas de fond */
.s-fer .dci{background:transparent;color:var(--gold);box-shadow:inset 0 0 0 1.5px var(--gold);cursor:pointer;}
[data-theme=light] .s-fer .dci{color:var(--gold-dark);box-shadow:inset 0 0 0 1.5px var(--gold);}
.s-cg .dci{background:var(--green-l);color:var(--green);cursor:pointer;}
.s-rend .dci{background:var(--rendu-red-l);color:var(--rendu-red-text);cursor:pointer;}
.s-sv-vac .dci{background:rgba(7,224,210,.18);color:#07E0D2;cursor:pointer;}
.s-sv-vac-fer .dci{background:rgba(7,224,210,.18);color:#07E0D2;cursor:pointer;box-shadow:inset 0 0 0 1.5px var(--gold);}
[data-theme=light] .s-sv-vac .dci{background:rgba(7,224,210,.15);color:#059688;}
.s-absent .dci{background:rgba(128,128,128,.18);color:var(--text3);cursor:pointer;}
/* All *-fer states share the gold border */
.s-tv-fer .dci,.s-cg-fer .dci,.s-rend-fer .dci,.s-absent-fer .dci,.s-ec2-fer .dci{box-shadow:inset 0 0 0 1.5px var(--gold);}
.s-tv-fer .dci{background:var(--blue-l);color:var(--blue);cursor:pointer;}
[data-theme=light] .s-tv-fer .dci{background:var(--blue-m);}
[data-theme=light] .ann-day.tv-fer{background:var(--blue-m);}
.s-cg-fer .dci{background:var(--green-l);color:var(--green);cursor:pointer;}
.s-rend-fer .dci{background:var(--rendu-red-l);color:var(--rendu-red-text);cursor:pointer;}
.s-absent-fer .dci{background:var(--bg3);color:var(--text3);cursor:pointer;}
.s-ec2-fer .dci{background:var(--bg3);color:var(--text3);cursor:pointer;}
/* Échange: orange=je travaille, gris=collègue couvre */
.s-ec .dci{background:var(--orange-bg,rgba(124,92,191,.20));color:#9b7fe0;cursor:pointer;}
.s-ec-fer .dci{background:var(--orange-bg,rgba(124,92,191,.20));color:#9b7fe0;box-shadow:inset 0 0 0 1.5px var(--gold);cursor:pointer;}
.s-ec2 .dci{background:var(--bg3);color:var(--text3);cursor:pointer;}
.wdot{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:18px;filter:grayscale(1);pointer-events:none;z-index:2;border-radius:var(--r);}
.pdot{position:absolute;top:3px;right:3px;width:5px;height:5px;border-radius:50%;background:#FFB300;}

/* Legend */
.leg{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:6px;align-items:center;justify-content:center;width:100%;}
.li{display:flex;align-items:center;gap:3px;color:var(--text3);font-size:10px;white-space:nowrap;}
.ld{width:8px;height:8px;border-radius:2px;flex-shrink:0;}

/* Side counters */
.ctr-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;}
.ctr{background:var(--bg2);border-radius:var(--r);padding:9px 10px;border:0.5px solid var(--border);}
.ctr.clk{cursor:pointer;transition:background .1s;}
.ctr.clk{cursor:pointer;transition:background .1s;}
/* "Créés ce mois" wide with detail */
.ctr.wide{grid-column:1/-1;}
.ctr-wide-inner{display:flex;align-items:flex-start;justify-content:space-between;gap:6px;}
.ctr-detail{display:flex;flex-direction:column;gap:2px;padding-top:1px;min-height:56px;justify-content:flex-start;}
.ctr-dot-row{display:flex;align-items:center;gap:4px;font-size:9px;color:var(--text2);}
.rdot{width:6px;height:6px;border-radius:50%;flex-shrink:0;}
.clbl{font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:.05em;margin-bottom:2px;}
.cval{font-size:17px;font-weight:600;line-height:1;}
.csub{font-size:9px;color:var(--text3);margin-top:1px;}

.bloc{background:var(--bg2);border:0.5px solid var(--border);border-radius:var(--rl);padding:10px 12px;}
.bloc.clk{cursor:pointer;transition:background .1s;}
.bloc.clk.active,.ctr.clk.active{background:var(--bg3);}
.btit{font-size:10px;font-weight:500;color:var(--text3);text-transform:uppercase;letter-spacing:.07em;margin-bottom:7px;}

/* Eph table — responsive bar */
.eph-row{display:flex;align-items:center;font-size:11px;gap:4px;padding:2px 0;}
.eph-mc{width:54px;flex-shrink:0;color:var(--text2);white-space:nowrap;}
.eph-bc{flex:1;min-width:0;}
.eph-bw{width:100%;height:4px;background:var(--bg3);border-radius:3px;overflow:hidden;}
.eph-b{height:4px;border-radius:3px;transition:width .3s;}
.eph-vc{width:48px;text-align:right;flex-shrink:0;font-weight:500;white-space:nowrap;}
.eph-ec{width:46px;text-align:right;flex-shrink:0;font-size:10px;color:var(--text3);white-space:nowrap;}
.eph-rbtn{font-size:8px;padding:1px 4px;border:0.5px solid var(--border);border-radius:4px;background:transparent;color:var(--text3);cursor:pointer;flex-shrink:0;width:26px;text-align:center;}
.eph-row.exp .eph-vc{color:var(--text3);text-decoration:line-through;}
.eph-row.fut .eph-mc,.eph-row.fut .eph-vc{color:var(--text3);}

/* History */
.hrow{display:flex;align-items:flex-start;gap:6px;padding:5px 0;border-bottom:0.5px solid var(--border2);font-size:11px;}
.hrow:last-child{border-bottom:none;}
.hdot{width:6px;height:6px;border-radius:50%;flex-shrink:0;margin-top:3px;}
.htime{color:var(--text3);font-size:10px;min-width:32px;}
.hdesc{color:var(--text);flex:1;}

/* Modal */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:200;display:flex;align-items:flex-end;justify-content:center;}
.overlay.behind{z-index:100;}
.sheet{background:var(--bg2);border-radius:20px 20px 0 0;padding:16px 16px 44px;width:100%;max-width:520px;max-height:90vh;overflow-y:auto;touch-action:pan-x;user-select:none;transition:transform .2s ease;}
.sh{width:36px;height:4px;background:var(--border);border-radius:2px;margin:0 auto 14px;}
.st{font-size:15px;font-weight:600;margin-bottom:3px;}
.ss{font-size:12px;color:var(--text2);margin-bottom:12px;}
.mrow{display:flex;flex-direction:column;gap:3px;margin-bottom:8px;}
.mrow label{font-size:11px;color:var(--text2);}
.mrow select,.mrow input{padding:10px 12px;border:0.5px solid var(--border);border-radius:var(--r);font-size:14px;background:var(--bg2);color:var(--text);width:100%;-webkit-appearance:none;}
.mr2{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px;align-items:end;}
.mr2>div{display:flex;flex-direction:column;gap:3px;}
.mr2>div label{font-size:11px;color:var(--text2);}
.mr2>div select,.mr2>div input{padding:10px 12px;border:0.5px solid var(--border);border-radius:var(--r);font-size:14px;background:var(--bg2);color:var(--text);width:100%;-webkit-appearance:none;}
.mcb{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--text2);margin-bottom:6px;cursor:pointer;padding:4px 0;}
.mcb input[type=checkbox]{width:18px;height:18px;accent-color:var(--blue);cursor:pointer;}
.mbtns{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px;}
.mb{padding:6px 6px;border:0.5px solid var(--border);border-radius:var(--r);font-size:13px;cursor:pointer;background:var(--bg2);color:var(--text);text-align:center;line-height:1.4;transition:opacity .1s;min-height:42px;display:flex;align-items:center;justify-content:center;flex-direction:column;}
.mb:active{opacity:.7;}
.mb.pri{background:var(--blue);color:#fff;border-color:transparent;}
.mb.del{border-color:#d09595;color:var(--red);background:rgba(192,57,43,.1);}
.mb.amb{border-color:#c09030;color:#d4a030;background:rgba(200,160,48,.1);}
.mb.grn{background:var(--green-l);color:var(--green);border-color:var(--green-m);}
.mb.wide{grid-column:1/-1;}
.mb.ghost{background:transparent;}
.mcancel{width:100%;padding:11px;border:none;background:transparent;font-size:14px;color:var(--text3);cursor:pointer;margin-top:4px;}
.sep{height:0.5px;background:var(--border2);margin:10px 0;}
.minfo{font-size:12px;color:var(--blue);background:var(--blue-l);border-radius:var(--r);padding:8px 12px;margin-bottom:8px;}
.chip-info{font-size:10px;padding:2px 6px;border-radius:10px;background:var(--gold-l);color:var(--gold-dark);}

/* Exchange */
.exchange-days{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:8px;}
.exchange-day{flex:0 0 auto;padding:6px 10px;border-radius:var(--r);border:0.5px solid var(--border);background:var(--bg2);cursor:pointer;font-size:11px;text-align:center;transition:all .1s;min-width:38px;}
.exchange-day.sel{background:var(--blue-l);border-color:var(--blue-m);color:var(--blue);font-weight:600;}
.exchange-day.current{background:var(--blue);color:#fff;border-color:var(--blue);}

/* Settings / profile */
.srow{display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:0.5px solid var(--border2);}
.srow:last-child{border-bottom:none;}
.slbl{font-size:13px;color:var(--text);}
.tgl{position:relative;width:44px;height:26px;flex-shrink:0;}
.tgl input{opacity:0;width:0;height:0;}
.tgl-s{position:absolute;inset:0;background:var(--bg3);border-radius:13px;cursor:pointer;transition:.2s;}
.tgl input:checked+.tgl-s{background:var(--blue);}
.tgl-s:before{content:'';position:absolute;width:20px;height:20px;left:3px;top:3px;background:#fff;border-radius:50%;transition:.2s;}
.tgl input:checked+.tgl-s:before{transform:translateX(18px);}
.pit{display:flex;align-items:center;justify-content:space-between;padding:8px 10px;border-radius:var(--r);cursor:pointer;border:0.5px solid transparent;margin-bottom:0;transition:background .1s;min-height:40px;}
.pit.act{background:var(--bg3);border-color:var(--border);cursor:default;}
.pit:not(.act){background:var(--bg2);opacity:.8;}
.pname{font-size:13px;font-weight:500;}
.pdel,.pgear{background:transparent;border:none;color:var(--text2);cursor:pointer;font-size:13px;padding:2px 5px;border-radius:var(--r);}
.pdel:hover{color:#c0392b;background:rgba(192,57,43,.12);}
.pit-wrap{margin-bottom:4px;}
.ps-panel{display:block;padding:8px 10px 10px;border-radius:0 0 var(--r) var(--r);background:var(--bg3);border:none;border-top:none;margin-top:-2px;}
.svi{display:flex;align-items:center;justify-content:space-between;padding:7px 10px;background:var(--bg2);border-radius:var(--r);margin-bottom:5px;font-size:12px;}
.svn{font-weight:500;}.svd{color:var(--text3);font-size:11px;}
.svdel{background:transparent;border:none;color:var(--text3);cursor:pointer;font-size:13px;}
.np-toggle{width:100%;padding:11px;border:0.5px solid var(--border);border-radius:var(--r);font-size:13px;cursor:pointer;background:var(--bg2);color:var(--text);text-align:left;display:flex;align-items:center;gap:8px;margin-top:8px;}
.np-body{display:none;overflow:hidden;max-height:800px;opacity:1;transition:max-height .3s ease,opacity .25s;}
.np-body.open{display:block;}

/* Dropdown */
.dropdown{position:absolute;right:0;top:calc(100% + 4px);background:var(--bg3);border:none;border-radius:var(--rl);box-shadow:0 8px 32px rgba(0,0,0,.25);width:300px;max-height:calc(100vh - 80px);overflow-y:auto;overflow-x:hidden;padding:12px 14px 16px;z-index:300;}

/* PWA */
.pwa{background:var(--blue-l);border:0.5px solid var(--blue-m);border-radius:var(--r);padding:9px 12px;margin-bottom:8px;font-size:12px;color:var(--blue);display:flex;align-items:center;gap:8px;}

.recap-row b{font-weight:600;}
@keyframes gcal-breathe{0%,100%{opacity:.25;}50%{opacity:1;}}
@keyframes gcal-done{0%,100%{opacity:.3;}50%{opacity:1;}}
.gcal-pending #gcal-status{animation:gcal-breathe 2.5s ease-in-out infinite;}
.gcal-clearing #gcal-progress-circle{stroke:#ea4335 !important;}
.gcal-syncing #gcal-status{animation:gcal-breathe 2.5s ease-in-out infinite;}
.gcal-done-anim #gcal-status{animation:gcal-done 1.5s ease-in-out 3;}
#gcal-status{transition:opacity .3s;}
#gcal-progress-circle{transition:stroke-dashoffset .2s linear;}
input[type=number]::-webkit-inner-spin-button,input[type=number]::-webkit-outer-spin-button{-webkit-appearance:none;margin:0;}input[type=number]{-moz-appearance:textfield;}
/* Transparent scrollbar */
::-webkit-scrollbar{width:6px;height:6px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:rgba(128,128,128,.3);border-radius:3px;}
* {scrollbar-width:thin;scrollbar-color:rgba(128,128,128,.3) transparent;}


.bloc.clk:active{background:var(--bg3);}
.ctr.clk:active{background:var(--bg3);}

function dk(d){return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}
function getMonday(d){const x=new Date(d);x.setHours(12,0,0,0);const dw=x.getDay();x.setDate(x.getDate()-(dw===0?6:dw-1));return x;}
function fmtH(min){if(min===0)return'0h00';const h=min/60;if(Number.isInteger(h))return h+'h00';return Math.floor(h)+'h'+String(min%60).padStart(2,'0');}
function fmtR(min){return(Math.round(min/60*100)/100).toFixed(2).replace('.',',')+'h';}
function fmtMin(min){if(isNaN(min)||min===undefined||min===null)return'0h00';return fmtH(Math.round(min));}
function capitalize(s){if(!s)return s;return s.charAt(0).toUpperCase()+s.slice(1);}
function nowHHMM(){const n=new Date();return String(n.getHours()).padStart(2,'0')+':'+String(n.getMinutes()).padStart(2,'0');}
function fmtDate(d){return JN[d.getDay()]+' '+d.getDate()+' '+MC[d.getMonth()]+' '+d.getFullYear();}
function parseHM(s){if(!s)return 0;const str=(s+'').trim().replace(',','.');var m;if((m=str.match(/^(\d+)h(\d{0,2})$/i)))return parseInt(m[1])*60+(parseInt(m[2]||'0')||0);if((m=str.match(/^(\d+(?:\.\d+)?)h?$/i))){const h=parseFloat(m[1]);return Math.round(h*60);}return 0;}
function isoWeek(date){const d=new Date(Date.UTC(date.getFullYear(),date.getMonth(),date.getDate()));const day=d.getUTCDay()||7;d.setUTCDate(d.getUTCDate()+4-day);const ys=new Date(Date.UTC(d.getUTCFullYear(),0,1));return Math.ceil(((d-ys)/864e5+1)/7);}
var _globalVacs={};
var _globalCycles=[];
function getActiveCycleGrid(date){
  if(!_globalCycles.length)return null;
  const key=dk(date instanceof Date?date:new Date(date+'T12:00:00'));
  const sorted=[..._globalCycles].filter(function(c){return c.weeks&&c.weeks.length>0;}).sort(function(a,b){return a.startDate<b.startDate?-1:1;});
  let active=null;
  sorted.forEach(function(c){
    if(c.startDate<=key&&(!c.endDate||c.endDate>=key))active=c;
  });
  return active?active.weeks:null;
}
function getActiveCycleAnchor(date){
  if(!_globalCycles.length)return null;

function lineIdx(monday){

function renduFactor(date){

function calcHSWeek(monday){
  const li=lineIdx(monday),weekBase=WEEK_DUR[li],VAC=getVAC();let weekWorked=0;
  const isRam=isSemaineRamenée(monday);
  for(let i=0;i<7;i++){const d=new Date(monday);d.setDate(monday.getDate()+i);const key=dk(d);const{vac,absent,echange,ecSelf,cycleVac}=getVac(d);if(absent)continue;const _cg=(S.conges||{})[key];
    // Vacation posée (cg, rend, absent) ne contribue pas aux HS ni aux rendus
    // En semaine ramenée, les 7h fixes sont un bonus forfaitaire indépendant du weekWorked
    if(_cg&&(_cg==='cg'||_cg==='rend'||_cg==='absent'))continue;
    if(echange){
      const _ecOv=(S.overrides||{})[key];
      const _hsFlag=_ecOv&&_ecOv.hs;
      if(_hsFlag){
        // Échange avec HS: jour pris = durée réelle, jour donné = 0 (soustraction implicite via weekBase)
        if(ecSelf&&vac&&vac!=='RH')weekWorked+=VAC[vac]?VAC[vac].dur:0;
        // ecSelf=false: contribue 0 → le weekBase comptait ce jour mais on ne le travaille plus
      } else {
        // Échange sans HS: différentiel = 0, valoriser au cycle original des deux côtés
        if(cycleVac&&cycleVac!=='RH')weekWorked+=VAC[cycleVac]?VAC[cycleVac].dur:0;
      }
    }else{
      if(!vac||vac==='RH')continue;
      const _ov=(S.overrides||{})[key];
      // Si override sans HS: compter durée cycle (pas la nouvelle vacation)
      if(_ov&&_ov.vac&&!_ov.echange&&!_ov.hs){
        // Pas de HS: valoriser au cycle original
        weekWorked+=cycleVac&&cycleVac!=='RH'&&VAC[cycleVac]?VAC[cycleVac].dur:0;
      } else {
        weekWorked+=VAC[vac]?VAC[vac].dur:0;

  if(isRam){

    const normalSurplus=Math.max(0,weekWorked-weekBase);
    const surplusTotal=ramMin+normalSurplus;
    const rendusTotal=hsRenduFromSurplus(surplusTotal);
    const rendusPure=hsRenduFromSurplus(normalSurplus);
    const rendusRam=rendusTotal-rendusPure;
    const rawLow=Math.min(surplusTotal,480);
    const rawHigh=Math.max(0,surplusTotal-480);
    return{surplus:surplusTotal,weekBase,weekWorked:weekBase+surplusTotal,
      rendusMin:rendusTotal,rendusH:Math.round(rendusTotal/60*100)/100,
      rendusMinHS:rendusPure,rendusMinRam:rendusRam,isRam,rawLow,rawHigh};
  }
  const surplusTotal=Math.max(0,weekWorked-weekBase);
  const surplusPure=Math.max(0,weekWorked-weekBase);
  const rendusTotal=hsRenduFromSurplus(surplusTotal);
  const rendusPure=hsRenduFromSurplus(surplusPure);
  const rendusRam=rendusTotal-rendusPure;
  // Raw brackets (no rate applied)
  const rawLow=Math.min(surplusTotal,480);
  const rawHigh=Math.max(0,surplusTotal-480);
  return{surplus:surplusTotal,weekBase,weekWorked:weekWorked,
    rendusMin:rendusTotal,rendusH:Math.round(rendusTotal/60*100)/100,
    rendusMinHS:rendusPure,rendusMinRam:rendusRam,isRam,rawLow,rawHigh};
}
function isSemaineRamenée(monday){
  let hasFérié=false,hasWork=false,allPosed=true,hasAbsent=false;
  for(let i=0;i<6;i++){const d=new Date(monday);d.setDate(monday.getDate()+i);const key=dk(d),{vac,absent,echange,ecSelf}=getVac(d);if(FERIES.has(key))hasFérié=true;if(absent)hasAbsent=true;const isGivenAway=echange&&!ecSelf;if(vac&&vac!=='RH'&&!absent&&!isGivenAway){hasWork=true;const _p=(S.conges||{})[key];if(_p!=='cg'&&_p!=='rend'&&_p!=='absent')allPosed=false;}}

function isWeekFullCG(monday){
  for(let i=0;i<7;i++){const d=new Date(monday);d.setDate(monday.getDate()+i);const key=dk(d),{vac,absent}=getVac(d);if(vac&&vac!=='RH'&&!absent&&!FERIES.has(key)&&(S.conges||{})[key]!=='cg')return false;}

function settingsForYM(ym){
  const ss=S.settings||{};
  const base={dimRendu:ss.dimRendu!==false,rhRendu:ss.rhRendu!==false,ferRendu:ss.ferRendu!==false,hsRendu:ss.hsRendu!==false};

function buildGen(){
  const gen={};function add(ym,k,v){if(!gen[ym])gen[ym]={dim:0,rh:0,fer:0,hs:0,ram:0,solde:0};gen[ym][k]+=v;}
  const START=2026*12,maxYM=CUR_YEAR*12+11,maxYMDisplay=(CUR_YEAR+2)*12+11,VAC=getVAC();
  const createdYM=(S.profile&&S.profile.ephSoldeCreatedYM!==undefined)?S.profile.ephSoldeCreatedYM:START;
  const solde=(S.profile&&S.profile.ephSolde)||0;
  if(solde>0)add(createdYM>0?createdYM-1:createdYM,'solde',solde*60);
  for(let y=2025;y<=2030;y++)for(let m=0;m<12;m++){
    const ym=y*12+m;if(ym<createdYM||ym>TODAY_YM&&ym>maxYMDisplay)continue;
    const last=new Date(y,m+1,0).getDate();
    for(let d=1;d<=last;d++){const date=new Date(y,m,d),key=dk(date);const v2e=getVac(date);const{vac,absent,echange,ecSelf}=v2e;if(!vac||vac==='RH'||absent)continue;if(echange&&!ecSelf)continue;// ec2: I give away, no rendu for me
const cKey=(S.conges||{})[key];if(cKey==='rend'||cKey==='cg'||cKey==='absent')continue;// vacation posée: pas de rendu dim/fer/RH
const dur=VAC[vac]?VAC[vac].dur:0;
      const isFer2=FERIES.has(key),isDim2=date.getDay()===0,isRH2=isRHDay(date);
      const sett2b=settingsForYM(ym);
      const ferF=isFer2&&sett2b.ferRendu?2.0:0;
      // Échange ecSelf=true: férié et dimanche comptent, pas RH
      const dimF=(isDim2&&sett2b.dimRendu)?0.5:0;
      const rhF=(!echange&&!isDim2&&isRH2&&sett2b.rhRendu)?0.5:0;
      const totF=ferF+dimF+rhF;
      if(totF===0)continue;
      if(ferF>0)add(ym,'fer',Math.round(dur*ferF/60*100)/100*60);
      if(dimF>0)add(ym,'dim',Math.round(dur*dimF/60*100)/100*60);
      if(rhF>0)add(ym,'rh',Math.round(dur*rhF/60*100)/100*60);}
  }
  const seenHS=new Set();
  for(let y=2025;y<=2030;y++)for(let m=0;m<12;m++){
    const ym=y*12+m;if(ym<createdYM||ym>TODAY_YM&&ym>maxYM)continue;
    const last=new Date(y,m+1,0).getDate();
    for(let d=1;d<=last;d++){const date=new Date(y,m,d),mon=getMonday(date),mk2=dk(mon);if(seenHS.has(mk2))continue;seenHS.add(mk2);const mym=mon.getFullYear()*12+mon.getMonth();
      // Compute ferYm early — for ramenée weeks the ferie might be in the next month
      let ferYm=mym;
      for(let fi=0;fi<7;fi++){const fd2=new Date(mon);fd2.setDate(mon.getDate()+fi);if(FERIES.has(dk(fd2))){ferYm=fd2.getFullYear()*12+fd2.getMonth();break;}}
      // Skip if neither the week's month nor the ferie month is in scope
      const weekInScope=mym>=createdYM&&(mym<=TODAY_YM||mym<=maxYM);
      const ferInScope=ferYm>=createdYM&&(ferYm<=TODAY_YM||ferYm<=maxYM);
      if(!weekInScope&&!ferInScope)continue;

      }}

function calcSoldes(){
  const gen=buildGen(),createdYM=(S.profile&&S.profile.ephSoldeCreatedYM!==undefined)?S.profile.ephSoldeCreatedYM:2026*12;
  const realEph={},prevEph={};
  for(let ym=createdYM;ym<=TODAY_YM;ym++)realEph[ym]=0;
  Object.keys(gen).forEach(ymStr=>{const ym=Number(ymStr),total=Object.values(gen[ym]).reduce((s,v)=>s+v,0),expYm=getExpYm(ym);if(ym>TODAY_YM){prevEph[ym]=total;return;}realEph[ym]=expYm<=TODAY_YM?0:total;});
  // FIFO: deduct all rendus (past AND future) from combined stock (realEph + prevEph)
  {
    const _rendKeys=Object.keys(S.conges||{}).filter(k=>S.conges[k]==='rend').sort();
    // Build combined simulation: realEph + prevEph
    const _sim={};
    Object.keys(realEph).forEach(function(ym){_sim[ym]=realEph[ym];});
    Object.keys(prevEph).forEach(function(ym){_sim[ym]=(_sim[ym]||0)+prevEph[ym];});
    _rendKeys.forEach(function(k){
      const _d=new Date(k+'T12:00:00'),_poseYm=_d.getFullYear()*12+_d.getMonth(),_dur=getDur(_d);
      let _left=_dur;
      const _yms=Object.keys(_sim).map(Number).sort();
      for(const _ym of _yms){
        if(_sim[_ym]<=0||getExpYm(_ym)<_poseYm)continue;
        const _take=Math.min(_sim[_ym],_left);_sim[_ym]-=_take;_left-=_take;
        if(_left<=0)break;
      }
    });
    // Write back deductions to realEph and prevEph
    Object.keys(realEph).forEach(function(ym){realEph[ym]=Math.max(0,_sim[ym]||0);});
    Object.keys(prevEph).forEach(function(ym){prevEph[ym]=Math.max(0,(_sim[ym]||0));});
  }
  let toDeduct=0;
  const realAvail={};Object.keys(realEph).map(Number).sort().forEach(ym=>realAvail[ym]=realEph[ym]);
  for(const ym of Object.keys(realAvail).map(Number).sort()){if(toDeduct<=0)break;const take=Math.min(realAvail[ym],toDeduct);realAvail[ym]-=take;toDeduct-=take;}
  let matelas=(S.profile&&S.profile.matelas)||0;if(toDeduct>0)matelas-=toDeduct;
  return{gen,realEph,realAvail,prevEph,matelas,totalReal:Object.values(realAvail).reduce((s,v)=>s+v,0),totalPrev:Object.keys(prevEph).map(Number).filter(ym=>ym<=CUR_YEAR*12+11).reduce((s,ym)=>s+(prevEph[ym]||0),0)};
}

function calcCongesUsedForYear(year){
  // Filter conges keys to that year only, then apply full calcCongesUsed logic
  const allCgKeys=Object.keys(S.conges||{}).filter(k=>S.conges[k]==='cg').sort();
  const yearKeys=allCgKeys.filter(k=>k.startsWith(String(year)+'-'));
  if(!yearKeys.length)return 0;
  const cgSet=new Set(allCgKeys);// full set for écart rule

  function isFullWeekCP(monday){
    const monKey=dk(monday);
    if(!cgSet.has(monKey))return false;
    for(var i=0;i<7;i++){
      const d=new Date(monday);d.setDate(monday.getDate()+i);
      const v2=getVac(d);
      const isWorked=v2.vac&&v2.vac!=='RH'&&!v2.absent;
      if(isWorked&&!cgSet.has(dk(d)))return false;
    }
    return true;
  }
  const fullWeeks=new Set(),seenMon=new Set();let total=0;
  yearKeys.forEach(function(k){
    const d=new Date(k+'T12:00:00'),mon=getMonday(d),mk=dk(mon);
    if(seenMon.has(mk))return;seenMon.add(mk);
    if(isFullWeekCP(mon)){fullWeeks.add(mk);total+=5;}
  });
  const partialKeys=yearKeys.filter(function(k){
    const d=new Date(k+'T12:00:00');return!fullWeeks.has(dk(getMonday(d)));
  });
  if(!partialKeys.length)return total;
  function findReprise(fromDate){
    const sd=new Date(fromDate);sd.setDate(sd.getDate()+1);
    while(sd<=new Date('2031-01-01')){
      const v2=getVac(sd);if(v2.vac&&v2.vac!=='RH'&&!v2.absent)return new Date(sd);
      sd.setDate(sd.getDate()+1);}return null;
  }
  const groups={};
  partialKeys.forEach(function(k){
    const d=new Date(k+'T12:00:00'),r=findReprise(d),rk=r?dk(r):'none';
    if(!groups[rk])groups[rk]={reprise:r,dates:[]};groups[rk].dates.push(d);
  });
  Object.values(groups).forEach(function(g){
    const nb=g.dates.length;if(!g.reprise){total+=nb;return;}
    const lastCp=new Date(Math.max.apply(null,g.dates));
    const ecart=Math.round((g.reprise-lastCp)/(864e5))-1;
    total+=nb+Math.max(0,ecart-2);
  });
  return total;
}

function calcCongesUsed(){
  // Total tous azimuts (pour compat récap, etc.) — somme sur toutes les années présentes dans S.conges
  const allYears=[...new Set(Object.keys(S.conges||{}).filter(k=>S.conges[k]==='cg').map(k=>parseInt(k.slice(0,4))))];
  return allYears.reduce((s,y)=>s+calcCongesUsedForYear(y),0);
}

function adjSoldeAnnee(year,delta){
  const cur=getSoldeAnnee(year);
  const nv=Math.max(0,cur+delta);
  setSoldeAnnee(year,nv);
  saveState();
  // Refresh just the cell
  const el=document.getElementById('cpa-solde-'+year);
  if(el)el.textContent=nv+' j';
  // Also refresh the used/rest cell (re-render whole modal is simpler)
  openCongesModal();
}

function adjCET(delta){
  const nowY=NOW.getFullYear();
  const cet=getCET();
  const solde=getSoldeAnnee(nowY);
  if(!S.profile)return;
  if(delta>0){
    // Add to CET: remove 1j from this year's solde
    if(solde<=0)return;
    setSoldeAnnee(nowY,solde-1);
    S.profile.congesCET=(cet+1);
  } else {
    // Remove from CET: add 1j to this year's solde
    if(cet<=0)return;
    setSoldeAnnee(nowY,solde+1);
    S.profile.congesCET=Math.max(0,cet-1);
  }
  saveState();
  openCongesModal();
  updateCounters();
}

function getState(date){
  const key=dk(date),v2=getVac(date),{vac,fromSV,absent,echange,ecSelf}=v2;
  if(absent)return'absent';
  const c=(S.conges||{})[key];
  // Échange: ec=orange (I work it), ec2=grey (colleague covers)
  if(echange){
    if(!ecSelf)return FERIES.has(key)?'ec2-fer':'ec2'; // grey - colleague works this
    // ecSelf: I work the new vacation
    if(FERIES.has(key))return'ec-fer';
    return'ec';
  }
  if(FERIES.has(key)){
    if(c==='cg')return'cg-fer';
    if(c==='rend')return'rend-fer';
    if(absent)return'absent-fer';
    if(!ecSelf&&echange)return'ec2-fer';
    if(vac&&vac!=='RH')return fromSV?'sv-vac-fer':'tv-fer';
    return'fer';
  }
  if(!vac){
    // SV override (explicitly set to SV) vs natural SV
    const _ovr=(S.overrides||{})[key];
    return(_ovr&&_ovr.fromSV&&!_ovr.echange)?'sv-ov':'sv';
  }
  if(vac==='RH')return'rh';
  if(c==='cg')return'cg';if(c==='rend')return'rend';
  return fromSV?'sv-vac':'tv';
}
function buildRameeSet(y,m){
  const set=new Set(),seen=new Set(),last=new Date(y,m+1,0).getDate();
  for(let d=1;d<=last;d++){const date=new Date(y,m,d),mon=getMonday(date),mk=dk(mon);if(seen.has(mk))continue;seen.add(mk);if(isSemaineRamenée(mon)){for(let i=0;i<7;i++){const dd=new Date(mon);dd.setDate(mon.getDate()+i);set.add(dk(dd));}}}
  return set;
}

function renderMonth(el_heads,el_cal){
  el_heads.innerHTML='<th class="wkh"></th>'+['L','M','Me','J','V','S','D'].map(j=>`<th>${j}</th>`).join('');
  const rameeSet=buildRameeSet(curY,curM),first=new Date(curY,curM,1),last=new Date(curY,curM+1,0);
  let sdow=first.getDay();sdow=sdow===0?6:sdow-1;
  // Compute warn keys in one FIFO pass
  const _warnKeys=new Set();
  {
    const _cs2=calcSoldes();
    const _stk={};
    Object.keys(_cs2.realAvail).map(Number).sort().forEach(function(ym){_stk[ym]=_cs2.realAvail[ym];});
    Object.keys(_cs2.prevEph).map(Number).sort().forEach(function(ym){_stk[ym]=(_stk[ym]||0)+(_cs2.prevEph[ym]||0);});
    const _rks=Object.keys(S.conges||{}).filter(function(k){return S.conges[k]==='rend';}).sort();
    _rks.forEach(function(k){
      const _d=new Date(k+'T12:00:00'),_pym=_d.getFullYear()*12+_d.getMonth(),_dur=getDur(_d);
      let _lft=_dur;
      Object.keys(_stk).map(Number).sort().forEach(function(_ym){
        if(_lft<=0||_stk[_ym]<=0||getExpYm(_ym)<_pym)return;
        const _tk=Math.min(_stk[_ym],_lft);_stk[_ym]-=_tk;_lft-=_tk;
      });
      if(_lft>0)_warnKeys.add(k);
    });
  }
  const cells=[];for(let i=0;i<sdow;i++)cells.push(null);
  const _VAC=getVAC();
  for(let d=1;d<=last.getDate();d++){
    const date=new Date(curY,curM,d),key=dk(date),st=getState(date),{vac,ov,fromSV,echange}=getVac(date);
    let lbl='';
    if(st==='absent')lbl='abs.';
    else if(st==='sv')lbl=ov?'*':'+';
    else if(st==='rh')lbl='+';
    else if(st==='fer')lbl=(vac&&vac!=='RH')?vLbl(vac,_VAC)+(echange?'~':'')+(ov&&!fromSV?'*':''):'+';
    else if(vac&&vac!=='RH')lbl=vLbl(vac,_VAC)+(echange?'~':'')+(ov&&!fromSV?'*':'');
    const panDot=isPanier(date)&&!(S.conges||{})[key]?'<span class="pdot"></span>':'';
    const _inWarn=_warnKeys.has(key);
    const warnDot=_inWarn?'<span class="wdot">⚠️</span>':'';
    const _lbl=_inWarn?'':lbl;
    const _dn=_inWarn?'':d;
    cells.push({d:_dn,date,key,st,lbl:_lbl,panDot,warnDot});
  }
  // Don't add trailing empty cells
  const todayMon=dk(getMonday(NOW));let html='';
  for(let r=0;r<cells.length/7;r++){
    const row=cells.slice(r*7,(r+1)*7),firstReal=row.find(x=>x&&x.date);
    const wn=firstReal?isoWeek(firstReal.date):'';
    const rowMon=firstReal?dk(getMonday(firstReal.date)):'';
    const rowRamee=firstReal&&rameeSet.has(dk(firstReal.date));
    const isCurWeek=rowMon===todayMon;
    const isFullCG=firstReal&&isWeekFullCG(getMonday(firstReal.date));
    // Wkn color: ramenee > plein CG > semaine courante
    const wknCls=rowRamee?'wram':isFullCG?'wcg':isCurWeek?'wcur':'';
    const rowCls=(rowRamee?'':'')+' '+(isCurWeek?'curweek':isFullCG?'cgweek':'');
    html+=`<tr class="${rowCls.trim()}"><td class="wkn ${wknCls}" data-wn="${wn}">${wn}</td>`;
    row.forEach(cell=>{
      if(!cell){html+='<td></td>';return;}
      html+=`<td><div class="dc s-${cell.st}" style="position:relative;">${cell.warnDot}<div class="dci" onclick="openDay('${cell.key}')"><span class="dn">${cell.d}</span><span class="dv">${cell.lbl}</span></div>${cell.panDot}</div></td>`;
    });
    html+='</tr>';
  }
  el_cal.innerHTML=html;
  // Update header warn icon
  updateWarnIcon(_warnKeys);
}

function getISOWeek(date){
  const d=new Date(Date.UTC(date.getFullYear(),date.getMonth(),date.getDate()));
  const dayNum=d.getUTCDay()||7;
  d.setUTCDate(d.getUTCDate()+4-dayNum);
  const yearStart=new Date(Date.UTC(d.getUTCFullYear(),0,1));
  return Math.ceil((((d-yearStart)/86400000)+1)/7);
}

  {const seenHSm=new Set();for(let d=1;d<=new Date(curY,curM+1,0).getDate();d++){const date=new Date(curY,curM,d),mon=getMonday(date),mk=dk(mon);if(seenHSm.has(mk))continue;seenHSm.add(mk);const hsW=calcHSWeek(mon);if(hsW.surplus<=0)continue;

  // Eph list

  const futureMonths=[];for(let i=1;i<=3;i++)futureMonths.push(TODAY_YM+i);

  const maxV=Math.max(...display.map(ym=>gen[ym]?Object.values(gen[ym]).reduce((s,v)=>s+v,0):0),1);
  let ephHtml='';
    // Show initial solde before first month

  }

function ephBarColor(moLeft,isExp){

function getDayVacs(dw,allVK){
  // lun-ven: A*, B*, C*, D*, P423 (pas de s/d suffixe)
  // sam: *s ou As*
  // dim: *d ou Ad*
  var night=['D1','D2','Es','Ed','Fs','Fd','P423'];
  var week=['A1','A2','A3','B1','C1','C2'];
  var sat=['As1','As2','As3','Cs','Es','Fs'];
  var sun=['Ad1','Ad2','Ad3','Cd','Ed','Fd'];
  var base;
  if(dw===6) base=[...new Set([...sat,...night.filter(v=>!sat.includes(v))])];
  else if(dw===0) base=[...new Set([...sun,...night.filter(v=>!sun.includes(v))])];
  else base=[...new Set([...week,...night.filter(v=>!week.includes(v))])];
  var std=base.filter(v=>allVK.includes(v));
  var stdAll=[...week,...sat,...sun,...night];
  var custom=allVK.filter(v=>!stdAll.includes(v));
  return [...std,...custom];
}

function removeCongé(){
  const key=pendingKey;
  if(!S.conges||!key)return;
  const type=S.conges[key];
  if(!type){saveState();closeModal();render();return;}
  // Find all days of the same type connected to this day (no worked-day gap)
  // Walk backward and forward
  const toRemove=new Set([key]);
  // Walk backward
  var d=new Date(key+'T12:00:00');
  for(var i=1;i<=365;i++){
    var prev=new Date(d);prev.setDate(prev.getDate()-i);
    var pk=dk(prev);
    var v2=getVac(prev);
    var isWorked=v2.vac&&v2.vac!=='RH'&&!v2.absent;
    if(isWorked){
      if(S.conges[pk]===type)toRemove.add(pk);
      else break; // gap found
    }
  }
  // Walk forward
  var d2=new Date(key+'T12:00:00');
  for(var j=1;j<=365;j++){
    var nxt=new Date(d2);nxt.setDate(nxt.getDate()+j);
    var nk=dk(nxt);
    var v2b=getVac(nxt);
    var isWorked2=v2b.vac&&v2b.vac!=='RH'&&!v2b.absent;
    if(isWorked2){
      if(S.conges[nk]===type)toRemove.add(nk);
      else break;
    }
  }
  const _pid2=window._aid||'default';
  const _stored2=JSON.parse(localStorage.getItem('gcal_event_ids_'+_pid2)||'{}');
  toRemove.forEach(function(k){
    delete S.conges[k];removeHistoryForKey(k);
    delete _stored2[k]; // clear stored IDs so sync re-creates correctly
  });
  localStorage.setItem('gcal_event_ids_'+_pid2,JSON.stringify(_stored2));
  saveState();closeModal();render();
  gcalMarkDirty(pendingKey);
}

function calcDispoAtDate(targetDate){
  // Heures disponibles à targetDate :
  // - heures réelles dispo aujourd'hui, non expirées à targetDate
  // - heures futures créées avant targetDate et non expirées à targetDate
  const cs=calcSoldes();
  let dispo=0;
  // Real months: include only if not expired at targetDate
  Object.keys(cs.realAvail).forEach(function(ymStr){
    const ym=Number(ymStr);
    const avail=cs.realAvail[ym];
    if(avail<=0)return;
    const expYm=ym+((S.ephExtend&&S.ephExtend[ym])?6:3);
    const expDate=new Date(Math.floor(expYm/12),expYm%12+1,0);
    if(expDate>=targetDate)dispo+=avail;
  });
  // Future months: created before targetDate, not expired at targetDate
  Object.keys(cs.prevEph).forEach(function(ymStr){
    const ym=Number(ymStr);
    const total=cs.prevEph[ym];
    if(total<=0)return;
    const lastDayOfMonth=new Date(Math.floor(ym/12),ym%12+1,0);
    if(lastDayOfMonth>targetDate)return; // not yet created at targetDate
    const expYm=ym+((S.ephExtend&&S.ephExtend[ym])?6:3);
    const expDate=new Date(Math.floor(expYm/12),expYm%12+1,0);
    if(expDate>=targetDate)dispo+=total;
  });
  return dispo;
}

function applyPose(type,startKey,unique){
  const endKey=unique?startKey:(document.getElementById('pose-until').value||startKey);
  const start=new Date(startKey+'T12:00:00');
  const end=new Date(endKey+'T12:00:00');

  // Validate rendus: check available hours at end date
  if(type==='rend'){
    var totalRend=0;
    var d0=new Date(start);
    while(d0<=end){
      const v2=getVac(d0);
      if(v2.vac&&v2.vac!=='RH'&&!v2.absent)totalRend+=getDur(d0);
      d0.setDate(d0.getDate()+1);
    }
    const dispo=calcDispoAtDate(end);
    if(totalRend>dispo){
      const manque=totalRend-dispo;
      document.getElementById('modal-root').innerHTML='<div class="overlay" style="z-index:400"><div class="sheet" style="max-height:220px"><div class="sh"></div>'
        +'<div class="st" style="color:var(--rendu-red-text)">Rendus insuffisants</div>'
        +'<div class="ss" style="margin-bottom:16px">Il manque <b>'+fmtMin(manque)+'</b> pour poser cette période.<br>Disponible : '+fmtMin(dispo)+' · Nécessaire : '+fmtMin(totalRend)+'</div>'
        +'<button class="mb wide" onclick="if(pendingKey)openDay(pendingKey);else closeModal()">Retour</button>'
        +'</div></div>';
      return;
    }

  }

  if(!S.conges)S.conges={};if(!S.overrides)S.overrides={};
  var d=new Date(start);
  while(d<=end){
    const k=dk(d);
    const v2=getVac(d);
    const isWorked=v2.vac&&v2.vac!=='RH'&&!v2.absent;
    if(isWorked){
      if(type==='absent'){S.overrides[k]={absent:true};S.conges[k]='absent';}
      else{S.conges[k]=type;}
    }
    d.setDate(d.getDate()+1);
  }
  const label=type==='cg'?'congé':type==='rend'?'rendu':'absent';
  const color=type==='cg'?'#5a9e3f':type==='rend'?'#b0443a':'#f0a030';
  logH(fmtDate(start)+' -> '+label+(unique?'':' au '+fmtDate(end)),color,startKey);
  saveState();closeModal();render();
  if(gcalTokens){
    const d2=new Date(start);
    while(d2<=end){gcalMarkDirty(dk(d2));d2.setDate(d2.getDate()+1);}
  }
}

function computeSettForProfile(pr,targetYM,key){
  var ss=pr&&pr.settings?pr.settings:{};
  var base=ss[key]!==false;
  var hist=ss.settingsHistory||[];
  var active=null;
  for(var h of hist){var p2=h.since||'';if(!p2)continue;var py=parseInt(p2.split('-')[0]),pm=parseInt(p2.split('-')[1])-1;var hym=py*12+pm;if(hym<=targetYM)active=h;}
  return active?active[key]!==false:base;
}

function toggleHistPanel(btn){

}

function cancelExchange(key){
  // Remove overrides for both days of the exchange
  if(!S.overrides)return;
  // Find the partner key: look for ec2 (the day we gave away) or ec (the day we took)
  const ov1=S.overrides[key];
  if(!ov1||!ov1.echange)return;
  delete S.overrides[key];
  // Also remove the partner if it references this exchange
  // Since we don't store a link, search all overrides for echange pairs in the same week
  const date=new Date(key+'T12:00:00'),mon=getMonday(date);
  for(let i=0;i<7;i++){
    const d=new Date(mon);d.setDate(mon.getDate()+i);const dk2=dk(d);
    const ov2=(S.overrides||{})[dk2];
    if(ov2&&ov2.echange){gcalClearDateId(dk2);if(dk2!==key)delete S.overrides[dk2];}
  }
  gcalClearDateId(key);delete S.overrides[key];
  removeHistoryForKey(key);
  saveState();closeModal();render();
  gcalMarkDirty(pendingKey);
}

function openRestantsModal(){

  const ML=['janvier','février','mars','avril','mai','juin','juillet','août','septembre','octobre','novembre','décembre'];
  // Combine real + 12 future months
  const allReal=Object.keys(realAvail).map(Number).filter(ym=>realAvail[ym]>0);
  const allPrev=Object.keys(prevEph).map(Number).filter(ym=>prevEph[ym]>0).sort().slice(0,12);
  const yms=[...new Set([...allReal,...allPrev])].sort();
  const maxV=Math.max(...yms.map(ym=>ym>TODAY_YM?(prevEph[ym]||0):(realAvail[ym]||0)),1);
  let rows='';
  const btnS='font-size:9px;padding:2px 5px;border:0.5px solid var(--border);border-radius:4px;background:transparent;cursor:pointer;';
  yms.forEach(function(ym){
    const isFut=ym>TODAY_YM;
    const avail=isFut?(prevEph[ym]||0):(realAvail[ym]||0);
    if(avail<=0)return;
    const y=Math.floor(ym/12),m=ym%12;

      +'<div style="display:flex;gap:2px">'+minusBtn+plusBtn+'</div>'

function calcCongesUsedForKeys(monthKeys,allCgKeys){
  // Count CP for a specific set of days, using full ecart rule but limited to these keys
  if(!monthKeys.length)return 0;
  const cgSet=new Set(allCgKeys);
  const seenMon=new Set();let total=0;const fullWeeks=new Set();
  monthKeys.forEach(function(k){
    const d=new Date(k+'T12:00:00'),mon=getMonday(d),mk=dk(mon);
    if(seenMon.has(mk))return;seenMon.add(mk);
    if(!cgSet.has(mk))return;
    // Only count full week if monday is in this month (avoids double-counting cross-month weeks)
    const monM=mon.getFullYear()*12+mon.getMonth();
    const dayM=d.getFullYear()*12+d.getMonth();
    if(monM!==dayM)return; // monday in different month — will be counted there
    let ok=true;
    for(let i=0;i<7;i++){const dd=new Date(mon);dd.setDate(mon.getDate()+i);const v2=getVac(dd);if(v2.vac&&v2.vac!=='RH'&&!v2.absent&&!cgSet.has(dk(dd))){ok=false;break;}}
    if(ok){fullWeeks.add(mk);total+=5;}
  });
  const partial=monthKeys.filter(k=>{
    const mk=dk(getMonday(new Date(k+'T12:00:00')));
    // Exclude days whose week was already counted as a full week (even from another month)
    if(fullWeeks.has(mk))return false;
    // Also check if this week is a full week globally (counted in a previous month)
    const mon=getMonday(new Date(k+'T12:00:00'));
    let ok=true;
    for(let i=0;i<7;i++){const dd=new Date(mon);dd.setDate(mon.getDate()+i);const v2=getVac(dd);if(v2.vac&&v2.vac!=='RH'&&!v2.absent&&!cgSet.has(dk(dd))){ok=false;break;}}
    return ok===false; // only include in partial if week is NOT full
  });
  function fR(from){const sd=new Date(from);sd.setDate(sd.getDate()+1);while(sd<=new Date('2031-01-01')){const v2=getVac(sd);if(v2.vac&&v2.vac!=='RH'&&!v2.absent)return new Date(sd);sd.setDate(sd.getDate()+1);}return null;}
  const groups={};
  partial.forEach(function(k){const d=new Date(k+'T12:00:00'),r=fR(d),rk=r?dk(r):'none';if(!groups[rk])groups[rk]={reprise:r,dates:[]};groups[rk].dates.push(d);});
  Object.values(groups).forEach(function(g){
    const nb=g.dates.length;if(!g.reprise){total+=nb;return;}
    const lc=new Date(Math.max.apply(null,g.dates));
    total+=nb+Math.max(0,Math.round((g.reprise-lc)/(864e5))-1-2);
  });
  return total;
}

function openDetailMois(mym){
  document.querySelectorAll('[onclick*="openDetailMois"]').forEach(el=>el.classList.add('active'));document.body.classList.add('modal-open');
  setTimeout(function(){if(document.documentElement.classList.contains('touch')){const _t=document.createElement('button');_t.style.cssText='position:fixed;opacity:0;pointer-events:none;top:0;left:0';document.body.appendChild(_t);_t.focus();document.body.removeChild(_t);}},50);
  const{gen}=calcSoldes();
  const gm=gen[mym]||{};
  const y=Math.floor(mym/12),m=mym%12;
  const ML=['Janvier','Février','Mars','Avril','Mai','Juin','Juillet','Août','Septembre','Octobre','Novembre','Décembre'];

  function makeWeekRow(mon,note){
    const hsW=calcHSWeek(mon);
    // Compute dim/fer for this week
    const VAC=getVAC();
    let weekDim=0,weekRH=0,weekFer=0;
    for(let i=0;i<7;i++){
      const d=new Date(mon);d.setDate(mon.getDate()+i);
      const key=dk(d);const v2=getVac(d);
      const{vac,absent,echange,ecSelf}=v2;
      if(!vac||vac==='RH'||absent)continue;
      if(echange&&!ecSelf)continue;
      const cKey=(S.conges||{})[key];if(cKey==='rend')continue;
      const dur=VAC[vac]?VAC[vac].dur:0;
      const isFer3=FERIES.has(key),isDim3=d.getDay()===0,isRH3=isRHDay(d);
      const sett3=settingsForYM(d.getFullYear()*12+d.getMonth());
      const ferF3=isFer3&&sett3.ferRendu?2.0:0;
      const dimF3=isDim3&&sett3.dimRendu?0.5:0;
      const rhF3=(!v2.echange&&!isDim3&&isRH3&&sett3.rhRendu)?0.5:0;
      if(ferF3+dimF3+rhF3===0)continue;
      if(ferF3>0)weekFer+=Math.round(dur*ferF3/60*100)/100*60;
      if(dimF3>0)weekDim+=Math.round(dur*dimF3/60*100)/100*60;
      if(rhF3>0)weekRH+=Math.round(dur*rhF3/60*100)/100*60;
    }
    const total=hsW.rendusMinHS+hsW.rendusMinRam+weekDim+weekRH+weekFer;
    if(total<=0)return'';
    const parts=[];
    if(weekDim>0)parts.push('<span style="color:#9c80e0">Dim +'+fmtMin(weekDim)+'</span>');
    if(weekRH>0)parts.push('<span style="color:#7b9ce0">RH +'+fmtMin(weekRH)+'</span>');
    if(weekFer>0)parts.push('<span style="color:var(--gold)">Fér +'+fmtMin(weekFer)+'</span>');
    if(hsW.rendusMinHS>0)parts.push('<span style="color:var(--blue)">HS +'+fmtMin(hsW.rendusMinHS)+'</span>');
    if(hsW.rendusMinRam>0)parts.push('<span style="color:var(--gold-dark)">Ram +'+fmtMin(hsW.rendusMinRam)+'</span>');
    const partRows=[
      {label:'Dimanches',val:weekDim,color:'#9c80e0'},
      {label:'RH',val:weekRH,color:'#7b9ce0'},
      {label:'Fériés',val:weekFer,color:'var(--gold)'},
      {label:'Heures supp.',val:hsW.rendusMinHS,color:'var(--blue)'},
      {label:'Ramenée',val:hsW.rendusMinRam,color:'var(--gold-dark)'},
    ].filter(r=>r.val>0);
    return'<div style="font-size:11px;padding:5px 0;border-bottom:0.5px solid var(--border2)">'      +'<div style="display:flex;justify-content:space-between;margin-bottom:3px">'      +'<span style="font-weight:500;color:var(--text)">Semaine '+getISOWeek(mon)+(note?' <span style="font-size:10px;font-weight:400;color:var(--text3)">'+note+'</span>':'')+'</span>'      +'<b style="color:var(--blue)">+'+fmtMin(total)+'</b></div>'      +partRows.map(r=>'<div style="display:flex;justify-content:space-between;padding:1px 0 1px 8px">'        +'<span style="color:var(--text3)">'+r.label+'</span>'        +'<span style="color:'+r.color+'">+'+fmtMin(r.val)+'</span>'        +'</div>').join('')      +'</div>';
  }

  const seenW=new Set();let hsRows='';

  // Cross-month ramenées: semaines du mois préc. dont le férié est ce mois
  for(let dd=-14;dd<0;dd++){
    const date=new Date(y,m,1);date.setDate(date.getDate()+dd);
    const mon=getMonday(date),mk=dk(mon);
    if(seenW.has(mk))continue;seenW.add(mk);
    if(!isSemaineRamenée(mon))continue;
    let ferYm2=mon.getFullYear()*12+mon.getMonth();
    for(let fi=0;fi<7;fi++){const fd=new Date(mon);fd.setDate(mon.getDate()+fi);if(FERIES.has(dk(fd))){ferYm2=fd.getFullYear()*12+fd.getMonth();break;}}
    if(ferYm2!==mym)continue;
    hsRows+=makeWeekRow(mon,'← mois préc.');
  }

  // Semaines de ce mois
  for(let d=1;d<=new Date(y,m+1,0).getDate();d++){
    const date=new Date(y,m,d),mon=getMonday(date),mk=dk(mon);
    if(seenW.has(mk))continue;seenW.add(mk);
    if(mon.getFullYear()*12+mon.getMonth()!==mym)continue;
    hsRows+=makeWeekRow(mon,'');
  }

  const rows=[
    {label:'Dimanches',val:gm.dim,color:'#9c80e0'},
    {label:'RH',val:gm.rh,color:'#7b9ce0'},
    {label:'Fériés travaillés',val:gm.fer,color:'var(--gold)'},
    {label:'Heures supp.',val:gm.hs,color:'var(--blue)'},
    {label:'Semaines ramenées',val:gm.ram,color:'var(--gold-dark)'},
    {label:'Solde initial',val:gm.solde,color:'var(--text2)'},
  ].filter(r=>r.val>0);

  const gt=(gm.dim||0)+(gm.rh||0)+(gm.fer||0)+(gm.hs||0)+(gm.ram||0);

  document.getElementById('modal-root').innerHTML=
    '<div class="overlay" onclick="if(event.target===this)closeModal()"><div class="sheet">'    +'<div class="sh"></div>'    +'<div class="st">Créés — '+ML[m].toLowerCase()+' '+y+'</div>'    +'<div class="ss">'+fmtMin(gt)+' acquis</div>'    +'<div style="margin-bottom:10px">'+rows.map(r=>
      '<div style="display:flex;justify-content:space-between;align-items:center;padding:5px 0">'      +'<div style="display:flex;align-items:center;gap:6px"><span class="rdot" style="background:'+r.color+'"></span><span style="font-size:12px;color:var(--text2)">'+r.label+'</span></div>'      +'<b style="font-size:13px;color:var(--text)">'+fmtMin(r.val)+'</b></div>'    ).join('')+'</div>'    +(hsRows?'<div class="sep"></div><div class="btit" style="margin-bottom:4px">Détail par semaine</div>'+hsRows:'')    +'<button class="mcancel" onclick="closeModal()">Fermer</button>'    +'</div></div>';
}

// Swipe down to close modal
(function(){
  var startY=0,startScroll=0,sheet=null,overlay=null,dragging=false;
  document.addEventListener('touchstart',function(e){
    var el=e.target.closest('.sheet');
    if(!el)return;
    sheet=el;overlay=el.closest('.overlay');
    startY=e.touches[0].clientY;
    startScroll=sheet.scrollTop;
    dragging=true;
    sheet.style.transition='none';
  },{passive:true});
  document.addEventListener('touchmove',function(e){
    if(!dragging||!sheet)return;
    var dy=e.touches[0].clientY-startY;
    // Only swipe down when at top of scroll
    if(dy>0&&sheet.scrollTop<=0){
      sheet.style.transform='translateY('+Math.min(dy,300)+'px)';
      if(overlay)overlay.style.background='rgba(0,0,0,'+Math.max(0,.45-dy/400)+')';
    }
  },{passive:true});
  document.addEventListener('touchend',function(e){
    if(!dragging||!sheet)return;
    dragging=false;
    var dy=e.changedTouches[0].clientY-startY;
    sheet.style.transition='transform .2s ease';
    if(dy>80){
      // Close
      sheet.style.transform='translateY(100%)';
      if(overlay)overlay.style.transition='background .2s ease';
      if(overlay)overlay.style.background='rgba(0,0,0,0)';
      setTimeout(closeModal,200);
    }else{
      sheet.style.transform='';
      if(overlay)overlay.style.background='';
    }
    sheet=null;overlay=null;
  },{passive:true});
})();

var EX_VACS={
  week:['A1','A2','A3','B1','C1','C2','D1','D2','P423'],
  sat: ['As1','As2','As3','Cs','Es','Fs'],
  sun: ['Ad1','Ad2','Ad3','Cd','Ed','Fd'],
};
function exVacsForDay(date){
  const dw=date.getDay();
  if(dw===6)return EX_VACS.sat;
  if(dw===0)return EX_VACS.sun;
  return EX_VACS.week;
}
// Rendus generés pour une vacation d'échange :
// - Ferié travaillé : OUI (+200%)
// - Dimanche travaillé : OUI (+50%)
// - RH travaillé : NON (pas de rendu RH en échange)
// - HS : NON (échange = pas de HS)
function renduFactorÉchange(date){
  const key=dk(date),isFer=FERIES.has(key),isDim=date.getDay()===0;
  const sett=settingsForYM(date.getFullYear()*12+date.getMonth());
  let f=0;
  if(isFer&&sett.ferRendu){f+=2.0;if(isDim&&sett.dimRendu)f+=0.5;}
  else if(isDim&&sett.dimRendu){f+=0.5;}
  // RH : pas de rendu en cas d'échange
  return f;
}

}

function _ddClose(e){
  const dds=document.querySelectorAll('.dropdown');

function saveProfileFromDD(pid){
  const pr=_profs[pid];if(!pr)return;
  // Read oldLine BEFORE modifying pr (pr is a reference to _profs[pid])
  const oldLine=pr.profile&&pr.profile.anchorLine;
  const n=document.getElementById('ps-name');if(n)pr.profile.name=n.value.trim()||pr.profile.name;
  // Line is now changed via openChangeLigneModal
  const mat=document.getElementById('ps-matelas');if(mat&&mat.value.trim()){const v=parseHM(mat.value);if(v>=0)pr.profile.matelas=v;}
  const cg=document.getElementById('ps-conges');if(cg){const v=parseInt(cg.value);if(!isNaN(v))pr.profile.congesInit=v;}
  const eph2=document.getElementById('ps-eph');if(eph2&&eph2.value.trim()){const ev=parseHM(eph2.value);pr.profile.ephSolde=Math.round(ev/60*100)/100;pr.profile.ephSoldeCreatedYM=TODAY_YM;}
  const newLine=pr.profile.anchorLine;
  _profs[pid]=pr;if(pid===_aid)S=pr;saveState();render();renderProfilesDropdown();gcalUpdateBtn();
  const _hpn=document.getElementById('hdr-profile-name');if(_hpn&&S.profile)_hpn.textContent=S.profile.name||'Profil';
}
function applySettingsFromDD(pid){
  const pr=_profs[pid];if(!pr)return;if(!pr.settings)pr.settings={};
  const dimEl=document.getElementById('ps-dim'),rhEl=document.getElementById('ps-rh');
  const ferEl=document.getElementById('ps-fer'),hsEl=document.getElementById('ps-hs');
  if(!dimEl)return;
  const newDim=dimEl.checked,newRh=rhEl?rhEl.checked:true,newFer=ferEl?ferEl.checked:true,newHs=hsEl?hsEl.checked:true;

  // M+1 since date
  const now=new Date();let sy=now.getFullYear(),sm=now.getMonth()+2;
  if(sm>12){sy++;sm=1;}
  const nextYM=sy*12+(sm-1);
  const since=sy+'-'+String(sm).padStart(2,'0');

  if(!pr.settings.settingsHistory)pr.settings.settingsHistory=[];

  // What are the current month's effective settings?
  const curEff=settingsForYM(TODAY_YM);
  const newMatchesCurrent=curEff.dimRendu===newDim&&curEff.rhRendu===newRh&&curEff.ferRendu===newFer&&curEff.hsRendu===newHs;

  if(newMatchesCurrent){
    // Cancel: remove any pending future entry for M+1
    pr.settings.settingsHistory=pr.settings.settingsHistory.filter(h=>{
      const hym=parseInt(h.since.split('-')[0])*12+(parseInt(h.since.split('-')[1])-1);
      return hym!==nextYM;
    });
  } else {
    // Apply change: upsert entry for M+1
    pr.settings.settingsHistory=pr.settings.settingsHistory.filter(h=>h.since!==since);
    pr.settings.settingsHistory.push({since,dimRendu:newDim,rhRendu:newRh,ferRendu:newFer,hsRendu:newHs});
    pr.settings.settingsHistory.sort((a,b)=>a.since.localeCompare(b.since));
    // Keep max 6 entries (preserve oldest = initial creation)
    if(pr.settings.settingsHistory.length>6){
      pr.settings.settingsHistory=pr.settings.settingsHistory.slice(-6);
    }
  }
  const oldLine=_profs[pid]&&_profs[pid].profile&&_profs[pid].profile.anchorLine;
  const newLine=pr.profile.anchorLine;
  _profs[pid]=pr;if(pid===_aid)S=pr;saveState();render();renderProfilesDropdown();gcalUpdateBtn();
  const _hpn=document.getElementById('hdr-profile-name');if(_hpn&&S.profile)_hpn.textContent=S.profile.name||'Profil';
  // If line changed and Google connected, clear calendar then re-sync
  if(gcalTokens&&oldLine!==undefined&&oldLine!==newLine){
    if(confirm('La ligne a changé. Voulez-vous vider le calendrier Google et le re-synchroniser ?')){
      gcalClear().then(function(){setTimeout(gcalHandleClick,500);});
    }
  }
}

function applyChangeLigne(pid,chosenVisual,scopeVal,fromDate){
  const pr=_profs[pid];if(!pr)return;

  if(scopeVal==='total'){
    const _diffNow=Math.round((getMonday(NOW)-ANCHOR)/(7*864e5));
    const _Nc=getCycleLen(NOW);
    const newAnchor=((chosenVisual-_diffNow)%_Nc+_Nc)%_Nc;
    pr.profile.anchorLine=newAnchor;
    pr.profile.lineHistory=[];
    delete pr.profile.origAnchor;
    pr.overrides={};
    pr.conges={};
  } else {
    const _fromMonday=getMonday(new Date(fromDate+'T12:00:00'));
    const _diffFrom=Math.round((_fromMonday-ANCHOR)/(7*864e5));
    const _Nc2=getCycleLen(_fromMonday);
    const newAnchor=((chosenVisual-_diffFrom)%_Nc2+_Nc2)%_Nc2;
    if(!pr.profile.lineHistory)pr.profile.lineHistory=[];
    if(pr.profile.origAnchor===undefined)pr.profile.origAnchor=pr.profile.anchorLine;
    pr.profile.lineHistory=pr.profile.lineHistory.filter(function(h){return h.from<fromDate;});
    pr.profile.lineHistory.push({anchorLine:newAnchor,from:fromDate});
    pr.profile.lineHistory.sort(function(a,b){return a.from<b.from?-1:1;});
    pr.profile.anchorLine=pr.profile.lineHistory[pr.profile.lineHistory.length-1].anchorLine;
    const _fromTs=_fromMonday.getTime();
    Object.keys(pr.overrides||{}).forEach(function(k){if(new Date(k+'T00:00:00').getTime()>=_fromTs)delete pr.overrides[k];});
    Object.keys(pr.conges||{}).forEach(function(k){if(new Date(k+'T00:00:00').getTime()>=_fromTs)delete pr.conges[k];});
  }

  _profs[pid]=pr;if(pid===_aid)S=pr;
  saveState();closeModal();render();renderProfilesDropdown();gcalUpdateBtn();
  if(gcalTokens){
    if(confirm('La ligne a changé. Vider le calendrier Google et re-synchroniser ?')){
      gcalClear().then(function(){setTimeout(gcalHandleClick,500);});
    }
  }
}

function getCycleVacWithHistory(date,pr){
  if(!pr||!pr.profile||!pr.profile.lineHistory||!pr.profile.lineHistory.length)return null;
  const key=dk(date);
  // Find the most recent line change that is <= date
  let best=null;
  pr.profile.lineHistory.forEach(function(h){
    if(h.from<=key){if(!best||h.from>best.from)best=h;}
  });
  return best?best.anchorLine:null;
}

  closeModal();

function init(){
  // Detect touch device and disable hover effects
  if('ontouchstart' in window){
    document.documentElement.classList.add('touch');
    // Kill sticky hover on mobile by blurring after touchend
    document.addEventListener('touchend', function(e){
      const el = e.target;
      if(el && el.blur) setTimeout(function(){ el.blur(); }, 0);
      // Move focus to body to clear hover state
      setTimeout(function(){
        const t=document.createElement('button');
        t.style.cssText='position:fixed;opacity:0;pointer-events:none;top:0;left:0';
        document.body.appendChild(t);t.focus();document.body.removeChild(t);
      }, 100);
    }, {passive:true});
  }
  // Auth check
  const authToken=localStorage.getItem('auth_token');
  const authUser=JSON.parse(localStorage.getItem('auth_user')||'null');
  if(!authToken||!authUser){window.location.replace('/planning/');return;}
  window._authToken=authToken;
  window._authUser=authUser;
  // Show user name in header if needed
  loadState();applyTheme();
  // Load cycle override from server if available
  fetch(CLOUD_API+'/get-cycle',{method:'POST',headers:cloudHeaders(),body:'{}'})
    .then(function(r){return r.json();})
    .then(function(d){
      if(d&&d.currentOverride&&d.currentOverride.weeks&&d.currentOverride.weeks.length>0){
        // Override the hardcoded CYCLE with the admin version
        d.currentOverride.weeks.forEach(function(week,i){CYCLE[i]=week;});
        render();
      }
    }).catch(function(){});// Fail silently
  // Load global vacations and cycles from KV
  Promise.all([
    fetch(CLOUD_API+'/get-vacations',{method:'POST',headers:cloudHeaders(),body:'{}'}).then(function(r){return r.json();}),
    fetch(CLOUD_API+'/get-cycle',{method:'POST',headers:cloudHeaders(),body:'{}'}).then(function(r){return r.json();})
  ]).then(function(results){
    const vd=results[0],cd=results[1];
    if(vd&&vd.vacations)_globalVacs=vd.vacations;
    if(cd&&cd.cycles)_globalCycles=cd.cycles;
    render();
  }).catch(function(){});
  const isIOS=/iphone|ipad|ipod/i.test(navigator.userAgent);
  if(isIOS&&!window.navigator.standalone)document.getElementById('pwa-banner').style.display='flex';
  updateUrBtns();
  // Load from cloud FIRST, then render (KV is source of truth)
  cloudLoadAll().then(function(){
    render();
    const hpn=document.getElementById('hdr-profile-name');
    if(hpn&&S&&S.profile)hpn.textContent=S.profile.name||'Profil';
    document.body.style.opacity='1';document.body.style.transition='opacity .25s';setTimeout(function(){document.body.style.transition='';},300);
  }).catch(function(){
    document.body.style.opacity='1';document.body.style.transition='opacity .25s';setTimeout(function(){document.body.style.transition='';},300);
  });
  // Scroll to navigate months/years

  // Sticky header: show on scroll up
  let _lastScrollY=0;
  

  // Swipe left/right to change month on calendar
  let _swipeStartX=0,_swipeStartY=0,_swipeActive=false;
  document.addEventListener('touchstart',function(e){
    if(e.target.closest('.sheet')||e.target.closest('.dropdown')||e.target.closest('.ann-wrap'))return; // ignore modals/dropdowns/annual
    _swipeStartX=e.touches[0].clientX;
    _swipeStartY=e.touches[0].clientY;
    _swipeActive=true;
  },{passive:true});
  document.addEventListener('touchend',function(e){
    if(!_swipeActive)return;
    _swipeActive=false;
    const dx=e.changedTouches[0].clientX-_swipeStartX;
    const dy=e.changedTouches[0].clientY-_swipeStartY;
    if(Math.abs(dx)>50&&Math.abs(dx)>Math.abs(dy)*1.5){
      navDir(dx<0?1:-1); // left = next month, right = prev month
    }
  },{passive:true});
  document.addEventListener('touchmove',function(e){
    if(!_swipeActive)return;
    const dx=Math.abs(e.touches[0].clientX-_swipeStartX);
    const dy=Math.abs(e.touches[0].clientY-_swipeStartY);
    // If clearly horizontal swipe, prevent vertical scroll
    if(dx>dy*1.5&&dx>20)e.preventDefault();
  },{passive:false});
}

async function cloudSave(pid){
  if(!window._authToken)return;
  try{
    await fetch(CLOUD_API+'/data/save',{method:'POST',headers:cloudHeaders(),body:JSON.stringify({profileId:pid,data:_profs[pid]})});
  }catch(e){console.warn('cloud save error',e);}
}

async function cloudLoad(pid){
  if(!window._authToken)return null;
  try{
    const res=await fetch(CLOUD_API+'/data/load',{method:'POST',headers:cloudHeaders(),body:JSON.stringify({profileId:pid})});
    if(!res.ok)return null;
    const text=await res.text();
    if(!text||text.trim()==='')return null;
    const data=JSON.parse(text);
    return data.data||null;
  }catch(e){console.warn('cloud load error',e);return null;}
}

async function cloudLoadAll(){
  if(!window._authToken){gcalLoad();return;}
  try{
    const res=await fetch(CLOUD_API+'/data/list',{method:'POST',headers:cloudHeaders(),body:JSON.stringify({})});
    if(!res.ok){gcalLoad();return;}
    const text=await res.text();
    if(!text||text.trim()===''){gcalLoad();return;}
    const data=JSON.parse(text);
    const profiles=data.profiles||{};
    if(Object.keys(profiles).length===0){
      // New account - no data in KV yet
      // Use profile from localStorage (set by login registration) if available
      const localState=localStorage.getItem('pl_v8');
      if(localState){
        try{
          const parsed=JSON.parse(localState);
          if(parsed.p&&Object.keys(parsed.p).length>0){
            _profs=parsed.p;_aid=parsed.a||'default';
            S=_profs[_aid]||_profs[Object.keys(_profs)[0]];
            if(window._authUser&&window._authUser.name&&S.profile)S.profile.name=capitalize(window._authUser.name);
            // Push initial profile to cloud
            cloudSave(_aid);
            saveState();
            gcalLoad();checkPendingLineChoice();return;
          }
        }catch(e){}
      }
      // Fallback to DEFAULT_PD
      _profs={default:DEFAULT_PD()};
      _aid='default';
      S=_profs['default'];
      if(window._authUser&&window._authUser.name)S.profile.name=capitalize(window._authUser.name);
    } else {
      for(const pid of Object.keys(profiles)){
        const cloudData=await cloudLoad(pid);
        if(cloudData){_profs[pid]=cloudData;} // KV always wins
      }
      // Update active profile S from loaded data
      if(_profs[_aid]){S=_profs[_aid];}
      else{_aid=Object.keys(_profs)[0];S=_profs[_aid];}
    }
    saveState();
  }catch(e){console.warn('cloud load all error',e);}
  gcalLoad();
  checkPendingLineChoice();
  // Restore pending dates and start poll
  gcalRestorePending();
  if(_pendingDates.size)gcalTrigger();
  gcalStartPoll();
  // Background sync on page close
  window.addEventListener('beforeunload',function(){
    if(gcalTokens)gcalSyncBackground();
  });
  // Also sync on visibility change (mobile: app goes to background)
  document.addEventListener('visibilitychange',function(){
    if(document.visibilityState==='hidden'&&gcalTokens)gcalSyncBackground();
    if(document.visibilityState==='visible'){
      gcalPollOnce();
      fetch(location.href,{cache:'no-store',headers:{'Cache-Control':'no-cache, no-store','Pragma':'no-cache'}})
        .then(function(r){return r.text();})
        .then(function(html){
          var m=html.match(/name="app-version" content="([^"]+)"/);
          if(m&&m[1]!==_appVer)location.reload();
        }).catch(function(){});
    }
  });
}

async function confirmDeleteAccount(){
  const btn=document.getElementById('del-confirm-btn');
  if(btn){btn.disabled=true;btn.textContent='Suppression...';}
  const pid=_aid||Object.keys(_profs)[0];
  const delGcal=!!(document.getElementById('del-gcal-cb')&&document.getElementById('del-gcal-cb').checked);
  // Delete Google Calendar if requested
  if(delGcal&&gcalTokens&&gcalCalendarId&&gcalCalendarId!=='primary'){
    try{
      const token=await gcalGetToken();
      if(token){
        await fetch(GCAL_FUNCTIONS+'/calendar',{method:'POST',headers:{'Content-Type':'application/json'},
          body:JSON.stringify({action:'deleteCalendar',access_token:token,refresh_token:gcalTokens.refresh_token,calendarId:gcalCalendarId})});
        localStorage.removeItem('gcal_calendar_id');
      }
    }catch(e){console.warn('gcal delete',e);}
  }
  // Delete cloud data + account (await so requests complete before redirect)
  if(window._authToken){
    if(pid) await fetch(CLOUD_API+'/data/deleteProfile',{method:'POST',headers:cloudHeaders(),body:JSON.stringify({profileId:pid})}).catch(function(){});
    await fetch(CLOUD_API+'/auth/delete-account',{method:'POST',headers:cloudHeaders(),body:JSON.stringify({})}).catch(function(){});
  }
  // Clear all local storage
  ['pl_v8','auth_token','auth_user','remember_creds','gcal_calendar_id'].forEach(function(k){localStorage.removeItem(k);});
  window.location.href='/planning/?tab=register';
}

function syncWknHeight(){
  setTimeout(function(){
    const dayCell=document.querySelector('.dc');
    if(!dayCell)return;
    const h=dayCell.getBoundingClientRect().height;
    if(!h||h<10)return;
    document.querySelectorAll('td.wkn').forEach(function(td){
      const num=td.getAttribute('data-wn')||td.textContent.trim();
      if(!td.getAttribute('data-wn'))td.setAttribute('data-wn',num);
      // Get actual computed background of cal-wrap for opaque badge
      const isLight=document.documentElement.getAttribute('data-theme')==='light';
      const calBg=isLight?'rgb(222,222,217)':'rgb(50,50,55)';
      var bg='transparent';var color=isLight?'#4a4a46':'#c8c8cc';var fw='normal';
      const tr=td.parentElement;
      if(td.classList.contains('wram')){
        bg=isLight?'rgba(220,185,60,.25)':'color-mix(in srgb, '+calBg+' 75%, rgba(184,148,30,1) 25%)';
        color=isLight?'#7a5c00':'#d4b040';fw='600';
      } else if(td.classList.contains('wcg')){
        bg=isLight?'rgba(90,158,63,.20)':'color-mix(in srgb, '+calBg+' 75%, rgba(90,158,63,1) 25%)';
        color=isLight?'#2d6b18':'#6ab84a';fw='600';
      }
      // Apply row background color to the td cell (behind the badge)
      var cellBg='transparent';
      if(tr&&tr.classList.contains('curweek'))cellBg='rgba(78,160,247,.06)';
      else if(tr&&tr.classList.contains('cgweek'))cellBg='rgba(90,158,63,.07)';
      td.style.position='relative';
      td.style.padding='0';
      td.style.background=cellBg;
      td.innerHTML='<div style="position:absolute;top:50%;left:0;transform:translateY(-50%);width:calc(100% - 4px);height:'+h+'px;display:flex;align-items:center;justify-content:center;font-size:9px;border-radius:0 var(--r) var(--r) 0;background:'+bg+';color:'+color+';font-weight:'+fw+';z-index:1;box-sizing:border-box">'+num+'</div>';
    });
  },0);
}

function gcalLoad(){
  // Load tokens from current profile
  if(S.profile&&S.profile.gcalTokens){gcalTokens=S.profile.gcalTokens;}
  else{gcalTokens=null;}
  // Check for auth code in URL (OAuth callback) OR in localStorage (set by callback page)
  // Handle GitHub Pages SPA redirect (code may be in ?redirect= param)
  let searchStr=window.location.search;
  const redirectParam=new URLSearchParams(searchStr).get('redirect');
  if(redirectParam){
    // Clean the redirect param and extract the real code
    searchStr=decodeURIComponent(redirectParam).replace(/^.*?\?/,'?');
    history.replaceState({},'','/planning/app/');
  }
  const urlParams=new URLSearchParams(searchStr);
  const urlCode=urlParams.get('code');
  const lsCode=localStorage.getItem('gcal_auth_code');
  const code=urlCode||lsCode;
  if(code){
    if(lsCode)localStorage.removeItem('gcal_auth_code');
    // Clean URL without reloading
    if(urlCode)history.replaceState({},'',window.location.pathname);
    gcalExchange(code);
  }
  gcalUpdateBtn();
}

function gcalSave(){
  if(S.profile)S.profile.gcalTokens=gcalTokens;
  saveState();
}

function gcalSetProgress(done,total){
  const circle=document.getElementById('gcal-progress-circle');
  if(!circle)return;
  const circ=81.68;
  if(!total||done>=total){circle.style.stroke='transparent';circle.style.strokeDashoffset=circ;return;}
  circle.style.stroke='#4ea0f7';
  circle.style.strokeDashoffset=circ*(1-done/total);
}

function gcalConnect(){
  const url='https://accounts.google.com/o/oauth2/v2/auth?'+new URLSearchParams({
    client_id:GCAL_CLIENT_ID,
    redirect_uri:GCAL_REDIRECT_URI,
    response_type:'code',
    scope:GCAL_SCOPE,
    access_type:'offline',
    prompt:'consent',
  });
  window.location.href=url;
}

async function gcalExchange(code){
  const btn=document.getElementById('gcal-btn');
  if(btn)btn.textContent='Connexion...';
  try{
    const res=await fetch(GCAL_FUNCTIONS+'/auth',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({action:'exchange',code}),
    });
    const data=await res.json();
    if(data.access_token){
      gcalTokens={
        access_token:data.access_token,
        refresh_token:data.refresh_token||gcalTokens&&gcalTokens.refresh_token,
        expiry:Date.now()+data.expires_in*1000,
      };
      if(S.profile)S.profile.gcalAutoSync=true;gcalSave();gcalUpdateBtn();
      await gcalEnsureCalendar();
      gcalResyncAll();
    } else {
      console.error('gcal exchange failed', JSON.stringify(data));
      alert('Connexion Google échouée: ' + (data.error_description || data.error || JSON.stringify(data)));
      if(btn)btn.textContent='Connecter à Google Agenda';
    }
  }catch(e){
    console.error('gcal exchange error',e);
    alert('Erreur connexion Google: ' + e.message);
    if(btn)btn.textContent='Connecter à Google Agenda';
  }
}

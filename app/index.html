<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<title>Planning</title>
<meta name="app-version" content="v4.42">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Planning">
<meta name="theme-color" id="theme-color-meta" content="#18181b">
<link rel="apple-touch-icon" href="/planning/app/apple-touch-icon.png">
<link rel="icon" type="image/png" href="/planning/app/favicon3.png">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.47.0/tabler-icons.min.css">
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');
:root{
  --bg:transparent;--bg2:#26262a;--bg3:#323237;
  --text:#f0f0f1;--text2:#c8c8cc;--text3:#8a8a96;
  --border:rgba(255,255,255,.12);--border2:rgba(255,255,255,.06);
  --r:10px;--rl:14px;
  --blue:#4ea0f7;--blue-l:#1a2d45;--blue-m:#2a4a6e;
  --green:#5a9e3f;--green-l:#1a2e10;--green-m:#2a4a1a;
  --amber:#e09830;--red:#c0392b;
  --gold:#b8941e;--gold-dark:#9a7a18;--gold-l:rgba(184,148,30,.15);--gold-b:rgba(184,148,30,.35);
  --rendu-red:#b0443a;--rendu-red-l:rgba(176,68,58,.18);--rendu-red-text:#d4776f;
  --fer-bg:#7a5c14;--fer-bg-light:#8f6e1a;--fer-text:#e8d5a3;
  --font:'Inter',-apple-system,sans-serif;
}

[data-theme=light]{
  background:#e8e8e4;
  --bg:#e8e8e4;--bg2:#deded9;--bg3:#d0cfc9;
  --text:#1a1a18;--text2:#4a4a46;--text3:#8a8880;
  --border:rgba(0,0,0,.18);--border2:rgba(0,0,0,.10);
  --blue:#0C447C;--blue-l:#d0e4f5;--blue-m:#a0c4e8;
  --green:#3d6b18;--green-l:#ddeece;--green-m:#b8d898;
  --gold-l:rgba(184,148,30,.15);--gold-b:rgba(184,148,30,.30);
  --rendu-red:#b0443a;--rendu-red-l:rgba(176,68,58,.10);--rendu-red-text:#b0443a;
  --fer-bg:#dbc98a;--fer-bg-light:#e5d5a0;--fer-text:#7a5c14;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;font-family:var(--font);}
html,body{overflow-x:hidden;}body{height:100%;padding-top:60px;background:var(--bg);color:var(--text);}
input,select,button,textarea{font-family:var(--font);}
input[type=number]::-webkit-inner-spin-button,input[type=number]::-webkit-outer-spin-button{-webkit-appearance:none;margin:0;}
input[type=number]{-moz-appearance:textfield;appearance:textfield;}
#app{display:block;}
.app-outer{max-width:1080px;margin:0 auto;padding:10px 12px 60px;overflow-x:hidden;}
@media (orientation:portrait){body{padding-top:68px;}.app-outer{padding-top:0;}}
.layout{display:flex;gap:14px;align-items:flex-start;}
.cal-col{flex:1;min-width:0;position:relative;}
.side-col{width:260px;flex-shrink:0;display:flex;flex-direction:column;gap:8px;padding-top:38px;}
@media(max-width:720px){.layout{flex-direction:column;align-items:stretch;}.side-col{width:100%;padding-top:0;}}
@media(max-width:480px){.hdr{padding:12px 10px;}.hdr-ver{display:none;}}

/* HEADER */
.hdr{display:flex;align-items:center;justify-content:space-between;padding:14px 20px;left:0;right:0;width:100%;background:var(--bg2);border-bottom:0.5px solid var(--border);position:fixed;top:0;z-index:200;}
.hdr-btns{display:flex;gap:5px;align-items:center;margin-left:auto;}
.ibtn{background:transparent;border:0.5px solid var(--border);border-radius:var(--r);padding:6px 9px;font-size:12px;cursor:pointer;color:var(--text2);display:flex;align-items:center;gap:4px;transition:background .1s;}
.ibtn:active{opacity:.7;}
.ibtn:disabled{opacity:.3;pointer-events:none;}

/* NAV */
.mbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;gap:4px;position:relative;}
.mnav{background:transparent;border:0.5px solid var(--border);border-radius:var(--r);padding:6px 12px;font-size:14px;cursor:pointer;color:var(--text);transition:background .1s;}
.mnav.today{font-size:12px;padding:6px 12px;font-weight:500;background:transparent;color:var(--text);border-color:var(--border);}
.mtit{font-size:15px;font-weight:500;cursor:pointer;padding:4px 8px;border-radius:var(--r);transition:background .1s;position:absolute;left:50%;transform:translateX(-50%);white-space:nowrap;}
#month-view{transition:opacity .18s ease,transform .18s ease;}
.slide-left{animation:slideLeft .2s ease forwards;}
.slide-right{animation:slideRight .2s ease forwards;}
@keyframes slideLeft{from{opacity:1;transform:translateX(0)}to{opacity:0;transform:translateX(-28px)}}
@keyframes slideRight{from{opacity:1;transform:translateX(0)}to{opacity:0;transform:translateX(28px)}}
.slide-in-left{animation:slideInLeft .2s ease forwards;}
.slide-in-right{animation:slideInRight .2s ease forwards;}
@keyframes slideInLeft{from{opacity:0;transform:translateX(28px)}to{opacity:1;transform:translateX(0)}}
@keyframes slideInRight{from{opacity:0;transform:translateX(-28px)}to{opacity:1;transform:translateX(0)}}

/* Annual view */
.ann-wrap{overflow:hidden;pointer-events:none;opacity:0;visibility:hidden;position:absolute;top:0;left:0;right:0;transition:opacity .2s ease;}
.ann-wrap.open{pointer-events:all;opacity:1;display:block;visibility:visible;overflow:visible;position:relative;}
.annual-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:10px;width:100%;box-sizing:border-box;}
@media(max-width:600px){.annual-grid{grid-template-columns:repeat(3,1fr);}}
.ann-month{background:var(--bg2);border:2px solid transparent;border-radius:var(--r);padding:8px;cursor:pointer;transition:background .1s;}
.ann-month.sel{border-color:var(--border);background:var(--bg2);}
[data-theme=light] .ann-month.sel{border-color:var(--border);background:var(--bg2);}
.ann-month.cur-month{background:var(--blue-l);border-color:var(--blue-m);}
[data-theme=light] .ann-month.cur-month{background:var(--blue-l);border-color:var(--blue-m);}
.ann-mname{font-size:12px;font-weight:500;color:var(--text);margin-bottom:5px;}
.ann-mini{display:grid;grid-template-columns:repeat(7,1fr);gap:1px;}
.ann-day{width:100%;aspect-ratio:1;border-radius:2px;outline:0.5px solid rgba(255,255,255,.15);}
[data-theme=light] .ann-day{outline:0.5px solid rgba(0,0,0,.14);}
.ann-day.tv{background:var(--blue-l);}
.ann-day.cg{background:var(--green-l);}
.ann-day.rend{background:var(--rendu-red-l);}
.ann-day.fer{background:transparent;outline:1.5px solid var(--gold);}
.ann-day.tv-fer{background:var(--blue-l);outline:1.5px solid var(--gold);}
.ann-day.ec{background:rgba(124,92,191,.18);}
.ann-day.ec-fer{background:rgba(124,92,191,.18);outline:1.5px solid var(--gold);}
.ann-day.ec2{background:var(--bg3);}
.ann-day.ec2-fer{background:var(--bg3);outline:1.5px solid var(--gold);}
.ann-day.cg-fer{background:var(--green-l);outline:1.5px solid var(--gold);}
.ann-day.rend-fer{background:var(--rendu-red-l);outline:1.5px solid var(--gold);}
.ann-day.absent-fer{background:var(--bg3);outline:1.5px solid var(--gold);}
.ann-day.absent{background:var(--bg3);}
.ann-day.sv,.ann-day.rh{background:transparent;outline:none;}

/* Calendar */
.cal-wrap{background:var(--bg2);border:0.5px solid var(--border);box-shadow:0 2px 12px rgba(0,0,0,.25);border-radius:var(--rl);overflow:hidden;margin-bottom:8px;width:100%;box-sizing:border-box;}
.cal{width:100%;border-collapse:collapse;table-layout:fixed;}
.cal th{font-size:10px;color:var(--text3);text-align:center;padding:4px 2px 3px;font-weight:400;}
.cal th.wkh{width:20px;padding:0;}
.cal td{text-align:center;padding:4px;}
.cal tr.curweek td{background:rgba(78,160,247,.06);}
[data-theme=light] .cal tr.curweek td{background:rgba(12,68,124,.05);}
.cal tr.cgweek td{background:rgba(90,158,63,.07);}
[data-theme=light] .cal tr.cgweek td{background:rgba(61,107,24,.06);}
.wkn{font-size:9px;color:var(--text3);text-align:center;vertical-align:middle;width:20px;padding:1px 2px;border-radius:4px;}
.wkn.wcur{background:var(--blue-l);color:var(--blue);font-weight:600;}

.dc{width:100%;padding-top:80%;position:relative;border-radius:var(--r);display:block;}
.dci{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1px;border-radius:var(--r);transition:background .1s;cursor:pointer;}
.dn{font-size:13px;font-weight:500;line-height:1;}
.dv{font-size:10px;line-height:1;opacity:.85;}

/* Day states */
.s-tv .dci{background:var(--blue-l);color:var(--blue);cursor:pointer;box-shadow:inset 0 0 0 0.5px rgba(78,160,247,.22);}
[data-theme=light] .s-tv .dci{box-shadow:inset 0 0 0 0.5px rgba(12,68,124,.18);background:var(--blue-m);color:var(--blue);}
.s-rh .dci{color:#b080c0;cursor:pointer;}
.s-sv-ov .dci{background:rgba(128,128,128,.18);color:var(--text3);cursor:pointer;}
.s-sv .dci{color:var(--text3);cursor:pointer;}
.s-fer .dci{background:transparent;color:var(--gold);box-shadow:inset 0 0 0 1.5px var(--gold);cursor:pointer;}
[data-theme=light] .s-fer .dci{color:var(--gold-dark);box-shadow:inset 0 0 0 1.5px var(--gold);}
.s-cg .dci{background:var(--green-l);color:var(--green);cursor:pointer;}
.s-rend .dci{background:var(--rendu-red-l);color:var(--rendu-red-text);cursor:pointer;}
.s-sv-vac .dci{background:rgba(7,224,210,.18);color:#07E0D2;cursor:pointer;}
.s-sv-vac-fer .dci{background:rgba(7,224,210,.18);color:#07E0D2;cursor:pointer;box-shadow:inset 0 0 0 1.5px var(--gold);}
[data-theme=light] .s-sv-vac .dci{background:rgba(7,224,210,.15);color:#059688;}
.s-absent .dci{background:rgba(128,128,128,.18);color:var(--text3);cursor:pointer;}
.s-tv-fer .dci,.s-cg-fer .dci,.s-rend-fer .dci,.s-absent-fer .dci,.s-ec2-fer .dci{box-shadow:inset 0 0 0 1.5px var(--gold);}
.s-tv-fer .dci{background:var(--blue-l);color:var(--blue);cursor:pointer;}
[data-theme=light] .s-tv-fer .dci{background:var(--blue-m);}
[data-theme=light] .ann-day.tv-fer{background:var(--blue-m);}
.s-cg-fer .dci{background:var(--green-l);color:var(--green);cursor:pointer;}
.s-rend-fer .dci{background:var(--rendu-red-l);color:var(--rendu-red-text);cursor:pointer;}
.s-absent-fer .dci{background:var(--bg3);color:var(--text3);cursor:pointer;}
.s-ec2-fer .dci{background:var(--bg3);color:var(--text3);cursor:pointer;}
.s-ec .dci{background:var(--orange-bg,rgba(124,92,191,.20));color:#9b7fe0;cursor:pointer;}
.s-ec-fer .dci{background:var(--orange-bg,rgba(124,92,191,.20));color:#9b7fe0;box-shadow:inset 0 0 0 1.5px var(--gold);cursor:pointer;}
.s-ec2 .dci{background:var(--bg3);color:var(--text3);cursor:pointer;}
.wdot{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:18px;filter:grayscale(1);pointer-events:none;z-index:2;border-radius:var(--r);}
.pdot{position:absolute;top:3px;right:3px;width:5px;height:5px;border-radius:50%;background:#FFB300;}

/* Legend */
.leg{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:6px;align-items:center;justify-content:center;width:100%;}
.li{display:flex;align-items:center;gap:3px;color:var(--text3);font-size:10px;white-space:nowrap;}
.ld{width:8px;height:8px;border-radius:2px;flex-shrink:0;}

/* Side counters */
.ctr-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;}
.ctr{background:var(--bg2);border-radius:var(--r);padding:9px 10px;border:0.5px solid var(--border);}
.ctr.clk{cursor:pointer;transition:background .1s;}
.ctr.wide{grid-column:1/-1;}
.ctr-wide-inner{display:flex;align-items:flex-start;justify-content:space-between;gap:6px;}
.ctr-detail{display:flex;flex-direction:column;gap:2px;padding-top:1px;min-height:56px;justify-content:flex-start;}
.ctr-dot-row{display:flex;align-items:center;gap:4px;font-size:9px;color:var(--text2);}
.rdot{width:6px;height:6px;border-radius:50%;flex-shrink:0;}
.clbl{font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:.05em;margin-bottom:2px;}
.cval{font-size:17px;font-weight:600;line-height:1;}
.csub{font-size:9px;color:var(--text3);margin-top:1px;}

.bloc{background:var(--bg2);border:0.5px solid var(--border);border-radius:var(--rl);padding:10px 12px;}
.bloc.clk{cursor:pointer;transition:background .1s;}
.bloc.clk.active,.ctr.clk.active{background:var(--bg3);}
.btit{font-size:10px;font-weight:500;color:var(--text3);text-transform:uppercase;letter-spacing:.07em;margin-bottom:7px;}

/* Eph table — responsive bar */
.eph-row{display:flex;align-items:center;font-size:11px;gap:4px;padding:2px 0;}
.eph-mc{width:54px;flex-shrink:0;color:var(--text2);white-space:nowrap;}
.eph-bc{flex:1;min-width:0;}
.eph-bw{width:100%;height:4px;background:var(--bg3);border-radius:3px;overflow:hidden;}
.eph-b{height:4px;border-radius:3px;transition:width .3s;}
.eph-vc{width:48px;text-align:right;flex-shrink:0;font-weight:500;white-space:nowrap;}
.eph-ec{width:46px;text-align:right;flex-shrink:0;font-size:10px;color:var(--text3);white-space:nowrap;}
.eph-rbtn{font-size:8px;padding:1px 4px;border:0.5px solid var(--border);border-radius:4px;background:transparent;color:var(--text3);cursor:pointer;flex-shrink:0;width:26px;text-align:center;}
.eph-row.exp .eph-vc{color:var(--text3);text-decoration:line-through;}
.eph-row.fut .eph-mc,.eph-row.fut .eph-vc{color:var(--text3);}

/* History */
.hrow{display:flex;align-items:flex-start;gap:6px;padding:5px 0;border-bottom:0.5px solid var(--border2);font-size:11px;}
.hrow:last-child{border-bottom:none;}
.hdot{width:6px;height:6px;border-radius:50%;flex-shrink:0;margin-top:3px;}
.htime{color:var(--text3);font-size:10px;min-width:32px;}
.hdesc{color:var(--text);flex:1;}

/* Modal */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:200;display:flex;align-items:flex-end;justify-content:center;}
.overlay.behind{z-index:100;}
.sheet{background:var(--bg2);border-radius:20px 20px 0 0;padding:16px 16px 44px;width:100%;max-width:520px;max-height:90vh;overflow-y:auto;touch-action:pan-x;user-select:none;transition:transform .2s ease;}
.sh{width:36px;height:4px;background:var(--border);border-radius:2px;margin:0 auto 14px;}
.st{font-size:15px;font-weight:600;margin-bottom:3px;}
.ss{font-size:12px;color:var(--text2);margin-bottom:12px;}
.mrow{display:flex;flex-direction:column;gap:3px;margin-bottom:8px;}
.mrow label{font-size:11px;color:var(--text2);}
.mrow select,.mrow input{padding:10px 12px;border:0.5px solid var(--border);border-radius:var(--r);font-size:14px;background:var(--bg2);color:var(--text);width:100%;-webkit-appearance:none;}
.mr2{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px;align-items:end;}
.mr2>div{display:flex;flex-direction:column;gap:3px;}
.mr2>div label{font-size:11px;color:var(--text2);}
.mr2>div select,.mr2>div input{padding:10px 12px;border:0.5px solid var(--border);border-radius:var(--r);font-size:14px;background:var(--bg2);color:var(--text);width:100%;-webkit-appearance:none;}
.mcb{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--text2);margin-bottom:6px;cursor:pointer;padding:4px 0;}
.mcb input[type=checkbox]{width:18px;height:18px;accent-color:var(--blue);cursor:pointer;}
.mbtns{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px;}
.mb{padding:6px 6px;border:0.5px solid var(--border);border-radius:var(--r);font-size:13px;cursor:pointer;background:var(--bg2);color:var(--text);text-align:center;line-height:1.4;transition:opacity .1s;min-height:42px;display:flex;align-items:center;justify-content:center;flex-direction:column;}
.mb:active{opacity:.7;}
.mb.pri{background:var(--blue);color:#fff;border-color:transparent;}
.mb.del{border-color:#d09595;color:var(--red);background:rgba(192,57,43,.1);}
.mb.amb{border-color:#c09030;color:#d4a030;background:rgba(200,160,48,.1);}
.mb.grn{background:var(--green-l);color:var(--green);border-color:var(--green-m);}
.mb.wide{grid-column:1/-1;}
.mb.ghost{background:transparent;}
.mcancel{width:100%;padding:11px;border:none;background:transparent;font-size:14px;color:var(--text3);cursor:pointer;margin-top:4px;}
.sep{height:0.5px;background:var(--border2);margin:10px 0;}
.minfo{font-size:12px;color:var(--blue);background:var(--blue-l);border-radius:var(--r);padding:8px 12px;margin-bottom:8px;}
.chip-info{font-size:10px;padding:2px 6px;border-radius:10px;background:var(--gold-l);color:var(--gold-dark);}

/* Exchange */
.exchange-days{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:8px;}
.exchange-day{flex:0 0 auto;padding:6px 10px;border-radius:var(--r);border:0.5px solid var(--border);background:var(--bg2);cursor:pointer;font-size:11px;text-align:center;transition:all .1s;min-width:38px;}
.exchange-day.sel{background:var(--blue-l);border-color:var(--blue-m);color:var(--blue);font-weight:600;}
.exchange-day.current{background:var(--blue);color:#fff;border-color:var(--blue);}

/* Settings / profile */
.srow{display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:0.5px solid var(--border2);}
.srow:last-child{border-bottom:none;}
.slbl{font-size:13px;color:var(--text);}
.tgl{position:relative;width:44px;height:26px;flex-shrink:0;}
.tgl input{opacity:0;width:0;height:0;}
.tgl-s{position:absolute;inset:0;background:var(--bg3);border-radius:13px;cursor:pointer;transition:.2s;}
.tgl input:checked+.tgl-s{background:var(--blue);}
.tgl-s:before{content:'';position:absolute;width:20px;height:20px;left:3px;top:3px;background:#fff;border-radius:50%;transition:.2s;}
.tgl input:checked+.tgl-s:before{transform:translateX(18px);}
.pit{display:flex;align-items:center;justify-content:space-between;padding:8px 10px;border-radius:var(--r);cursor:pointer;border:0.5px solid transparent;margin-bottom:0;transition:background .1s;min-height:40px;}
.pit.act{background:var(--bg3);border-color:var(--border);cursor:default;}
.pit:not(.act){background:var(--bg2);opacity:.8;}
.pname{font-size:13px;font-weight:500;}
.pdel,.pgear{background:transparent;border:none;color:var(--text2);cursor:pointer;font-size:13px;padding:2px 5px;border-radius:var(--r);}
.pdel:hover{color:#c0392b;background:rgba(192,57,43,.12);}
.pit-wrap{margin-bottom:4px;}
.ps-panel{display:block;padding:8px 10px 10px;border-radius:0 0 var(--r) var(--r);background:var(--bg3);border:none;border-top:none;margin-top:-2px;}
.svi{display:flex;align-items:center;justify-content:space-between;padding:7px 10px;background:var(--bg2);border-radius:var(--r);margin-bottom:5px;font-size:12px;}
.svn{font-weight:500;}.svd{color:var(--text3);font-size:11px;}
.svdel{background:transparent;border:none;color:var(--text3);cursor:pointer;font-size:13px;}
.np-toggle{width:100%;padding:11px;border:0.5px solid var(--border);border-radius:var(--r);font-size:13px;cursor:pointer;background:var(--bg2);color:var(--text);text-align:left;display:flex;align-items:center;gap:8px;margin-top:8px;}
.np-body{display:none;overflow:hidden;max-height:800px;opacity:1;transition:max-height .3s ease,opacity .25s;}
.np-body.open{display:block;}

/* Dropdown */
.dropdown{position:absolute;right:0;top:calc(100% + 4px);background:var(--bg3);border:none;border-radius:var(--rl);box-shadow:0 8px 32px rgba(0,0,0,.25);width:300px;max-width:calc(100vw - 16px);max-height:calc(100vh - 80px);overflow-y:auto;overflow-x:hidden;padding:12px 14px 16px;z-index:300;}
.dd-title{font-size:13px;font-weight:600;margin-bottom:10px;color:var(--text);}

/* PWA */
.pwa{background:var(--blue-l);border:0.5px solid var(--blue-m);border-radius:var(--r);padding:9px 12px;margin-bottom:8px;font-size:12px;color:var(--blue);display:flex;align-items:center;gap:8px;}
.pwa button{background:transparent;border:none;color:var(--text3);font-size:16px;cursor:pointer;margin-left:auto;}

/* Recap */

<script>
// CONFIG & DATA GLOBAL
const CLOUD_API = 'https://mon-planning-back.gregory-braye.workers.dev/api';
const GCAL_FUNCTIONS = 'https://mon-planning-back.gregory-braye.workers.dev/api/gcal';
const GCAL_CLIENT_ID = '380456184852-dfb8h78nd57n9vggon6q5r563821j7it.apps.googleusercontent.com';
const GCAL_REDIRECT_URI = 'https://gregorybraye.github.io/planning/app/';
const GCAL_SCOPE = 'https://www.googleapis.com/auth/calendar https://www.googleapis.com/auth/calendar.events';

const ANCHOR = new Date('2024-01-01T00:00:00');
const ANCHOR_L = 10;
const CYCLE = [
  ['RH','RH','A7','A7','B7','B7','RH'], // L1
  ['RH','A10','B10','B10','C10','C10','RH'], // L2
  ['RH','RH','B7','B7','C7','C7','RH'], // L3
  ['RH','B10','C10','C10','D10','D10','RH'], // L4
  ['RH','RH','C7','C7','D7','D7','RH'], // L5
  ['RH','C10','D10','D10','A10','A10','RH'], // L6
  ['RH','RH','D7','D7','A7','A7','RH'], // L7
  ['RH','D10','A10','A10','B10','B10','RH'], // L8
  ['RH','RH','A7','A7','B7','Bs','Ds'], // L9 (sam-dim s)
  ['RH','RH','RH','RH','RH','RH','RH'], // L10 (S9+1)
  ['RH','RH','B7','B7','C7','BsV','BdV'], // L11 (sam-dim v)
  ['RH','RH','RH','RH','RH','RH','RH'], // L12 (S11+1)
  ['RH','RH','C7','C7','D7','Bs','Ds'], // L13 (sam-dim s)
  ['RH','RH','RH','RH','RH','RH','RH'], // L14 (S13+1)
];

const VAC = {
  'A7':{deb:'06h45',dur:450},'B7':{deb:'07h15',dur:450},'C7':{deb:'07h45',dur:450},'D7':{deb:'08h15',dur:450},
  'A10':{deb:'06h45',dur:600},'B10':{deb:'07h15',dur:600},'C10':{deb:'07h45',dur:600},'D10':{deb:'08h15',dur:600},
  'Bs':{deb:'07h15',dur:660},'Ds':{deb:'08h15',dur:660},
  'BsV':{deb:'07h15',dur:450},'BdV':{deb:'08h15',dur:450},
  'M':{deb:'08h00',dur:450},'S':{deb:'12h30',dur:450},'Pj':{deb:'08h00',dur:510},'Pv':{deb:'08h00',dur:420},
  'MR':{deb:'07h00',dur:600},'SR':{deb:'12h00',dur:600},'Ms-R':{deb:'07h00',dur:660},'Md-R':{deb:'08h00',dur:660},
  'B2V':{deb:'07h15',dur:450},'C3V':{deb:'07h45',dur:450},'P422V':{deb:'08h00',dur:450},
};

const FERIES = {
  '2024-01-01':'Jour de l\'an','2024-04-01':'Lundi de Pâques','2024-05-01':'Fête du Travail','2024-05-08':'Victoire 1945','2024-05-09':'Ascension','2024-05-20':'Lundi de Pentecôte','2024-07-14':'Fête Nationale','2024-08-15':'Assomption','2024-11-01':'Toussaint','2024-11-11':'Armistice 1918','2024-12-25':'Noël',
  '2025-01-01':'Jour de l\'an','2025-04-21':'Lundi de Pâques','2025-05-01':'Fête du Travail','2025-05-08':'Victoire 1945','2025-05-29':'Ascension','2025-06-09':'Lundi de Pentecôte','2025-07-14':'Fête Nationale','2025-08-15':'Assomption','2025-11-01':'Toussaint','2025-11-11':'Armistice 1918','2025-12-25':'Noël',
  '2026-01-01':'Jour de l\'an','2026-04-06':'Lundi de Pâques','2026-05-01':'Fête du Travail','2026-05-08':'Victoire 1945','2026-05-14':'Ascension','2026-05-25':'Lundi de Pentecôte','2026-07-14':'Fête Nationale','2026-08-15':'Assomption','2026-11-01':'Toussaint','2026-11-11':'Armistice 1918','2026-12-25':'Noël',
  '2027-01-01':'Jour de l\'an','2027-03-29':'Lundi de Pâques','2027-05-01':'Fête du Travail','2027-05-08':'Victoire 1945','2027-05-06':'Ascension','2027-05-17':'Lundi de Pentecôte','2027-07-14':'Fête Nationale','2027-08-15':'Assomption','2027-11-01':'Toussaint','2027-11-11':'Armistice 1918','2027-12-25':'Noël',
};

// ÉTAT DE L'APPLICATION
let S = { profile:{name:'Profil', anchorLine:ANCHOR_L}, overrides:{}, history:[], ephExtend:{} };
let _profs = {}; 
let _aid = null; 
let undoStack = []; 
let redoStack = [];
let NOW = new Date(); 
let curY = NOW.getFullYear(), curM = NOW.getMonth();
let annualOpen = false;
let gcalTokens = null; 
let gcalCalendarId = null; 
let autoSync = false;

// COUPLAGE AVEC LE DOM & INITIALISATION
window.addEventListener('DOMContentLoaded', async function(){
  initTheme();
  initPwa();
  await loadAll();
  goToday();
  document.body.style.opacity = '1';
});

function initTheme(){
  const th = localStorage.getItem('pl_theme') || 'dark';
  document.documentElement.setAttribute('data-theme', th);
  updateThemeIcon(th);
}
function toggleTheme(){
  const cur = document.documentElement.getAttribute('data-theme') || 'dark';
  const nw = cur==='dark'?'light':'dark';
  document.documentElement.setAttribute('data-theme', nw);
  localStorage.setItem('pl_theme', nw);
  updateThemeIcon(nw);
}
function updateThemeIcon(t){
  const ic = document.getElementById('theme-icon');
  if(!ic)return;
  ic.className = t==='dark'?'ti ti-moon':'ti ti-sun';
  const meta = document.getElementById('theme-color-meta');
  if(meta) meta.setAttribute('content', t==='dark'?'#18181b':'#e8e8e4');
}
function initPwa(){
  if(window.navigator.standalone || window.matchMedia('(display-mode: standalone)').matches) return;
  const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream;
  if(isIOS){ document.getElementById('pwa-banner').style.display = 'flex'; }
}

// STACK D'ANNULATION
function saveStateSnapshot(){
  undoStack.push(JSON.stringify({overrides:S.overrides||{}, ephExtend:S.ephExtend||{}, history:S.history||[]}));
  redoStack = [];
  updateUndoRedoBtns();
}
function undoAction(){
  if(!undoStack.length)return;
  redoStack.push(JSON.stringify({overrides:S.overrides||{}, ephExtend:S.ephExtend||{}, history:S.history||[]}));
  const prev = JSON.parse(undoStack.pop());
  S.overrides = prev.overrides; S.ephExtend = prev.ephExtend; S.history = prev.history;
  saveState(true); render(); updateUndoRedoBtns(); triggerAutoSync();
}
function redoAction(){
  if(!redoStack.length)return;
  undoStack.push(JSON.stringify({overrides:S.overrides||{}, ephExtend:S.ephExtend||{}, history:S.history||[]}));
  const next = JSON.parse(redoStack.pop());
  S.overrides = next.overrides; S.ephExtend = next.ephExtend; S.history = next.history;
  saveState(true); render(); updateUndoRedoBtns(); triggerAutoSync();
}
function updateUndoRedoBtns(){
  document.getElementById('undo-btn').disabled = !undoStack.length;
  document.getElementById('redo-btn').disabled = !redoStack.length;
}

// SYNCHRONISATION STORAGE & CLOUD
function cloudHeaders(){ return { 'Authorization': 'Bearer '+(window._authToken||''), 'Content-Type': 'application/json' }; }

async function loadAll(){
  const localData = localStorage.getItem('pl_v8');
  if(localData){
    try{ const p = JSON.parse(localData); S = Object.assign(S, p); }catch(e){}
  }
  const tok = localStorage.getItem('auth_token');
  if(tok){
    window._authToken = tok;
    try{
      const r = await fetch(CLOUD_API+'/data/get', {headers: cloudHeaders()});
      if(r.ok){
        const res = await r.json();
        if(res.profiles && Object.keys(res.profiles).length){
          _profs = res.profiles;
          _aid = res.activeProfileId || Object.keys(_profs)[0];
          S = _profs[_aid];
        }
      }
    }catch(e){console.warn('Cloud offline, local fallback used.');}
  }
  if(!S.overrides) S.overrides = {};
  if(!S.ephExtend) S.ephExtend = {};
  if(!S.history) S.history = [];
  if(!S.profile) S.profile = {name:'Profil', anchorLine:ANCHOR_L};
  if(S.profile.gcalAutoSync) autoSync = true;
  
  const gtok = localStorage.getItem('gcal_tokens');
  if(gtok) { try{ gcalTokens = JSON.parse(gtok); }catch(e){} }
  gcalCalendarId = localStorage.getItem('gcal_calendar_id');
  gcalUpdateBtn();
}

async function saveState(skipCloud=false){
  localStorage.setItem('pl_v8', JSON.stringify(S));
  if(window._authToken && _aid && !skipCloud){
    _profs[_aid] = S;
    fetch(CLOUD_API+'/data/save', {
      method:'POST', headers: cloudHeaders(),
      body: JSON.stringify({ activeProfileId:_aid, profiles:_profs })
    }).catch(e=>console.warn('Cloud save deferred.'));
  }
}

// FONCTIONS UTILITAIRES DE DATE
function dk(d){ return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); }
function getMonday(date){ const d = new Date(date); const day = d.getDay(), diff = d.getDate() - day + (day === 0 ? -6 : 1); return new Date(d.setDate(diff)); }
function getCycleLen(date){ return CYCLE.length; }
function getVac(date){
  const k = dk(date);
  const ov = S.overrides[k];
  // Calcul du cycle historique s'il y a lieu
  let anchor = S.profile.anchorLine !== undefined ? S.profile.anchorLine : ANCHOR_L;
  if(S.profile.lineHistory && S.profile.lineHistory.length){
    const matches = S.profile.lineHistory.filter(h => new Date(k+'T12:00:00') >= getMonday(new Date(h.date+'T12:00:00')));
    if(matches.length) anchor = matches[matches.length-1].line;
  }
  const diffWeeks = Math.round((getMonday(date) - ANCHOR) / (7 * 864e5));
  const cycleLen = getCycleLen(date);
  const lineIdx = (anchor + diffWeeks + cycleLen * 1000) % cycleLen;
  const dw = date.getDay();
  const cycleVac = CYCLE[lineIdx][dw === 0 ? 6 : dw - 1];
  
  if(ov && ov.vac !== undefined){
    return { vac: ov.vac, cv: cycleVac, ov: true, fromSV: ov.fromSV, echange: ov.echange, ecSelf: ov.ecSelf, hs: ov.hs };
  }
  return { vac: cycleVac, cv: cycleVac, ov: false };
}

function getVacDuration(vacName, dateKey){
  if(!vacName || vacName === 'RH') return 0;
  if(VAC[vacName]) return VAC[vacName].dur;
  if(S.customVacs && S.customVacs[vacName]) return S.customVacs[vacName].dur;
  return 0;
}

function fmtMin(m){ if(!m)return '0h'; return Math.floor(m/60)+'h'+(m%60?String(m%60).padStart(2,'0'):''); }
function fmtDate(d){ return d.toLocaleDateString('fr-FR', {weekday:'short', day:'numeric', month:'short'}); }
function nowHHMM(){ const d = new Date(); return String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0'); }
function logH(desc, color, key){ if(!S.history)S.history=[]; S.history.unshift({t:nowHHMM(), d:desc, c:color, key}); if(S.history.length>30)S.history.pop(); saveState(); }

// ENGIN DE CALCUL DES COMPTEURS & RENDUS ÉPHÉMÈRES
function computeCounters(targetYear, targetMonth){
  const targetDate = new Date(targetYear, targetMonth, 15);
  const nowYm = NOW.getFullYear() * 12 + NOW.getMonth();
  const tgtYm = targetYear * 12 + targetMonth;
  
  let cs = {
    globalAvail: 45, realAvail: {}, prevEph: {},
    takenThisMonth: 0, createdThisMonth: 0, monthCreatedDetails: [],
    yearTaken: {}, yearCreated: {}
  };
  
  // Analyse de l'historique complet pour construire l'état
  const startD = new Date(2024, 0, 1);
  const endD = new Date(targetYear + 2, 11, 31);
  
  for(let d = new Date(startD); d <= endD; d.setDate(d.getDate() + 1)){
    const k = dk(d);
    const y = d.getFullYear(), m = d.getMonth();
    const ym = y * 12 + m;
    const v = getVac(d);
    
    if(v.vac === 'REND'){
      if(ym === tgtYm) cs.takenThisMonth++;
      cs.yearTaken[y] = (cs.yearTaken[y] || 0) + 1;
    }
    
    // Détection d'un jour générant un rendu
    const isWorked = v.vac && v.vac !== 'RH' && v.vac !== 'REND' && v.vac !== 'CG' && v.vac !== 'ABSENT';
    const isFer = FERIES[k];
    
    if(isWorked && isFer){
      cs.globalAvail++;
      cs.realAvail[ym] = (cs.realAvail[ym] || 0) + 1;
      if(ym === tgtYm){
        cs.createdThisMonth++;
        cs.monthCreatedDetails.push({ d: new Date(d), type: 'Férié', lbl: FERIES[k] });
      }
      cs.yearCreated[y] = (cs.yearCreated[y] || 0) + 1;
    }
    
    if(v.ov && v.hs){
      cs.globalAvail++;
      cs.realAvail[ym] = (cs.realAvail[ym] || 0) + 1;
      if(ym === tgtYm){
        cs.createdThisMonth++;
        cs.monthCreatedDetails.push({ d: new Date(d), type: 'Heures Sup', lbl: 'HS cochées' });
      }
      cs.yearCreated[y] = (cs.yearCreated[y] || 0) + 1;
    }
  }
  
  // Consommation FIFO des lignes éphémères
  let takenKeys = [];
  for(let d = new Date(startD); d <= endD; d.setDate(d.getDate() + 1)){
    if(getVac(d).vac === 'REND') takenKeys.push(dk(d));
  }
  
  let sortedYms = Object.keys(cs.realAvail).map(Number).sort((a,b)=>a-b);
  sortedYms.forEach(function(ym){
    let c = cs.realAvail[ym];
    if(c <= 0) return;
    
    // Validité étendue (+6m) ou normale (+3m)
    const ext = (S.ephExtend && S.ephExtend[ym]) ? 6 : 3;
    const expYm = ym + ext;
    const expDate = new Date(Math.floor(expYm/12), expYm%12 + 1, 0);
    
    let consumed = 0;
    for(let i = 0; i < takenKeys.length; i++){
      const tk = takenKeys[i];
      const td = new Date(tk + 'T12:00:00');
      const tYm = td.getFullYear() * 12 + td.getMonth();
      
      // Valide si pris après création et avant expiration
      if(tYm >= ym && td <= expDate){
        consumed++;
        takenKeys.splice(i, 1);
        i--;
        if(consumed === c) break;
      }
    }
    cs.realAvail[ym] = c - consumed;
  });
  
  // Calcul du solde disponible à la date cible
  let dispo = 0;
  Object.keys(cs.realAvail).forEach(function(ymStr){
    const ym = Number(ymStr);
    const avail = cs.realAvail[ym];
    if(avail <= 0) return;
    
    const ext = (S.ephExtend && S.ephExtend[ym]) ? 6 : 3;
    const expYm = ym + ext;
    const expDate = new Date(Math.floor(expYm/12), expYm%12 + 1, 0);
    if(expDate >= targetDate) dispo += avail;
  });
  
  return {
    globalAvail: cs.globalAvail,
    realAvail: cs.realAvail,
    takenThisMonth: cs.takenThisMonth,
    createdThisMonth: cs.createdThisMonth,
    monthCreatedDetails: cs.monthCreatedDetails,
    soldeDispoAtTarget: dispo,
    yearCreated: cs.yearCreated,
    yearTaken: cs.yearTaken
  };
}

function renderMonthTable(){
  const tbody = document.getElementById('cal-tbody');
  tbody.innerHTML = '';
  
  const firstDay = new Date(curY, curM, 1);
  const startMonday = getMonday(firstDay);
  const lastDay = new Date(curY, curM + 1, 0);
  
  let d = new Date(startMonday);
  let hasMore = true;
  const nowWk = dk(getMonday(NOW));
  
  while(hasMore){
    const tr = document.createElement('tr');
    const monWk = dk(getMonday(d));
    
    if(monWk === nowWk) tr.className = 'curweek';
    
    // Case Numéro de semaine
    const tdW = document.createElement('td');
    tdW.className = 'wkn';
    if(monWk === nowWk) tdW.classList.add('wcur');
    tdW.textContent = getISOWeek(d);
    tr.appendChild(tdW);
    
    for(let i=0; i<7; i++){
      const td = document.createElement('td');
      if(d.getMonth() === curM){
        const v = getVac(d);
        const k = dk(d);
        const isFer = FERIES[k];
        
        let stateClass = 's-sv';
        if(v.vac === 'RH') stateClass = 's-rh';
        else if(v.vac === 'CG') stateClass = isFer ? 's-cg-fer' : 's-cg';
        else if(v.vac === 'REND') stateClass = isFer ? 's-rend-fer' : 's-rend';
        else if(v.vac === 'ABSENT') stateClass = isFer ? 's-absent-fer' : 's-absent';
        else if(v.vac && v.vac !== 'RH') stateClass = isFer ? 's-tv-fer' : 's-tv';
        else if(isFer) stateClass = 's-fer';
        
        // Suffixe override visuel général
        if(v.ov && stateClass === 's-sv') stateClass = 's-sv-ov';
        
        td.className = stateClass;
        
        let pdotHtml = '';
        if(v.ov && v.hs) pdotHtml = '<div class="pdot"></div>';
        
        let innerText = v.vac || '';
        if(v.echange) innerText = v.ecSelf ? v.vac : '<i class="ti ti-switch-horizontal" style="font-size:13px;opacity:.8"></i>';
        
        td.innerHTML = '<div class="dc" onclick="openDayModal(\''+k+'\')">'
          +'<div class="dci">'
            +'<span class="dn">'+d.getDate()+'</span>'
            +'<span class="dv">'+vLbl(innerText, VAC)+'</span>'
          +'</div>'
          +pdotHtml
        +'</div>';
      }else{
        td.innerHTML = '<div class="dc" style="cursor:default"></div>';
      }
      tr.appendChild(td);
      d.setDate(d.getDate() + 1);
    }
    tbody.appendChild(tr);
    if(d.getMonth() !== curM && d > lastDay) hasMore = false;
  }
}

function vLbl(v, d){ if(!v)return ''; return v; }

function getISOWeek(date){
  const d = new Date(Date.UTC(date.getFullYear(), date.getMonth(), date.getDate()));
  const dayNum = d.getUTCDay() || 7;
  d.setUTCDate(d.getUTCDate() + 4 - dayNum);
  const yearStart = new Date(Date.UTC(d.getUTCFullYear(), 0, 1));
  return Math.ceil((((d - yearStart) / 86400000) + 1) / 7);
}

// TIMELINE DES RENDUS ÉPHÉMÈRES (REPORT M-1 INTÉGRÉ)
function buildEphTimeline(cs){
  const el = document.getElementById('eph-timeline');
  el.innerHTML = '';
  
  const nowYm = NOW.getFullYear() * 12 + NOW.getMonth();
  let sorted = Object.keys(cs.realAvail).map(Number).sort((a,b)=>a-b);
  
  if(!sorted.length){
    el.innerHTML = '<div style="font-size:11px;color:var(--text3);padding:4px 2px">Aucun rendu éphémère créé.</div>';
    return;
  }
  
  const monthsShort = ['janv','févr','mars','avr','mai','juin','juil','août','sept','oct','nov','déc'];
  
  sorted.forEach(function(ym){
    const avail = cs.realAvail[ym];
    const total = avail; 
    if(total <= 0) return;
    
    const ext = (S.ephExtend && S.ephExtend[ym]) ? 6 : 3;
    const expYm = ym + ext;
    const expDate = new Date(Math.floor(expYm/12), expYm%12 + 1, 0);
    
    // Déduction des états : Expired (passé), Future (non-existant), Active (en cours)
    let isExp = expDate < NOW;
    let isFut = ym > nowYm;
    
    // Condition de report modifiée pour inclure le mois M-1 rétroactif par rapport au mois actuel
    let canExtend = !S.ephExtend[ym] && (ym >= (nowYm - 1));
    
    const row = document.createElement('div');
    row.className = 'eph-row' + (isExp?' exp':'') + (isFut?' fut':'');
    
    const lblMonth = monthsShort[ym%12] + ' ' + String(Math.floor(ym/12)).substring(2);
    const lblExp = monthsShort[expYm%12] + ' ' + String(Math.floor(expYm/12)).substring(2);
    
    let btnHtml = '';
    if(canExtend){
      btnHtml = '<button class="eph-rbtn" onclick="extendEph('+ym+', event)">+3m</button>';
    }else if(S.ephExtend[ym]){
      btnHtml = '<span style="font-size:10px;color:var(--green);width:26px;text-align:center"><i class="ti ti-check"></i></span>';
    }else{
      btnHtml = '<div style="width:26px"></div>';
    }
    
    row.innerHTML = '<span class="eph-mc">'+lblMonth+'</span>'
      +'<div class="eph-bc"><div class="eph-bw"><div class="eph-b" style="width:100%;background:'+(isExp?'var(--text3)':'var(--amber)')+'"></div></div></div>'
      +'<span class="eph-vc">'+avail+' dispo.</span>'
      +'<span class="eph-ec">Exp : '+lblExp+'</span>'
      +btnHtml;
      
    el.appendChild(row);
  });
}

function extendEph(ym, e){
  e.stopPropagation();
  saveStateSnapshot();
  if(!S.ephExtend) S.ephExtend = {};
  S.ephExtend[ym] = true;
  logH('Validité étendue pour '+ym, 'var(--amber)', 'extend-'+ym);
  saveState(); render(); triggerAutoSync();
}

// ALERTES ET OVERLAYS EN CAS DE DÉPASSEMENT DES RENDUS
function checkRendusExceeded(){
  const warnWrap = document.getElementById('warn-icon-wrap');
  const listEl = document.getElementById('warn-dates-list');
  const nowYm = NOW.getFullYear() * 12 + NOW.getMonth();
  
  let cs = { realAvail: {} };
  const startD = new Date(2024, 0, 1);
  const endD = new Date(curY + 1, 11, 31);
  
  for(let d = new Date(startD); d <= endD; d.setDate(d.getDate() + 1)){
    const k = dk(d); const ym = d.getFullYear() * 12 + d.getMonth(); const v = getVac(d);
    const isWorked = v.vac && v.vac !== 'RH' && v.vac !== 'REND' && v.vac !== 'CG' && v.vac !== 'ABSENT';
    if((isWorked && FERIES[k]) || (v.ov && v.hs)){ cs.realAvail[ym] = (cs.realAvail[ym] || 0) + 1; }
  }
  
  let takenKeys = [];
  for(let d = new Date(startD); d <= endD; d.setDate(d.getDate() + 1)){
    if(getVac(d).vac === 'REND') takenKeys.push(dk(d));
  }
  
  let expiredCount = 0;
  let expiredDatesHtml = [];
  const monthsShort = ['janv','févr','mars','avr','mai','juin','juil','août','sept','oct','nov','déc'];
  
  let sortedYms = Object.keys(cs.realAvail).map(Number).sort((a,b)=>a-b);
  sortedYms.forEach(function(ym){
    let c = cs.realAvail[ym]; if(c <= 0) return;
    const ext = (S.ephExtend && S.ephExtend[ym]) ? 6 : 3;
    const expDate = new Date(Math.floor((ym+ext)/12), (ym+ext)%12 + 1, 0);
    
    let consumed = 0;
    for(let i = 0; i < takenKeys.length; i++){
      const td = new Date(takenKeys[i] + 'T12:00:00');
      if((td.getFullYear()*12 + td.getMonth()) >= ym && td <= expDate){ consumed++; takenKeys.splice(i, 1); i--; if(consumed === c) break; }
    }
    let diff = c - consumed;
    if(diff > 0 && expDate < NOW){
      expiredCount += diff;
      expiredDatesHtml.push('<div>• Ligne '+monthsShort[ym%12]+' '+String(Math.floor(ym/12))+' : <b>'+diff+' perdu(s)</b></div>');
    }
  });
  
  if(expiredCount > 0){
    warnWrap.style.display = 'inline-flex';
    listEl.innerHTML = expiredDatesHtml.join('') + '<div style="margin-top:6px;color:var(--text3);font-size:10px">Seuils maximaux de validité franchis.</div>';
  }else{
    warnWrap.style.display = 'none';
  }
}

  if(dw >= 1 && dw <= 5) return normal;
  if(dw === 6) return ['Bs','BsV','Ds'];
  return ['Ds','BdV'];
}

  function vacBtn(vn){
    const active = v.vac === vn && !v.echange;
    const vi = VAC[vn]; const dur = vi ? vi.dur : 0;

  }
  
  const coordVacs = []; if(isWeek||isSam||isDim) coordVacs.push('S'); if(isWeek) coordVacs.push('M'); if(dw===4) coordVacs.push('Pj'); if(dw===5) coordVacs.push('Pv');
  const videoVacs = isWeek ? ['MR','SR'] : isSam ? ['Ms-R'] : ['Md-R'];

    +'<label class="tgl"><input type="checkbox" id="modal-hs-toggle" '+(v.hs?'checked':'')+' onchange="toggleDayHs(\''+key+'\')"><span class="tgl-s"></span></label>'
    +'</div>' : '';
    
  const root = document.getElementById('modal-root');

    +'<div class="sheet" style="max-height:85vh">'
      +'<div class="sh"></div>'
      +'<div class="st">'+fmtDate(d)+'</div>'
      +'<div class="ss" style="margin-bottom:10px">Cycle prévu : <b>'+(v.cv||'RH')+'</b></div>'
      +ferLabel
      +'<div class="mrow" style="gap:6px">'
        +section('Cycle de base', coreVacs)
        +section('Coordination', coordVacs)
        +section('Vidéo', videoVacs)
        +section('Cadre', cadreVacs)
        +'<div class="btit" style="margin-top:8px;margin-bottom:5px">Absences & Spécifiques</div>'
        +'<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:12px">'

          +'<button class="mb'+(v.vac==='REND'&&!v.echange?' pri':'')+'" onclick="setDayVac(\''+key+'\',\'REND\')">Rendu</button>'

        +'</div>'

}

  document.getElementById('modal-root').innerHTML = '<div class="overlay" onclick="if(event.target===this)closeModal()"><div class="sheet"><div class="sh"></div><div class="st">Rendus consommés</div><div style="margin:12px 0 20px;font-size:13px">Vous avez posé <b>'+cs.takenThisMonth+'</b> rendu(s) sur ce mois.</div><button class="mb wide" onclick="closeModal()">Fermer</button></div></div>';

// INTERACTION ÉCHANGE DE JOUR (COLLÈGUES)
let _exState = { targetKey: null, selectedKey: null };
function openEchangeModal(key){
  _exState.targetKey = key;
  const d = new Date(key+'T12:00:00');
  const mon = getMonday(d);
  let dayBtns = '';
  
  for(let i=0; i<7; i++){
    const curr = new Date(mon); curr.setDate(mon.getDate()+i);
    const ck = dk(curr);
    const isTarget = ck === key;
    dayBtns += '<div class="exchange-day'+(isTarget?' current':'')+'" id="exd-'+ck+'" onclick="selectExchangePartner(\''+ck+'\')">'+curr.getDate()+'</div>';
  }
  
  let vacGrid = '<div style="margin-top:12px;font-size:12px;color:var(--text3)" id="ex-vac-prompt">Sélectionnez le jour donné ou reçu ci-dessus pour définir la vacation associée.</div>';
  
  document.getElementById('modal-root').innerHTML = '<div class="overlay" onclick="if(event.target===this)closeModal()"><div class="sheet">'
    +'<div class="sh"></div><div class="st">Échange de jours</div>'
    +'<div class="ss">Sélectionnez le jour de la même semaine associé à l\'échange :</div>'
    +'<div class="exchange-days">'+dayBtns+'</div>'
    +'<div id="ex-vac-grid-container">'+vacGrid+'</div>'
    +'<div class="sep"></div>'
    +'<button class="mb wide pri" id="ex-confirm-btn" disabled onclick="confirmExchange()">Confirmer l\'échange</button>'
    +'<button class="mcancel" onclick="closeModal()">Annuler</button>'
    +'</div></div>';
}

function selectExchangePartner(ck){
  if(ck === _exState.targetKey) return;
  _exState.selectedKey = ck;
  
  document.querySelectorAll('.exchange-day').forEach(el => {
    if(!el.classList.contains('current')) el.classList.remove('sel');
  });
  const selEl = document.getElementById('exd-'+ck); if(selEl) selEl.classList.add('sel');
  
  const d = new Date(ck+'T12:00:00');
  const coreVacs = getDayVacs(d.getDay(), Object.keys(VAC));
  
  let exVgHtml = '<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:6px">';
  coreVacs.forEach(function(vn){
    exVgHtml += '<button class="mb" style="padding:6px;font-size:11px" onclick="setExchangeVac(\''+vn+'\', this)">'+vn+'</button>';
  });
  exVgHtml += '</div>';
  
  document.getElementById('ex-vac-grid-container').innerHTML = '<div class="btit" style="margin-top:10px">Vacation effectuée par le collègue :</div>' + exVgHtml;
  document.getElementById('ex-confirm-btn').disabled = false;
}

let _exSelectedVac = null;
function setExchangeVac(vn, btn){
  _exSelectedVac = vn;
  const btns = btn.parentElement.querySelectorAll('button'); btns.forEach(b => b.classList.remove('pri'));
  btn.classList.add('pri');
}

function confirmExchange(){
  if(!_exState.selectedKey || !_exSelectedVac) return;
  saveStateSnapshot();
  
  if(!S.overrides) S.overrides = {};
  
  // Jour cible (Donné au collègue)
  S.overrides[_exState.targetKey] = { vac: 'RH', fromSV: false, echange: true, ecSelf: false, hs: false };
  // Jour récupéré (Vacation effectuée à la place)
  S.overrides[_exState.selectedKey] = { vac: _exSelectedVac, fromSV: false, echange: true, ecSelf: true, hs: false };
  
  logH('Échange validé sur la semaine', 'var(--blue)', _exState.targetKey);
  saveState(); render(); closeModal(); triggerAutoSync();
}

// DROPDOWNS & NAVIGATION DES HISTORIQUES
let activeDropdownId = null;
function toggleDropdown(id){
  const el = document.getElementById(id);
  if(activeDropdownId && activeDropdownId !== id){
    const openEl = document.getElementById(activeDropdownId); if(openEl) openEl.style.display = 'none';
  }
  if(el.style.display === 'none'){ el.style.display = 'block'; activeDropdownId = id; }
  else { el.style.display = 'none'; activeDropdownId = null; }
}

window.addEventListener('click', function(e){
  if(activeDropdownId){
    const box = document.getElementById(activeDropdownId);
    const btn = box.parentElement.querySelector('button');
    if(!box.contains(e.target) && !btn.contains(e.target)){ box.style.display = 'none'; activeDropdownId = null; }
  }
});

function renderHistoryDropdown(){
  const el = document.getElementById('dd-history-content'); if(!el) return;
  const h = S.history || [];
  const html = h.length ? h.slice(0, 15).map(e => '<div class="hrow"><div class="hdot" style="background:'+e.c+'"></div><span class="htime">'+e.t+'</span><span class="hdesc">'+e.d+'</span></div>').join('') : '<span style="font-size:11px;color:var(--text3)">Aucune action enregistrée.</span>';
  el.innerHTML = '<div class="dd-title" style="display:flex;justify-content:space-between"><span>Historique</span><button style="background:transparent;border:none;color:var(--blue);font-size:11px;cursor:pointer" onclick="openHistoryModal()">Voir tout</button></div>' + html;
  
  // Menu de profil couplé
  renderProfilDropdown();
}

function openHistoryModal(){
  const h = S.history || [];
  const html = h.length ? h.map(e => '<div class="hrow"><div class="hdot" style="background:'+e.c+'"></div><span class="htime">'+e.t+'</span><span class="hdesc">'+e.d+'</span></div>').join('') : '<span style="font-size:11px;color:var(--text3)">Aucun historique.</span>';
  document.getElementById('modal-root').innerHTML = '<div class="overlay" onclick="if(event.target===this)closeModal()"><div class="sheet"><div class="sh"></div><div class="st">Historique Complet</div><div style="margin:10px 0;max-height:60vh;overflow-y:auto">'+html+'</div><button class="mb wide" onclick="closeModal()">Fermer</button></div></div>';

function renderProfilDropdown(){
  const el = document.getElementById('dd-profil-content'); if(!el) return;
  let profsHtml = '';
  Object.keys(_profs).forEach(k => {
    const p = _profs[k]; const isAct = k === _aid;
    profsHtml += '<div class="pit'+(isAct?' act':'')+'" onclick="switchProfile(\''+k+'\')"><span class="pname">'+p.profile.name+'</span>'
      +(isAct?'<span style="font-size:11px;color:var(--green)">Actif</span>':'')+'</div>';

    +'<div style="display:flex;flex-direction:column;gap:4px;margin-bottom:10px">'+profsHtml+'</div>'
    +'<div class="srow"><span class="slbl">Synchro Google Calendar</span><label class="tgl"><input type="checkbox" id="gcal-autosync-cb" '+(autoSync?'checked':'')+' onchange="toggleGcalAutoSync(this)"><span class="tgl-s"></span></label></div>'
    +'<button class="mb wide ghost" style="margin-top:8px;color:var(--red)" onclick="signOut()"><i class="ti ti-logout"></i> Déconnexion</button>';

async function switchProfile(id){ if(id === _aid) return; _aid = id; S = _profs[id]; autoSync = !!S.profile.gcalAutoSync; saveState(true); localStorage.setItem('pl_v8', JSON.stringify(S)); goToday(); }
function signOut(){ localStorage.removeItem('auth_token'); window.location.reload(); }

// SYNCHRONISATION SECURE ET AUTOMATIQUE AVEC GOOGLE CALENDAR (GCAL)
function gcalUpdateBtn(){
  const st = document.getElementById('gcal-status'); if(!st) return;
  if(gcalTokens){ st.innerHTML = '<i class="ti ti-calendar-check" style="color:var(--green);font-size:16px"></i>'; }
  else { st.innerHTML = '<i class="ti ti-calendar-off" style="color:var(--text3);font-size:16px"></i>'; }
}

function gcalConnect(){
  const url = 'https://accounts.google.com/o/oauth2/v2/auth?' + new URLSearchParams({
    client_id: GCAL_CLIENT_ID, redirect_uri: GCAL_REDIRECT_URI, response_type: 'code',
    scope: GCAL_SCOPE, access_type: 'offline', prompt: 'consent'
  });
  window.location.href = url;
}

// Interception du paramètre d'autorisation OAuth2 au rechargement
const urlParams = new URLSearchParams(window.location.search);
const code = urlParams.get('code');
if(code){
  window.history.replaceState({}, document.title, window.location.pathname);
  gcalExchangeCode(code);
}

async function gcalExchangeCode(c){
  try{
    const r = await fetch(GCAL_FUNCTIONS+'/auth', {
      method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({ action:'exchange', code: c })
    });
    const d = await r.json();
    if(d.access_token){
      gcalTokens = { access_token: d.access_token, refresh_token: d.refresh_token, expiry: Date.now() + d.expires_in*1000 };
      localStorage.setItem('gcal_tokens', JSON.stringify(gcalTokens));
      if(S.profile) S.profile.gcalAutoSync = true; autoSync = true; saveState(); gcalUpdateBtn();
      await gcalResyncAll();
    }
  }catch(e){ console.error('OAuth token exchange failed', e); }
}

async function gcalGetValidToken(){
  if(!gcalTokens) return null;
  if(Date.now() < gcalTokens.expiry - 60000) return gcalTokens.access_token;
  try{
    const r = await fetch(GCAL_FUNCTIONS+'/auth', {
      method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ action:'refresh', refresh_token: gcalTokens.refresh_token })
    });
    const d = await r.json();
    if(d.access_token){
      gcalTokens.access_token = d.access_token; gcalTokens.expiry = Date.now() + d.expires_in*1000;
      localStorage.setItem('gcal_tokens', JSON.stringify(gcalTokens));
      return d.access_token;
    }
  }catch(e){ return null; }
}

async function gcalHandleClick(){
  if(!gcalTokens) { gcalConnect(); return; }
  await gcalResyncAll();
}

async function gcalResyncAll(){
  const tok = await gcalGetValidToken(); if(!tok) return;
  const wrap = document.getElementById('gcal-status-wrap');
  const circ = document.getElementById('gcal-progress-circle');
  
  wrap.className = 'gcal-syncing';
  circ.style.stroke = 'var(--blue)'; circ.style.strokeDashoffset = '0';
  
  try{
    // Chargement de l'ID du calendrier
    if(!gcalCalendarId){
      const rc = await fetch(GCAL_FUNCTIONS+'/calendar', {
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({ action:'getOrCreate', access_token: tok })
      });
      const dc = await rc.json();
      if(dc.id){ gcalCalendarId = dc.id; localStorage.setItem('gcal_calendar_id', gcalCalendarId); }
    }
    
    // Envoi du jeu d'overrides local vers le Cloud Worker GCal
    await fetch(GCAL_FUNCTIONS+'/sync', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({
        access_token: tok, calendarId: gcalCalendarId,
        overrides: S.overrides, profileName: S.profile.name
      })
    });
    
    wrap.className = 'gcal-done-anim';
    setTimeout(()=>{ wrap.className = ''; circ.style.stroke = 'transparent'; circ.style.strokeDashoffset = '81.68'; }, 1500);
  }catch(e){
    wrap.className = ''; circ.style.stroke = 'transparent';
  }
}

function triggerAutoSync(){ if(autoSync && gcalTokens) gcalResyncAll(); }
function toggleGcalAutoSync(cb){ autoSync = cb.checked; if(S.profile) S.profile.gcalAutoSync = autoSync; saveState(); if(autoSync) triggerAutoSync(); }
</script>
